<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- УБРАТЬ ВСЕ CSP! -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - czhmass.com</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
</head>
<body style="background:#1a202c; color:white; padding:20px; font-family:sans-serif;">
    <h1>🔐 Админ-панель</h1>
    
    <div id="adminCheck" style="margin:20px 0; padding:20px; background:#2d3748; border-radius:10px;">
        Проверка прав администратора...
    </div>

    <div id="adminContent" style="display:none;">
        <!-- ПОЛЬЗОВАТЕЛИ -->
        <h2>👥 Пользователи</h2>
        <div id="usersList"></div>
        
        <!-- ПОСТЫ -->
        <h2>📝 Посты</h2>
        <div id="postsList"></div>
    </div>

    <script>
        // === ПРОСТАЯ КОНФИГУРАЦИЯ ===
        const firebaseConfig = {
            apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
            authDomain: "czhmass.firebaseapp.com",
            projectId: "czhmass",
            storageBucket: "czhmass.firebasestorage.app",
            messagingSenderId: "1064257019843",
            appId: "1:1064257019843:web:65488b45be2f86838ca776"
        };

        // Инициализация
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const db = firebase.firestore();
        const auth = firebase.auth();

        // === ПРОСТЫЕ ФУНКЦИИ ===
        function showError(text) {
            alert("❌ " + text);
        }

        function showSuccess(text) {
            alert("✅ " + text);
        }

        // === ПРОВЕРКА АДМИНА ===
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                
                if (!userData || !userData.isAdmin) {
                    showError('Нет прав администратора');
                    setTimeout(() => window.location.href = 'feed.html', 1000);
                    return;
                }

                document.getElementById('adminCheck').innerHTML = `
                    <div style="color:#38a169;">
                        ✅ Вы вошли как администратор: <strong>${userData.username}</strong>
                    </div>
                    <button onclick="logout()" style="margin-top:10px; padding:8px 16px; background:#e53e3e; color:white; border:none; border-radius:5px;">
                        Выйти
                    </button>
                `;
                
                document.getElementById('adminContent').style.display = 'block';
                loadUsers();
                loadPosts();
                
            } catch (error) {
                showError('Ошибка загрузки: ' + error.message);
            }
        });

        // === ЗАГРУЗКА ПОЛЬЗОВАТЕЛЕЙ ===
        async function loadUsers() {
            try {
                const snapshot = await db.collection('users').get();
                let html = '<div style="display:grid; gap:10px; margin:20px 0;">';
                
                snapshot.forEach(doc => {
                    const user = doc.data();
                    const userId = doc.id;
                    
                    html += `
                        <div style="background:#2d3748; padding:15px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <strong>${user.username}</strong><br>
                                <small style="color:#a0aec0;">${user.email} | Постов: ${user.postsCount || 0}</small>
                            </div>
                            <div>
                                ${user.isAdmin ? '<span style="background:#805ad5; padding:3px 8px; border-radius:10px; font-size:12px;">👑 АДМИН</span>' : ''}
                                <button onclick="deleteUserSimple('${userId}', '${user.username}')" 
                                        style="margin-left:10px; padding:6px 12px; background:#e53e3e; color:white; border:none; border-radius:5px;">
                                    🗑️ Удалить
                                </button>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
                document.getElementById('usersList').innerHTML = html;
                
            } catch (error) {
                document.getElementById('usersList').innerHTML = '<div style="color:#e53e3e;">Ошибка загрузки пользователей</div>';
            }
        }

        // === ЗАГРУЗКА ПОСТОВ ===
        async function loadPosts() {
            try {
                const snapshot = await db.collection('posts').orderBy('createdAt', 'desc').limit(50).get();
                let html = '<div style="display:grid; gap:10px; margin:20px 0;">';
                
                snapshot.forEach(doc => {
                    const post = doc.data();
                    const postId = doc.id;
                    const shortText = post.text.length > 50 ? post.text.substring(0, 50) + '...' : post.text;
                    
                    html += `
                        <div style="background:#2d3748; padding:15px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
                            <div style="flex:1;">
                                <strong>@${post.username}</strong><br>
                                <span style="color:#cbd5e0;">${shortText}</span><br>
                                <small style="color:#a0aec0;">${new Date(post.createdAt?.toDate?.() || post.createdAt).toLocaleString()}</small>
                            </div>
                            <button onclick="deletePostSimple('${postId}')" 
                                    style="margin-left:10px; padding:6px 12px; background:#e53e3e; color:white; border:none; border-radius:5px;">
                                🗑️ Удалить
                            </button>
                        </div>
                    `;
                });
                
                html += '</div>';
                document.getElementById('postsList').innerHTML = html;
                
            } catch (error) {
                document.getElementById('postsList').innerHTML = '<div style="color:#e53e3e;">Ошибка загрузки постов</div>';
            }
        }

        // === ПРОСТЫЕ ФУНКЦИИ УДАЛЕНИЯ ===
        window.deletePostSimple = async function(postId) {
            console.log('УДАЛЕНИЕ ПОСТА:', postId);
            
            if (!confirm('🗑️ Удалить этот пост?')) return;
            
            try {
                await db.collection('posts').doc(postId).delete();
                showSuccess('Пост удален!');
                loadPosts(); // Перезагружаем список
                
            } catch (error) {
                console.error('Ошибка удаления поста:', error);
                showError('Ошибка: ' + error.message);
                
                if (error.code === 'permission-denied') {
                    showError('Нет прав доступа! Проверьте правила Firestore.');
                }
            }
        };

        window.deleteUserSimple = async function(userId, username) {
            console.log('УДАЛЕНИЕ ПОЛЬЗОВАТЕЛЯ:', userId, username);
            
            if (!confirm(`🗑️ Удалить пользователя @${username} и все его посты?`)) return;
            
            try {
                // 1. Удаляем посты пользователя
                const postsSnapshot = await db.collection('posts').where('userId', '==', userId).get();
                
                if (!postsSnapshot.empty) {
                    const batch = db.batch();
                    postsSnapshot.forEach(doc => {
                        batch.delete(doc.ref);
                    });
                    await batch.commit();
                    console.log('Удалено постов:', postsSnapshot.size);
                }
                
                // 2. Удаляем пользователя
                await db.collection('users').doc(userId).delete();
                
                showSuccess(`Пользователь @${username} удален!`);
                loadUsers(); // Перезагружаем списки
                loadPosts();
                
            } catch (error) {
                console.error('Ошибка удаления пользователя:', error);
                showError('Ошибка: ' + error.message);
                
                if (error.code === 'permission-denied') {
                    showError('Нет прав доступа! Правила Firestore:');
                    console.log(`
rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    function isAdmin() {
      return request.auth != null && 
             exists(/databases/\$(database)/documents/users/\$(request.auth.uid)) &&
             get(/databases/\$(database)/documents/users/\$(request.auth.uid)).data.isAdmin == true;
    }

    match /users/{userId} {
      allow list: if true;
      allow read: if request.auth != null;
      allow create: if request.auth != null;
      allow update, delete: if 
        request.auth != null && 
        (request.auth.uid == userId || isAdmin());
    }
    
    match /posts/{postId} {
      allow read: if request.auth != null;
      allow create: if request.auth != null;
      allow update, delete: if 
        request.auth != null && 
        (resource.data.userId == request.auth.uid || isAdmin());
    }
  }
}
                    `);
                }
            }
        };

        // === ВЫХОД ===
        window.logout = function() {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        };

        console.log('⚡ Админ-панель загружена (упрощенная версия)');
    </script>
</body>
</html>
