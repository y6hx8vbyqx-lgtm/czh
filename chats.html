<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личные сообщения - czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>

<style>
:root{
  --bg:#000;
  --card:rgba(28,28,30,.95);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
  --success:#30d158;
  --online:#30d158;
  --offline:#8e8e93;
  --views:#8e8e93;
  --message:#5ac8fa;
  --outgoing-message:#667eea;
  --pinned:#ffd60a;
  --reply:#5ac8fa;
  --heart:#ff375f;
  --call-bg:#1c1c1e;
  --call-accept:#30d158;
  --call-decline:#ff453a;
  --call-video:#5ac8fa;
  --voice-message:#5ac8fa;
  --voice-wave:#667eea;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  height:100vh;
  overflow:hidden;
}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);
  border-radius:18px;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}
.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  cursor:pointer;
}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}
.chats-btn{
  background:#5ac8fa;
  color:var(--bg);
}

.container{
  max-width:480px;
  margin:auto;
  padding:140px 14px 100px;
  height:100vh;
  overflow-y:auto;
  position:relative;
  z-index:1;
}

.chats-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.chat-item {
  background: var(--card);
  border-radius: 20px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: transform 0.2s, background 0.2s;
  position: relative;
}
.chat-item:hover {
  background: rgba(255,255,255,0.05);
  transform: translateY(-2px);
}
.chat-item.unread {
  background: rgba(90,200,250,0.1);
}
.chat-item.unread::after {
  content: '';
  position: absolute;
  top: 18px;
  right: 18px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--message);
}
.chat-item.pinned {
  background: rgba(255,214,10,0.1);
  border-left: 4px solid var(--pinned);
}
.chat-item.pinned .pin-indicator {
  color: var(--pinned);
}
.chat-avatar {
  width: 56px;
  height: 56px;
  border-radius: 18px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 20px;
  flex-shrink: 0;
  position: relative;
}
.chat-info {
  flex: 1;
  min-width: 0;
  padding-right: 80px;
}
.chat-user {
  font-weight: 600;
  font-size: 16px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.verified-badge {
  color: #5ac8fa;
  font-size: 14px;
}
.chat-preview {
  color: var(--sub);
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-time {
  color: var(--sub);
  font-size: 12px;
  margin-top: 4px;
}
.chat-actions {
  position: absolute;
  top: 50%;
  right: 16px;
  transform: translateY(-50%);
  display: flex;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.2s;
}
.chat-item:hover .chat-actions {
  opacity: 1;
}
.action-btn {
  background: rgba(28,28,30,0.8);
  border: none;
  color: var(--sub);
  width: 36px;
  height: 36px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
}
.action-btn:hover {
  background: var(--card);
  color: var(--text);
  transform: scale(1.1);
}
.action-btn.pin-btn:hover {
  color: var(--pinned);
  background: rgba(255,214,10,0.1);
}
.action-btn.delete-btn:hover {
  color: var(--danger);
  background: rgba(255,69,58,0.1);
}
.no-chats {
  text-align: center;
  padding: 80px 20px;
  color: var(--sub);
}
.no-chats-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.no-chats-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}
.no-chats-description {
  font-size: 14px;
  line-height: 1.4;
}

.chat-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 5000;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.chat-overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
}
.chat-header {
  background: var(--card);
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: relative;
  min-height: 72px;
  flex-shrink: 0;
  z-index: 10;
}
.chat-user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
}
.chat-header-avatar {
  width: 44px;
  height: 44px;
  border-radius: 16px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 18px;
}
.chat-header-username {
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
}
.chat-header-username:hover {
  opacity: 0.8;
}
.chat-header-time {
  font-size: 12px;
  margin-top: 2px;
  color: var(--sub);
}
.chat-close-btn {
  background: none;
  border: none;
  color: var(--sub);
  font-size: 24px;
  cursor: pointer;
  padding: 8px;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.chat-close-btn:hover {
  background: rgba(255,255,255,0.1);
}

.call-buttons {
  display: flex;
  gap: 8px;
  margin-right: 8px;
}
.call-btn {
  background: var(--card);
  border: none;
  color: #fff;
  width: 40px;
  height: 40px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
  transition: all 0.2s;
}
.call-btn.audio {
  background: var(--success);
}
.call-btn.audio:hover {
  background: #34c759;
  transform: scale(1.1);
}
.call-btn.video {
  background: var(--call-video);
}
.call-btn.video:hover {
  background: #5ac8fa;
  transform: scale(1.1);
}
.call-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.call-btn:disabled:hover {
  transform: none;
}

.block-btn {
  background: var(--danger);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-right: 8px;
}
.block-btn:hover {
  opacity: 0.9;
}
.unblock-btn {
  background: var(--success);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-right: 8px;
}
.unblock-btn:hover {
  opacity: 0.9;
}

.call-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.95);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.call-modal.show {
  opacity: 1;
  pointer-events: auto;
}
.call-container {
  width: 100%;
  max-width: 400px;
  padding: 20px;
  text-align: center;
}
.call-avatar {
  width: 120px;
  height: 120px;
  border-radius: 60px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 60px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% {
    box-shadow: 0 0 0 0 rgba(90, 200, 250, 0.7);
  }
  70% {
    box-shadow: 0 0 0 20px rgba(90, 200, 250, 0);
  }
  100% {
    box-shadow: 0 0 0 0 rgba(90, 200, 250, 0);
  }
}
.call-info {
  margin-bottom: 30px;
}
.call-name {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  color: #fff;
}
.call-type {
  color: var(--sub);
  font-size: 16px;
}
.call-timer {
  font-size: 32px;
  font-weight: 600;
  color: #fff;
  margin: 20px 0;
  font-family: monospace;
}
.call-controls {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}
.call-control-btn {
  width: 70px;
  height: 70px;
  border-radius: 35px;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 28px;
  transition: all 0.3s ease;
}
.call-control-btn:hover {
  transform: scale(1.1);
}
.call-control-btn.audio-mute {
  background: var(--card);
  color: #fff;
}
.call-control-btn.audio-mute.muted {
  background: var(--danger);
}
.call-control-btn.video-toggle {
  background: var(--card);
  color: #fff;
}
.call-control-btn.video-toggle.off {
  background: var(--danger);
}
.call-control-btn.end-call {
  background: var(--danger);
  color: #fff;
}
.call-control-btn.accept-call {
  background: var(--success);
  color: #fff;
}
.call-control-btn.decline-call {
  background: var(--danger);
  color: #fff;
}

.video-container {
  position: relative;
  width: 100%;
  height: 0;
  padding-bottom: 56.25%;
  background: #1c1c1e;
  border-radius: 20px;
  overflow: hidden;
  margin: 20px 0;
}
#remoteVideo {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
#localVideo {
  position: absolute;
  width: 120px;
  height: 160px;
  bottom: 20px;
  right: 20px;
  border-radius: 12px;
  border: 2px solid #fff;
  z-index: 2;
  object-fit: cover;
}

.incoming-call {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--card);
  border-radius: 30px;
  padding: 30px;
  z-index: 10001;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
  animation: slideIn 0.3s ease;
  min-width: 320px;
  text-align: center;
}
@keyframes slideIn {
  from {
    transform: translate(-50%, -30%);
    opacity: 0;
  }
  to {
    transform: translate(-50%, -50%);
    opacity: 1;
  }
}
.incoming-avatar {
  width: 100px;
  height: 100px;
  border-radius: 50px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 15px;
  font-size: 50px;
  animation: pulse 2s infinite;
}
.incoming-name {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 8px;
  color: #fff;
}
.incoming-type {
  color: var(--sub);
  font-size: 16px;
  margin-bottom: 20px;
}
.incoming-buttons {
  display: flex;
  gap: 20px;
  justify-content: center;
}
.incoming-accept {
  background: var(--success);
  color: #fff;
  border: none;
  width: 60px;
  height: 60px;
  border-radius: 30px;
  font-size: 24px;
  cursor: pointer;
  transition: all 0.2s;
}
.incoming-accept:hover {
  transform: scale(1.1);
}
.incoming-decline {
  background: var(--danger);
  color: #fff;
  border: none;
  width: 60px;
  height: 60px;
  border-radius: 30px;
  font-size: 24px;
  cursor: pointer;
  transition: all 0.2s;
}
.incoming-decline:hover {
  transform: scale(1.1);
}

.reply-preview {
  background: var(--card);
  border-left: 4px solid var(--reply);
  border-radius: 12px;
  padding: 10px 14px;
  margin-bottom: 8px;
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.reply-preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.reply-sender {
  font-size: 12px;
  color: var(--reply);
  font-weight: 600;
}
.reply-close-btn {
  background: none;
  border: none;
  color: var(--sub);
  font-size: 14px;
  cursor: pointer;
  width: 20px;
  height: 20px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.reply-close-btn:hover {
  background: rgba(255,255,255,0.1);
}
.reply-text {
  font-size: 13px;
  color: var(--sub);
  line-height: 1.3;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.reply-icon {
  color: var(--reply);
  font-size: 14px;
  flex-shrink: 0;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  min-height: 0;
  -webkit-overflow-scrolling: touch;
}
.message {
  max-width: 75%;
  padding: 12px 16px;
  border-radius: 18px;
  line-height: 1.4;
  word-break: break-word;
  position: relative;
  animation: fade 0.3s ease;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.message:hover {
  background: rgba(255,255,255,0.03);
}
.message-outgoing {
  align-self: flex-end;
  background: var(--outgoing-message);
  color: white;
  border-bottom-right-radius: 4px;
}
.message-incoming {
  align-self: flex-start;
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.message-replied {
  margin-top: 4px;
}
.message-reply {
  background: rgba(90,200,250,0.1);
  border-left: 3px solid var(--reply);
  border-radius: 10px;
  padding: 8px 10px;
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.3;
  max-width: 100%;
  overflow: hidden;
}
.message-reply-sender {
  font-weight: 600;
  color: var(--reply);
  font-size: 11px;
  margin-bottom: 2px;
}
.message-reply-text {
  color: var(--sub);
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.message-text {
  font-size: 15px;
  line-height: 1.4;
}
.message-time {
  font-size: 11px;
  opacity: 0.7;
  margin-top: 6px;
  text-align: right;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
}
.message-status {
  font-size: 10px;
}

.message-reactions {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.reaction {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 2px 6px;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  transition: all 0.2s;
}
.reaction:hover {
  background: rgba(255,255,255,0.15);
  transform: scale(1.1);
}
.reaction.liked {
  background: rgba(255,55,95,0.2);
  color: var(--heart);
}
.reaction-count {
  font-size: 11px;
}

.reactions-panel {
  position: absolute;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px;
  display: flex;
  gap: 8px;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.2s;
  pointer-events: none;
}
.reactions-panel.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.reaction-emoji {
  font-size: 24px;
  cursor: pointer;
  transition: transform 0.2s;
  padding: 4px;
  border-radius: 12px;
}
.reaction-emoji:hover {
  transform: scale(1.2);
  background: rgba(255,255,255,0.1);
}
.reaction-emoji.heart:hover {
  color: var(--heart);
}

.message-date-divider {
  text-align: center;
  color: var(--sub);
  font-size: 12px;
  padding: 8px 0;
  position: relative;
  margin: 12px 0;
}
.message-date-divider::before,
.message-date-divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 30%;
  height: 1px;
  background: var(--border);
}
.message-date-divider::before {
  left: 0;
}
.message-date-divider::after {
  right: 0;
}

/* Стили для голосовых сообщений */
.voice-message {
  background: rgba(90,200,250,0.1);
  border-radius: 20px;
  padding: 12px;
  margin: 4px 0;
  display: flex;
  align-items: center;
  gap: 12px;
}
.voice-play-btn {
  width: 40px;
  height: 40px;
  border-radius: 20px;
  background: var(--voice-message);
  border: none;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: transform 0.2s;
}
.voice-play-btn:hover {
  transform: scale(1.1);
}
.voice-play-btn.playing {
  background: var(--danger);
}
.voice-waveform {
  flex: 1;
  height: 40px;
  display: flex;
  align-items: center;
  gap: 2px;
}
.wave-bar {
  width: 3px;
  height: 20px;
  background: var(--voice-wave);
  border-radius: 1.5px;
  transition: height 0.1s ease;
}
.wave-bar.active {
  background: var(--success);
  height: 30px;
}
.voice-time {
  font-size: 12px;
  color: var(--sub);
  min-width: 45px;
}
.voice-delete-btn {
  background: none;
  border: none;
  color: var(--danger);
  font-size: 16px;
  cursor: pointer;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.voice-delete-btn:hover {
  opacity: 1;
}

.chat-input-area {
  background: var(--card);
  padding: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
  position: relative;
  flex-shrink: 0;
  z-index: 10;
}
.reply-container {
  width: 100%;
}
.chat-input-wrapper {
  width: 100%;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.chat-input {
  flex: 1;
  background: #1c1c1e;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 12px 16px;
  color: #fff;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  line-height: 1.4;
}
.chat-input:focus {
  outline: none;
  border-color: var(--accent);
}
.chat-input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.chat-send-btn {
  background: var(--accent);
  border: none;
  color: white;

// Улучшенная функция воспроизведения рингтона
async function playRingtone() {
  console.log('🔔 Попытка воспроизвести рингтон...');
  
  try {
    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    
    if (audioContext.state === 'suspended') {
      console.log('🔇 Аудио контекст заблокирован, нужно взаимодействие');
      showNotification('🔔 Входящий звонок! Нажмите для ответа');
      
      const unlockBtn = document.createElement('button');
      unlockBtn.innerHTML = '🔔 Входящий звонок! Нажмите для звука';
      unlockBtn.id = 'unlock-audio-btn';
      
      unlockBtn.onclick = async () => {
        await audioContext.resume();
        playRingtonePattern();
        setTimeout(() => {
          if (unlockBtn.parentNode) unlockBtn.remove();
        }, 1000);
      };
      
      document.body.appendChild(unlockBtn);
      return;
    }
    
    if (audioContext.state === 'running') {
      playRingtonePattern();
    }
    
  } catch (e) {
    console.error('Ошибка воспроизведения:', e);
    showNotification('🔔 Входящий звонок!');
  }
}

function playRingtonePattern() {
  if (!audioContext || audioContext.state !== 'running') return;
  
  stopRingtone();
  
  ringtoneAudio = setInterval(() => {
    if (!audioContext || audioContext.state !== 'running') {
      stopRingtone();
      return;
    }
    
    playBeep(440, 0.15);
    setTimeout(() => playBeep(440, 0.15), 200);
    
  }, 2000);
}

function playBeep(frequency = 440, duration = 0.15) {
  if (!audioContext || audioContext.state !== 'running') return;
  
  try {
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
    
    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
    
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    oscillator.start();
    oscillator.stop(audioContext.currentTime + duration);
    
  } catch (e) {
    console.error('Ошибка воспроизведения звука:', e);
  }
}

function stopRingtone() {
  if (ringtoneAudio) {
    if (typeof ringtoneAudio === 'number') {
      clearInterval(ringtoneAudio);
    }
    ringtoneAudio = null;
  }
  
  const unlockBtn = document.getElementById('unlock-audio-btn');
  if (unlockBtn) unlockBtn.remove();
}

async function testAudioOutput() {
  try {
    const testContext = new (window.AudioContext || window.webkitAudioContext)();
    
    if (testContext.state === 'suspended') {
      console.log('🔇 Аудио контекст заблокирован');
      
      const testBtn = document.createElement('button');
      testBtn.innerHTML = '🔊 Проверить звук';
      testBtn.id = 'test-audio-btn';
      
      testBtn.onclick = async () => {
        await testContext.resume();
        
        const oscillator = testContext.createOscillator();
        const gainNode = testContext.createGain();
        
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(440, testContext.currentTime);
        
        gainNode.gain.setValueAtTime(0.2, testContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, testContext.currentTime + 0.3);
        
        oscillator.connect(gainNode);
        gainNode.connect(testContext.destination);
        
        oscillator.start();
        oscillator.stop(testContext.currentTime + 0.3);
        
        testBtn.remove();
        showNotification('✅ Звук работает!');
      };
      
      document.body.appendChild(testBtn);
      return false;
    }
    
    return true;
  } catch (e) {
    console.error('Ошибка теста аудио:', e);
    return false;
  }
}

async function testMediaDevices() {
  console.log('🔍 Тест медиаустройств...');
  
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      console.error('❌ getUserMedia не поддерживается');
      showNotification('Ваш браузер не поддерживает звонки');
      return false;
    }
    
    const devices = await navigator.mediaDevices.enumerateDevices();
    const audioInputs = devices.filter(d => d.kind === 'audioinput');
    const videoInputs = devices.filter(d => d.kind === 'videoinput');
    
    console.log('📱 Найденные устройства:');
    console.log('- Аудио входы:', audioInputs.length);
    console.log('- Видео входы:', videoInputs.length);
    
    if (audioInputs.length === 0) {
      console.warn('⚠️ Нет микрофона');
      showNotification('Микрофон не найден');
      return false;
    }
    
    console.log('🎤 Запрос доступа к микрофону...');
    const audioStream = await navigator.mediaDevices.getUserMedia({ 
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      } 
    });
    console.log('✅ Доступ к микрофону получен');
    
    const audioTrack = audioStream.getAudioTracks()[0];
    if (audioTrack) {
      console.log('🔊 Аудио трек:', audioTrack.label);
      console.log('🔊 Аудио трек включен:', audioTrack.enabled);
    }
    
    audioStream.getTracks().forEach(track => track.stop());
    
    return true;
    
  } catch (error) {
    console.error('❌ Ошибка теста медиа:', error);
    
    if (error.name === 'NotAllowedError') {
      showNotification('❌ Разрешите доступ к микрофону');
    } else if (error.name === 'NotFoundError') {
      showNotification('❌ Микрофон не найден');
    } else {
      showNotification('❌ Ошибка: ' + error.message);
    }
    return false;
  }
}

async function sendIceCandidate(candidate) {
  if (!currentCall) return;
  
  try {
    const candidateData = {
      candidate: candidate.candidate || '',
      sdpMid: candidate.sdpMid || '',
      sdpMLineIndex: candidate.sdpMLineIndex || 0,
      usernameFragment: candidate.usernameFragment || ''
    };
    
    await db.collection('calls').doc(currentCall).collection('iceCandidates').add({
      candidate: candidateData,
      sender: currentUser.uid,
      timestamp: new Date()
    });
    console.log('✅ ICE кандидат отправлен');
  } catch (error) {
    console.error('Ошибка отправки ICE кандидата:', error);
  }
}

function watchCallStatus(callId) {
  if (callStatusListener) callStatusListener();
  
  callStatusListener = db.collection('calls').doc(callId).onSnapshot(async (snapshot) => {
    const call = snapshot.data();
    if (!call) return;
    
    console.log('Статус звонка:', call.status);
    console.log('Документ звонка:', call);
    
    // ВАЖНО: Проверяем наличие answer и устанавливаем remote description
    if (call.answer && peerConnection && !peerConnection.currentRemoteDescription) {
      console.log('📞 Получен ответ, устанавливаем remote description...');
      
      try {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(call.answer));
        console.log('✅ Remote description установлен!');
        
        // Добавляем все накопленные ICE кандидаты
        console.log(`📦 Добавление накопленных ICE кандидатов (${pendingIceCandidates.length})...`);
        for (const candidateData of pendingIceCandidates) {
          try {
            const candidate = new RTCIceCandidate({
              candidate: candidateData.candidate || '',
              sdpMid: candidateData.sdpMid || '',
              sdpMLineIndex: candidateData.sdpMLineIndex || 0,
              usernameFragment: candidateData.usernameFragment || ''
            });
            await peerConnection.addIceCandidate(candidate);
            console.log('✅ Накопленный ICE кандидат добавлен');
          } catch (e) {
            console.error('❌ Ошибка добавления накопленного ICE кандидата:', e);
          }
        }
        pendingIceCandidates = [];
        
      } catch (e) {
        console.error('❌ Ошибка установки remote description:', e);
      }
    }
    
    if (call.status === 'connected') {
      document.getElementById('outgoingControls').style.display = 'none';
      document.getElementById('activeCallControls').style.display = 'flex';
      if (callType === 'video') {
        document.getElementById('videoToggleBtn').style.display = 'flex';
      }
      startCallTimer();
      
      if (localStream) {
        const audioTracks = localStream.getAudioTracks();
        if (audioTracks.length > 0) {
          audioTracks[0].enabled = true;
          console.log('🔊 Локальное аудио включено');
        }
      }
      
      // Проверяем, что remote description установлен
      if (peerConnection && !peerConnection.currentRemoteDescription) {
        console.log('⚠️ Статус connected, но remote description не установлен! Пробуем перечитать документ...');
        
        setTimeout(async () => {
          try {
            const freshDoc = await db.collection('calls').doc(callId).get();
            const freshCall = freshDoc.data();
            
            if (freshCall.answer && peerConnection && !peerConnection.currentRemoteDescription) {
              console.log('📞 Повторная попытка установки remote description...');
              await peerConnection.setRemoteDescription(new RTCSessionDescription(freshCall.answer));
              console.log('✅ Remote description установлен (повторно)!');
              
              for (const candidateData of pendingIceCandidates) {
                try {
                  const candidate = new RTCIceCandidate(candidateData);
                  await peerConnection.addIceCandidate(candidate);
                  console.log('✅ Накопленный ICE кандидат добавлен');
                } catch (e) {
                  console.error('❌ Ошибка добавления ICE кандидата:', e);
                }
              }
              pendingIceCandidates = [];
            }
          } catch (e) {
            console.error('❌ Ошибка при повторной попытке:', e);
          }
        }, 1000);
      }
      
    } else if (call.status === 'ended') {
      console.log('Звонок завершен');
      await saveCallHistory(call);
      showNotification('Звонок завершен');
      cleanupCall();
      
    } else if (call.status === 'declined') {
      console.log('Звонок отклонен');
      await saveCallHistory({ ...call, status: 'declined' });
      showNotification('Пользователь отклонил звонок');
      cleanupCall();
    }
  });
  
  if (iceCandidateListener) iceCandidateListener();
  
  iceCandidateListener = db.collection('calls').doc(callId).collection('iceCandidates')
    .orderBy('timestamp', 'asc')
    .onSnapshot((snapshot) => {
      snapshot.docChanges().forEach(async (change) => {
        if (change.type === 'added' && peerConnection) {
          const data = change.doc.data();
          if (data.sender !== currentUser.uid) {
            console.log('📦 Получен ICE кандидат от собеседника');
            
            try {
              const candidateData = data.candidate;
              
              if (!peerConnection.remoteDescription) {
                console.log('⚠️ Remote description еще не установлен, сохраняем ICE кандидат');
                pendingIceCandidates.push(candidateData);
                return;
              }
              
              const candidate = new RTCIceCandidate({
                candidate: candidateData.candidate || '',
                sdpMid: candidateData.sdpMid || '',
                sdpMLineIndex: candidateData.sdpMLineIndex || 0,
                usernameFragment: candidateData.usernameFragment || ''
              });
              
              await peerConnection.addIceCandidate(candidate);
              console.log('✅ ICE кандидат добавлен');
            } catch (e) {
              console.error('Ошибка добавления ICE кандидата:', e);
            }
          }
        }
      });
    });
}

// Новая функция для сохранения истории звонков
async function saveCallHistory(call) {
  if (!currentChatId || !call) return;
  
  try {
    const duration = callStartTime ? Math.floor((Date.now() - callStartTime) / 1000) : 0;
    const minutes = Math.floor(duration / 60);
    const seconds = duration % 60;
    const durationStr = duration > 0 ? `${minutes}:${seconds.toString().padStart(2, '0')}` : null;
    
    const callMessage = {
      type: 'call',
      callType: call.type || callType,
      callStatus: call.status,
      callerId: call.callerId,
      duration: durationStr,
      timestamp: new Date(),
      senderId: currentUser.uid
    };
    
    await db.collection('chats').doc(currentChatId)
      .collection('messages')
      .add(callMessage);
    
    console.log('✅ История звонка сохранена');
    
  } catch (error) {
    console.error('Ошибка сохранения истории звонка:', error);
  }
}

async function initializeCall() {
  try {
    console.log('Инициализация звонка...');
    
    const constraints = {
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      },
      video: callType === 'video' ? {
        width: { ideal: 1280 },
        height: { ideal: 720 },
        facingMode: 'user'
      } : false
    };
    
    console.log('Запрос медиа с параметрами:', constraints);
    localStream = await navigator.mediaDevices.getUserMedia(constraints);
    console.log('✅ Медиа получены:', localStream.getTracks().map(t => t.kind).join(', '));
    
    const audioTracks = localStream.getAudioTracks();
    if (audioTracks.length > 0) {
      console.log('🔊 Аудио трек:', audioTracks[0].label);
      console.log('🔊 Аудио трек включен:', audioTracks[0].enabled);
      audioTracks[0].enabled = true;
    }
    
    if (callType === 'video') {
      document.getElementById('videoContainer').style.display = 'block';
      const localVideo = document.getElementById('localVideo');
      localVideo.srcObject = localStream;
      await localVideo.play().catch(e => console.warn('Ошибка воспроизведения локального видео:', e));
      console.log('✅ Локальное видео запущено');
    }
    
    peerConnection = new RTCPeerConnection(iceServers);
    
    localStream.getTracks().forEach(track => {
      console.log('Добавление трека:', track.kind);
      peerConnection.addTrack(track, localStream);
    });
    
    peerConnection.ontrack = (event) => {
      console.log('🎥 Получен удаленный поток');
      remoteStream = event.streams[0];
      
      const remoteAudioTracks = remoteStream.getAudioTracks();
      if (remoteAudioTracks.length > 0) {
        console.log('🔊 Удаленный аудио трек получен:', remoteAudioTracks[0].label);
        remoteAudioTracks[0].enabled = true;
      }
      
      const remoteVideo = document.getElementById('remoteVideo');
      if (remoteVideo) {
        remoteVideo.srcObject = remoteStream;
        remoteVideo.play()
          .then(() => console.log('✅ Удаленное видео запущено'))
          .catch(e => console.warn('Ошибка воспроизведения удаленного видео:', e));
      }
    };
    
    peerConnection.onicecandidate = (event) => {
      if (event.candidate) {
        console.log('📦 Отправка ICE кандидата');
        sendIceCandidate(event.candidate);
      }
    };
    
    peerConnection.onicegatheringstatechange = () => {
      console.log('🔄 ICE gathering state:', peerConnection.iceGatheringState);
    };
    
    peerConnection.oniceconnectionstatechange = () => {
      console.log('🔌 ICE connection state:', peerConnection.iceConnectionState);
      if (peerConnection.iceConnectionState === 'connected' || 
          peerConnection.iceConnectionState === 'completed') {
        console.log('✅ ICE соединение установлено!');
        showNotification('✅ Соединение установлено!');
      }
    };
    
    peerConnection.onconnectionstatechange = () => {
      console.log('🔗 Состояние соединения:', peerConnection.connectionState);
      if (peerConnection.connectionState === 'connected') {
        console.log('✅ Соединение установлено!');
      }
    };
    
    console.log('📞 Создание оффера...');
    const offer = await peerConnection.createOffer({
      offerToReceiveAudio: true,
      offerToReceiveVideo: callType === 'video'
    });
    
    await peerConnection.setLocalDescription(offer);
    console.log('✅ Оффер создан');
    
    const callId = 'call_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    
    const callData = {
      callerId: currentUser.uid,
      callerName: userData.username,
      targetId: currentChatUserId,
      offer: {
        type: offer.type,
        sdp: offer.sdp
      },
      type: callType,
      status: 'ringing',
      createdAt: new Date()
    };
    
    console.log('💾 Сохранение звонка в Firebase:', callId);
    await db.collection('calls').doc(callId).set(callData);
    
    currentCall = callId;
    
    showCallModal('outgoing');
    
    watchCallStatus(callId);
    
  } catch (error) {
    console.error('❌ Ошибка инициализации звонка:', error);
    
    if (error.name === 'NotAllowedError') {
      showNotification('Разрешите доступ к микрофону и камере');
    } else if (error.name === 'NotFoundError') {
      showNotification('Микрофон или камера не найдены');
    } else if (error.name === 'NotReadableError') {
      showNotification('Устройства заняты другим приложением');
    } else {
      showNotification('Ошибка: ' + error.message);
    }
    
    cleanupCall();
  }
}

  }

function cleanupCall() {
  console.log('🧹 Очистка звонка');
  
  if (localStream) {
    localStream.getTracks().forEach(track => {
      track.stop();
      console.log('✅ Трек остановлен:', track.kind);
    });
    localStream = null;
  }
  
  if (peerConnection) {
    peerConnection.close();
    peerConnection = null;
    console.log('✅ Peer connection закрыт');
  }
  
  document.getElementById('callModal').classList.remove('show');
  document.getElementById('incomingCall').style.display = 'none';
  document.getElementById('videoContainer').style.display = 'none';
  
  const localVideo = document.getElementById('localVideo');
  const remoteVideo = document.getElementById('remoteVideo');
  if (localVideo) localVideo.srcObject = null;
  if (remoteVideo) remoteVideo.srcObject = null;
  
  if (callTimer) {
    clearInterval(callTimer);
    callTimer = null;
  }
  
  stopRingtone();
  
  if (callStatusListener) {
    callStatusListener();
    callStatusListener = null;
  }
  
  if (iceCandidateListener) {
    iceCandidateListener();
    iceCandidateListener = null;
  }
  
  pendingIceCandidates = [];
  remoteStream = null;
  currentCall = null;
  
  console.log('✅ Звонок полностью очищен');
}

// ==================== ФУНКЦИИ ДЛЯ ГОЛОСОВЫХ СООБЩЕНИЙ ====================

async function toggleVoiceRecording() {
  if (isRecording) {
    stopVoiceRecording();
  } else {
    await startVoiceRecording();
  }
}

async function startVoiceRecording() {
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showNotification('Ваш браузер не поддерживает запись голоса');
      return;
    }
    
    const stream = await navigator.mediaDevices.getUserMedia({ 
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      } 
    });
    
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    
    mediaRecorder.ondataavailable = (event) => {
      if (event.data.size > 0) {
        audioChunks.push(event.data);
      }
    };
    
    mediaRecorder.onstop = async () => {
      const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      await sendVoiceMessage(audioBlob);
      
      stream.getTracks().forEach(track => track.stop());
    };
    
    mediaRecorder.start();
    isRecording = true;
    recordingStartTime = Date.now();
    
    document.getElementById('voiceRecordBtn').classList.add('recording');
    document.getElementById('voiceRecordBtn').innerHTML = '⏹️';
    
    // Запускаем таймер записи
    recordingTimer = setInterval(() => {
      const duration = Math.floor((Date.now() - recordingStartTime) / 1000);
      const minutes = Math.floor(duration / 60);
      const seconds = duration % 60;
      showNotification(`⏺️ Запись: ${minutes}:${seconds.toString().padStart(2, '0')}`, 1000);
    }, 1000);
    
  } catch (error) {
    console.error('Ошибка начала записи:', error);
    showNotification('Ошибка доступа к микрофону');
  }
}

function stopVoiceRecording() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    
    if (recordingTimer) {
      clearInterval(recordingTimer);
      recordingTimer = null;
    }
    
    document.getElementById('voiceRecordBtn').classList.remove('recording');
    document.getElementById('voiceRecordBtn').innerHTML = '🎤';
  }
}

async function sendVoiceMessage(audioBlob) {
  if (!currentChatUserId) {
    showNotification('Ошибка: выберите чат');
    return;
  }
  
  if (blockedUsers.includes(currentChatUserId)) {
    showNotification('Нельзя отправить сообщение заблокированному пользователю');
    return;
  }
  
  try {
    showNotification('⏫ Загрузка голосового сообщения...');
    
    // Создаем уникальное имя файла
    const fileName = `voice_${Date.now()}_${Math.random().toString(36).substr(2, 9)}.webm`;
    const storageRef = storage.ref().child(`voice_messages/${currentChatId}/${fileName}`);
    
    // Загружаем в Storage
    await storageRef.put(audioBlob);
    const downloadUrl = await storageRef.getDownloadURL();
    
    // Создаем сообщение
    const duration = Math.floor((Date.now() - recordingStartTime) / 1000);
    
    let chatId = currentChatId;
    
    if (!chatId) {
      const newChatRef = await db.collection('chats').add({
        participants: [currentUser.uid, currentChatUserId],
        lastMessage: '🎤 Голосовое сообщение',
        lastSender: currentUser.uid,
        lastMessageTime: new Date(),
        createdAt: new Date(),
        updatedAt: new Date(),
        unreadFor: [currentChatUserId]
      });
      
      chatId = newChatRef.id;
      currentChatId = chatId;
    } else {
      await db.collection('chats').doc(chatId).update({
        lastMessage: '🎤 Голосовое сообщение',
        lastSender: currentUser.uid,
        lastMessageTime: new Date(),
        updatedAt: new Date(),
        unreadFor: firebase.firestore.FieldValue.arrayUnion(currentChatUserId)
      });
    }
    
    const messageData = {
      type: 'voice',
      voiceUrl: downloadUrl,
      voiceDuration: duration,
      senderId: currentUser.uid,
      timestamp: new Date(),
      read: false
    };
    
    if (replyingToMessage) {
      messageData.replyTo = {
        messageId: replyingToMessage.id,
        senderId: replyingToMessage.senderId,
        text: replyingToMessage.text
      };
      cancelReply();
    }
    
    await db.collection('chats').doc(chatId)
      .collection('messages')
      .add(messageData);
    
    showNotification('✅ Голосовое сообщение отправлено');
    loadChatsList();
    
  } catch (error) {
    console.error('Ошибка отправки голосового сообщения:', error);
    showNotification('Ошибка: ' + error.message);
  }
}

function playVoiceMessage(messageId, voiceUrl) {
  if (audioPlayers[messageId]) {
    // Останавливаем если играет
    if (!audioPlayers[messageId].paused) {
      audioPlayers[messageId].pause();
      audioPlayers[messageId].currentTime = 0;
      updateVoiceButtonState(messageId, false);
      return;
    }
  }
  
  // Останавливаем все другие аудио
  Object.values(audioPlayers).forEach(player => {
    if (!player.paused) {
      player.pause();
    }
  });
  
  const audio = new Audio(voiceUrl);
  audioPlayers[messageId] = audio;
  
  audio.onplay = () => updateVoiceButtonState(messageId, true);
  audio.onended = () => updateVoiceButtonState(messageId, false);
  audio.onpause = () => updateVoiceButtonState(messageId, false);
  
  audio.play().catch(e => console.error('Ошибка воспроизведения:', e));
}

function updateVoiceButtonState(messageId, isPlaying) {
  const button = document.querySelector(`.voice-play-btn[data-message-id="${messageId}"]`);
  if (button) {
    button.innerHTML = isPlaying ? '⏸️' : '▶️';
    button.classList.toggle('playing', isPlaying);
  }
}

function formatDuration(seconds) {
  if (!seconds) return '0:00';
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

// ==================== ФУНКЦИИ ДЛЯ ЧАТОВ ====================

function formatTimeAgo(date) {
  if (!date) return "только что";
  
  const now = new Date();
  const diff = now - date;
  const seconds = Math.floor(diff / 1000);
  const minutes = Math.floor(seconds / 60);
  const hours = Math.floor(minutes / 60);
  const days = Math.floor(hours / 24);
  
  if (days > 7) {
    return date.toLocaleDateString("ru-RU", {
      day: "2-digit",
      month: "2-digit"
    });
  } else if (days > 0) {
    return `${days} д назад`;
  } else if (hours > 0) {
    return `${hours} ч назад`;
  } else if (minutes > 0) {
    return `${minutes} мин назад`;
  } else {
    return "только что";
  }
}

function formatMessageTime(date) {
  if (!date) return "";
  return date.toLocaleTimeString("ru-RU", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

async function getUserInfo(userId) {
  if (usersCache.has(userId)) {
    return usersCache.get(userId);
  }
  
  try {
    const userDoc = await db.collection("users").doc(userId).get();
    let userInfo = {
      username: "user" + userId.slice(-6),
      isAdmin: false
    };
    
    if (userDoc.exists) {
      const data = userDoc.data();
      userInfo = {
        username: data.username || userInfo.username,
        isAdmin: data.isAdmin || false
      };
    }
    
    usersCache.set(userId, userInfo);
    return userInfo;
  } catch (error) {
    console.error("Ошибка получения информации о пользователе:", error);
    return {
      username: "user" + userId.slice(-6),
      isAdmin: false
    };
  }
}

async function loadChatsList() {
  const chatsList = document.getElementById('chatsList');
  
  try {
    const chatsSnap = await db.collection('chats').get();
    
    if (chatsSnap.empty) {
      chatsList.innerHTML = `
        <div class="no-chats">
          <div class="no-chats-icon">💬</div>
          <div class="no-chats-title">Нет сообщений</div>
          <div class="no-chats-description">
            Начните общение с другими пользователями!
          </div>
        </div>`;
      return;
    }
    
    const userChats = [];
    
    for (const doc of chatsSnap.docs) {
      const chat = doc.data();
      const chatId = doc.id;
      
      if (chat.participants && chat.participants.includes(currentUser.uid)) {
        const otherUserId = chat.participants.find(id => id !== currentUser.uid);
        
        if (!otherUserId) continue;
        
        if (blockedUsers.includes(otherUserId)) continue;
        
        const otherUserInfo = await getUserInfo(otherUserId);
        
        const isPinned = pinnedChats.includes(chatId);
        
        userChats.push({
          id: chatId,
          ...chat,
          otherUserId: otherUserId,
          otherUserInfo: otherUserInfo,
          isPinned: isPinned
        });
      }
    }
    
    if (userChats.length === 0) {
      chatsList.innerHTML = `
        <div class="no-chats">
          <div class="no-chats-icon">💬</div>
          <div class="no-chats-title">Нет активных чатов</div>
          <div class="no-chats-description">
            Начните общение с другими пользователями
          </div>
        </div>`;
      return;
    }
    
    const pinnedChatsArray = userChats.filter(chat => chat.isPinned);
    const regularChatsArray = userChats.filter(chat => !chat.isPinned);
    
    const sortByTime = (a, b) => {
      const timeA = a.lastMessageTime?.toDate ? a.lastMessageTime.toDate() : new Date(0);
      const timeB = b.lastMessageTime?.toDate ? b.lastMessageTime.toDate() : new Date(0);
      return timeB - timeA;
    };
    
    pinnedChatsArray.sort(sortByTime);
    regularChatsArray.sort(sortByTime);
    
    const sortedChats = [...pinnedChatsArray, ...regularChatsArray];
    
    let chatsHTML = '';
    
    for (const chat of sortedChats) {
      const otherUser = chat.otherUserInfo;
      if (!otherUser) continue;
      
      const isUnread = chat.unreadFor && chat.unreadFor.includes(currentUser.uid);
      const lastMessageTime = chat.lastMessageTime?.toDate ? chat.lastMessageTime.toDate() : new Date();
      const timeAgo = formatTimeAgo(lastMessageTime);
      
      let preview = chat.lastMessage || 'Нет сообщений';
      if (preview.length > 50) {
        preview = preview.substring(0, 47) + '...';
      }
      
      const senderPrefix = chat.lastSender === currentUser.uid ? 'Вы: ' : '';
      
      chatsHTML += `
        <div class="chat-item fade ${isUnread ? 'unread' : ''} ${chat.isPinned ? 'pinned' : ''}" 
             onclick="openChat('${chat.otherUserId}', '${otherUser.username}', '${chat.id}')"
             data-chat-id="${chat.id}">
          <div class="chat-avatar">
            ${otherUser.username?.[0]?.toUpperCase() || 'U'}
          </div>
          <div class="chat-info">
            <div class="chat-user">
              @${otherUser.username}
              ${adminUsers.includes(chat.otherUserId) ? '<span class="verified-badge" title="Администратор">✓</span>' : ''}
              ${chat.isPinned ? '<span style="color:var(--pinned);margin-left:4px;">📌</span>' : ''}
            </div>
            <div class="chat-preview">${senderPrefix}${preview}</div>
            <div class="chat-time">${timeAgo}</div>
          </div>
          <div class="chat-actions">
            <button class="action-btn pin-btn" onclick="event.stopPropagation(); togglePinChat('${chat.id}')" title="${chat.isPinned ? 'Открепить чат' : 'Закрепить чат'}">
              📌
            </button>
            <button class="action-btn delete-btn" onclick="event.stopPropagation(); showDeleteConfirm('${chat.id}', '${otherUser.username}')" title="Удалить чат">
              🗑️
            </button>
          </div>
        </div>
      `;
    }
    
    chatsList.innerHTML = chatsHTML;
    
  } catch (error) {
    console.error('Ошибка загрузки чатов:', error);
    chatsList.innerHTML = `
      <div class="no-chats" style="color:var(--danger)">
        Ошибка загрузки чатов: ${error.message}
      </div>`;
  }
}

async function togglePinChat(chatId) {
  try {
    const isCurrentlyPinned = pinnedChats.includes(chatId);
    
    if (isCurrentlyPinned) {
      pinnedChats = pinnedChats.filter(id => id !== chatId);
      await db.collection("users").doc(currentUser.uid).update({
        pinnedChats: pinnedChats
      });
      showNotification("Чат откреплен");
    } else {
      pinnedChats.push(chatId);
      await db.collection("users").doc(currentUser.uid).update({
        pinnedChats: pinnedChats
      });
      showNotification("Чат закреплен");
    }
    
    loadChatsList();
    
  } catch (error) {
    console.error("Ошибка при закреплении чата:", error);
    showNotification("Ошибка: " + error.message);
  }
}

function showDeleteConfirm(chatId, username) {
  if (confirm(`Вы уверены, что хотите удалить чат с @${username}? Все сообщения будут удалены.`)) {
    deleteChat(chatId);
  }
}

async function deleteChat(chatId) {
  try {
    const messagesSnap = await db.collection('chats').doc(chatId)
      .collection('messages').get();
    
    const batch = db.batch();
    messagesSnap.docs.forEach(doc => {
      batch.delete(doc.ref);
    });
    
    batch.delete(db.collection('chats').doc(chatId));
    
    await batch.commit();
    
    pinnedChats = pinnedChats.filter(id => id !== chatId);
    await db.collection("users").doc(currentUser.uid).update({
      pinnedChats: pinnedChats
    });
    
    showNotification("Чат удален");
    
    if (currentChatId === chatId) {
      closeChat();
    }
    
    loadChatsList();
    
  } catch (error) {
    console.error("Ошибка при удалении чата:", error);
    showNotification("Ошибка удаления: " + error.message);
  }
}

async function openChat(userId, username, chatId = null) {
  currentChatUserId = userId;
  currentChatUsername = username;
  
  if (!chatId) {
    const chatsSnap = await db.collection('chats').get();
    
    for (const doc of chatsSnap.docs) {
      const chat = doc.data();
      if (chat.participants && 
          chat.participants.includes(currentUser.uid) && 
          chat.participants.includes(userId)) {
        chatId = doc.id;
        break;
      }
    }
  }
  
  currentChatId = chatId;
  
  document.getElementById('chatUserAvatar').textContent = username?.[0]?.toUpperCase() || 'U';
  document.getElementById('chatUserName').textContent = '@' + username;
  document.getElementById('chatUserStatus').textContent = 'онлайн';
  
  const isBlocked = blockedUsers.includes(userId);
  updateBlockButtons(isBlocked);
  updateCallButtons(isBlocked);
  
  document.getElementById('chatOverlay').classList.add('show');
  
  await loadChatMessages();
  
  setTimeout(() => {
    document.getElementById('chatInput').focus();
  }, 100);
  
  if (currentChatId) {
    await markChatAsRead(currentChatId);
  }
}

function closeChat() {
  document.getElementById('chatOverlay').classList.remove('show');
  
  if (chatMessagesListener) {
    chatMessagesListener();
    chatMessagesListener = null;
  }
  
  // Останавливаем все воспроизводящиеся голосовые
  Object.values(audioPlayers).forEach(player => {
    if (!player.paused) {
      player.pause();
    }
  });
  
  currentChatUserId = null;
  currentChatUsername = null;
  currentChatId = null;
  
  loadChatsList();
}

async function markChatAsRead(chatId) {
  try {
    const chatRef = db.collection('chats').doc(chatId);
    const chatDoc = await chatRef.get();
    
    if (chatDoc.exists) {
      const chatData = chatDoc.data();
      if (chatData.unreadFor && chatData.unreadFor.includes(currentUser.uid)) {
        const updatedUnreadFor = chatData.unreadFor.filter(id => id !== currentUser.uid);
        await chatRef.update({
          unreadFor: updatedUnreadFor
        });
      }
    }
  } catch (error) {
    console.error("Ошибка при отметке чата как прочитанного:", error);
  }
}

async function loadChatMessages() {
  const chatMessages = document.getElementById('chatMessages');
  chatMessages.innerHTML = '<div class="loader"><div class="loader-spinner"></div><div>Загрузка сообщений...</div></div>';
  
  if (!currentChatId) {
    chatMessages.innerHTML = `
      <div class="no-messages">
        Начните общение с @${currentChatUsername}!
      </div>`;
    return;
  }
  
  try {
    const messagesSnap = await db.collection('chats').doc(currentChatId)
      .collection('messages')
      .orderBy('timestamp', 'asc')
      .limit(100)
      .get();
    
    if (messagesSnap.empty) {
      chatMessages.innerHTML = `
        <div class="no-messages">
          Нет сообщений. Начните общение!
        </div>`;
      return;
    }
    
    chatMessages.innerHTML = '';
    
    messagesSnap.forEach(doc => {
      const msg = doc.data();
      addMessageToUI({ id: doc.id, ...msg });
    });
    
    setTimeout(() => {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }, 100);
    
    setupChatMessagesListener();
    
  } catch (error) {

    chatMessages.innerHTML = `
      <div class="no-messages" style="color:var(--danger)">
        Ошибка загрузки сообщений
      </div>`;
  }
}

function addMessageToUI(msg) {
  const chatMessages = document.getElementById('chatMessages');
  
  const loader = chatMessages.querySelector('.loader');
  const noMessages = chatMessages.querySelector('.no-messages');
  if (loader) loader.remove();
  if (noMessages) noMessages.remove();
  
  const msgDate = msg.timestamp?.toDate ? msg.timestamp.toDate() : new Date();
  const isOutgoing = msg.senderId === currentUser.uid;
  const messageTime = formatMessageTime(msgDate);
  
  const messageDiv = document.createElement('div');
  messageDiv.className = `message fade ${isOutgoing ? 'message-outgoing' : 'message-incoming'}`;
  messageDiv.setAttribute('data-message-id', msg.id);
  messageDiv.setAttribute('data-sender-id', msg.senderId);
  
  setupMessageClickHandler(messageDiv, msg);
  
  const readStatus = msg.read === true ? '✓✓' : '✓';
  
  let contentHTML = '';
  
  // Обработка разных типов сообщений
  if (msg.type === 'call') {
    const isCaller = msg.callerId === currentUser.uid;
    const callIcon = msg.callType === 'video' ? '📹' : '📞';
    const callStatus = msg.callStatus === 'connected' ? 'состоялся' : 'отменен';
    const durationText = msg.duration ? ` (${msg.duration})` : '';
    
    contentHTML = `
      <div style="display:flex;align-items:center;gap:8px;opacity:0.8;">
        <span>${callIcon}</span>
        <span>${isCaller ? 'Исходящий' : 'Входящий'} звонок ${callStatus}${durationText}</span>
      </div>
    `;
    
  } else if (msg.type === 'voice') {
    const duration = formatDuration(msg.voiceDuration);
    const waveBars = Array(20).fill(0).map((_, i) => 
      `<div class="wave-bar" style="height:${Math.random() * 20 + 10}px"></div>`
    ).join('');
    
    contentHTML = `
      <div class="voice-message">
        <button class="voice-play-btn" data-message-id="${msg.id}" onclick="playVoiceMessage('${msg.id}', '${msg.voiceUrl}')">▶️</button>
        <div class="voice-waveform">
          ${waveBars}
        </div>
        <span class="voice-time">${duration}</span>
        ${isOutgoing ? `<button class="voice-delete-btn" onclick="deleteMessage('${msg.id}')">🗑️</button>` : ''}
      </div>
    `;
    
  } else {
    // Обычное текстовое сообщение
    let replyHTML = '';
    if (msg.replyTo) {
      const replySender = msg.replyTo.senderId === currentUser.uid ? 'Вы' : currentChatUsername;
      const replyText = msg.replyTo.text || '';
      const shortText = replyText.length > 50 ? replyText.substring(0, 47) + '...' : replyText;
      
      replyHTML = `
        <div class="message-reply">
          <div class="message-reply-sender">${replySender}</div>
          <div class="message-reply-text">${shortText}</div>
        </div>
      `;
    }
    
    let reactionsHTML = '';
    if (msg.reactions && Object.keys(msg.reactions).length > 0) {
      const reactionGroups = {};
      Object.entries(msg.reactions).forEach(([userId, emoji]) => {
        if (!reactionGroups[emoji]) {
          reactionGroups[emoji] = [];
        }
        reactionGroups[emoji].push(userId);
      });
      
      reactionsHTML = '<div class="message-reactions">';
      Object.entries(reactionGroups).forEach(([emoji, users]) => {
        const isLikedByMe = users.includes(currentUser.uid);
        reactionsHTML += `
          <div class="reaction ${isLikedByMe ? 'liked' : ''}" onclick="event.stopPropagation(); addReactionToMessage('${msg.id}', '${emoji}')">
            <span>${emoji}</span>
            <span class="reaction-count">${users.length}</span>
          </div>
        `;
      });
      reactionsHTML += '</div>';
    }
    
    contentHTML = `
      ${replyHTML}
      <div class="message-text">${msg.text || ''}</div>
      ${reactionsHTML}
    `;
  }
  
  messageDiv.innerHTML = `
    ${contentHTML}
    <div class="message-time">
      ${messageTime}
      ${isOutgoing && msg.type !== 'call' ? `<span class="message-status">${readStatus}</span>` : ''}
    </div>
  `;
  
  chatMessages.appendChild(messageDiv);
}

function setupMessageClickHandler(messageDiv, msg) {
  if ('ontouchstart' in window) {
    let longPressTimer;
    let isLongPress = false;
    
    messageDiv.addEventListener('touchstart', (e) => {
      isLongPress = false;
      longPressTimer = setTimeout(() => {
        isLongPress = true;
        showMessageContextMenu(e, msg.id, msg);
      }, 500);
    });
    
    messageDiv.addEventListener('touchend', (e) => {
      clearTimeout(longPressTimer);
      if (!isLongPress && msg.type !== 'call' && msg.type !== 'voice') {
        showReactionsPanel(e, msg.id, msg);
      }
    });
    
    messageDiv.addEventListener('touchmove', () => {
      clearTimeout(longPressTimer);
    });
  } else {
    messageDiv.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      if (msg.type !== 'call' && msg.type !== 'voice') {
        showMessageContextMenu(e, msg.id, msg);
      }
    });
    
    messageDiv.addEventListener('click', (e) => {
      if (e.button === 0 && msg.type !== 'call' && msg.type !== 'voice') {
        showReactionsPanel(e, msg.id, msg);
      }
    });
  }
}

function setupChatMessagesListener() {
  if (chatMessagesListener || !currentChatId) return;
  
  chatMessagesListener = db.collection('chats').doc(currentChatId)
    .collection('messages')
    .orderBy('timestamp', 'desc')
    .limit(1)
    .onSnapshot((snapshot) => {
      snapshot.docChanges().forEach((change) => {
        if (change.type === 'added') {
          const msg = change.doc.data();
          const existingMessage = document.querySelector(`[data-message-id="${change.doc.id}"]`);
          
          if (!existingMessage) {
            addMessageToUI({ id: change.doc.id, ...msg });
            
            setTimeout(() => {
              const chatMessages = document.getElementById('chatMessages');
              chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 100);
          }
        } else if (change.type === 'modified') {
          const msg = change.doc.data();
          const existingMessage = document.querySelector(`[data-message-id="${change.doc.id}"]`);
          if (existingMessage && msg.reactions) {
            updateMessageReactions(change.doc.id, msg.reactions);
          }
        }
      });
    });
}

async function sendMessage() {
  if (!currentChatUserId) return;
  
  const chatInput = document.getElementById('chatInput');
  const text = chatInput.value.trim();
  
  if (!text) {
    showNotification('Введите сообщение!');
    return;
  }
  
  if (blockedUsers.includes(currentChatUserId)) {
    showNotification('Нельзя отправить сообщение заблокированному пользователю');
    return;
  }
  
  const sendBtn = document.getElementById('chatSendBtn');
  sendBtn.disabled = true;
  
  const messageData = {
    text: text,
    senderId: currentUser.uid,
    timestamp: new Date(),
    read: false
  };
  
  if (replyingToMessage) {
    messageData.replyTo = {
      messageId: replyingToMessage.id,
      senderId: replyingToMessage.senderId,
      text: replyingToMessage.text
    };
  }
  
  try {
    let chatId = currentChatId;
    
    if (!chatId) {
      const newChatRef = await db.collection('chats').add({
        participants: [currentUser.uid, currentChatUserId],
        lastMessage: text,
        lastSender: currentUser.uid,
        lastMessageTime: new Date(),
        createdAt: new Date(),
        updatedAt: new Date(),
        unreadFor: [currentChatUserId]
      });
      
      chatId = newChatRef.id;
      currentChatId = chatId;
    } else {
      await db.collection('chats').doc(chatId).update({
        lastMessage: text,
        lastSender: currentUser.uid,
        lastMessageTime: new Date(),
        updatedAt: new Date(),
        unreadFor: firebase.firestore.FieldValue.arrayUnion(currentChatUserId)
      });
    }
    
    await db.collection('chats').doc(chatId)
      .collection('messages')
      .add(messageData);
    
    chatInput.value = '';
    chatInput.style.height = 'auto';
    cancelReply();
    
    loadChatsList();
    
  } catch (error) {
    console.error('Ошибка отправки сообщения:', error);
    showNotification('Ошибка отправки: ' + error.message);
  } finally {
    sendBtn.disabled = false;
  }
}

function showReactionsPanel(event, messageId, messageData) {
  if (messageData.type === 'call' || messageData.type === 'voice') return;
  
  let x, y;
  if (event.type.includes('touch')) {
    const touch = event.touches[0] || event.changedTouches[0];
    x = touch.clientX;
    y = touch.clientY;
  } else {
    x = event.clientX;
    y = event.clientY;
  }
  
  selectedMessageForReaction = { id: messageId, ...messageData };
  
  const panel = document.getElementById('reactionsPanel');
  panel.style.left = Math.min(x - 100, window.innerWidth - 220) + 'px';
  panel.style.top = Math.min(y - 60, window.innerHeight - 80) + 'px';
  panel.classList.add('show');
  
  setTimeout(() => {
    const closePanel = (e) => {
      if (!panel.contains(e.target)) {
        panel.classList.remove('show');
        document.removeEventListener('click', closePanel);
        document.removeEventListener('touchstart', closePanel);
      }
    };
    document.addEventListener('click', closePanel);
    document.addEventListener('touchstart', closePanel);
  }, 10);
}

async function addReaction(emoji) {
  if (!selectedMessageForReaction || !currentChatId) return;
  
  try {
    const messageRef = db.collection('chats').doc(currentChatId)
      .collection('messages')
      .doc(selectedMessageForReaction.id);
    
    const messageDoc = await messageRef.get();
    const currentReactions = messageDoc.data()?.reactions || {};
    
    const userReaction = currentReactions[currentUser.uid];
    
    if (userReaction === emoji) {
      delete currentReactions[currentUser.uid];
      showNotification("Реакция убрана");
    } else {
      currentReactions[currentUser.uid] = emoji;
      showNotification(`${emoji} Добавлено`);
    }
    
    await messageRef.update({
      reactions: currentReactions
    });
    
    updateMessageReactions(selectedMessageForReaction.id, currentReactions);
    
    document.getElementById('reactionsPanel').classList.remove('show');
    
  } catch (error) {
    console.error("Ошибка при добавлении реакции:", error);
    showNotification("Ошибка: " + error.message);
  }
}

async function addReactionToMessage(messageId, emoji) {
  if (!currentChatId) return;
  
  try {
    const messageRef = db.collection('chats').doc(currentChatId)
      .collection('messages')
      .doc(messageId);
    
    const messageDoc = await messageRef.get();
    const currentReactions = messageDoc.data()?.reactions || {};
    
    const userReaction = currentReactions[currentUser.uid];
    
    if (userReaction === emoji) {
      delete currentReactions[currentUser.uid];
      showNotification("Реакция убрана");
    } else {
      currentReactions[currentUser.uid] = emoji;
      showNotification(`${emoji} Добавлено`);
    }
    
    await messageRef.update({
      reactions: currentReactions
    });
    
    updateMessageReactions(messageId, currentReactions);
    
  } catch (error) {
    console.error("Ошибка при добавлении реакции:", error);
    showNotification("Ошибка: " + error.message);
  }
}

function updateMessageReactions(messageId, reactions) {
  const messageElement = document.querySelector(`[data-message-id="${messageId}"]`);
  if (!messageElement) return;
  
  let reactionsContainer = messageElement.querySelector('.message-reactions');
  
  if (!reactionsContainer) {
    reactionsContainer = document.createElement('div');
    reactionsContainer.className = 'message-reactions';
    
    const timeElement = messageElement.querySelector('.message-time');
    if (timeElement) {
      messageElement.insertBefore(reactionsContainer, timeElement);
    } else {
      messageElement.appendChild(reactionsContainer);
    }
  }
  
  reactionsContainer.innerHTML = '';
  
  if (Object.keys(reactions).length === 0) {
    reactionsContainer.remove();
    return;
  }
  
  const reactionGroups = {};
  Object.entries(reactions).forEach(([userId, emoji]) => {
    if (!reactionGroups[emoji]) {
      reactionGroups[emoji] = [];
    }
    reactionGroups[emoji].push(userId);
  });
  
  Object.entries(reactionGroups).forEach(([emoji, users]) => {
    const isLikedByMe = users.includes(currentUser.uid);
    
    const reactionElement = document.createElement('div');
    reactionElement.className = `reaction ${isLikedByMe ? 'liked' : ''}`;
    reactionElement.onclick = (e) => {
      e.stopPropagation();
      addReactionToMessage(messageId, emoji);
    };
    
    reactionElement.innerHTML = `
      <span>${emoji}</span>
      <span class="reaction-count">${users.length}</span>
    `;
    
    reactionsContainer.appendChild(reactionElement);
  });
}

function replyToMessage(messageId, messageData) {
  if (messageData.type === 'call' || messageData.type === 'voice') {
    showNotification('Нельзя ответить на звонок или голосовое сообщение');
    return;
  }
  
  const senderInfo = messageData.senderId === currentUser.uid ? 
    { username: 'Вы' } : 
    { username: currentChatUsername };
  
  replyingToMessage = {
    id: messageId,
    text: messageData.text,
    senderId: messageData.senderId,
    senderName: senderInfo.username
  };
  
  const replyContainer = document.getElementById('replyContainer');
  const replySender = document.getElementById('replySender');
  const replyText = document.getElementById('replyText');
  
  replyContainer.style.display = 'block';
  replySender.textContent = senderInfo.username;
  
  const shortText = messageData.text.length > 50 ? 
    messageData.text.substring(0, 47) + '...' : 
    messageData.text;
  replyText.textContent = shortText;
  
  document.getElementById('chatInput').focus();
}

function cancelReply() {
  replyingToMessage = null;
  document.getElementById('replyContainer').style.display = 'none';
}

function showMessageContextMenu(event, messageId, messageData) {
  if (messageData.type === 'call' || messageData.type === 'voice') return;
  
  event.preventDefault();
  event.stopPropagation();
  
  const menu = document.getElementById('messageContextMenu');
  
  let x, y;
  if (event.type.includes('touch')) {
    const touch = event.touches[0] || event.changedTouches[0];
    x = touch.clientX;
    y = touch.clientY;
  } else {
    x = event.clientX;
    y = event.clientY;
  }
  
  menu.style.left = Math.min(x, window.innerWidth - 200) + 'px';
  menu.style.top = Math.min(y, window.innerHeight - 150) + 'px';
  menu.classList.add('show');
  
  window.currentContextMessageId = messageId;
  window.currentContextMessageData = messageData;
  
  setTimeout(() => {
    const closeMenu = (e) => {
      if (!menu.contains(e.target)) {
        menu.classList.remove('show');
        document.removeEventListener('click', closeMenu);
        document.removeEventListener('touchstart', closeMenu);
      }
    };
    document.addEventListener('click', closeMenu);
    document.addEventListener('touchstart', closeMenu);
  }, 10);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('contextReplyBtn').addEventListener('click', () => {
    document.getElementById('messageContextMenu').classList.remove('show');
    if (window.currentContextMessageId && window.currentContextMessageData) {
      replyToMessage(window.currentContextMessageId, window.currentContextMessageData);
    }
  });
  
  document.getElementById('contextReactionBtn').addEventListener('click', () => {
    document.getElementById('messageContextMenu').classList.remove('show');
    if (window.currentContextMessageId && window.currentContextMessageData) {
      addReactionToMessage(window.currentContextMessageId, '❤️');
    }
  });
  
  document.getElementById('contextDeleteMessageBtn').addEventListener('click', () => {
    document.getElementById('messageContextMenu').classList.remove('show');
    if (window.currentContextMessageId) {
      if (confirm("Вы уверены, что хотите удалить это сообщение?")) {
        deleteMessage(window.currentContextMessageId);
      }
    }
  });
});

async function deleteMessage(messageId) {
  try {
    if (!currentChatId) return;
    
    await db.collection('chats').doc(currentChatId)
      .collection('messages')
      .doc(messageId)
      .delete();
    
    const messageElement = document.querySelector(`[data-message-id="${messageId}"]`);
    if (messageElement) {
      messageElement.remove();
    }
    
    showNotification("Сообщение удалено");
    
  } catch (error) {
    console.error("Ошибка при удалении сообщения:", error);
    showNotification("Ошибка удаления сообщения: " + error.message);
  }
}

function showNotification(message, duration = 3000) {
  const notification = document.getElementById('notification');
  notification.textContent = message;
  notification.classList.add('show');
  
  setTimeout(() => {
    notification.classList.remove('show');
  }, duration);
}

function logout() {
  if (confirm("Выйти из аккаунта?")) {
    auth.signOut().then(() => {
      location.href = "index.html";
    });
  }
}

async function checkForAutoOpenChat() {
  const openChatData = sessionStorage.getItem('openChatWith');
  
  if (openChatData) {
    try {
      const data = JSON.parse(openChatData);
      const { userId, username } = data;
      
      sessionStorage.removeItem('openChatWith');
      
      if (userId && username) {
        setTimeout(() => {
          openChat(userId, username);
        }, 500);
      }
    } catch (error) {
      console.error("Ошибка при обработке данных для открытия чата:", error);
    }
  }
}

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    location.href = 'index.html';
    return;
  }
  
  currentUser = user;
  
  await loadUserData();
  await loadAdminUsers();
  await loadChatsList();
  
  listenForIncomingCalls();
  
  await checkForAutoOpenChat();
  
  setTimeout(() => {
    testAudioOutput();
  }, 2000);
  
  setInterval(() => {
    const timeElement = document.getElementById('time');
    if (timeElement) {
      timeElement.textContent = new Date().toLocaleTimeString('ru-RU', {
        hour: '2-digit',
        minute: '2-digit'
      });
    }
  }, 1000);
});

document.getElementById('chatInput')?.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = (this.scrollHeight) + 'px';
});

document.getElementById('chatInput')?.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
