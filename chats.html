<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личные сообщения - czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#000;
  --card:rgba(28,28,30,.95);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
  --success:#30d158;
  --views:#8e8e93;
  --message:#5ac8fa;
  --outgoing-message:#667eea;
  --pinned:#ffd60a;
  --reply:#5ac8fa;
  --heart:#ff375f;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  height:100vh;
  overflow:hidden;
}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);
  border-radius:18px;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}
.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  cursor:pointer;
}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}
.chats-btn{
  background:#5ac8fa;
  color:var(--bg);
}

.container{
  max-width:480px;
  margin:auto;
  padding:140px 14px 100px;
  height:100vh;
  overflow-y:auto;
  position:relative;
  z-index:1;
}

/* Список чатов */
.chats-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.chat-item {
  background: var(--card);
  border-radius: 20px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: transform 0.2s, background 0.2s;
  position: relative;
}
.chat-item:hover {
  background: rgba(255,255,255,0.05);
  transform: translateY(-2px);
}
.chat-item.unread {
  background: rgba(90,200,250,0.1);
}
.chat-item.unread::after {
  content: '';
  position: absolute;
  top: 18px;
  right: 18px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--message);
}
.chat-item.pinned {
  background: rgba(255,214,10,0.1);
  border-left: 4px solid var(--pinned);
}
.chat-item.pinned .pin-indicator {
  color: var(--pinned);
}
.chat-avatar {
  width: 56px;
  height: 56px;
  border-radius: 18px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 20px;
  flex-shrink: 0;
  position: relative;
}
.chat-info {
  flex: 1;
  min-width: 0;
  padding-right: 80px; /* Место для кнопок */
}
.chat-user {
  font-weight: 600;
  font-size: 16px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.verified-badge {
  color: #5ac8fa;
  font-size: 14px;
}
.chat-preview {
  color: var(--sub);
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-time {
  color: var(--sub);
  font-size: 12px;
  margin-top: 4px;
}
.chat-actions {
  position: absolute;
  top: 50%;
  right: 16px;
  transform: translateY(-50%);
  display: flex;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.2s;
}
.chat-item:hover .chat-actions {
  opacity: 1;
}
.chat-item.mobile-actions-visible .chat-actions {
  opacity: 1;
}
.action-btn {
  background: rgba(28,28,30,0.8);
  border: none;
  color: var(--sub);
  width: 36px;
  height: 36px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
}
.action-btn:hover {
  background: var(--card);
  color: var(--text);
  transform: scale(1.1);
}
.action-btn.pin-btn:hover {
  color: var(--pinned);
  background: rgba(255,214,10,0.1);
}
.action-btn.delete-btn:hover {
  color: var(--danger);
  background: rgba(255,69,58,0.1);
}
.no-chats {
  text-align: center;
  padding: 80px 20px;
  color: var(--sub);
}
.no-chats-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.no-chats-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}
.no-chats-description {
  font-size: 14px;
  line-height: 1.4;
}

/* Окно чата */
.chat-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 5000;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.chat-overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
}
.chat-header {
  background: var(--card);
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: relative;
  min-height: 72px;
  flex-shrink: 0;
  z-index: 10;
}
.chat-user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
}
.chat-header-avatar {
  width: 44px;
  height: 44px;
  border-radius: 16px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 18px;
}
.chat-header-username {
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
}
.chat-header-username:hover {
  opacity: 0.8;
}
.chat-header-time {
  color: var(--sub);
  font-size: 12px;
  margin-top: 2px;
}
.chat-close-btn {
  background: none;
  border: none;
  color: var(--sub);
  font-size: 24px;
  cursor: pointer;
  padding: 8px;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.chat-close-btn:hover {
  background: rgba(255,255,255,0.1);
}
.block-btn {
  background: var(--danger);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-right: 8px;
}
.block-btn:hover {
  opacity: 0.9;
}
.unblock-btn {
  background: var(--success);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-right: 8px;
}
.unblock-btn:hover {
  opacity: 0.9;
}

/* Ответ на сообщение */
.reply-preview {
  background: var(--card);
  border-left: 4px solid var(--reply);
  border-radius: 12px;
  padding: 10px 14px;
  margin-bottom: 8px;
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.reply-preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.reply-sender {
  font-size: 12px;
  color: var(--reply);
  font-weight: 600;
}
.reply-close-btn {
  background: none;
  border: none;
  color: var(--sub);
  font-size: 14px;
  cursor: pointer;
  width: 20px;
  height: 20px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.reply-close-btn:hover {
  background: rgba(255,255,255,0.1);
}
.reply-text {
  font-size: 13px;
  color: var(--sub);
  line-height: 1.3;
  flex: 1;
}
.reply-icon {
  color: var(--reply);
  font-size: 14px;
  flex-shrink: 0;
}

/* Сообщения */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  min-height: 0; /* Важно для flex */
}
.message {
  max-width: 75%;
  padding: 12px 16px;
  border-radius: 18px;
  line-height: 1.4;
  word-break: break-word;
  position: relative;
  animation: fade 0.3s ease;
  cursor: pointer;
  transition: background 0.2s;
}
.message:hover {
  background: rgba(255,255,255,0.03);
}
.message-outgoing {
  align-self: flex-end;
  background: var(--outgoing-message);
  color: white;
  border-bottom-right-radius: 4px;
}
.message-incoming {
  align-self: flex-start;
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.message-replied {
  margin-top: 4px;
}
.message-reply {
  background: rgba(90,200,250,0.1);
  border-left: 3px solid var(--reply);
  border-radius: 10px;
  padding: 8px 10px;
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.3;
  max-width: 100%;
  overflow: hidden;
}
.message-reply-sender {
  font-weight: 600;
  color: var(--reply);
  font-size: 11px;
  margin-bottom: 2px;
}
.message-reply-text {
  color: var(--sub);
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.message-text {
  font-size: 15px;
  line-height: 1.4;
}
.message-time {
  font-size: 11px;
  opacity: 0.7;
  margin-top: 6px;
  text-align: right;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
}
.message-status {
  font-size: 10px;
}
.message-actions {
  position: absolute;
  top: 8px;
  right: 8px;
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.2s;
}
.message:hover .message-actions {
  opacity: 1;
}
.message-action-btn {
  background: rgba(0,0,0,0.5);
  border: none;
  color: var(--sub);
  width: 24px;
  height: 24px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
}
.message-action-btn:hover {
  background: rgba(0,0,0,0.7);
  color: var(--text);
}
.message-action-btn.delete-message-btn:hover {
  color: var(--danger);
}
.message-action-btn.reply-btn:hover {
  color: var(--reply);
}
.message-action-btn.heart-btn:hover {
  color: var(--heart);
}

/* Мобильные кнопки действий для сообщений */
.mobile-message-actions {
  display: none;
  gap: 8px;
  margin-top: 8px;
  justify-content: flex-end;
}

.mobile-action-btn {
  background: rgba(28,28,30,0.8);
  border: none;
  color: var(--sub);
  width: 36px;
  height: 36px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
}

/* Реакции на сообщения */
.message-reactions {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.reaction {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 2px 6px;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  transition: all 0.2s;
}
.reaction:hover {
  background: rgba(255,255,255,0.15);
  transform: scale(1.1);
}
.reaction.liked {
  background: rgba(255,55,95,0.2);
  color: var(--heart);
}
.reaction-count {
  font-size: 11px;
}

/* Панель с реакциями */
.reactions-panel {
  position: absolute;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px;
  display: flex;
  gap: 8px;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.2s;
  pointer-events: none;
}
.reactions-panel.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.reaction-emoji {
  font-size: 24px;
  cursor: pointer;
  transition: transform 0.2s;
  padding: 4px;
  border-radius: 12px;
}
.reaction-emoji:hover {
  transform: scale(1.2);
  background: rgba(255,255,255,0.1);
}
.reaction-emoji.heart:hover {
  color: var(--heart);
}

.message-date-divider {
  text-align: center;
  color: var(--sub);
  font-size: 12px;
  padding: 8px 0;
  position: relative;
  margin: 12px 0;
}
.message-date-divider::before,
.message-date-divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 30%;
  height: 1px;
  background: var(--border);
}
.message-date-divider::before {
  left: 0;
}
.message-date-divider::after {
  right: 0;
}

/* Поле ввода */
.chat-input-area {
  background: var(--card);
  padding: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
  position: relative;
  flex-shrink: 0; /* Важно - не сжимается */
  z-index: 10;
}
.reply-container {
  width: 100%;
}
.chat-input-wrapper {
  width: 100%;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.chat-input {
  flex: 1;
  background: #1c1c1e;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 12px 16px;
  color: #fff;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  line-height: 1.4;
}
.chat-input:focus {
  outline: none;
  border-color: var(--accent);
}
.chat-input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.chat-send-btn {
  background: var(--accent);
  border: none;
  color: white;
  padding: 12px 20px;
  border-radius: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  align-self: flex-end;
  min-width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.chat-send-btn:hover:not(:disabled) {
  opacity: 0.9;
}
.chat-send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Нет сообщений */
.no-messages {
  text-align: center;
  color: var(--sub);
  padding: 60px 20px;
  font-size: 14px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
}

/* Загрузчик */
.loader {
  text-align: center;
  padding: 40px 0;
  color: var(--sub);
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
}
.loader-spinner {
  display: inline-block;
  width: 30px;
  height: 30px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Уведомление */
.notification{
  position:fixed;
  top:120px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:var(--accent);
  color:white;
  padding:12px 20px;
  border-radius:14px;
  font-weight:600;
  z-index:1999;
  opacity:0;
  transition:opacity 0.3s, transform 0.3s;
  pointer-events:none;
  max-width:90%;
  text-align:center;
}
.notification.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* Кнопка назад на мобильных */
.back-btn {
  display: none;
}

/* Контекстное меню для мобильных */
.context-menu {
  position: fixed;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 8px;
  z-index: 10000;
  min-width: 160px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  display: none;
}
.context-menu.show {
  display: block;
  animation: fade 0.2s ease;
}
.menu-item {
  padding: 12px 16px;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background 0.2s;
}
.menu-item:hover {
  background: rgba(255,255,255,0.1);
}
.menu-item.pin-item:hover {
  color: var(--pinned);
}
.menu-item.delete-item:hover {
  color: var(--danger);
}
.menu-item.delete-message-item:hover {
  color: var(--danger);
}
.menu-item.reply-item:hover {
  color: var(--reply);
}
.menu-item.reaction-item:hover {
  color: var(--heart);
}

@media (max-width: 768px) {
  .dynamic-island {
    top: 8px;
    width: 110px;
    height: 32px;
    font-size: 14px;
  }
  
  .navbar {
    top: 50px;
    width: 95%;
    padding: 8px 12px;
  }
  
  .container {
    padding: 140px 12px 100px;
    height: 100vh;
  }
  
  .back-btn {
    display: block;
    background: none;
    border: none;
    color: var(--sub);
    font-size: 20px;
    cursor: pointer;
    padding: 8px;
    margin-right: 8px;
  }
  .chat-header {
    padding: 12px;
    min-height: 64px;
  }
  .chat-actions {
    opacity: 1 !important;
    position: absolute;
    top: 50%;
    right: 16px;
    transform: translateY(-50%);
    gap: 6px;
  }
  .action-btn {
    background: rgba(28,28,30,0.9);
    width: 32px;
    height: 32px;
    font-size: 14px;
  }
  .chat-info {
    padding-right: 70px;
  }
  .chat-input-area {
    padding: 12px;
  }
  .chat-messages {
    padding: 16px;
  }
  
  /* Скрываем обычные кнопки действий на мобильных */
  .message-actions {
    display: none !important;
  }
  
  /* Показываем мобильные кнопки действий */
  .mobile-message-actions {
    display: flex;
  }
  
  /* Убираем ховер-эффекты на тач-устройствах */
  .message:hover {
    background: transparent;
  }
  
  .no-chats {
    padding: 100px 20px;
  }
}

</style>
</head>

<body>

<div class="dynamic-island" id="time"></div>

<div class="navbar">
  <div class="logo" onclick="location.href='feed.html'">czhmass</div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="location.href='profile.html'">👤</button>
    <button class="nav-btn" id="adminBtn" style="display:none" onclick="location.href='admin.html'">👑</button>
    <button class="nav-btn chats-btn" onclick="location.href='chats.html'">💬</button>
    <button class="nav-btn" onclick="logout()">🚪</button>
  </div>
</div>

<div class="container">
  <div class="chats-list" id="chatsList">
    <div class="loader">
      <div class="loader-spinner"></div>
      <div>Загрузка чатов...</div>
    </div>
  </div>
</div>

<!-- Окно чата -->
<div class="chat-overlay" id="chatOverlay">
  <div class="chat-container">
    <div class="chat-header">
      <button class="back-btn" onclick="closeChat()">←</button>
      <div class="chat-user-info">
        <div class="chat-header-avatar" id="chatUserAvatar">U</div>
        <div>
          <div class="chat-header-username" id="chatUserName" onclick="openProfileFromChat()">@username</div>
          <div class="chat-header-time" id="chatUserStatus">был(а) недавно</div>
        </div>
      </div>
      <button class="block-btn" id="blockBtn" onclick="toggleBlockUser()">Заблокировать</button>
      <button class="unblock-btn" id="unblockBtn" onclick="toggleBlockUser()" style="display:none">Разблокировать</button>

// ==================== ФОРМАТИРОВАНИЕ ВРЕМЕНИ ====================

function formatTimeAgo(date) {
  if (!date) return "только что";
  
  const now = new Date();
  const diff = now - date;
  const seconds = Math.floor(diff / 1000);
  const minutes = Math.floor(seconds / 60);
  const hours = Math.floor(minutes / 60);
  const days = Math.floor(hours / 24);
  
  if (days > 7) {
    return date.toLocaleDateString("ru-RU", {
      day: "2-digit",
      month: "2-digit"
    });
  } else if (days > 0) {
    return `${days} д назад`;
  } else if (hours > 0) {
    return `${hours} ч назад`;
  } else if (minutes > 0) {
    return `${minutes} мин назад`;
  } else {
    return "только что";
  }
}

function formatMessageTime(date) {
  if (!date) return "";
  
  return date.toLocaleTimeString("ru-RU", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

function formatMessageDate(date) {
  if (!date) return "";
  
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);
  
  const messageDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  
  if (messageDate.getTime() === today.getTime()) {
    return "Сегодня";
  } else if (messageDate.getTime() === yesterday.getTime()) {
    return "Вчера";
  } else {
    return date.toLocaleDateString("ru-RU", {
      day: "2-digit",
      month: "2-digit",
      year: date.getFullYear() !== now.getFullYear() ? "numeric" : undefined
    });
  }
}

async function loadUserData() {
  try {
    const snap = await db.collection("users").doc(currentUser.uid).get();
    if (!snap.exists) {
      userData = {
        username: "user" + currentUser.uid.slice(-6),
        isAdmin: false,
        blockedUsers: [],
        pinnedChats: []
      };
      await db.collection("users").doc(currentUser.uid).set(userData);
    } else {
      userData = snap.data();
      pinnedChats = new Set(userData.pinnedChats || []);
    }
    
    if (userData.isAdmin === true) {
      document.getElementById("adminBtn").style.display = "block";
    }
  } catch (error) {
    console.error("Ошибка загрузки данных:", error);
  }
}

async function loadBlockedUsers() {
  try {
    const userDoc = await db.collection("users").doc(currentUser.uid).get();
    if (userDoc.exists) {
      const data = userDoc.data();
      blockedUsers = new Set(data.blockedUsers || []);
    }
  } catch (error) {
    console.error("Ошибка загрузки заблокированных пользователей:", error);
  }
}

async function loadAdminUsers() {
  try {
    const adminSnap = await db.collection("users")
      .where("isAdmin", "==", true)
      .get();
    
    adminUsers.clear();
    adminSnap.forEach(doc => {
      adminUsers.add(doc.id);
    });
  } catch (error) {

  }
}

async function getUserInfo(userId) {
  if (usersCache.has(userId)) {
    return usersCache.get(userId);
  }
  
  try {
    const userDoc = await db.collection("users").doc(userId).get();
    let userInfo = {
      username: "user" + userId.slice(-6),
      isAdmin: false
    };
    
    if (userDoc.exists) {
      const data = userDoc.data();
      userInfo = {
        username: data.username || userInfo.username,
        isAdmin: data.isAdmin || false,
        bio: data.bio || ""
      };
    }
    
    usersCache.set(userId, userInfo);
    return userInfo;
  } catch (error) {
    console.error("Ошибка получения информации о пользователе:", error);
    return {
      username: "user" + userId.slice(-6),
      isAdmin: false
    };
  }
}

async function loadChatsList() {
  const chatsList = document.getElementById('chatsList');
  
  try {
    // Получаем все чаты
    const chatsSnap = await db.collection('chats').get();
    
    if (chatsSnap.empty) {
      chatsList.innerHTML = `
        <div class="no-chats">
          <div class="no-chats-icon">💬</div>
          <div class="no-chats-title">Нет сообщений</div>
          <div class="no-chats-description">
            Начните общение с другими пользователями!<br>
            Перейдите в профиль пользователя и нажмите "В чат"
          </div>
        </div>`;
      return;
    }
    
    // Собираем чаты текущего пользователя
    const userChats = [];
    const pinnedChatsArray = [];
    const regularChatsArray = [];
    
    for (const doc of chatsSnap.docs) {
      const chat = doc.data();
      
      // Проверяем участвует ли пользователь в чате
      if (chat.participants && chat.participants.includes(currentUser.uid)) {
        const otherUserId = chat.participants.find(id => id !== currentUser.uid);
        
        if (otherUserId && !blockedUsers.has(otherUserId)) {
          const otherUserInfo = await getUserInfo(otherUserId);
          const isPinned = pinnedChats.has(doc.id);
          
          const chatData = {
            id: doc.id,
            ...chat,
            otherUserId: otherUserId,
            otherUserInfo: otherUserInfo,
            isPinned: isPinned
          };
          
          if (isPinned) {
            pinnedChatsArray.push(chatData);
          } else {
            regularChatsArray.push(chatData);
          }
        }
      }
    }
    
    // Сортируем по времени последнего сообщения
    const sortByTime = (a, b) => {
      const timeA = a.lastMessageTime?.toDate ? a.lastMessageTime.toDate() : new Date(a.lastMessageTime || 0);
      const timeB = b.lastMessageTime?.toDate ? b.lastMessageTime.toDate() : new Date(b.lastMessageTime || 0);
      return timeB - timeA;
    };
    
    pinnedChatsArray.sort(sortByTime);
    regularChatsArray.sort(sortByTime);
    
    const sortedChats = [...pinnedChatsArray, ...regularChatsArray];
    
    if (sortedChats.length === 0) {
      chatsList.innerHTML = `
        <div class="no-chats">
          <div class="no-chats-icon">💬</div>
          <div class="no-chats-title">Нет активных чатов</div>
          <div class="no-chats-description">
            Начните общение с другими пользователями
          </div>
        </div>`;
      return;
    }
    
    // Формируем список
    let chatsHTML = '';
    
    for (const chat of sortedChats) {
      const otherUser = chat.otherUserInfo;
      if (!otherUser) continue;
      
      const isUnread = chat.unreadFor && chat.unreadFor.includes(currentUser.uid);
      const lastMessageTime = chat.lastMessageTime?.toDate ? chat.lastMessageTime.toDate() : new Date();
      const timeAgo = formatTimeAgo(lastMessageTime);
      
      let preview = chat.lastMessage || 'Нет сообщений';
      if (preview.length > 50) {
        preview = preview.substring(0, 47) + '...';
      }
      
      const senderPrefix = chat.lastSender === currentUser.uid ? 'Вы: ' : '';
      const pinIcon = chat.isPinned ? '📌' : '📌';
      const pinBtnTitle = chat.isPinned ? 'Открепить чат' : 'Закрепить чат';
      
      chatsHTML += `
        <div class="chat-item fade ${isUnread ? 'unread' : ''} ${chat.isPinned ? 'pinned' : ''}" 
             onclick="handleChatClick(event, '${chat.otherUserId}', '${otherUser.username}', '${chat.id}')"
             data-chat-id="${chat.id}"
             data-is-pinned="${chat.isPinned}"
             onmouseenter="showChatActions(this)"
             onmouseleave="hideChatActions(this)">
          <div class="chat-avatar">
            ${otherUser.username?.[0]?.toUpperCase() || 'U'}
          </div>
          <div class="chat-info">
            <div class="chat-user">
              @${otherUser.username}
              ${adminUsers.has(chat.otherUserId) ? '<span class="verified-badge" title="Администратор">✓</span>' : ''}
              ${chat.isPinned ? '<span style="color:var(--pinned);margin-left:4px;">📌</span>' : ''}
            </div>
            <div class="chat-preview">${senderPrefix}${preview}</div>
            <div class="chat-time">${timeAgo}</div>
          </div>
          <div class="chat-actions">
            <button class="action-btn pin-btn" onclick="event.stopPropagation(); togglePinChat('${chat.id}')" title="${pinBtnTitle}">
              ${pinIcon}
            </button>
            <button class="action-btn delete-btn" onclick="event.stopPropagation(); showDeleteConfirm('${chat.id}', '${otherUser.username}')" title="Удалить чат">
              🗑️
            </button>
          </div>
        </div>
      `;
    }
    
    chatsList.innerHTML = chatsHTML;
    
    // Добавляем обработчики для мобильных
    if (isMobile) {
      const chatItems = document.querySelectorAll('.chat-item');
      chatItems.forEach(item => {
        let longPressTimer;
        const chatId = item.getAttribute('data-chat-id');
        const isPinned = item.getAttribute('data-is-pinned') === 'true';
        
        item.addEventListener('touchstart', (e) => {
          longPressTimer = setTimeout(() => {
            showChatContextMenu(e, chatId, isPinned);
          }, 500);
        });
        
        item.addEventListener('touchend', () => {
          clearTimeout(longPressTimer);
        });
        
        item.addEventListener('touchmove', () => {
          clearTimeout(longPressTimer);
        });
        
        // Показываем кнопки при нажатии на мобильных
        item.addEventListener('click', (e) => {
          if (!e.target.closest('.action-btn')) {
            // Клик не по кнопке действия - показываем/скрываем кнопки
            item.classList.toggle('mobile-actions-visible');
          }
        });
      });
    }
    
  } catch (error) {
    console.error('Ошибка загрузки чатов:', error);
    chatsList.innerHTML = `
      <div class="no-chats" style="color:var(--danger)">
        Ошибка загрузки чатов: ${error.message}
      </div>`;
  }
}

async function addReaction(emoji) {
  if (!selectedMessageForReaction || !currentChatId) return;
  
  try {
    const messageRef = db.collection('chats').doc(currentChatId)
      .collection('messages')
      .doc(selectedMessageForReaction.id);
    
    // Получаем текущие реакции
    const messageDoc = await messageRef.get();
    const currentReactions = messageDoc.data()?.reactions || {};
    
    // Проверяем, есть ли уже реакция от этого пользователя
    const userReaction = currentReactions[currentUser.uid];
    
    if (userReaction === emoji) {
      // Убираем реакцию
      delete currentReactions[currentUser.uid];
      showNotification("Реакция убрана");
    } else {
      // Добавляем/изменяем реакцию
      currentReactions[currentUser.uid] = emoji;
      showNotification(`${emoji} Добавлено`);
    }
    
    // Обновляем сообщение
    await messageRef.update({
      reactions: currentReactions
    });
    
    // Закрываем панель реакций
    document.getElementById('reactionsPanel').classList.remove('show');
    
    // Обновляем UI сообщения
    updateMessageReactions(selectedMessageForReaction.id, currentReactions);
    
  } catch (error) {
    console.error("Ошибка при добавлении реакции:", error);
    showNotification("Ошибка: " + error.message);
  }
}

async function toggleHeartReaction(messageId) {
  if (!currentChatId) return;
  
  try {
    const messageRef = db.collection('chats').doc(currentChatId)
      .collection('messages')
      .doc(messageId);
    
    // Получаем текущие реакции
    const messageDoc = await messageRef.get();
    const currentReactions = messageDoc.data()?.reactions || {};
    
    // Проверяем, есть ли уже сердечко от этого пользователя
    const userReaction = currentReactions[currentUser.uid];
    
    if (userReaction === '❤️') {
      // Убираем сердечко
      delete currentReactions[currentUser.uid];
      showNotification("Реакция убрана");
    } else {
      // Добавляем сердечко
      currentReactions[currentUser.uid] = '❤️';
      showNotification("❤️ Добавлено");
    }
    
    // Обновляем сообщение
    await messageRef.update({
      reactions: currentReactions
    });
    
    // Обновляем UI сообщения
    updateMessageReactions(messageId, currentReactions);
    
    // На мобильных скрываем кнопки действий
    if (isMobile && selectedMessageForMobile) {
      hideMobileMessageActions();
    }
    
  } catch (error) {
    console.error("Ошибка при добавлении сердечка:", error);
    showNotification("Ошибка: " + error.message);
  }
}

function updateMessageReactions(messageId, reactions) {
  const messageElement = document.querySelector(`[data-message-id="${messageId}"]`);
  if (!messageElement) return;
  
  // Находим или создаем контейнер реакций
  let reactionsContainer = messageElement.querySelector('.message-reactions');
  
  if (!reactionsContainer) {
    reactionsContainer = document.createElement('div');
    reactionsContainer.className = 'message-reactions';
    
    // Вставляем перед временем сообщения
    const timeElement = messageElement.querySelector('.message-time');
    messageElement.insertBefore(reactionsContainer, timeElement);
  }
  
  // Очищаем контейнер
  reactionsContainer.innerHTML = '';
  
  // Группируем реакции по эмодзи
  const reactionGroups = {};
  Object.entries(reactions).forEach(([userId, emoji]) => {
    if (!reactionGroups[emoji]) {
      reactionGroups[emoji] = [];
    }
    reactionGroups[emoji].push(userId);
  });
  
  // Добавляем реакции в UI
  Object.entries(reactionGroups).forEach(([emoji, users]) => {
    const isLikedByMe = users.includes(currentUser.uid);
    
    const reactionElement = document.createElement('div');
    reactionElement.className = `reaction ${isLikedByMe ? 'liked' : ''}`;
    reactionElement.setAttribute('data-emoji', emoji);
    reactionElement.onclick = (e) => {
      e.stopPropagation();
      addReaction(emoji);
    };
    
    reactionElement.innerHTML = `
      <span>${emoji}</span>
      <span class="reaction-count">${users.length}</span>
    `;
    
    reactionsContainer.appendChild(reactionElement);
  });
}

// ==================== УПРАВЛЕНИЕ СООБЩЕНИЯМИ НА МОБИЛЬНЫХ ====================

function showMobileMessageActions(messageElement, messageId, messageData) {
  // Закрываем предыдущие открытые кнопки
  hideMobileMessageActions();
  
  // Устанавливаем текущее выбранное сообщение
  selectedMessageForMobile = { id: messageId, ...messageData };
  
  // Добавляем класс для выделения
  messageElement.classList.add('mobile-actions-visible');
  
  // Создаем мобильные кнопки действий
  const isOutgoing = messageData.senderId === currentUser.uid;
  const mobileActions = document.createElement('div');
  mobileActions.className = 'mobile-message-actions';
  
  mobileActions.innerHTML = `
    <button class="mobile-action-btn" onclick="replyToMessage('${messageId}', ${JSON.stringify(messageData).replace(/'/g, "\\'")})" title="Ответить">
      ↩️
    </button>
    <button class="mobile-action-btn" onclick="toggleHeartReaction('${messageId}')" title="Сердечко">
      ❤️
    </button>
    ${isOutgoing ? `
      <button class="mobile-action-btn" onclick="showDeleteMessageConfirm('${messageId}')" title="Удалить">
        🗑️
      </button>
    ` : ''}
  `;
  
  // Вставляем перед временем сообщения
  const timeElement = messageElement.querySelector('.message-time');
  messageElement.insertBefore(mobileActions, timeElement);
  
  // Добавляем обработчик для закрытия при клике снаружи
  setTimeout(() => {
    const closeHandler = (e) => {
      if (!messageElement.contains(e.target)) {
        hideMobileMessageActions();
      }
    };
    document.addEventListener('click', closeHandler);
    document.addEventListener('touchstart', closeHandler);
    
    // Сохраняем обработчик для удаления
    messageElement._closeHandler = closeHandler;
  }, 10);
}

function hideMobileMessageActions() {
  if (selectedMessageForMobile) {
    const messageElement = document.querySelector(`[data-message-id="${selectedMessageForMobile.id}"]`);
    if (messageElement) {
      messageElement.classList.remove('mobile-actions-visible');
      
      // Удаляем мобильные кнопки действий
      const mobileActions = messageElement.querySelector('.mobile-message-actions');
      if (mobileActions) {
        mobileActions.remove();
      }
      
      // Удаляем обработчик закрытия
      if (messageElement._closeHandler) {
        document.removeEventListener('click', messageElement._closeHandler);
        document.removeEventListener('touchstart', messageElement._closeHandler);
        delete messageElement._closeHandler;
      }
    }
    selectedMessageForMobile = null;
  }
}

function handleMessageClick(event, messageId, messageData) {
  // Если это клик по кнопке действия - пропускаем
  if (event.target.closest('.message-action-btn') || 
      event.target.closest('.mobile-action-btn') ||
      event.target.closest('.reaction')) {
    return;
  }
  
  // На мобильных показываем/скрываем кнопки действий
  if (isMobile) {
    const messageElement = event.currentTarget;
    
    // Если уже открыты кнопки для этого сообщения - закрываем их
    if (selectedMessageForMobile && selectedMessageForMobile.id === messageId) {
      hideMobileMessageActions();
      return;
    }
    
    // Показываем кнопки для текущего сообщения
    showMobileMessageActions(messageElement, messageId, messageData);
  }
}

// ==================== ЗАКРЕПЛЕНИЕ ЧАТОВ ====================

async function togglePinChat(chatId) {
  try {
    const isCurrentlyPinned = pinnedChats.has(chatId);
    
    if (isCurrentlyPinned) {
      // Открепляем
      pinnedChats.delete(chatId);
      await db.collection("users").doc(currentUser.uid).update({
        pinnedChats: firebase.firestore.FieldValue.arrayRemove(chatId)
      });
      showNotification("Чат откреплен");
    } else {
      // Закрепляем
      pinnedChats.add(chatId);
      await db.collection("users").doc(currentUser.uid).update({
        pinnedChats: firebase.firestore.FieldValue.arrayUnion(chatId)
      });
      showNotification("Чат закреплен");
    }
    
    // Обновляем UI
    const chatItem = document.querySelector(`.chat-item[data-chat-id="${chatId}"]`);
    if (chatItem) {
      chatItem.setAttribute('data-is-pinned', (!isCurrentlyPinned).toString());
      chatItem.classList.toggle('pinned');
      
      const pinBtn = chatItem.querySelector('.pin-btn');
      const usernameElement = chatItem.querySelector('.chat-user');
      
      if (!isCurrentlyPinned) {
        // Добавляем значок закрепления
        let pinIndicator = usernameElement.querySelector('.pin-indicator');
        if (!pinIndicator) {
          pinIndicator = document.createElement('span');
          pinIndicator.className = 'pin-indicator';
          pinIndicator.style.cssText = 'color:var(--pinned);margin-left:4px;';
          pinIndicator.textContent = '📌';
          usernameElement.appendChild(pinIndicator);
        }
        if (pinBtn) {
          pinBtn.innerHTML = '📌';
          pinBtn.title = 'Открепить чат';
        }
      } else {
        // Удаляем значок закрепления
        const pinIndicator = usernameElement.querySelector('.pin-indicator');
        if (pinIndicator) pinIndicator.remove();
        if (pinBtn) {
          pinBtn.innerHTML = '📌';
          pinBtn.title = 'Закрепить чат';
        }
      }
    }
    
    // Перезагружаем список чатов для правильной сортировки
    setTimeout(() => {
      loadChatsList();
    }, 300);
    
  } catch (error) {
    console.error("Ошибка при закреплении чата:", error);
    showNotification("Ошибка: " + error.message);
  }
}

// ==================== УДАЛЕНИЕ ЧАТА ====================

function showDeleteConfirm(chatId, username) {
  if (confirm(`Вы уверены, что хотите удалить чат с @${username}? Все сообщения будут удалены.`)) {
    deleteChat(chatId);
  }
}

async function deleteChat(chatId) {
  try {
    // Удаляем все сообщения чата
    const messagesSnap = await db.collection('chats').doc(chatId)
      .collection('messages').get();
    
    const batch = db.batch();
    messagesSnap.docs.forEach(doc => {
      batch.delete(doc.ref);
    });
    
    // Удаляем сам чат
    batch.delete(db.collection('chats').doc(chatId));
    
    await batch.commit();
    
    // Удаляем из закрепленных, если есть
    if (pinnedChats.has(chatId)) {
      pinnedChats.delete(chatId);
      await db.collection("users").doc(currentUser.uid).update({
        pinnedChats: firebase.firestore.FieldValue.arrayRemove(chatId)
      });
    }
    
    showNotification("Чат удален");
    
    // Если это текущий открытый чат - закрываем его
    if (currentChatId === chatId) {
      closeChat();
    }
    
    // Обновляем список чатов
    setTimeout(() => {
      loadChatsList();
    }, 300);
    
  } catch (error) {
    console.error("Ошибка при удалении чата:", error);
    showNotification("Ошибка удаления: " + error.message);
  }
}

// ==================== УДАЛЕНИЕ СООБЩЕНИЯ ====================

function showDeleteMessageConfirm(messageId) {
  if (confirm("Вы уверены, что хотите удалить это сообщение?")) {
    deleteMessage(messageId);
  }
}

async function deleteMessage(messageId) {
  try {
    if (!currentChatId || !messageId) return;
    
    // Удаляем сообщение
    await db.collection('chats').doc(currentChatId)
      .collection('messages')
      .doc(messageId)
      .delete();
    
    // Удаляем сообщение из UI
    const messageElement = document.querySelector(`[data-message-id="${messageId}"]`);
    if (messageElement) {
      messageElement.remove();
    }
    
    // Обновляем последнее сообщение в чате
    const messagesSnap = await db.collection('chats').doc(currentChatId)
      .collection('messages')
      .orderBy('timestamp', 'desc')
      .limit(1)
      .get();
    
    if (messagesSnap.empty) {
      // Если нет сообщений
      await db.collection('chats').doc(currentChatId).update({
        lastMessage: 'Нет сообщений',
        lastSender: '',
        lastMessageTime: firebase.firestore.FieldValue.delete()
      });
    } else {
      // Обновляем последнее сообщение
      const lastMsg = messagesSnap.docs[0].data();
      await db.collection('chats').doc(currentChatId).update({
        lastMessage: lastMsg.text,
        lastSender: lastMsg.senderId,
        lastMessageTime: lastMsg.timestamp
      });
    }
    
    showNotification("Сообщение удалено");
    
    // На мобильных сбрасываем выбранное сообщение
    if (isMobile && selectedMessageForMobile && selectedMessageForMobile.id === messageId) {
      hideMobileMessageActions();
    }
    
    // Обновляем список чатов
    loadChatsList();
    
  } catch (error) {
    console.error("Ошибка при удалении сообщения:", error);
    showNotification("Ошибка удаления сообщения: " + error.message);
  }
}

// ==================== ОКНО ЧАТА ====================

function handleChatClick(event, userId, username, chatId) {
  // Проверяем, была ли нажата кнопка действия
  if (event.target.closest('.action-btn') || event.target.closest('.chat-actions')) {
    return;
  }
  
  // На мобильных закрываем кнопки если они открыты
  const chatItem = event.currentTarget;
  if (chatItem.classList.contains('mobile-actions-visible')) {
    chatItem.classList.remove('mobile-actions-visible');
    return;
  }
  
  // Открываем чат как обычно
  openChat(userId, username, chatId);
}

async function openChat(userId, username, chatId = null) {
  currentChatUserId = userId;
  currentChatUsername = username;
  
  // Находим ID чата если не передан
  if (!chatId) {
    const chatsSnap = await db.collection('chats').get();
    
    for (const doc of chatsSnap.docs) {
      const chat = doc.data();
      if (chat.participants && 
          chat.participants.includes(currentUser.uid) && 
          chat.participants.includes(userId)) {
        chatId = doc.id;
        break;
      }
    }
  }
  
  currentChatId = chatId;
  
  // Обновляем UI чата
  document.getElementById('chatUserAvatar').textContent = username?.[0]?.toUpperCase() || 'U';
  document.getElementById('chatUserName').textContent = '@' + username;
  document.getElementById('chatUserStatus').textContent = 'онлайн';
  
  // Проверяем блокировку
  const isBlocked = blockedUsers.has(userId);
  updateBlockButtons(isBlocked);
  
  // Открываем окно чата
  document.getElementById('chatOverlay').classList.add('show');
  
  // Сбрасываем ответ на сообщение
  cancelReply();
  
  // Сбрасываем выбранное сообщение на мобильных
  hideMobileMessageActions();
  
  // Сбрасываем последнее сообщение
  lastMessageId = null;
  
  // Загружаем сообщения
  await loadChatMessages();
  
  // Настраиваем слушатель новых сообщений
  setupChatMessagesListener();
  
  // Помечаем сообщения как прочитанные
  if (currentChatId) {
    await markChatAsRead(currentChatId);
  }
  
  // Фокусируемся на поле ввода с небольшой задержкой
  setTimeout(() => {
    const chatInput = document.getElementById('chatInput');
    if (chatInput) {
      chatInput.focus();
    }
  }, 100);
}

function closeChat() {
  document.getElementById('chatOverlay').classList.remove('show');
  
  if (chatMessagesListener) {
    chatMessagesListener();
    chatMessagesListener = null;
  }
  
  currentChatUserId = null;
  currentChatUsername = null;
  currentChatId = null;
  lastMessageId = null;
  replyingToMessage = null;
  
  // Сбрасываем выбранное сообщение на мобильных
  hideMobileMessageActions();
  
  loadChatsList();
}

function updateBlockButtons(isCurrentlyBlocked) {
  const blockBtn = document.getElementById('blockBtn');
  const unblockBtn = document.getElementById('unblockBtn');
  const chatInput = document.getElementById('chatInput');
  const chatSendBtn = document.getElementById('chatSendBtn');
  
  if (isCurrentlyBlocked) {
    blockBtn.style.display = 'none';
    unblockBtn.style.display = 'block';
    chatInput.disabled = true;
    chatSendBtn.disabled = true;
    chatInput.placeholder = 'Пользователь заблокирован';
  } else {
    blockBtn.style.display = 'block';
    unblockBtn.style.display = 'none';
    chatInput.disabled = false;
    chatSendBtn.disabled = false;
    chatInput.placeholder = 'Напишите сообщение...';
  }
}

async function toggleBlockUser() {
  if (!currentChatUserId) return;
  
  try {
    const userDoc = await db.collection("users").doc(currentUser.uid).get();
    const currentBlocked = userDoc.exists ? userDoc.data().blockedUsers || [] : [];
    
    const isBlocked = currentBlocked.includes(currentChatUserId);
    
    if (isBlocked) {
      // Разблокировать
      await db.collection("users").doc(currentUser.uid).update({
        blockedUsers: firebase.firestore.FieldValue.arrayRemove(currentChatUserId)
      });
      blockedUsers.delete(currentChatUserId);
      showNotification(`Вы разблокировали @${currentChatUsername}`);
    } else {
      // Заблокировать
      await db.collection("users").doc(currentUser.uid).update({
        blockedUsers: firebase.firestore.FieldValue.arrayUnion(currentChatUserId)
      });
      blockedUsers.add(currentChatUserId);
      showNotification(`Вы заблокировали @${currentChatUsername}`);
    }
    
    updateBlockButtons(!isBlocked);
    
    if (!isBlocked) {
      setTimeout(() => {
        closeChat();
        loadChatsList();
      }, 1000);
    }
    
  } catch (error) {
    console.error("Ошибка при блокировке пользователя:", error);
    showNotification("Ошибка: " + error.message);
  }
}

// ==================== СООБЩЕНИЯ ====================

async function loadChatMessages() {
  const chatMessages = document.getElementById('chatMessages');
  chatMessages.innerHTML = '<div class="loader"><div class="loader-spinner"></div><div>Загрузка сообщений...</div></div>';
  
  if (!currentChatId) {
    chatMessages.innerHTML = `
      <div class="no-messages">
        Начните общение с @${currentChatUsername}!
      </div>`;
    return;
  }
  
  try {
    const messagesSnap = await db.collection('chats').doc(currentChatId)
      .collection('messages')
      .orderBy('timestamp', 'asc')
      .limit(100)
      .get();
    
    if (messagesSnap.empty) {
      chatMessages.innerHTML = `
        <div class="no-messages">
          Нет сообщений. Начните общение!
        </div>`;
      return;
    }
    
    const messages = [];
    messagesSnap.forEach(doc => {
      messages.push({ id: doc.id, ...doc.data() });
    });
    
    // Отображаем сообщения
    chatMessages.innerHTML = '';
    let lastDate = null;
    
    messages.forEach((msg) => {
      const msgDate = msg.timestamp?.toDate ? msg.timestamp.toDate() : new Date();
      const currentDate = formatMessageDate(msgDate);
      
      // Добавляем разделитель даты только если дата изменилась
      if (currentDate !== lastDate) {
        const dateDivider = document.createElement('div');
        dateDivider.className = 'message-date-divider';
        dateDivider.textContent = currentDate;
        chatMessages.appendChild(dateDivider);
        lastDate = currentDate;
      }
      
      addMessageToUI(msg, false);
    });
    
    // Прокрутка вниз
    setTimeout(() => {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }, 100);
    
  } catch (error) {
    console.error('Ошибка загрузки сообщений:', error);
    chatMessages.innerHTML = `
      <div class="no-messages" style="color:var(--danger)">
        Ошибка загрузки сообщений
      </div>`;
  }
}

function addMessageToUI(msg, isNew = true) {
  const chatMessages = document.getElementById('chatMessages');
  const noMessages = chatMessages.querySelector('.no-messages');
  const loader = chatMessages.querySelector('.loader');
  
  // Убираем загрузчик или сообщение "нет сообщений"
  if (noMessages) noMessages.remove();
  if (loader) loader.remove();
  
  const msgDate = msg.timestamp?.toDate ? msg.timestamp.toDate() : new Date();
  const currentDate = formatMessageDate(msgDate);
  const isOutgoing = msg.senderId === currentUser.uid;
  const messageTime = formatMessageTime(msgDate);
  const senderInfo = msg.senderId === currentUser.uid ? 
    { username: 'Вы' } : 
    { username: currentChatUsername };
  
  // Создаем элемент сообщения
  const messageDiv = document.createElement('div');
  messageDiv.className = `message fade ${isOutgoing ? 'message-outgoing' : 'message-incoming'} ${msg.replyTo ? 'message-replied' : ''}`;
  messageDiv.setAttribute('data-message-id', msg.id);
  messageDiv.onclick = (e) => handleMessageClick(e, msg.id, msg);
  
  // Проверяем, есть ли ответ на другое сообщение
  let replyHTML = '';
  if (msg.replyTo) {
    const replySender = msg.replyTo.senderId === currentUser.uid ? 'Вы' : currentChatUsername;
    const replyText = msg.replyTo.text.length > 50 ? 
      msg.replyTo.text.substring(0, 47) + '...' : 
      msg.replyTo.text;
    
    replyHTML = `
      <div class="message-reply">
        <div class="message-reply-sender">${replySender}</div>
        <div class="message-reply-text">${replyText}</div>
      </div>
    `;
  }
  
  messageDiv.innerHTML = `
    ${replyHTML}
    <div class="message-text">${msg.text}</div>
    <div class="message-time">
      ${messageTime}
      ${isOutgoing ? `<span class="message-status">${msg.read ? '✓✓' : '✓'}</span>` : ''}
    </div>
    ${!isMobile ? `
      <div class="message-actions">
        <button class="message-action-btn reply-btn" 
                onclick="event.stopPropagation(); replyToMessage('${msg.id}', ${JSON.stringify(msg).replace(/'/g, "\\'")})"
                title="Ответить">
          ↩️
        </button>
        <button class="message-action-btn heart-btn" 
                onclick="event.stopPropagation(); toggleHeartReaction('${msg.id}')"
                title="Сердечко">
          ❤️
        </button>
        ${isOutgoing ? `
          <button class="message-action-btn delete-message-btn" 
                  onclick="event.stopPropagation(); showDeleteMessageConfirm('${msg.id}')"
                  title="Удалить сообщение">
            🗑️
          </button>
        ` : ''}
      </div>
    ` : ''}
  `;
  
  // Для новых сообщений проверяем дату и добавляем разделитель если нужно
  if (isNew) {
    const allElements = chatMessages.children;
    let lastMessageDateDivider = null;
    
    // Ищем последний разделитель даты
    for (let i = allElements.length - 1; i >= 0; i--) {
      const element = allElements[i];
      if (element.classList.contains('message-date-divider')) {
        lastMessageDateDivider = element;
        break;
      }
    }
    
    // Проверяем, нужен ли новый разделитель даты
    let needsDateDivider = false;
    if (!lastMessageDateDivider) {
      needsDateDivider = true;
    } else if (lastMessageDateDivider.textContent !== currentDate) {
      needsDateDivider = true;
    }
    
    // Добавляем разделитель даты если нужно
    if (needsDateDivider) {
      const dateDivider = document.createElement('div');
      dateDivider.className = 'message-date-divider';
      dateDivider.textContent = currentDate;
      chatMessages.appendChild(dateDivider);
    }
  }
  
  chatMessages.appendChild(messageDiv);
  
  // Добавляем реакции если есть
  if (msg.reactions && Object.keys(msg.reactions).length > 0) {
    updateMessageReactions(msg.id, msg.reactions);
  }
  
  // Добавляем обработчики для контекстного меню на мобильных
  if (isMobile) {
    let longPressTimer;
    
    messageDiv.addEventListener('touchstart', (e) => {
      longPressTimer = setTimeout(() => {
        showMessageContextMenu(e, msg.id, msg);
      }, 500);
    });
    
    messageDiv.addEventListener('touchend', () => {
      clearTimeout(longPressTimer);
    });
    
    messageDiv.addEventListener('touchmove', () => {
      clearTimeout(longPressTimer);
    });
    
    // Двойной тап для сердечка
    let tapCount = 0;
    let tapTimer;
    
    messageDiv.addEventListener('click', (e) => {
      if (e.target.closest('.mobile-action-btn')) return;
      
      tapCount++;
      if (tapCount === 1) {
        tapTimer = setTimeout(() => {
          tapCount = 0;
        }, 300);
      } else if (tapCount === 2) {
        clearTimeout(tapTimer);
        tapCount = 0;
        toggleHeartReaction(msg.id);
      }
    });
  }
  
  // Добавляем обработчик контекстного меню для десктопа
  if (!isMobile) {
    messageDiv.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      showReactionsPanel(e, msg.id, msg);
    });
  }
  
  // Прокручиваем вниз для новых сообщений
  if (isNew) {
    setTimeout(() => {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }, 100);
  }
}

// Исправленный слушатель сообщений
function setupChatMessagesListener() {
  if (chatMessagesListener || !currentChatId) return;
  
  let isFirstLoad = true;
  let processedMessages = new Set();
  
  chatMessagesListener = db.collection('chats').doc(currentChatId)
    .collection('messages')
    .orderBy('timestamp', 'asc')
    .onSnapshot((snapshot) => {
      // Для первого загрузки игнорируем (уже загружено в loadChatMessages)
      if (isFirstLoad) {
        isFirstLoad = false;
        return;
      }
      
      snapshot.docChanges().forEach((change) => {
        const msgId = change.doc.id;
        
        // Проверяем, не обрабатывали ли мы уже это сообщение
        if (processedMessages.has(msgId)) {
          return;
        }
        
        processedMessages.add(msgId);
        
        if (change.type === 'added') {
          const msg = change.doc.data();
          
          // Проверяем, не наше ли это только что отправленное сообщение
          const isOutgoing = msg.senderId === currentUser.uid;
          const msgDate = msg.timestamp?.toDate ? msg.timestamp.toDate() : new Date();
          const timeDiff = new Date() - msgDate;
          
          // Игнорируем сообщения старше 2 секунд (чтобы не дублировать уже загруженные)
          if (!isOutgoing || timeDiff < 2000) {
            addMessageToUI({ id: msgId, ...msg }, true);
            
            // Помечаем как прочитанное если это входящее
            if (!isOutgoing) {
              markMessageAsRead(msgId);
            }
          }
        } else if (change.type === 'modified') {
          // Обновляем реакции если сообщение было изменено
          const msg = change.doc.data();
          const messageElement = document.querySelector(`[data-message-id="${msgId}"]`);
          if (messageElement && msg.reactions) {
            updateMessageReactions(msgId, msg.reactions);
          }
        } else if (change.type === 'removed') {
          // Удаляем сообщение из UI если оно было удалено
          const messageElement = document.querySelector(`[data-message-id="${msgId}"]`);
          if (messageElement) {
            messageElement.remove();
          }
        }
      });
      
      // Очищаем старые ID (чтобы не копить слишком много)
      if (processedMessages.size > 100) {
        const ids = Array.from(processedMessages);
        processedMessages = new Set(ids.slice(-50));
      }
    }, (error) => {
      console.error('Ошибка слушателя сообщений:', error);
    });
}

async function sendMessage() {
  if (!currentChatUserId) return;
  
  const chatInput = document.getElementById('chatInput');
  const text = chatInput.value.trim();
  
  if (!text) {
    showNotification('Введите сообщение!');
    return;
  }
  
  if (blockedUsers.has(currentChatUserId)) {
    showNotification('Нельзя отправить сообщение заблокированному пользователю');
    return;
  }
  
  // Блокируем кнопку отправки
  const sendBtn = document.getElementById('chatSendBtn');
  const originalText = sendBtn.innerHTML;
  sendBtn.innerHTML = '⏳';
  sendBtn.disabled = true;
  
  const messageData = {
    text: text,
    senderId: currentUser.uid,
    timestamp: new Date(),
    read: false
  };
  
  // Добавляем информацию об ответе если есть
  if (replyingToMessage) {
    messageData.replyTo = {
      messageId: replyingToMessage.id,
      senderId: replyingToMessage.senderId,
      text: replyingToMessage.text
    };
  }
  
  try {
    let chatId = currentChatId;
    
    if (!chatId) {
      // Создаем новый чат
      const newChatRef = await db.collection('chats').add({
        participants: [currentUser.uid, currentChatUserId],
        lastMessage: text,
        lastSender: currentUser.uid,
        lastMessageTime: new Date(),
        createdAt: new Date(),
        updatedAt: new Date(),
        unreadFor: [currentChatUserId]
      });
      
      chatId = newChatRef.id;
      currentChatId = chatId;
    } else {
      // Обновляем существующий чат
      await db.collection('chats').doc(chatId).update({
        lastMessage: text,
        lastSender: currentUser.uid,
        lastMessageTime: new Date(),
        updatedAt: new Date(),
        unreadFor: firebase.firestore.FieldValue.arrayUnion(currentChatUserId)
      });
    }
    
    // Добавляем сообщение
    await db.collection('chats').doc(chatId)
      .collection('messages')
      .add(messageData);
    
    // Очищаем поле ввода и сбрасываем ответ
    chatInput.value = '';
    chatInput.style.height = 'auto';
    cancelReply();
    
    // Разблокируем кнопку отправки
    sendBtn.innerHTML = originalText;
    sendBtn.disabled = false;
    
    // Обновляем список чатов
    loadChatsList();
    
  } catch (error) {
    console.error('Ошибка отправки сообщения:', error);
    showNotification('Ошибка отправки: ' + error.message);
    
    // Разблокируем кнопку отправки в случае ошибки
    sendBtn.innerHTML = originalText;
    sendBtn.disabled = false;
  }
}

async function markMessageAsRead(messageId) {
  if (!currentChatId) return;
  
  try {
    await db.collection('chats').doc(currentChatId)
      .collection('messages')
      .doc(messageId)
      .update({
        read: true
      });
    
    // Обновляем статус в UI
    const messageElements = document.querySelectorAll('.message-outgoing .message-status');
    messageElements.forEach(el => {
      if (el.textContent === '✓') {
        el.textContent = '✓✓';
      }
    });
    
  } catch (error) {
    console.error('Ошибка пометки сообщения как прочитанного:', error);
  }
}

async function markChatAsRead(chatId) {
  try {
    // Обновляем статус чата
    await db.collection('chats').doc(chatId).update({
      unreadFor: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
    });
    
    // Помечаем все входящие сообщения как прочитанные
    const messagesSnap = await db.collection('chats').doc(chatId)
      .collection('messages')
      .where('senderId', '==', currentChatUserId)
      .where('read', '==', false)
      .get();
    
    const batch = db.batch();
    messagesSnap.forEach(doc => {
      batch.update(doc.ref, { read: true });
    });
    
    if (!messagesSnap.empty) {
      await batch.commit();
    }
    
    // Обновляем UI
    const messageElements = document.querySelectorAll('.message-outgoing .message-status');
    messageElements.forEach(el => {
      if (el.textContent === '✓') {
        el.textContent = '✓✓';
      }
    });
    
  } catch (error) {
    console.error('Ошибка пометки чата как прочитанного:', error);
  }
}

// ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================

async function openProfileFromChat() {
  if (currentChatUserId && currentChatUsername) {
    const chatState = {
      userId: currentChatUserId,
      username: currentChatUsername,
      chatId: currentChatId
    };
    sessionStorage.setItem('returnToChat', JSON.stringify(chatState));
    
    location.href = `feed.html?openProfile=${currentChatUserId}`;
  }
}

function showNotification(message, duration = 3000) {
  const notification = document.getElementById('notification');
  notification.textContent = message;
  notification.classList.add('show');
  
  setTimeout(() => {
    notification.classList.remove('show');
  }, duration);
}

function logout() {
  if (confirm("Выйти из аккаунта?")) {
    auth.signOut().then(() => {
      location.href = "index.html";
    });
  }
}

// Инициализация контекстных меню
document.addEventListener('DOMContentLoaded', () => {
  // Меню для чатов
  const contextMenu = document.getElementById('contextMenu');
  const contextPinBtn = document.getElementById('contextPinBtn');
  const contextDeleteBtn = document.getElementById('contextDeleteBtn');
  
  contextPinBtn.addEventListener('click', () => {
    if (contextMenuChatId) {
      togglePinChat(contextMenuChatId);
      contextMenu.classList.remove('show');
    }
  });
  
  contextDeleteBtn.addEventListener('click', () => {
    if (contextMenuChatId) {
      const chatItem = document.querySelector(`.chat-item[data-chat-id="${contextMenuChatId}"]`);
      if (chatItem) {
        const usernameElement = chatItem.querySelector('.chat-user');
        const username = usernameElement ? usernameElement.textContent.replace('@', '').replace('📌', '').trim() : 'пользователем';
        showDeleteConfirm(contextMenuChatId, username);
      }
      contextMenu.classList.remove('show');
    }
  });
  
  // Меню для сообщений
  const messageContextMenu = document.getElementById('messageContextMenu');
  const contextReplyBtn = document.getElementById('contextReplyBtn');
  const contextReactionBtn = document.getElementById('contextReactionBtn');
  const contextDeleteMessageBtn = document.getElementById('contextDeleteMessageBtn');
  
  contextReplyBtn.addEventListener('click', () => {
    if (contextMenuMessageId && selectedMessageForReaction) {
      replyToMessage(contextMenuMessageId, selectedMessageForReaction);
      messageContextMenu.classList.remove('show');
    }
  });
  
  contextReactionBtn.addEventListener('click', () => {
    if (contextMenuMessageId) {
      toggleHeartReaction(contextMenuMessageId);
      messageContextMenu.classList.remove('show');
    }
  });
  
  contextDeleteMessageBtn.addEventListener('click', () => {
    if (contextMenuMessageId) {
      showDeleteMessageConfirm(contextMenuMessageId);
      messageContextMenu.classList.remove('show');
    }
  });
});

document.getElementById('chatInput')?.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = (this.scrollHeight) + 'px';
});

document.getElementById('chatInput')?.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
  
  // Отмена ответа на сообщение по Escape
  if (e.key === 'Escape' && replyingToMessage) {
    cancelReply();
  }
});

async function checkOpenChatOnLoad() {
  const openChatData = sessionStorage.getItem('openChatWith');
  if (openChatData) {
    try {
      const { userId, username } = JSON.parse(openChatData);
      sessionStorage.removeItem('openChatWith');
      
      setTimeout(async () => {
        await openChat(userId, username);
      }, 500);
      
    } catch(e) {
      console.error('Ошибка открытия чата:', e);
    }
  }
}

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    location.href = 'index.html';
    return;
  }
  
  currentUser = user;
  console.log('Пользователь авторизован:', user.uid);
  
  await loadUserData();
  await loadAdminUsers();
  await loadBlockedUsers();
  await loadChatsList();
  await checkOpenChatOnLoad();

  setInterval(() => {
    const timeElement = document.getElementById('time');
    if (timeElement) {
      timeElement.textContent = new Date().toLocaleTimeString('ru-RU', {
        hour: '2-digit',
        minute: '2-digit'
      });
    }
  }, 1000);
});

window.addEventListener('load', () => {
  const returnToChat = sessionStorage.getItem('returnToChat');
  if (returnToChat) {
    try {
      const { userId, username, chatId } = JSON.parse(returnToChat);
      sessionStorage.removeItem('returnToChat');

        currentChatUserId = userId;

        loadChatMessages();
      }
    } catch(e) {
      console.error('Ошибка восстановления чата:', e);
    }
  }
});
