<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личные сообщения - czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
:root {
  --bg: #000;
  --card: rgba(28,28,30,0.95);
  --border: #1f1f1f;
  --text: #fff;
  --sub: #9a9a9a;
  --accent: linear-gradient(135deg,#667eea,#764ba2);
  --danger: #ff453a;
  --success: #30d158;
  --online: #30d158;
  --offline: #8e8e93;
  --message: #5ac8fa;
  --outgoing-message: #667eea;
  --pinned: #ffd60a;
  --reply: #5ac8fa;
  --heart: #ff375f;
  --call-bg: #1c1c1e;
  --call-accept: #30d158;
  --call-decline: #ff453a;
  --call-video: #5ac8fa;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  height: 100vh;
  overflow: hidden;
}

.fade {
  animation: fade .3s ease;
}

@keyframes fade {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
  }
}

.dynamic-island {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 34px;
  border-radius: 20px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  z-index: 1000;
}

.navbar {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  max-width: 430px;
  background: var(--card);
  border-radius: 18px;
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 999;
}

.logo {
  font-weight: 700;
  background: var(--accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  cursor: pointer;
}

.nav-btns {
  display: flex;
  gap: 8px;
}

.nav-btn {
  background: #1c1c1e;
  border: none;
  color: #fff;
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
}

.chats-btn {
  background: #5ac8fa;
  color: var(--bg);
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 140px 14px 100px;
  height: 100vh;
  overflow-y: auto;
  position: relative;
  z-index: 1;
}

.chats-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.chat-item {
  background: var(--card);
  border-radius: 20px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: transform 0.2s, background 0.2s;
  position: relative;
}

.chat-item:hover {
  background: rgba(255,255,255,0.05);
  transform: translateY(-2px);
}

.chat-item.unread {
  background: rgba(90,200,250,0.1);
}

.chat-item.unread::after {
  content: '';
  position: absolute;
  top: 18px;
  right: 18px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--message);
}

.chat-item.pinned {
  background: rgba(255,214,10,0.1);
  border-left: 4px solid var(--pinned);
}

.chat-avatar {
  width: 56px;
  height: 56px;
  border-radius: 18px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 20px;
  flex-shrink: 0;
}

.chat-info {
  flex: 1;
  min-width: 0;
  padding-right: 80px;
}

.chat-user {
  font-weight: 600;
  font-size: 16px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.verified-badge {
  color: #5ac8fa;
  font-size: 14px;
}

.chat-preview {
  color: var(--sub);
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chat-time {
  color: var(--sub);
  font-size: 12px;
  margin-top: 4px;
}

.chat-actions {
  position: absolute;
  top: 50%;
  right: 16px;
  transform: translateY(-50%);
  display: flex;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.2s;
}

.chat-item:hover .chat-actions {
  opacity: 1;
}

.action-btn {
  background: rgba(28,28,30,0.8);
  border: none;
  color: var(--sub);
  width: 36px;
  height: 36px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
}

.action-btn:hover {
  background: var(--card);
  color: var(--text);
  transform: scale(1.1);
}

.action-btn.pin-btn:hover {
  color: var(--pinned);
  background: rgba(255,214,10,0.1);
}

.action-btn.delete-btn:hover {
  color: var(--danger);
  background: rgba(255,69,58,0.1);
}

.no-chats {
  text-align: center;
  padding: 80px 20px;
  color: var(--sub);
}

.no-chats-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.no-chats-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}

.no-chats-description {
  font-size: 14px;
  line-height: 1.4;
}

.chat-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 5000;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.chat-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
}

.chat-header {
  background: var(--card);
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: relative;
  min-height: 72px;
  flex-shrink: 0;
  z-index: 10;
}

.chat-user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
}

.chat-header-avatar {
  width: 44px;
  height: 44px;
  border-radius: 16px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 18px;
}

.chat-header-username {
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
}

.chat-header-username:hover {
  opacity: 0.8;
}

.chat-header-time {
  font-size: 12px;
  margin-top: 2px;
  color: var(--sub);
}

.chat-close-btn {
  background: none;
  border: none;
  color: var(--sub);
  font-size: 24px;
  cursor: pointer;
  padding: 8px;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.chat-close-btn:hover {
  background: rgba(255,255,255,0.1);
}

.call-buttons {
  display: flex;
  gap: 8px;
  margin-right: 8px;
}

.call-btn {
  background: var(--card);
  border: none;
  color: #fff;
  width: 40px;
  height: 40px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
  transition: all 0.2s;
}

.call-btn.audio {
  background: var(--success);
}

.call-btn.audio:hover {
  background: #34c759;
  transform: scale(1.1);
}

.call-btn.video {
  background: var(--call-video);
}

.call-btn.video:hover {
  background: #5ac8fa;
  transform: scale(1.1);
}

.call-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.block-btn {
  background: var(--danger);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-right: 8px;
}

.block-btn:hover {
  opacity: 0.9;
}

.unblock-btn {
  background: var(--success);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-right: 8px;
}

.unblock-btn:hover {
  opacity: 0.9;
}

.call-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.95);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.call-modal.show {
  opacity: 1;
  pointer-events: auto;
}

.call-container {
  width: 100%;
  max-width: 400px;
  padding: 20px;
  text-align: center;
}

.call-avatar {
  width: 120px;
  height: 120px;
  border-radius: 60px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 60px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% {
    box-shadow: 0 0 0 0 rgba(90, 200, 250, 0.7);
  }
  70% {
    box-shadow: 0 0 0 20px rgba(90, 200, 250, 0);
  }
  100% {
    box-shadow: 0 0 0 0 rgba(90, 200, 250, 0);
  }
}

.call-info {
  margin-bottom: 30px;
}

.call-name {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  color: #fff;
}

.call-type {
  color: var(--sub);
  font-size: 16px;
}

.call-timer {
  font-size: 32px;
  font-weight: 600;
  color: #fff;
  margin: 20px 0;
  font-family: monospace;
}

.call-controls {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}

.call-control-btn {
  width: 70px;
  height: 70px;
  border-radius: 35px;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 28px;
  transition: all 0.3s ease;
}

.call-control-btn:hover {
  transform: scale(1.1);
}

.call-control-btn.audio-mute {
  background: var(--card);
  color: #fff;
}

.call-control-btn.audio-mute.muted {
  background: var(--danger);
}

.call-control-btn.video-toggle {
  background: var(--card);
  color: #fff;
}

.call-control-btn.video-toggle.off {
  background: var(--danger);
}

.call-control-btn.end-call {
  background: var(--danger);
  color: #fff;
}

.video-container {
  position: relative;
  width: 100%;
  height: 0;
  padding-bottom: 56.25%;
  background: #1c1c1e;
  border-radius: 20px;
  overflow: hidden;
  margin: 20px 0;
}

#remoteVideo {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#localVideo {
  position: absolute;
  width: 120px;
  height: 160px;
  bottom: 20px;
  right: 20px;
  border-radius: 12px;
  border: 2px solid #fff;
  z-index: 2;
  object-fit: cover;
}

.incoming-call {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--card);
  border-radius: 30px;
  padding: 30px;
  z-index: 10001;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
  animation: slideIn 0.3s ease;
  min-width: 320px;
  text-align: center;
}

@keyframes slideIn {
  from {
    transform: translate(-50%, -30%);
    opacity: 0;
  }
  to {
    transform: translate(-50%, -50%);
    opacity: 1;
  }
}

.incoming-avatar {
  width: 100px;
  height: 100px;
  border-radius: 50px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 15px;
  font-size: 50px;
  animation: pulse 2s infinite;
}

.incoming-name {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 8px;
  color: #fff;
}

.incoming-type {
  color: var(--sub);
  font-size: 16px;
  margin-bottom: 20px;
}

.incoming-buttons {
  display: flex;
  gap: 20px;
  justify-content: center;
}

.incoming-accept {
  background: var(--success);
  color: #fff;
  border: none;
  width: 60px;
  height: 60px;
  border-radius: 30px;
  font-size: 24px;
  cursor: pointer;
  transition: all 0.2s;
}

.incoming-accept:hover {
  transform: scale(1.1);
}

.incoming-decline {
  background: var(--danger);
  color: #fff;
  border: none;
  width: 60px;
  height: 60px;
  border-radius: 30px;
  font-size: 24px;
  cursor: pointer;
  transition: all 0.2s;
}

.incoming-decline:hover {
  transform: scale(1.1);
}

.reply-preview {
  background: var(--card);
  border-left: 4px solid var(--reply);
  border-radius: 12px;
  padding: 10px 14px;
  margin-bottom: 8px;
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.reply-preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.reply-sender {
  font-size: 12px;
  color: var(--reply);
  font-weight: 600;
}

.reply-close-btn {
  background: none;
  border: none;
  color: var(--sub);
  font-size: 14px;
  cursor: pointer;
  width: 20px;
  height: 20px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.reply-close-btn:hover {
  background: rgba(255,255,255,0.1);
}

.reply-text {
  font-size: 13px;
  color: var(--sub);
  line-height: 1.3;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.reply-icon {
  color: var(--reply);
  font-size: 14px;
  flex-shrink: 0;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  min-height: 0;
  -webkit-overflow-scrolling: touch;
}

.message {
  max-width: 75%;
  padding: 12px 16px;
  border-radius: 18px;
  line-height: 1.4;
  word-break: break-word;
  position: relative;
  animation: fade 0.3s ease;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.message:hover {
  background: rgba(255,255,255,0.03);
}

.message-outgoing {
  align-self: flex-end;
  background: var(--outgoing-message);
  color: white;
  border-bottom-right-radius: 4px;
}

.message-incoming {
  align-self: flex-start;
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.message-reply {
  background: rgba(90,200,250,0.1);
  border-left: 3px solid var(--reply);
  border-radius: 10px;
  padding: 8px 10px;
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.3;
}

.message-reply-sender {
  font-weight: 600;
  color: var(--reply);
  font-size: 11px;
  margin-bottom: 2px;
}

.message-reply-text {
  color: var(--sub);
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.message-text {
  font-size: 15px;
  line-height: 1.4;
}

.message-time {
  font-size: 11px;
  opacity: 0.7;
  margin-top: 6px;
  text-align: right;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
}

.message-status {
  font-size: 10px;
}

.message-reactions {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}

.reaction {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 2px 6px;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  transition: all 0.2s;
}

.reaction:hover {
  background: rgba(255,255,255,0.15);
  transform: scale(1.1);
}

.reaction.liked {
  background: rgba(255,55,95,0.2);
  color: var(--heart);
}

.reaction-count {
  font-size: 11px;
}

.reactions-panel {
  position: absolute;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px;
  display: flex;
  gap: 8px;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.2s;
  pointer-events: none;
}

.reactions-panel.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.reaction-emoji {
  font-size: 24px;
  cursor: pointer;
  transition: transform 0.2s;
  padding: 4px;
  border-radius: 12px;
}

.reaction-emoji:hover {
  transform: scale(1.2);
  background: rgba(255,255,255,0.1);
}

.reaction-emoji.heart:hover {
  color: var(--heart);
}

.message-date-divider {
  text-align: center;
  color: var(--sub);
  font-size: 12px;
  padding: 8px 0;
  position: relative;
  margin: 12px 0;
}

.message-date-divider::before,
.message-date-divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 30%;
  height: 1px;
  background: var(--border);
}

.message-date-divider::before {
  left: 0;
}

.message-date-divider::after {
  right: 0;
}

.chat-input-area {
  background: var(--card);
  padding: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
  position: relative;
  flex-shrink: 0;
  z-index: 10;
}

.reply-container {
  width: 100%;
}

.chat-input-wrapper {
  width: 100%;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.chat-input {
  flex: 1;
  background: #1c1c1e;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 12px 16px;
  color: #fff;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  line-height: 1.4;
}

.chat-input:focus {
  outline: none;
  border-color: var(--accent);
}

.chat-input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.chat-send-btn {
  background: var(--accent);
  border: none;
  color: white;
  padding: 12px 20px;
  border-radius: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  align-self: flex-end;
  min-width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.chat-send-btn:hover:not(:disabled) {
  opacity: 0.9;
}

.chat-send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.no-messages {
  text-align: center;
  color: var(--sub);
  padding: 60px 20px;
  font-size: 14px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
}

.loader {
  text-align: center;
  padding: 40px 0;
  color: var(--sub);
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
}

.loader-spinner {
  display: inline-block;
  width: 30px;
  height: 30px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.notification {
  position: fixed;
  top: 120px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--accent);
  color: white;
  padding: 12px 20px;
  border-radius: 14px;
  font-weight: 600;
  z-index: 1999;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  max-width: 90%;
  text-align: center;
}

.notification.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.back-btn {
  display: none;
}

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
  authDomain: "czhmass.firebaseapp.com",
  projectId: "czhmass"
});

const db = firebase.firestore();
const auth = firebase.auth();

let currentUser = null;
let userData = null;
let blockedUsers = [];
let adminUsers = [];
let currentChatUserId = null;
let currentChatUsername = null;
let currentChatId = null;
let chatMessagesListener = null;
let usersCache = new Map();
let pinnedChats = [];
let replyingToMessage = null;
let selectedMessageForReaction = null;

let currentCall = null;
let callType = null;
let localStream = null;
let remoteStream = null;
let peerConnection = null;
let callTimer = null;
let callStartTime = null;
let incomingCallListener = null;
let callStatusListener = null;
let iceCandidateListener = null;
let pendingIceCandidates = [];
let audioContext = null;
let audioElement = null;

const iceServers = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' }
  ]
};

function showNotification(message, duration = 3000) {
  const notification = document.getElementById('notification');
  notification.textContent = message;
  notification.classList.add('show');
  setTimeout(() => notification.classList.remove('show'), duration);
}

function formatTimeAgo(date) {
  if (!date) return 'только что';
  const diff = Date.now() - date;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'только что';
  if (mins < 60) return `${mins} мин назад`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours} ч назад`;
  const days = Math.floor(hours / 24);
  return `${days} д назад`;
}

function formatMessageTime(date) {
  if (!date) return '';
  return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}

function unmuteAudio() {
  const remoteVideo = document.getElementById('remoteVideo');
  if (remoteVideo) {
    remoteVideo.muted = false;
    document.getElementById('unmuteBtn').style.display = 'none';
    showNotification('🔊 Звук включен');
  }
  
  if (audioElement) {
    audioElement.muted = false;
  }
}

async function loadUserData() {
  try {
    const snap = await db.collection('users').doc(currentUser.uid).get();
    if (!snap.exists) {
      userData = {
        username: 'user' + currentUser.uid.slice(-6),
        isAdmin: false,
        blockedUsers: [],
        pinnedChats: []
      };
      await db.collection('users').doc(currentUser.uid).set(userData);
    } else {
      userData = snap.data();
      blockedUsers = userData.blockedUsers || [];
      pinnedChats = userData.pinnedChats || [];
    }
    if (userData.isAdmin) document.getElementById('adminBtn').style.display = 'block';
  } catch (error) {
    console.error('Ошибка загрузки данных:', error);
    showNotification('Ошибка загрузки данных');
  }
}

async function loadAdminUsers() {
  try {
    const adminSnap = await db.collection('users').where('isAdmin', '==', true).get();
    adminUsers = [];
    adminSnap.forEach(doc => adminUsers.push(doc.id));
  } catch (error) {
    console.error('Ошибка загрузки админов:', error);
  }
}

async function getUserInfo(userId) {
  if (usersCache.has(userId)) return usersCache.get(userId);
  try {
    const userDoc = await db.collection('users').doc(userId).get();
    let userInfo = { username: 'user' + userId.slice(-6), isAdmin: false };
    if (userDoc.exists) {
      const data = userDoc.data();
      userInfo = { username: data.username || userInfo.username, isAdmin: data.isAdmin || false };
    }
    usersCache.set(userId, userInfo);
    return userInfo;
  } catch (error) {
    return { username: 'user' + userId.slice(-6), isAdmin: false };
  }
}

async function loadChatsList() {
  const chatsList = document.getElementById('chatsList');
  try {
    const chatsSnap = await db.collection('chats').get();
    if (chatsSnap.empty) {
      chatsList.innerHTML = '<div class="no-chats">Нет чатов</div>';
      return;
    }
    
    const userChats = [];
    for (const doc of chatsSnap.docs) {
      const chat = doc.data();
      if (chat.participants && chat.participants.includes(currentUser.uid)) {
        const otherUserId = chat.participants.find(id => id !== currentUser.uid);
        if (!otherUserId || blockedUsers.includes(otherUserId)) continue;
        const otherUserInfo = await getUserInfo(otherUserId);
        userChats.push({
          id: doc.id,
          ...chat,
          otherUserId,
          otherUserInfo,
          isPinned: pinnedChats.includes(doc.id)
        });
      }
    }
    
    if (userChats.length === 0) {
      chatsList.innerHTML = '<div class="no-chats">Нет активных чатов</div>';
      return;
    }
    
    userChats.sort((a, b) => {
      const timeA = a.lastMessageTime?.toDate?.() || new Date(0);
      const timeB = b.lastMessageTime?.toDate?.() || new Date(0);
      return timeB - timeA;
    });
    
    let chatsHTML = '';
    for (const chat of userChats) {
      const lastMessageTime = chat.lastMessageTime?.toDate?.() || new Date();
      chatsHTML += `
        <div class="chat-item fade" onclick="openChat('${chat.otherUserId}', '${chat.otherUserInfo.username}', '${chat.id}')">
          <div class="chat-avatar">${chat.otherUserInfo.username?.[0]?.toUpperCase() || 'U'}</div>
          <div class="chat-info">
            <div class="chat-user">@${chat.otherUserInfo.username}</div>
            <div class="chat-preview">${chat.lastMessage || 'Нет сообщений'}</div>
            <div class="chat-time">${formatTimeAgo(lastMessageTime)}</div>
          </div>
        </div>
      `;
    }
    chatsList.innerHTML = chatsHTML;
  } catch (error) {
    chatsList.innerHTML = '<div class="no-chats">Ошибка загрузки</div>';
  }
}

async function openChat(userId, username, chatId) {
  currentChatUserId = userId;
  currentChatUsername = username;
  currentChatId = chatId;
  document.getElementById('chatUserAvatar').textContent = username?.[0]?.toUpperCase() || 'U';
  document.getElementById('chatUserName').textContent = '@' + username;
  document.getElementById('chatOverlay').classList.add('show');
  await loadChatMessages();
  document.getElementById('chatInput').focus();
}

function closeChat() {
  document.getElementById('chatOverlay').classList.remove('show');
  if (chatMessagesListener) chatMessagesListener();
  currentChatUserId = null;
  currentChatUsername = null;
  currentChatId = null;
  loadChatsList();
}

async function loadChatMessages() {
  const chatMessages = document.getElementById('chatMessages');
  chatMessages.innerHTML = '<div class="loader"><div class="loader-spinner"></div></div>';
  if (!currentChatId) {
    chatMessages.innerHTML = '<div class="no-messages">Начните общение!</div>';
    return;
  }
  
  try {
    const messagesSnap = await db.collection('chats').doc(currentChatId)
      .collection('messages').orderBy('timestamp', 'asc').limit(100).get();
    
    if (messagesSnap.empty) {
      chatMessages.innerHTML = '<div class="no-messages">Нет сообщений</div>';
      return;
    }
    
    chatMessages.innerHTML = '';
    messagesSnap.forEach(doc => addMessageToUI({ id: doc.id, ...doc.data() }));
    setTimeout(() => chatMessages.scrollTop = chatMessages.scrollHeight, 100);
    setupChatMessagesListener();
  } catch (error) {
    chatMessages.innerHTML = '<div class="no-messages">Ошибка загрузки</div>';
  }
}

function addMessageToUI(msg) {
  const chatMessages = document.getElementById('chatMessages');
  const msgDate = msg.timestamp?.toDate?.() || new Date();
  const isOutgoing = msg.senderId === currentUser.uid;
  
  const messageDiv = document.createElement('div');
  messageDiv.className = `message fade ${isOutgoing ? 'message-outgoing' : 'message-incoming'}`;
  messageDiv.setAttribute('data-message-id', msg.id);
  messageDiv.setAttribute('data-sender-id', msg.senderId);
  
  let reactionsHTML = '';
  if (msg.reactions && Object.keys(msg.reactions).length > 0) {
    reactionsHTML = '<div class="message-reactions">';
    const reactionCounts = {};
    Object.values(msg.reactions).forEach(emoji => {
      reactionCounts[emoji] = (reactionCounts[emoji] || 0) + 1;
    });
    Object.entries(reactionCounts).forEach(([emoji, count]) => {
      reactionsHTML += `<div class="reaction" onclick="addReactionToMessage('${msg.id}', '${emoji}')">${emoji} ${count}</div>`;
    });
    reactionsHTML += '</div>';
  }
  
  messageDiv.innerHTML = `
    <div class="message-text">${msg.text || ''}</div>
    ${reactionsHTML}
    <div class="message-time">${formatMessageTime(msgDate)}</div>`;
  
  setupMessageClickHandler(messageDiv, msg);
  chatMessages.appendChild(messageDiv);
}

function setupMessageClickHandler(messageDiv, msg) {
  if ('ontouchstart' in window) {
    let longPressTimer;
    messageDiv.addEventListener('touchstart', (e) => {
      longPressTimer = setTimeout(() => {
        showMessageContextMenu(e, msg.id, msg);
      }, 500);
    });
    messageDiv.addEventListener('touchend', () => clearTimeout(longPressTimer));
    messageDiv.addEventListener('touchmove', () => clearTimeout(longPressTimer));
  } else {
    messageDiv.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      showMessageContextMenu(e, msg.id, msg);
    });
    messageDiv.addEventListener('click', (e) => {
      showReactionsPanel(e, msg.id, msg);
    });
  }
}

function showReactionsPanel(event, messageId, messageData) {
  const x = event.clientX;
  const y = event.clientY;
  selectedMessageForReaction = { id: messageId, ...messageData };
  
  const panel = document.getElementById('reactionsPanel');
  panel.style.left = Math.min(x - 100, window.innerWidth - 220) + 'px';
  panel.style.top = Math.min(y - 60, window.innerHeight - 80) + 'px';
  panel.classList.add('show');
  
  setTimeout(() => {
    const closePanel = (e) => {
      if (!panel.contains(e.target)) {
        panel.classList.remove('show');
        document.removeEventListener('click', closePanel);
      }
    };
    document.addEventListener('click', closePanel);
  }, 10);
}

function showMessageContextMenu(event, messageId, messageData) {
  event.preventDefault();
  const menu = document.getElementById('messageContextMenu');
  menu.style.left = event.clientX + 'px';
  menu.style.top = event.clientY + 'px';
  menu.classList.add('show');
  
  window.currentContextMessageId = messageId;
  window.currentContextMessageData = messageData;
  
  setTimeout(() => {
    const closeMenu = (e) => {
      if (!menu.contains(e.target)) {
        menu.classList.remove('show');
        document.removeEventListener('click', closeMenu);
      }
    };
    document.addEventListener('click', closeMenu);
  }, 10);
}

async function addReaction(emoji) {
  if (!selectedMessageForReaction || !currentChatId) return;
  
  try {
    const messageRef = db.collection('chats').doc(currentChatId)
      .collection('messages').doc(selectedMessageForReaction.id);
    
    const messageDoc = await messageRef.get();
    const currentReactions = messageDoc.data()?.reactions || {};
    currentReactions[currentUser.uid] = emoji;
    
    await messageRef.update({ reactions: currentReactions });
    document.getElementById('reactionsPanel').classList.remove('show');
    showNotification(`➕ ${emoji}`);
  } catch (error) {
    console.error('Ошибка реакции:', error);
  }
}

async function addReactionToMessage(messageId, emoji) {
  if (!currentChatId) return;
  try {
    const messageRef = db.collection('chats').doc(currentChatId)
      .collection('messages').doc(messageId);
    const messageDoc = await messageRef.get();
    const currentReactions = messageDoc.data()?.reactions || {};
    currentReactions[currentUser.uid] = emoji;
    await messageRef.update({ reactions: currentReactions });
    showNotification(`➕ ${emoji}`);
  } catch (error) {
    console.error('Ошибка реакции:', error);
  }
}

function setupChatMessagesListener() {
  if (chatMessagesListener || !currentChatId) return;
  chatMessagesListener = db.collection('chats').doc(currentChatId)
    .collection('messages').orderBy('timestamp', 'desc').limit(1)
    .onSnapshot(snapshot => {
      snapshot.docChanges().forEach(change => {
        if (change.type === 'added') {
          const existing = document.querySelector(`[data-message-id="${change.doc.id}"]`);
          if (!existing) addMessageToUI({ id: change.doc.id, ...change.doc.data() });
        }
      });
    });
}

async function sendMessage() {
  if (!currentChatUserId) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  
  const messageData = {
    text,
    senderId: currentUser.uid,
    timestamp: new Date(),
    read: false
  };
  
  if (replyingToMessage) {
    messageData.replyTo = {
      messageId: replyingToMessage.id,
      senderId: replyingToMessage.senderId,
      text: replyingToMessage.text
    };
  }
  
  try {
    if (!currentChatId) {
      const newChat = await db.collection('chats').add({
        participants: [currentUser.uid, currentChatUserId],
        lastMessage: text,
        lastSender: currentUser.uid,
        lastMessageTime: new Date(),
        createdAt: new Date()
      });
      currentChatId = newChat.id;
    } else {
      await db.collection('chats').doc(currentChatId).update({
        lastMessage: text,
        lastSender: currentUser.uid,
        lastMessageTime: new Date()
      });
    }
    
    await db.collection('chats').doc(currentChatId).collection('messages').add(messageData);
    input.value = '';
    cancelReply();
    loadChatsList();
  } catch (error) {
    showNotification('Ошибка отправки');
  }
}

function replyToMessage(messageId, messageData) {
  replyingToMessage = {
    id: messageId,
    text: messageData.text,
    senderId: messageData.senderId
  };
  
  document.getElementById('replyContainer').style.display = 'block';
  document.getElementById('replySender').textContent = 
    messageData.senderId === currentUser.uid ? 'Вы' : '@' + currentChatUsername;
  document.getElementById('replyText').textContent = messageData.text;
  document.getElementById('chatInput').focus();
}

function cancelReply() {
  replyingToMessage = null;
  document.getElementById('replyContainer').style.display = 'none';
}

async function deleteMessage(messageId) {
  if (!currentChatId || !confirm('Удалить сообщение?')) return;
  try {
    await db.collection('chats').doc(currentChatId).collection('messages').doc(messageId).delete();
    document.querySelector(`[data-message-id="${messageId}"]`).remove();
    showNotification('Сообщение удалено');
  } catch (error) {
    showNotification('Ошибка удаления');
  }
}

async function testMediaDevices() {
  try {
    if (!navigator.mediaDevices?.getUserMedia) {
      showNotification('Браузер не поддерживает звонки');
      return false;
    }
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    stream.getTracks().forEach(t => t.stop());
    return true;
  } catch (error) {
    showNotification('Нет доступа к микрофону');
    return false;
  }
}

async function startAudioCall() {
  if (!currentChatUserId || blockedUsers.includes(currentChatUserId)) return;
  if (!await testMediaDevices()) return;
  callType = 'audio';
  await initializeCall();
}

async function startVideoCall() {
  if (!currentChatUserId || blockedUsers.includes(currentChatUserId)) return;
  callType = 'video';
  await initializeCall();
}

async function initializeCall() {
  try {
    const constraints = {
      audio: true,
      video: callType === 'video' ? { width: 1280, height: 720 } : false
    };
    
    localStream = await navigator.mediaDevices.getUserMedia(constraints);
    
    if (callType === 'video') {
      document.getElementById('videoContainer').style.display = 'block';
      document.getElementById('localVideo').srcObject = localStream;
    }
    
    peerConnection = new RTCPeerConnection(iceServers);
    localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
    
    peerConnection.ontrack = (event) => {
      remoteStream = event.streams[0];
      const remoteVideo = document.getElementById('remoteVideo');
      if (remoteVideo) {
        remoteVideo.srcObject = remoteStream;
        remoteVideo.muted = true; // Начинаем с muted
      }
      
      // Создаем отдельный аудио элемент для лучшего контроля
      audioElement = new Audio();
      audioElement.srcObject = remoteStream;
      audioElement.muted = true; // Начинаем с muted
      audioElement.play().catch(() => {});
      
      // Показываем кнопку включения звука
      document.getElementById('unmuteBtn').style.display = 'block';
    };
    
    peerConnection.onicecandidate = (event) => {
      if (event.candidate) sendIceCandidate(event.candidate);
    };
    
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    
    const callId = 'call_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    await db.collection('calls').doc(callId).set({
      callerId: currentUser.uid,
      callerName: userData.username,
      targetId: currentChatUserId,
      offer: { type: offer.type, sdp: offer.sdp },
      type: callType,
      status: 'ringing',
      createdAt: new Date()
    });
    
    currentCall = callId;
    showCallModal('outgoing');
    watchCallStatus(callId);
  } catch (error) {
    cleanupCall();
  }
}

async function sendIceCandidate(candidate) {
  if (!currentCall) return;
  await db.collection('calls').doc(currentCall).collection('iceCandidates').add({
    candidate: {
      candidate: candidate.candidate,
      sdpMid: candidate.sdpMid,
      sdpMLineIndex: candidate.sdpMLineIndex
    },
    sender: currentUser.uid,
    timestamp: new Date()
  });
}

function watchCallStatus(callId) {
  callStatusListener = db.collection('calls').doc(callId).onSnapshot(async (snap) => {
    const call = snap.data();
    if (!call) return;
    
    if (call.status === 'connected') {
      document.getElementById('outgoingControls').style.display = 'none';
      document.getElementById('activeCallControls').style.display = 'flex';
      if (callType === 'video') document.getElementById('videoToggleBtn').style.display = 'flex';
      startCallTimer();
    } else if (call.status === 'ended' || call.status === 'declined') {
      cleanupCall();
    } else if (call.answer && peerConnection && !peerConnection.currentRemoteDescription) {
      await peerConnection.setRemoteDescription(new RTCSessionDescription(call.answer));
      for (const cand of pendingIceCandidates) {
        await peerConnection.addIceCandidate(new RTCIceCandidate(cand));
      }
      pendingIceCandidates = [];
    }
  });
  
  iceCandidateListener = db.collection('calls').doc(callId).collection('iceCandidates')
    .onSnapshot(snapshot => {
      snapshot.docChanges().forEach(change => {
        if (change.type === 'added' && peerConnection) {
          const data = change.doc.data();
          if (data.sender !== currentUser.uid) {
            if (!peerConnection.currentRemoteDescription) {
              pendingIceCandidates.push(data.candidate);
            } else {
              peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
          }
        }
      });
    });
}

function showCallModal(mode) {
  document.getElementById('callName').textContent = '@' + currentChatUsername;
  document.getElementById('callAvatar').textContent = currentChatUsername?.[0]?.toUpperCase() || 'U';
  document.getElementById('callType').textContent = callType === 'video' ? 'Видеозвонок' : 'Аудиозвонок';
  document.getElementById('outgoingControls').style.display = mode === 'outgoing' ? 'flex' : 'none';
  document.getElementById('incomingControls').style.display = mode === 'incoming' ? 'flex' : 'none';
  document.getElementById('callModal').classList.add('show');
}

function listenForIncomingCalls() {
  if (incomingCallListener) return;
  incomingCallListener = db.collection('calls')
    .where('targetId', '==', currentUser.uid)
    .where('status', '==', 'ringing')
    .onSnapshot(async snapshot => {
      snapshot.docChanges().forEach(change => {
        if (change.type === 'added') {
          const call = change.doc.data();
          showNotification(`📞 Входящий звонок от @${call.callerName}`);
          document.getElementById('incomingCall').style.display = 'block';
          document.getElementById('incomingName').textContent = '@' + call.callerName;
          document.getElementById('incomingAvatar').textContent = call.callerName?.[0]?.toUpperCase() || 'U';
          document.getElementById('incomingType').textContent = 
            call.type === 'video' ? 'Входящий видеозвонок' : 'Входящий аудиозвонок';
          currentCall = change.doc.id;
          callType = call.type;
          currentChatUserId = call.callerId;
          currentChatUsername = call.callerName;
        }
      });
    });
}

async function acceptIncomingCall() {
  document.getElementById('incomingCall').style.display = 'none';
  
  try {
    const callDoc = await db.collection('calls').doc(currentCall).get();
    const call = callDoc.data();
    
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: call.type === 'video'
    });
    
    showCallModal('incoming');
    
    if (call.type === 'video') {
      document.getElementById('videoContainer').style.display = 'block';
      document.getElementById('localVideo').srcObject = localStream;
    }
    
    peerConnection = new RTCPeerConnection(iceServers);
    localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
    
    peerConnection.ontrack = (event) => {
      remoteStream = event.streams[0];
      const remoteVideo = document.getElementById('remoteVideo');
      if (remoteVideo) {
        remoteVideo.srcObject = remoteStream;
        remoteVideo.muted = true;
      }
      
      audioElement = new Audio();
      audioElement.srcObject = remoteStream;
      audioElement.muted = true;
      audioElement.play().catch(() => {});
      
      document.getElementById('unmuteBtn').style.display = 'block';
    };
    
    peerConnection.onicecandidate = (event) => {
      if (event.candidate) sendIceCandidate(event.candidate);
    };
    
    await peerConnection.setRemoteDescription(new RTCSessionDescription(call.offer));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    
    await db.collection('calls').doc(currentCall).update({
      answer: { type: answer.type, sdp: answer.sdp },
      status: 'connected'
    });
    
    document.getElementById('incomingControls').style.display = 'none';
    document.getElementById('activeCallControls').style.display = 'flex';
    if (call.type === 'video') document.getElementById('videoToggleBtn').style.display = 'flex';
    startCallTimer();
    watchCallStatus(currentCall);
  } catch (error) {
    cleanupCall();
  }
}

async function declineIncomingCall() {
  document.getElementById('incomingCall').style.display = 'none';
  if (currentCall) {
    await db.collection('calls').doc(currentCall).update({ status: 'declined' });
    currentCall = null;
  }
}

async function endCall() {
  if (currentCall) {
    await db.collection('calls').doc(currentCall).update({ status: 'ended' });
  }
  cleanupCall();
}

function cleanupCall() {
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (peerConnection) peerConnection.close();
  document.getElementById('callModal').classList.remove('show');
  document.getElementById('incomingCall').style.display = 'none';
  document.getElementById('videoContainer').style.display = 'none';
  document.getElementById('unmuteBtn').style.display = 'none';
  if (callTimer) clearInterval(callTimer);
  if (callStatusListener) callStatusListener();
  if (iceCandidateListener) iceCandidateListener();
  
  localStream = null;
  remoteStream = null;
  peerConnection = null;
  currentCall = null;
  pendingIceCandidates = [];
  audioElement = null;
}

function startCallTimer() {
  callStartTime = Date.now();
  callTimer = setInterval(() => {
    const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
    const minutes = Math.floor(elapsed / 60);
    const seconds = elapsed % 60;
    document.getElementById('callTimer').textContent = 
      `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
  }, 1000);
}

function toggleMute() {
  if (localStream) {
    const track = localStream.getAudioTracks()[0];
    if (track) {
      track.enabled = !track.enabled;
      document.getElementById('muteBtn').classList.toggle('muted');
      document.getElementById('muteBtn').innerHTML = track.enabled ? '🎤' : '🔇';
    }
  }
}

function toggleVideo() {
  if (localStream && callType === 'video') {
    const track = localStream.getVideoTracks()[0];
    if (track) {
      track.enabled = !track.enabled;
      document.getElementById('videoToggleBtn').classList.toggle('off');
      document.getElementById('videoToggleBtn').innerHTML = track.enabled ? '📹' : '🚫';
    }
  }
}

function acceptCall() { acceptIncomingCall(); }
function declineCall() { declineIncomingCall(); }
function openProfileFromChat() { window.location.href = `feed.html?openProfile=${currentChatUserId}`; }
function toggleBlockUser() { showNotification('Функция в разработке'); }
function logout() { auth.signOut().then(() => location.href = 'index.html'); }

document.getElementById('contextReplyBtn')?.addEventListener('click', () => {
  document.getElementById('messageContextMenu').classList.remove('show');
  if (window.currentContextMessageId && window.currentContextMessageData) {
    replyToMessage(window.currentContextMessageId, window.currentContextMessageData);
  }
});

document.getElementById('contextReactionBtn')?.addEventListener('click', () => {
  document.getElementById('messageContextMenu').classList.remove('show');
  if (window.currentContextMessageId) {
    addReactionToMessage(window.currentContextMessageId, '❤️');
  }
});

document.getElementById('contextDeleteMessageBtn')?.addEventListener('click', () => {
  document.getElementById('messageContextMenu').classList.remove('show');
  if (window.currentContextMessageId) {
    deleteMessage(window.currentContextMessageId);
  }
});

auth.onAuthStateChanged(async (user) => {
  if (!user) { location.href = 'index.html'; return; }
  currentUser = user;
  await loadUserData();
  await loadAdminUsers();
  await loadChatsList();
  listenForIncomingCalls();
  
  setInterval(() => {
    document.getElementById('time').textContent = new Date().toLocaleTimeString('ru-RU', {
      hour: '2-digit', minute: '2-digit'
    });
  }, 1000);
});

document.getElementById('chatInput')?.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
