<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личные сообщения - czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#000;
  --card:rgba(28,28,30,.95);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
  --success:#30d158;
  --online:#30d158;
  --offline:#8e8e93;
  --views:#8e8e93;
  --message:#5ac8fa;
  --outgoing-message:#667eea;
  --pinned:#ffd60a;
  --reply:#5ac8fa;
  --heart:#ff375f;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  height:100vh;
  overflow:hidden;
}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);
  border-radius:18px;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}
.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  cursor:pointer;
}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}
.chats-btn{
  background:#5ac8fa;
  color:var(--bg);
}

.container{
  max-width:480px;
  margin:auto;
  padding:140px 14px 100px;
  height:100vh;
  overflow-y:auto;
  position:relative;
  z-index:1;
}

/* Список чатов */
.chats-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.chat-item {
  background: var(--card);
  border-radius: 20px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: transform 0.2s, background 0.2s;
  position: relative;
}
.chat-item:hover {
  background: rgba(255,255,255,0.05);
  transform: translateY(-2px);
}
.chat-item.unread {
  background: rgba(90,200,250,0.1);
}
.chat-item.unread::after {
  content: '';
  position: absolute;
  top: 18px;
  right: 18px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--message);
}
.chat-item.pinned {
  background: rgba(255,214,10,0.1);
  border-left: 4px solid var(--pinned);
}
.chat-item.pinned .pin-indicator {
  color: var(--pinned);
}
.chat-avatar {
  width: 56px;
  height: 56px;
  border-radius: 18px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 20px;
  flex-shrink: 0;
  position: relative;
}
.chat-info {
  flex: 1;
  min-width: 0;
  padding-right: 80px;
}
.chat-user {
  font-weight: 600;
  font-size: 16px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.verified-badge {
  color: #5ac8fa;
  font-size: 14px;
}
.chat-preview {
  color: var(--sub);
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-time {
  color: var(--sub);
  font-size: 12px;
  margin-top: 4px;
}
.chat-actions {
  position: absolute;
  top: 50%;
  right: 16px;
  transform: translateY(-50%);
  display: flex;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.2s;
}
.chat-item:hover .chat-actions {
  opacity: 1;
}
.action-btn {
  background: rgba(28,28,30,0.8);
  border: none;
  color: var(--sub);
  width: 36px;
  height: 36px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
}
.action-btn:hover {
  background: var(--card);
  color: var(--text);
  transform: scale(1.1);
}
.action-btn.pin-btn:hover {
  color: var(--pinned);
  background: rgba(255,214,10,0.1);
}
.action-btn.delete-btn:hover {
  color: var(--danger);
  background: rgba(255,69,58,0.1);
}
.no-chats {
  text-align: center;
  padding: 80px 20px;
  color: var(--sub);
}
.no-chats-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.no-chats-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}
.no-chats-description {
  font-size: 14px;
  line-height: 1.4;
}

/* Окно чата */
.chat-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 5000;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.chat-overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
}
.chat-header {
  background: var(--card);
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: relative;
  min-height: 72px;
  flex-shrink: 0;
  z-index: 10;
}
.chat-user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
}
.chat-header-avatar {
  width: 44px;
  height: 44px;
  border-radius: 16px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 18px;
}
.chat-header-username {
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
}
.chat-header-username:hover {
  opacity: 0.8;
}
.chat-header-time {
  font-size: 12px;
  margin-top: 2px;
  color: var(--sub);
}
.chat-close-btn {
  background: none;
  border: none;
  color: var(--sub);
  font-size: 24px;
  cursor: pointer;
  padding: 8px;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.chat-close-btn:hover {
  background: rgba(255,255,255,0.1);
}
.block-btn {
  background: var(--danger);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-right: 8px;
}
.block-btn:hover {
  opacity: 0.9;
}
.unblock-btn {
  background: var(--success);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-right: 8px;
}
.unblock-btn:hover {
  opacity: 0.9;
}

/* Ответ на сообщение */
.reply-preview {
  background: var(--card);
  border-left: 4px solid var(--reply);
  border-radius: 12px;
  padding: 10px 14px;
  margin-bottom: 8px;
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.reply-preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.reply-sender {
  font-size: 12px;
  color: var(--reply);
  font-weight: 600;
}
.reply-close-btn {
  background: none;
  border: none;
  color: var(--sub);
  font-size: 14px;
  cursor: pointer;
  width: 20px;
  height: 20px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.reply-close-btn:hover {
  background: rgba(255,255,255,0.1);
}
.reply-text {
  font-size: 13px;
  color: var(--sub);
  line-height: 1.3;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.reply-icon {
  color: var(--reply);
  font-size: 14px;
  flex-shrink: 0;
}

/* Сообщения */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  min-height: 0;
  -webkit-overflow-scrolling: touch;
}
.message {
  max-width: 75%;
  padding: 12px 16px;
  border-radius: 18px;
  line-height: 1.4;
  word-break: break-word;
  position: relative;
  animation: fade 0.3s ease;
  cursor: pointer;
}
.message:hover {
  background: rgba(255,255,255,0.03);
}
.message-outgoing {
  align-self: flex-end;
  background: var(--outgoing-message);
  color: white;
  border-bottom-right-radius: 4px;
}
.message-incoming {
  align-self: flex-start;
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.message-replied {
  margin-top: 4px;
}
.message-reply {
  background: rgba(90,200,250,0.1);
  border-left: 3px solid var(--reply);
  border-radius: 10px;
  padding: 8px 10px;
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.3;
  max-width: 100%;
  overflow: hidden;
}
.message-reply-sender {
  font-weight: 600;
  color: var(--reply);
  font-size: 11px;
  margin-bottom: 2px;
}
.message-reply-text {
  color: var(--sub);
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.message-text {
  font-size: 15px;
  line-height: 1.4;
}
.message-time {
  font-size: 11px;
  opacity: 0.7;
  margin-top: 6px;
  text-align: right;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
}
.message-status {
  font-size: 10px;
}

/* Реакции на сообщения */
.message-reactions {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.reaction {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 2px 6px;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  transition: all 0.2s;
}
.reaction:hover {
  background: rgba(255,255,255,0.15);
  transform: scale(1.1);
}
.reaction.liked {
  background: rgba(255,55,95,0.2);
  color: var(--heart);
}
.reaction-count {
  font-size: 11px;
}

.message-date-divider {
  text-align: center;
  color: var(--sub);
  font-size: 12px;
  padding: 8px 0;
  position: relative;
  margin: 12px 0;
}
.message-date-divider::before,
.message-date-divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 30%;
  height: 1px;
  background: var(--border);
}
.message-date-divider::before {
  left: 0;
}
.message-date-divider::after {
  right: 0;
}

/* Поле ввода */
.chat-input-area {
  background: var(--card);
  padding: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
  position: relative;
  flex-shrink: 0;
  z-index: 10;
}
.reply-container {
  width: 100%;
}
.chat-input-wrapper {
  width: 100%;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.chat-input {
  flex: 1;
  background: #1c1c1e;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 12px 16px;
  color: #fff;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  line-height: 1.4;
}
.chat-input:focus {
  outline: none;
  border-color: var(--accent);
}
.chat-input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.chat-send-btn {
  background: var(--accent);
  border: none;
  color: white;
  padding: 12px 20px;
  border-radius: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  align-self: flex-end;
  min-width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.chat-send-btn:hover:not(:disabled) {
  opacity: 0.9;
}
.chat-send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Нет сообщений */
.no-messages {
  text-align: center;
  color: var(--sub);
  padding: 60px 20px;
  font-size: 14px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
}

/* Загрузчик */
.loader {
  text-align: center;
  padding: 40px 0;
  color: var(--sub);
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
}
.loader-spinner {
  display: inline-block;
  width: 30px;
  height: 30px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Уведомление */
.notification{
  position:fixed;
  top:120px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:var(--accent);
  color:white;
  padding:12px 20px;
  border-radius:14px;
  font-weight:600;
  z-index:1999;
  opacity:0;
  transition:opacity 0.3s, transform 0.3s;
  pointer-events:none;
  max-width:90%;
  text-align:center;
}
.notification.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* Кнопка назад на мобильных */
.back-btn {
  display: none;
}

/* Контекстное меню для всех устройств */
.context-menu {
  position: fixed;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 8px;
  z-index: 10000;
  min-width: 160px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  display: none;
}
.context-menu.show {
  display: block;
  animation: fade 0.2s ease;
}
.menu-item {
  padding: 12px 16px;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background 0.2s;
}
.menu-item:hover {
  background: rgba(255,255,255,0.1);
}
.menu-item.pin-item:hover {
  color: var(--pinned);
}
.menu-item.delete-item:hover {
  color: var(--danger);
}
.menu-item.delete-message-item:hover {
  color: var(--danger);
}
.menu-item.reply-item:hover {
  color: var(--reply);
}
.menu-item.reaction-item:hover {
  color: var(--heart);
}

@media (max-width: 768px) {
  .dynamic-island {
    top: 8px;
    width: 110px;
    height: 32px;
    font-size: 14px;
  }
  
  .navbar {
    top: 50px;
    width: 95%;
    padding: 8px 12px;
  }
  
  .container {
    padding: 140px 12px 100px;
    height: 100vh;
  }
  
  .back-btn {
    display: block;
    background: none;
    border: none;
    color: var(--sub);
    font-size: 20px;
    cursor: pointer;
    padding: 8px;
    margin-right: 8px;
  }
  .chat-header {
    padding: 12px;
    min-height: 64px;
  }
  .chat-actions {
    opacity: 1 !important;
    position: absolute;
    top: 50%;
    right: 16px;
    transform: translateY(-50%);
    gap: 6px;
  }
  .action-btn {
    background: rgba(28,28,30,0.9);
    width: 32px;
    height: 32px;
    font-size: 14px;
  }
  .chat-info {
    padding-right: 70px;
  }
  .chat-input-area {
    padding: 12px;
  }
  .chat-messages {
    padding: 16px;
  }
  
  .no-chats {
    padding: 100px 20px;
  }
}

</style>
</head>

<body>

<div class="dynamic-island" id="time"></div>

<div class="navbar">
  <div class="logo" onclick="location.href='feed.html'">czhmass</div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="location.href='profile.html'">👤</button>
    <button class="nav-btn" id="adminBtn" style="display:none" onclick="location.href='admin.html'">👑</button>
    <button class="nav-btn chats-btn" onclick="location.href='chats.html'">💬</button>
    <button class="nav-btn" onclick="logout()">🚪</button>
  </div>
</div>

<div class="container">
  <div class="chats-list" id="chatsList">
    <div class="loader">
      <div class="loader-spinner"></div>
      <div>Загрузка чатов...</div>
    </div>
  </div>
</div>

<!-- Окно чата -->
<div class="chat-overlay" id="chatOverlay">
  <div class="chat-container">
    <div class="chat-header">
      <button class="back-btn" onclick="closeChat()">←</button>
      <div class="chat-user-info">
        <div class="chat-header-avatar" id="chatUserAvatar">U</div>
        <div>
          <div class="chat-header-username" id="chatUserName" onclick="openProfileFromChat()">@username</div>
          <div class="chat-header-time" id="chatUserStatus">был(а) недавно</div>
        </div>
      </div>
      <button class="block-btn" id="blockBtn" onclick="toggleBlockUser()">Заблокировать</button>
      <button class="unblock-btn" id="unblockBtn" onclick="toggleBlockUser()" style="display:none">Разблокировать</button>
      <button class="chat-close-btn" onclick="closeChat()">✕</button>
    </div>
    
    <div class="chat-messages" id="chatMessages">
      <div class="loader">
        <div class="loader-spinner"></div>
        <div>Загрузка сообщений...</div>
      </div>
    </div>
    
    <div class="chat-input-area">
      <div class="reply-container" id="replyContainer" style="display:none">
        <div class="reply-preview" id="replyPreview">
          <div class="reply-icon">↩️</div>
          <div style="flex:1">
            <div class="reply-preview-header">
              <div class="reply-sender" id="replySender">@username</div>
              <button class="reply-close-btn" onclick="cancelReply()">✕</button>
            </div>
            <div class="reply-text" id="replyText">Текст сообщения...</div>
          </div>
        </div>
      </div>
      <div class="chat-input-wrapper">
        <textarea class="chat-input" id="chatInput" 
                  placeholder="Напишите сообщение..." 
                  rows="1"
                  maxlength="1000"></textarea>
        <button class="chat-send-btn" id="chatSendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- Контекстное меню для чатов -->
<div class="context-menu" id="contextMenu">
  <div class="menu-item pin-item" id="contextPinBtn">
    <span>📌</span>
    <span id="contextPinText">Закрепить чат</span>
  </div>
  <div class="menu-item delete-item" id="contextDeleteBtn">
    <span>🗑️</span>
    <span>Удалить чат</span>
  </div>
</div>

<!-- Контекстное меню для сообщений -->
<div class="context-menu" id="messageContextMenu">
  <div class="menu-item reply-item" id="contextReplyBtn">
    <span>↩️</span>
    <span>Ответить</span>
  </div>
  <div class="menu-item reaction-item" id="contextReactionBtn">
    <span>❤️</span>
    <span>Сердечко</span>
  </div>
  <div class="menu-item delete-message-item" id="contextDeleteMessageBtn">
    <span>🗑️</span>
    <span>Удалить</span>
  </div>
</div>

<!-- Панель реакций -->
<div class="reactions-panel" id="reactionsPanel">
  <div class="reaction-emoji heart" onclick="addReaction('❤️')">❤️</div>
  <div class="reaction-emoji" onclick="addReaction('👍')">👍</div>
  <div class="reaction-emoji" onclick="addReaction('👎')">👎</div>
  <div class="reaction-emoji" onclick="addReaction('😂')">😂</div>
  <div class="reaction-emoji" onclick="addReaction('😮')">😮</div>
  <div class="reaction-emoji" onclick="addReaction('😢')">😢</div>
  <div class="reaction-emoji" onclick="addReaction('😡')">😡</div>
</div>

<script>
// Инициализация Firebase
firebase.initializeApp({
  apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
  authDomain: "czhmass.firebaseapp.com",
  projectId: "czhmass"
});
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser = null;
let userData = null;
let blockedUsers = [];
let adminUsers = [];
let currentChatUserId = null;
let currentChatUsername = null;
let currentChatId = null;
let chatMessagesListener = null;
let usersCache = new Map();
let pinnedChats = [];
let replyingToMessage = null;

// ==================== ФОРМАТИРОВАНИЕ ВРЕМЕНИ ====================

function formatTimeAgo(date) {
  if (!date) return "только что";
  
  const now = new Date();
  const diff = now - date;
  const seconds = Math.floor(diff / 1000);
  const minutes = Math.floor(seconds / 60);
  const hours = Math.floor(minutes / 60);
  const days = Math.floor(hours / 24);
  
  if (days > 7) {
    return date.toLocaleDateString("ru-RU", {
      day: "2-digit",
      month: "2-digit"
    });
  } else if (days > 0) {
    return `${days} д назад`;
  } else if (hours > 0) {
    return `${hours} ч назад`;
  } else if (minutes > 0) {
    return `${minutes} мин назад`;
  } else {
    return "только что";
  }
}

function formatMessageTime(date) {
  if (!date) return "";
  return date.toLocaleTimeString("ru-RU", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

// ==================== ЗАГРУЗКА ДАННЫХ ====================

async function loadUserData() {
  try {
    const snap = await db.collection("users").doc(currentUser.uid).get();
    if (!snap.exists) {
      userData = {
        username: "user" + currentUser.uid.slice(-6),
        isAdmin: false,
        blockedUsers: [],
        pinnedChats: []
      };
      await db.collection("users").doc(currentUser.uid).set(userData);
    } else {
      userData = snap.data();
      blockedUsers = userData.blockedUsers || [];
      pinnedChats = userData.pinnedChats || [];
    }
    
    if (userData.isAdmin === true) {
      document.getElementById("adminBtn").style.display = "block";
    }
  } catch (error) {
    console.error("Ошибка загрузки данных:", error);
    showNotification("Ошибка загрузки данных");
  }
}

async function loadAdminUsers() {
  try {
    const adminSnap = await db.collection("users")
      .where("isAdmin", "==", true)
      .get();
    
    adminUsers = [];
    adminSnap.forEach(doc => {
      adminUsers.push(doc.id);
    });
  } catch (error) {
    console.error("Ошибка загрузки админов:", error);
  }
}

async function getUserInfo(userId) {
  if (usersCache.has(userId)) {
    return usersCache.get(userId);
  }
  
  try {
    const userDoc = await db.collection("users").doc(userId).get();
    let userInfo = {
      username: "user" + userId.slice(-6),
      isAdmin: false
    };
    
    if (userDoc.exists) {
      const data = userDoc.data();
      userInfo = {
        username: data.username || userInfo.username,
        isAdmin: data.isAdmin || false
      };
    }
    
    usersCache.set(userId, userInfo);
    return userInfo;
  } catch (error) {
    console.error("Ошибка получения информации о пользователе:", error);
    return {
      username: "user" + userId.slice(-6),
      isAdmin: false
    };
  }
}

// ==================== СПИСОК ЧАТОВ ====================

async function loadChatsList() {
  const chatsList = document.getElementById('chatsList');
  
  try {
    // Получаем ВСЕ чаты
    const chatsSnap = await db.collection('chats').get();
    
    if (chatsSnap.empty) {
      chatsList.innerHTML = `
        <div class="no-chats">
          <div class="no-chats-icon">💬</div>
          <div class="no-chats-title">Нет сообщений</div>
          <div class="no-chats-description">
            Начните общение с другими пользователями!
          </div>
        </div>`;
      return;
    }
    
    const userChats = [];
    
    // Проходим по всем чатам
    for (const doc of chatsSnap.docs) {
      const chat = doc.data();
      const chatId = doc.id;
      
      // Проверяем, является ли пользователь участником чата
      if (chat.participants && chat.participants.includes(currentUser.uid)) {
        // Находим ID другого участника
        const otherUserId = chat.participants.find(id => id !== currentUser.uid);
        
        if (!otherUserId) continue;
        
        // Пропускаем если пользователь заблокирован
        if (blockedUsers.includes(otherUserId)) continue;
        
        // Получаем информацию о другом пользователе
        const otherUserInfo = await getUserInfo(otherUserId);
        
        // Проверяем, закреплен ли чат
        const isPinned = pinnedChats.includes(chatId);
        
        // Добавляем чат в список
        userChats.push({
          id: chatId,
          ...chat,
          otherUserId: otherUserId,
          otherUserInfo: otherUserInfo,
          isPinned: isPinned
        });
      }
    }
    
    if (userChats.length === 0) {
      chatsList.innerHTML = `
        <div class="no-chats">
          <div class="no-chats-icon">💬</div>
          <div class="no-chats-title">Нет активных чатов</div>
          <div class="no-chats-description">
            Начните общение с другими пользователями
          </div>
        </div>`;
      return;
    }
    
    // Сортируем чаты: сначала закрепленные, потом по времени
    const pinnedChatsArray = userChats.filter(chat => chat.isPinned);
    const regularChatsArray = userChats.filter(chat => !chat.isPinned);
    
    const sortByTime = (a, b) => {
      const timeA = a.lastMessageTime?.toDate ? a.lastMessageTime.toDate() : new Date(0);
      const timeB = b.lastMessageTime?.toDate ? b.lastMessageTime.toDate() : new Date(0);
      return timeB - timeA;
    };
    
    pinnedChatsArray.sort(sortByTime);
    regularChatsArray.sort(sortByTime);
    
    const sortedChats = [...pinnedChatsArray, ...regularChatsArray];
    
    // Генерируем HTML
    let chatsHTML = '';
    
    for (const chat of sortedChats) {
      const otherUser = chat.otherUserInfo;
      if (!otherUser) continue;
      
      const isUnread = chat.unreadFor && chat.unreadFor.includes(currentUser.uid);
      const lastMessageTime = chat.lastMessageTime?.toDate ? chat.lastMessageTime.toDate() : new Date();
      const timeAgo = formatTimeAgo(lastMessageTime);
      
      let preview = chat.lastMessage || 'Нет сообщений';
      if (preview.length > 50) {
        preview = preview.substring(0, 47) + '...';
      }
      
      const senderPrefix = chat.lastSender === currentUser.uid ? 'Вы: ' : '';
      
      chatsHTML += `
        <div class="chat-item fade ${isUnread ? 'unread' : ''} ${chat.isPinned ? 'pinned' : ''}" 
             onclick="openChat('${chat.otherUserId}', '${otherUser.username}', '${chat.id}')"
             data-chat-id="${chat.id}">
          <div class="chat-avatar">
            ${otherUser.username?.[0]?.toUpperCase() || 'U'}
          </div>
          <div class="chat-info">
            <div class="chat-user">
              @${otherUser.username}
              ${adminUsers.includes(chat.otherUserId) ? '<span class="verified-badge" title="Администратор">✓</span>' : ''}
              ${chat.isPinned ? '<span style="color:var(--pinned);margin-left:4px;">📌</span>' : ''}
            </div>
            <div class="chat-preview">${senderPrefix}${preview}</div>
            <div class="chat-time">${timeAgo}</div>
          </div>
          <div class="chat-actions">
            <button class="action-btn pin-btn" onclick="event.stopPropagation(); togglePinChat('${chat.id}')" title="${chat.isPinned ? 'Открепить чат' : 'Закрепить чат'}">
              📌
            </button>
            <button class="action-btn delete-btn" onclick="event.stopPropagation(); showDeleteConfirm('${chat.id}', '${otherUser.username}')" title="Удалить чат">
              🗑️
            </button>
          </div>
        </div>
      `;
    }
    
    chatsList.innerHTML = chatsHTML;
    
  } catch (error) {
    console.error('Ошибка загрузки чатов:', error);
    chatsList.innerHTML = `
      <div class="no-chats" style="color:var(--danger)">
        Ошибка загрузки чатов: ${error.message}
      </div>`;
  }
}

// ==================== УПРАВЛЕНИЕ ЧАТАМИ ====================

async function togglePinChat(chatId) {
  try {
    const isCurrentlyPinned = pinnedChats.includes(chatId);
    
    if (isCurrentlyPinned) {
      pinnedChats = pinnedChats.filter(id => id !== chatId);
      await db.collection("users").doc(currentUser.uid).update({
        pinnedChats: pinnedChats
      });
      showNotification("Чат откреплен");
    } else {
      pinnedChats.push(chatId);
      await db.collection("users").doc(currentUser.uid).update({
        pinnedChats: pinnedChats
      });
      showNotification("Чат закреплен");
    }
    
    // Обновляем список
    loadChatsList();
    
  } catch (error) {
    console.error("Ошибка при закреплении чата:", error);
    showNotification("Ошибка: " + error.message);
  }
}

function showDeleteConfirm(chatId, username) {
  if (confirm(`Вы уверены, что хотите удалить чат с @${username}? Все сообщения будут удалены.`)) {
    deleteChat(chatId);
  }
}

async function deleteChat(chatId) {
  try {
    // Удаляем все сообщения чата
    const messagesSnap = await db.collection('chats').doc(chatId)
      .collection('messages').get();
    
    const batch = db.batch();
    messagesSnap.docs.forEach(doc => {
      batch.delete(doc.ref);
    });
    
    // Удаляем сам чат
    batch.delete(db.collection('chats').doc(chatId));
    
    await batch.commit();
    
    // Убираем из закрепленных
    pinnedChats = pinnedChats.filter(id => id !== chatId);
    await db.collection("users").doc(currentUser.uid).update({
      pinnedChats: pinnedChats
    });
    
    showNotification("Чат удален");
    
    // Закрываем если это текущий чат
    if (currentChatId === chatId) {
      closeChat();
    }
    
    // Обновляем список
    loadChatsList();
    
  } catch (error) {
    console.error("Ошибка при удалении чата:", error);
    showNotification("Ошибка удаления: " + error.message);
  }
}

// ==================== ОКНО ЧАТА ====================

async function openChat(userId, username, chatId = null) {
  currentChatUserId = userId;
  currentChatUsername = username;
  
  // Если chatId не передан, ищем существующий чат
  if (!chatId) {
    const chatsSnap = await db.collection('chats').get();
    
    for (const doc of chatsSnap.docs) {
      const chat = doc.data();
      if (chat.participants && 
          chat.participants.includes(currentUser.uid) && 
          chat.participants.includes(userId)) {
        chatId = doc.id;
        break;
      }
    }
  }
  
  currentChatId = chatId;
  
  // Обновляем UI
  document.getElementById('chatUserAvatar').textContent = username?.[0]?.toUpperCase() || 'U';
  document.getElementById('chatUserName').textContent = '@' + username;
  document.getElementById('chatUserStatus').textContent = 'был(а) недавно';
  
  // Обновляем кнопки блокировки
  const isBlocked = blockedUsers.includes(userId);
  updateBlockButtons(isBlocked);
  
  // Показываем окно чата
  document.getElementById('chatOverlay').classList.add('show');
  
  // Загружаем сообщения
  await loadChatMessages();
  
  // Фокусируемся на поле ввода
  setTimeout(() => {
    document.getElementById('chatInput').focus();
  }, 100);
}

function closeChat() {
  document.getElementById('chatOverlay').classList.remove('show');
  
  if (chatMessagesListener) {
    chatMessagesListener();
    chatMessagesListener = null;
  }
  
  // Обновляем список чатов
  loadChatsList();
}

function updateBlockButtons(isCurrentlyBlocked) {
  const blockBtn = document.getElementById('blockBtn');
  const unblockBtn = document.getElementById('unblockBtn');
  const chatInput = document.getElementById('chatInput');
  const chatSendBtn = document.getElementById('chatSendBtn');
  
  if (isCurrentlyBlocked) {
    blockBtn.style.display = 'none';
    unblockBtn.style.display = 'block';
    chatInput.disabled = true;
    chatSendBtn.disabled = true;
    chatInput.placeholder = 'Пользователь заблокирован';
  } else {
    blockBtn.style.display = 'block';
    unblockBtn.style.display = 'none';
    chatInput.disabled = false;
    chatSendBtn.disabled = false;
    chatInput.placeholder = 'Напишите сообщение...';
  }
}

async function toggleBlockUser() {
  if (!currentChatUserId) return;
  
  try {
    const isBlocked = blockedUsers.includes(currentChatUserId);
    
    if (isBlocked) {
      // Разблокируем
      blockedUsers = blockedUsers.filter(id => id !== currentChatUserId);
      await db.collection("users").doc(currentUser.uid).update({
        blockedUsers: blockedUsers
      });
      showNotification(`Вы разблокировали @${currentChatUsername}`);
    } else {
      // Блокируем
      blockedUsers.push(currentChatUserId);
      await db.collection("users").doc(currentUser.uid).update({
        blockedUsers: blockedUsers
      });
      showNotification(`Вы заблокировали @${currentChatUsername}`);
    }
    
    updateBlockButtons(!isBlocked);
    
    // Обновляем список чатов
    loadChatsList();
    
  } catch (error) {
    console.error("Ошибка при блокировке пользователя:", error);
    showNotification("Ошибка: " + error.message);
  }
}

// ==================== СООБЩЕНИЯ ====================

async function loadChatMessages() {
  const chatMessages = document.getElementById('chatMessages');
  chatMessages.innerHTML = '<div class="loader"><div class="loader-spinner"></div><div>Загрузка сообщений...</div></div>';
  
  if (!currentChatId) {
    chatMessages.innerHTML = `
      <div class="no-messages">
        Начните общение с @${currentChatUsername}!
      </div>`;
    return;
  }
  
  try {
    const messagesSnap = await db.collection('chats').doc(currentChatId)
      .collection('messages')
      .orderBy('timestamp', 'asc')
      .limit(100)
      .get();
    
    if (messagesSnap.empty) {
      chatMessages.innerHTML = `
        <div class="no-messages">
          Нет сообщений. Начните общение!
        </div>`;
      return;
    }
    
    chatMessages.innerHTML = '';
    
    messagesSnap.forEach(doc => {
      const msg = doc.data();
      addMessageToUI({ id: doc.id, ...msg });
    });
    
    // Скроллим вниз
    setTimeout(() => {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }, 100);
    
    // Подписываемся на новые сообщения
    setupChatMessagesListener();
    
  } catch (error) {
    console.error('Ошибка загрузки сообщений:', error);
    chatMessages.innerHTML = `
      <div class="no-messages" style="color:var(--danger)">
        Ошибка загрузки сообщений
      </div>`;
  }
}

function addMessageToUI(msg) {
  const chatMessages = document.getElementById('chatMessages');
  
  // Убираем loader если есть
  const loader = chatMessages.querySelector('.loader');
  const noMessages = chatMessages.querySelector('.no-messages');
  if (loader) loader.remove();
  if (noMessages) noMessages.remove();
  
  const msgDate = msg.timestamp?.toDate ? msg.timestamp.toDate() : new Date();
  const isOutgoing = msg.senderId === currentUser.uid;
  const messageTime = formatMessageTime(msgDate);
  
  const messageDiv = document.createElement('div');
  messageDiv.className = `message fade ${isOutgoing ? 'message-outgoing' : 'message-incoming'}`;
  messageDiv.setAttribute('data-message-id', msg.id);
  
  // Обработчик для контекстного меню
  messageDiv.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    showMessageContextMenu(e, msg.id, msg);
  });
  
  const readStatus = msg.read === true ? '✓✓' : '✓';
  
  let replyHTML = '';
  if (msg.replyTo) {
    const replySender = msg.replyTo.senderId === currentUser.uid ? 'Вы' : currentChatUsername;
    const replyText = msg.replyTo.text || '';
    const shortText = replyText.length > 50 ? replyText.substring(0, 47) + '...' : replyText;
    
    replyHTML = `
      <div class="message-reply">
        <div class="message-reply-sender">${replySender}</div>
        <div class="message-reply-text">${shortText}</div>
      </div>
    `;
  }
  
  messageDiv.innerHTML = `
    ${replyHTML}
    <div class="message-text">${msg.text || ''}</div>
    <div class="message-time">
      ${messageTime}
      ${isOutgoing ? `<span class="message-status">${readStatus}</span>` : ''}
    </div>
  `;
  
  chatMessages.appendChild(messageDiv);
}

function setupChatMessagesListener() {
  if (chatMessagesListener || !currentChatId) return;
  
  chatMessagesListener = db.collection('chats').doc(currentChatId)
    .collection('messages')
    .orderBy('timestamp', 'desc')
    .limit(1)
    .onSnapshot((snapshot) => {
      snapshot.docChanges().forEach((change) => {
        if (change.type === 'added') {
          const msg = change.doc.data();
          const existingMessage = document.querySelector(`[data-message-id="${change.doc.id}"]`);
          
          if (!existingMessage) {
            addMessageToUI({ id: change.doc.id, ...msg });
            
            // Скроллим вниз
            setTimeout(() => {
              const chatMessages = document.getElementById('chatMessages');
              chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 100);
          }
        }
      });
    });
}

async function sendMessage() {
  if (!currentChatUserId) return;
  
  const chatInput = document.getElementById('chatInput');
  const text = chatInput.value.trim();
  
  if (!text) {
    showNotification('Введите сообщение!');
    return;
  }
  
  if (blockedUsers.includes(currentChatUserId)) {
    showNotification('Нельзя отправить сообщение заблокированному пользователю');
    return;
  }
  
  const sendBtn = document.getElementById('chatSendBtn');
  sendBtn.disabled = true;
  
  const messageData = {
    text: text,
    senderId: currentUser.uid,
    timestamp: new Date(),
    read: false
  };
  
  if (replyingToMessage) {
    messageData.replyTo = {
      messageId: replyingToMessage.id,
      senderId: replyingToMessage.senderId,
      text: replyingToMessage.text
    };
  }
  
  try {
    let chatId = currentChatId;
    
    if (!chatId) {
      // Создаем новый чат
      const newChatRef = await db.collection('chats').add({
        participants: [currentUser.uid, currentChatUserId],
        lastMessage: text,
        lastSender: currentUser.uid,
        lastMessageTime: new Date(),
        createdAt: new Date(),
        updatedAt: new Date(),
        unreadFor: [currentChatUserId]
      });
      
      chatId = newChatRef.id;
      currentChatId = chatId;
    } else {
      // Обновляем существующий чат
      await db.collection('chats').doc(chatId).update({
        lastMessage: text,
        lastSender: currentUser.uid,
        lastMessageTime: new Date(),
        updatedAt: new Date(),
        unreadFor: firebase.firestore.FieldValue.arrayUnion(currentChatUserId)
      });
    }
    
    // Добавляем сообщение
    await db.collection('chats').doc(chatId)
      .collection('messages')
      .add(messageData);
    
    // Очищаем поле ввода
    chatInput.value = '';
    chatInput.style.height = 'auto';
    cancelReply();
    
    // Обновляем список чатов
    loadChatsList();
    
  } catch (error) {
    console.error('Ошибка отправки сообщения:', error);
    showNotification('Ошибка отправки: ' + error.message);
  } finally {
    sendBtn.disabled = false;
  }
}

// ==================== ОТВЕТ НА СООБЩЕНИЯ ====================

function replyToMessage(messageId, messageData) {
  const senderInfo = messageData.senderId === currentUser.uid ? 
    { username: 'Вы' } : 
    { username: currentChatUsername };
  
  replyingToMessage = {
    id: messageId,
    text: messageData.text,
    senderId: messageData.senderId,
    senderName: senderInfo.username
  };
  
  const replyContainer = document.getElementById('replyContainer');
  const replySender = document.getElementById('replySender');
  const replyText = document.getElementById('replyText');
  
  replyContainer.style.display = 'block';
  replySender.textContent = senderInfo.username;
  
  const shortText = messageData.text.length > 50 ? 
    messageData.text.substring(0, 47) + '...' : 
    messageData.text;
  replyText.textContent = shortText;
  
  document.getElementById('chatInput').focus();
}

function cancelReply() {
  replyingToMessage = null;
  document.getElementById('replyContainer').style.display = 'none';
}

// ==================== КОНТЕКСТНЫЕ МЕНЮ ====================

function showMessageContextMenu(event, messageId, messageData) {
  event.preventDefault();
  
  const menu = document.getElementById('messageContextMenu');
  const x = event.clientX;
  const y = event.clientY;
  
  menu.style.left = Math.min(x, window.innerWidth - 200) + 'px';
  menu.style.top = Math.min(y, window.innerHeight - 150) + 'px';
  menu.classList.add('show');
  
  // Сохраняем данные для использования в обработчиках
  window.currentContextMessageId = messageId;
  window.currentContextMessageData = messageData;
  
  // Закрываем меню при клике вне его
  setTimeout(() => {
    const closeMenu = (e) => {
      if (!menu.contains(e.target)) {
        menu.classList.remove('show');
        document.removeEventListener('click', closeMenu);
      }
    };
    document.addEventListener('click', closeMenu);
  }, 10);
}

// Инициализация обработчиков контекстного меню
document.addEventListener('DOMContentLoaded', () => {
  // Ответить на сообщение
  document.getElementById('contextReplyBtn').addEventListener('click', () => {
    document.getElementById('messageContextMenu').classList.remove('show');
    if (window.currentContextMessageId && window.currentContextMessageData) {
      replyToMessage(window.currentContextMessageId, window.currentContextMessageData);
    }
  });
  
  // Реакция на сообщение
  document.getElementById('contextReactionBtn').addEventListener('click', () => {
    document.getElementById('messageContextMenu').classList.remove('show');
    showNotification('Реакции скоро будут добавлены');
  });
  
  // Удалить сообщение
  document.getElementById('contextDeleteMessageBtn').addEventListener('click', () => {
    document.getElementById('messageContextMenu').classList.remove('show');
    if (window.currentContextMessageId) {
      if (confirm("Вы уверены, что хотите удалить это сообщение?")) {
        deleteMessage(window.currentContextMessageId);
      }
    }
  });
});

async function deleteMessage(messageId) {
  try {
    if (!currentChatId) return;
    
    await db.collection('chats').doc(currentChatId)
      .collection('messages')
      .doc(messageId)
      .delete();
    
    // Удаляем из UI
    const messageElement = document.querySelector(`[data-message-id="${messageId}"]`);
    if (messageElement) {
      messageElement.remove();
    }
    
    showNotification("Сообщение удалено");
    
  } catch (error) {
    console.error("Ошибка при удалении сообщения:", error);
    showNotification("Ошибка удаления сообщения: " + error.message);
  }
}

// ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================

function showNotification(message, duration = 3000) {
  const notification = document.getElementById('notification');
  notification.textContent = message;
  notification.classList.add('show');
  
  setTimeout(() => {
    notification.classList.remove('show');
  }, duration);
}

function logout() {
  if (confirm("Выйти из аккаунта?")) {
    auth.signOut().then(() => {
      location.href = "index.html";
    });
  }
}

// ==================== ИНИЦИАЛИЗАЦИЯ ====================

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    location.href = 'index.html';
    return;
  }
  
  currentUser = user;
  
  // Загружаем данные пользователя
  await loadUserData();
  await loadAdminUsers();
  await loadChatsList();
  
  // Обновляем время
  setInterval(() => {
    const timeElement = document.getElementById('time');
    if (timeElement) {
      timeElement.textContent = new Date().toLocaleTimeString('ru-RU', {
        hour: '2-digit',
        minute: '2-digit'
      });
    }
  }, 1000);
});

// Обработчики событий
document.getElementById('chatInput')?.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = (this.scrollHeight) + 'px';
});

document.getElementById('chatInput')?.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
