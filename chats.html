<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личные сообщения - czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#000;
  --card:rgba(28,28,30,.95);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
  --success:#30d158;
  --views:#8e8e93;
  --message:#5ac8fa;
  --outgoing-message:#667eea;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);
  border-radius:18px;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}
.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  cursor:pointer;
}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}
.chats-btn{
  background:#5ac8fa;
  color:var(--bg);
}

.container{
  max-width:480px;
  margin:auto;
  padding:130px 14px 100px;
}

/* Список чатов */
.chats-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.chat-item {
  background: var(--card);
  border-radius: 20px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: transform 0.2s, background 0.2s;
  position: relative;
}
.chat-item:hover {
  background: rgba(255,255,255,0.05);
  transform: translateY(-2px);
}
.chat-item.unread {
  background: rgba(90,200,250,0.1);
}
.chat-item.unread::after {
  content: '';
  position: absolute;
  top: 18px;
  right: 18px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--message);
}
.chat-avatar {
  width: 56px;
  height: 56px;
  border-radius: 18px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 20px;
  flex-shrink: 0;
}
.chat-info {
  flex: 1;
  min-width: 0;
}
.chat-user {
  font-weight: 600;
  font-size: 16px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.verified-badge {
  color: #5ac8fa;
  font-size: 14px;
}
.chat-preview {
  color: var(--sub);
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-time {
  color: var(--sub);
  font-size: 12px;
  margin-top: 4px;
}
.no-chats {
  text-align: center;
  padding: 60px 20px;
  color: var(--sub);
}
.no-chats-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.no-chats-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}
.no-chats-description {
  font-size: 14px;
  line-height: 1.4;
}

/* Окно чата */
.chat-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 5000;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.chat-overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.chat-header {
  background: var(--card);
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.chat-user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
}
.chat-header-avatar {
  width: 44px;
  height: 44px;
  border-radius: 16px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 18px;
}
.chat-header-username {
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
}
.chat-header-username:hover {
  opacity: 0.8;
}
.chat-header-time {
  color: var(--sub);
  font-size: 12px;
  margin-top: 2px;
}
.chat-close-btn {
  background: none;
  border: none;
  color: var(--sub);
  font-size: 24px;
  cursor: pointer;
  padding: 8px;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.chat-close-btn:hover {
  background: rgba(255,255,255,0.1);
}
.block-btn {
  background: var(--danger);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-right: 8px;
}
.block-btn:hover {
  opacity: 0.9;
}
.unblock-btn {
  background: var(--success);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-right: 8px;
}
.unblock-btn:hover {
  opacity: 0.9;
}

/* Сообщения */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.message {
  max-width: 75%;
  padding: 12px 16px;
  border-radius: 18px;
  line-height: 1.4;
  word-break: break-word;
  position: relative;
  animation: fade 0.3s ease;
}
.message-outgoing {
  align-self: flex-end;
  background: var(--outgoing-message);
  color: white;
  border-bottom-right-radius: 4px;
}
.message-incoming {
  align-self: flex-start;
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.message-text {
  font-size: 15px;
  line-height: 1.4;
}
.message-time {
  font-size: 11px;
  opacity: 0.7;
  margin-top: 6px;
  text-align: right;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
}
.message-status {
  font-size: 10px;
}
.message-date-divider {
  text-align: center;
  color: var(--sub);
  font-size: 12px;
  padding: 8px 0;
  position: relative;
}
.message-date-divider::before,
.message-date-divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 30%;
  height: 1px;
  background: var(--border);
}
.message-date-divider::before {
  left: 0;
}
.message-date-divider::after {
  right: 0;
}

/* Поле ввода */
.chat-input-area {
  background: var(--card);
  padding: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}
.chat-input {
  flex: 1;
  background: #1c1c1e;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 12px 16px;
  color: #fff;
  font-size: 15px;
  font-family: inherit;
  resize: none;
  min-height: 44px;
  max-height: 120px;
}
.chat-input:focus {
  outline: none;
  border-color: var(--accent);
}
.chat-input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.chat-send-btn {
  background: var(--accent);
  border: none;
  color: white;
  padding: 12px 20px;
  border-radius: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  align-self: flex-end;
  min-width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.chat-send-btn:hover:not(:disabled) {
  opacity: 0.9;
}
.chat-send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Нет сообщений */
.no-messages {
  text-align: center;
  color: var(--sub);
  padding: 60px 20px;
  font-size: 14px;
}

/* Загрузчик */
.loader {
  text-align: center;
  padding: 40px 0;
  color: var(--sub);
}
.loader-spinner {
  display: inline-block;
  width: 30px;
  height: 30px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Уведомление */
.notification{
  position:fixed;
  top:120px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:var(--accent);
  color:white;
  padding:12px 20px;
  border-radius:14px;
  font-weight:600;
  z-index:1999;
  opacity:0;
  transition:opacity 0.3s, transform 0.3s;
  pointer-events:none;
  max-width:90%;
  text-align:center;
}
.notification.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* Кнопка назад на мобильных */
.back-btn {
  display: none;
}

@media (max-width: 768px) {
  .back-btn {
    display: block;
    background: none;
    border: none;
    color: var(--sub);
    font-size: 20px;
    cursor: pointer;
    padding: 8px;
    margin-right: 8px;
  }
  .chat-header {
    padding: 12px;
  }
}
</style>
</head>

<body>

<div class="dynamic-island" id="time"></div>

<div class="navbar">
  <div class="logo" onclick="location.href='feed.html'">czhmass</div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="location.href='profile.html'">👤</button>
    <button class="nav-btn" id="adminBtn" style="display:none" onclick="location.href='admin.html'">👑</button>
    <button class="nav-btn chats-btn" onclick="location.href='chats.html'">💬</button>

</div>

<div class="container">
  <div class="chats-list" id="chatsList">
    <div class="loader">
      <div class="loader-spinner"></div>
      <div>Загрузка чатов...</div>
    </div>
  </div>
</div>

<!-- Окно чата -->
<div class="chat-overlay" id="chatOverlay">
  <div class="chat-container">
    <div class="chat-header">
      <button class="back-btn" onclick="closeChat()">←</button>
      <div class="chat-user-info">
        <div class="chat-header-avatar" id="chatUserAvatar">U</div>
        <div>
          <div class="chat-header-username" id="chatUserName" onclick="openProfileFromChat()">@username</div>
          <div class="chat-header-time" id="chatUserStatus">был(а) недавно</div>
        </div>
      </div>
      <button class="block-btn" id="blockBtn" onclick="toggleBlockUser()">Заблокировать</button>
      <button class="unblock-btn" id="unblockBtn" onclick="toggleBlockUser()" style="display:none">Разблокировать</button>
      <button class="chat-close-btn" onclick="closeChat()">✕</button>
    </div>
    
    <div class="chat-messages" id="chatMessages">
      <div class="loader">
        <div class="loader-spinner"></div>
        <div>Загрузка сообщений...</div>
      </div>
    </div>
    
    <div class="chat-input-area">
      <textarea class="chat-input" id="chatInput" 
                placeholder="Напишите сообщение..." 
                rows="1"
                maxlength="1000"></textarea>
      <button class="chat-send-btn" id="chatSendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<div class="notification" id="notification"></div>

<script>
// Инициализация Firebase
firebase.initializeApp({
  apiKey:"AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
  authDomain:"czhmass.firebaseapp.com",
  projectId:"czhmass"
});
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser = null;
let userData = null;
let blockedUsers = new Set();
let adminUsers = new Set();
let currentChatUserId = null;
let currentChatUsername = null;
let currentChatId = null;
let chatMessagesListener = null;
let usersCache = new Map();

// Форматирование времени
function formatTimeAgo(date) {
  if (!date) return "только что";
  
  const now = new Date();
  const diff = now - date;
  const seconds = Math.floor(diff / 1000);
  const minutes = Math.floor(seconds / 60);
  const hours = Math.floor(minutes / 60);
  const days = Math.floor(hours / 24);
  
  if (days > 7) {
    return date.toLocaleDateString("ru-RU", {
      day: "2-digit",
      month: "2-digit"
    });
  } else if (days > 0) {
    return `${days} д назад`;
  } else if (hours > 0) {
    return `${hours} ч назад`;
  } else if (minutes > 0) {
    return `${minutes} мин назад`;
  } else {
    return "только что";
  }
}

// Форматирование времени сообщения
function formatMessageTime(date) {
  if (!date) return "";
  
  return date.toLocaleTimeString("ru-RU", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

// Форматирование даты сообщения
function formatMessageDate(date) {
  if (!date) return "";
  
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);
  
  const messageDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  
  if (messageDate.getTime() === today.getTime()) {
    return "Сегодня";
  } else if (messageDate.getTime() === yesterday.getTime()) {
    return "Вчера";
  } else {
    return date.toLocaleDateString("ru-RU", {
      day: "2-digit",
      month: "2-digit",
      year: date.getFullYear() !== now.getFullYear() ? "numeric" : undefined
    });
  }
}

// Загрузка данных пользователя
async function loadUserData() {
  try {
    const snap = await db.collection("users").doc(currentUser.uid).get();
    if (!snap.exists) {
      userData = {
        username: "user" + currentUser.uid.slice(-6),
        isAdmin: false,
        blockedUsers: []
      };
      await db.collection("users").doc(currentUser.uid).set(userData);
    } else {
      userData = snap.data();
    }
    
    if (userData.isAdmin === true) {
      document.getElementById("adminBtn").style.display = "block";
    } else {
      document.getElementById("adminBtn").style.display = "none";
    }
  } catch(error) {
    console.error("Ошибка загрузки данных:", error);
  }
}

// Загрузка заблокированных пользователей
async function loadBlockedUsers() {
  try {
    const userDoc = await db.collection("users").doc(currentUser.uid).get();
    if (userDoc.exists) {
      const data = userDoc.data();
      blockedUsers = new Set(data.blockedUsers || []);
    }
  } catch(error) {
    console.error("Ошибка загрузки заблокированных пользователей:", error);
  }
}

// Загрузка списка админов
async function loadAdminUsers() {
  try {
    const adminSnap = await db.collection("users")
      .where("isAdmin", "==", true)
      .get();
    
    adminUsers.clear();
    adminSnap.forEach(doc => {
      adminUsers.add(doc.id);
    });
  } catch(error) {
    console.error("Ошибка загрузки админов:", error);
  }
}

// Получение информации о пользователе
async function getUserInfo(userId) {
  if (usersCache.has(userId)) {
    return usersCache.get(userId);
  }
  
  try {
    const userDoc = await db.collection("users").doc(userId).get();
    let userInfo = {
      username: "user" + userId.slice(-6),
      isAdmin: false
    };
    
    if (userDoc.exists) {
      const data = userDoc.data();
      userInfo = {
        username: data.username || userInfo.username,
        isAdmin: data.isAdmin || false,
        bio: data.bio || ""
      };
    }
    
    usersCache.set(userId, userInfo);
    return userInfo;
  } catch(error) {
    console.error("Ошибка получения информации о пользователе:", error);
    return {
      username: "user" + userId.slice(-6),
      isAdmin: false
    };
  }
}

// Загрузка списка чатов (БЕЗ ИНДЕКСА - простая версия)
async function loadChatsList() {
  const chatsList = document.getElementById('chatsList');
  
  try {
    // Получаем ВСЕ чаты и фильтруем на клиенте
    const chatsSnap = await db.collection('chats').limit(100).get();
    
    if (chatsSnap.empty) {
      chatsList.innerHTML = `
        <div class="no-chats">
          <div class="no-chats-icon">💬</div>
          <div class="no-chats-title">Нет сообщений</div>
          <div class="no-chats-description">
            Начните общение с другими пользователями!<br>
            Перейдите в профиль пользователя и нажмите "В чат"
          </div>
        </div>`;
      return;
    }
    
    // Собираем чаты текущего пользователя
    const userChats = [];
    
    for (const doc of chatsSnap.docs) {
      const chat = doc.data();
      
      // Проверяем участвует ли пользователь в чате
      if (chat.participants && chat.participants.includes(currentUser.uid)) {
        const otherUserId = chat.participants.find(id => id !== currentUser.uid);
        
        if (otherUserId && !blockedUsers.has(otherUserId)) {
          // Проверяем, не заблокировал ли нас пользователь
          const otherUserInfo = await getUserInfo(otherUserId);
          const otherUserDoc = await db.collection("users").doc(otherUserId).get();
          const otherUserData = otherUserDoc.exists ? otherUserDoc.data() : {};
          const theyBlockedMe = (otherUserData.blockedUsers || []).includes(currentUser.uid);
          
          if (!theyBlockedMe) {
            userChats.push({
              id: doc.id,
              ...chat,
              otherUserId: otherUserId,
              otherUserInfo: otherUserInfo
            });
          }
        }
      }
    }
    
    // Сортируем по времени последнего сообщения
    userChats.sort((a, b) => {
      const timeA = a.lastMessageTime?.toDate ? a.lastMessageTime.toDate() : new Date(a.lastMessageTime || 0);
      const timeB = b.lastMessageTime?.toDate ? b.lastMessageTime.toDate() : new Date(b.lastMessageTime || 0);
      return timeB - timeA; // Новые сверху
    });
    
    if (userChats.length === 0) {
      chatsList.innerHTML = `
        <div class="no-chats">
          <div class="no-chats-icon">💬</div>
          <div class="no-chats-title">Нет активных чатов</div>
          <div class="no-chats-description">
            Начните общение с другими пользователями
          </div>
        </div>`;
      return;
    }
    
    // Формируем список
    let chatsHTML = '';
    
    for (const chat of userChats) {
      const otherUser = chat.otherUserInfo;
      if (!otherUser) continue;
      
      const isUnread = chat.unreadFor && chat.unreadFor.includes(currentUser.uid);
      const lastMessageTime = chat.lastMessageTime?.toDate ? chat.lastMessageTime.toDate() : new Date();
      const timeAgo = formatTimeAgo(lastMessageTime);
      
      // Обрезаем длинное сообщение
      let preview = chat.lastMessage || 'Нет сообщений';
      if (preview.length > 50) {
        preview = preview.substring(0, 47) + '...';
      }
      
      // Определяем кто отправил последнее сообщение
      const senderPrefix = chat.lastSender === currentUser.uid ? 'Вы: ' : '';
      
      chatsHTML += `
        <div class="chat-item fade ${isUnread ? 'unread' : ''}" 
             onclick="openChat('${chat.otherUserId}', '${otherUser.username}')">
          <div class="chat-avatar">${otherUser.username?.[0]?.toUpperCase() || 'U'}</div>
          <div class="chat-info">
            <div class="chat-user">
              @${otherUser.username}
              ${adminUsers.has(chat.otherUserId) ? '<span class="verified-badge" title="Администратор">✓</span>' : ''}
            </div>
            <div class="chat-preview">${senderPrefix}${preview}</div>
            <div class="chat-time">${timeAgo}</div>
          </div>
        </div>
      `;
    }
    
    chatsList.innerHTML = chatsHTML;
    
  } catch(error) {
    console.error('Ошибка загрузки чатов:', error);
    chatsList.innerHTML = `
      <div class="no-chats" style="color:var(--danger)">
        Ошибка загрузки чатов: ${error.message}
      </div>`;
  }
}

// Открытие чата
async function openChat(userId, username) {
  currentChatUserId = userId;
  currentChatUsername = username;
  
  // Находим ID чата (без индекса)
  const chatsSnap = await db.collection('chats').limit(100).get();
  
  let foundChatId = null;
  chatsSnap.forEach(doc => {
    const chat = doc.data();
    if (chat.participants && 
        chat.participants.includes(currentUser.uid) && 
        chat.participants.includes(userId)) {
      foundChatId = doc.id;
    }
  });
  
  currentChatId = foundChatId;
  
  // Обновляем UI чата
  document.getElementById('chatUserAvatar').textContent = username?.[0]?.toUpperCase() || 'U';
  document.getElementById('chatUserName').textContent = '@' + username;
  document.getElementById('chatUserStatus').textContent = 'онлайн';
  
  // Проверяем блокировку
  const isBlocked = blockedUsers.has(userId);
  updateBlockButtons(isBlocked);
  
  // Открываем окно чата
  document.getElementById('chatOverlay').classList.add('show');
  document.getElementById('chatInput').focus();
  
  // Загружаем сообщения
  await loadChatMessages();
  
  // Настраиваем слушатель новых сообщений
  setupChatMessagesListener();
  
  // Помечаем сообщения как прочитанные
  if (currentChatId) {
    await markChatAsRead(currentChatId);
  }
}

// Закрытие чата
function closeChat() {
  document.getElementById('chatOverlay').classList.remove('show');
  
  if (chatMessagesListener) {
    chatMessagesListener();
    chatMessagesListener = null;
  }
  
  currentChatUserId = null;
  currentChatUsername = null;
  currentChatId = null;
  
  loadChatsList();
}

// Обновление кнопок блокировки
function updateBlockButtons(isCurrentlyBlocked) {
  const blockBtn = document.getElementById('blockBtn');
  const unblockBtn = document.getElementById('unblockBtn');
  const chatInput = document.getElementById('chatInput');
  const chatSendBtn = document.getElementById('chatSendBtn');
  
  if (isCurrentlyBlocked) {
    blockBtn.style.display = 'none';
    unblockBtn.style.display = 'block';
    chatInput.disabled = true;
    chatSendBtn.disabled = true;
    chatInput.placeholder = 'Пользователь заблокирован';
  } else {
    blockBtn.style.display = 'block';
    unblockBtn.style.display = 'none';
    chatInput.disabled = false;
    chatSendBtn.disabled = false;
    chatInput.placeholder = 'Напишите сообщение...';
  }
}

// Блокировка/разблокировка пользователя
async function toggleBlockUser() {
  if (!currentChatUserId) return;
  
  try {
    const userDoc = await db.collection("users").doc(currentUser.uid).get();
    const currentBlocked = userDoc.exists ? userDoc.data().blockedUsers || [] : [];
    
    const isBlocked = currentBlocked.includes(currentChatUserId);
    
    if (isBlocked) {
      // Разблокировать
      await db.collection("users").doc(currentUser.uid).update({
        blockedUsers: firebase.firestore.FieldValue.arrayRemove(currentChatUserId)
      });
      blockedUsers.delete(currentChatUserId);
      showNotification(`Вы разблокировали @${currentChatUsername}`);
    } else {
      // Заблокировать
      await db.collection("users").doc(currentUser.uid).update({
        blockedUsers: firebase.firestore.FieldValue.arrayUnion(currentChatUserId)
      });
      blockedUsers.add(currentChatUserId);
      showNotification(`Вы заблокировали @${currentChatUsername}`);
    }
    
    updateBlockButtons(!isBlocked);
    
    if (!isBlocked) {
      setTimeout(() => {
        closeChat();
        loadChatsList();
      }, 1000);
    }
    
  } catch(error) {
    console.error("Ошибка при блокировке пользователя:", error);
    showNotification("Ошибка: " + error.message);
  }
}

// Загрузка сообщений
async function loadChatMessages() {
  const chatMessages = document.getElementById('chatMessages');
  chatMessages.innerHTML = '<div class="loader"><div class="loader-spinner"></div><div>Загрузка сообщений...</div></div>';
  
  if (!currentChatId) {
    chatMessages.innerHTML = `
      <div class="no-messages">
        Начните общение с @${currentChatUsername}!
      </div>`;
    return;
  }
  
  try {
    const messagesSnap = await db.collection('chats').doc(currentChatId)
      .collection('messages')
      .orderBy('timestamp', 'desc')
      .limit(50)
      .get();
    
    if (messagesSnap.empty) {
      chatMessages.innerHTML = `
        <div class="no-messages">
          Нет сообщений. Начните общение!
        </div>`;
      return;
    }
    
    const messages = [];
    messagesSnap.forEach(doc => {
      messages.push({ id: doc.id, ...doc.data() });
    });
    
    // Сортируем по времени (старые первыми)
    messages.sort((a, b) => {
      const timeA = a.timestamp?.toDate ? a.timestamp.toDate() : new Date(a.timestamp);
      const timeB = b.timestamp?.toDate ? b.timestamp.toDate() : new Date(b.timestamp);
      return timeA - timeB;
    });
    
    // Отображаем сообщения
    chatMessages.innerHTML = '';
    let lastDate = null;
    
    messages.forEach((msg, index) => {
      const msgDate = msg.timestamp?.toDate ? msg.timestamp.toDate() : new Date();
      const currentDate = formatMessageDate(msgDate);
      
      // Добавляем разделитель даты если нужно
      if (currentDate !== lastDate) {
        chatMessages.innerHTML += `
          <div class="message-date-divider">${currentDate}</div>
        `;
        lastDate = currentDate;
      }
      
      const isOutgoing = msg.senderId === currentUser.uid;
      const messageTime = formatMessageTime(msgDate);
      
      const messageDiv = document.createElement('div');
      messageDiv.className = `message fade ${isOutgoing ? 'message-outgoing' : 'message-incoming'}`;
      messageDiv.innerHTML = `
        <div class="message-text">${msg.text}</div>
        <div class="message-time">
          ${messageTime}
          ${isOutgoing ? `<span class="message-status">${msg.read ? '✓✓' : '✓'}</span>` : ''}
        </div>
      `;
      
      chatMessages.appendChild(messageDiv);
    });
    
    // Прокрутка вниз
    setTimeout(() => {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }, 100);
    
  } catch(error) {
    console.error('Ошибка загрузки сообщений:', error);
    chatMessages.innerHTML = `
      <div class="no-messages" style="color:var(--danger)">
        Ошибка загрузки сообщений
      </div>`;
  }
}

// Настройка слушателя новых сообщений
function setupChatMessagesListener() {
  if (chatMessagesListener || !currentChatId) return;
  
  chatMessagesListener = db.collection('chats').doc(currentChatId)
    .collection('messages')
    .orderBy('timestamp', 'desc')
    .limit(1)
    .onSnapshot((snapshot) => {
      snapshot.docChanges().forEach((change) => {
        if (change.type === 'added') {
          const msg = change.doc.data();
          
          if (msg.senderId === currentUser.uid) return;
          
          addMessageToUI(msg);
          markMessageAsRead(change.doc.id);
        }
      });
    }, (error) => {
      console.error('Ошибка слушателя сообщений:', error);
    });
}

// Добавление сообщения в UI
function addMessageToUI(msg) {
  const chatMessages = document.getElementById('chatMessages');
  const noMessages = chatMessages.querySelector('.no-messages');
  if (noMessages) noMessages.remove();
  
  const msgDate = msg.timestamp?.toDate ? msg.timestamp.toDate() : new Date();
  const currentDate = formatMessageDate(msgDate);
  const lastMessageDivider = chatMessages.querySelector('.message-date-divider:last-child');
  
  let needsDateDivider = true;
  if (lastMessageDivider) {
    const lastDate = lastMessageDivider.textContent;
    if (lastDate === currentDate) {
      needsDateDivider = false;
    }
  }
  
  if (needsDateDivider) {
    chatMessages.innerHTML += `
      <div class="message-date-divider">${currentDate}</div>
    `;
  }
  
  const isOutgoing = msg.senderId === currentUser.uid;
  const messageTime = formatMessageTime(msgDate);
  
  const messageDiv = document.createElement('div');
  messageDiv.className = `message fade ${isOutgoing ? 'message-outgoing' : 'message-incoming'}`;
  messageDiv.innerHTML = `
    <div class="message-text">${msg.text}</div>
    <div class="message-time">
      ${messageTime}
      ${isOutgoing ? `<span class="message-status">${msg.read ? '✓✓' : '✓'}</span>` : ''}
    </div>
  `;
  
  chatMessages.appendChild(messageDiv);
  
  setTimeout(() => {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }, 100);
}

// Отправка сообщения
async function sendMessage() {
  if (!currentChatUserId) return;
  
  const chatInput = document.getElementById('chatInput');
  const text = chatInput.value.trim();
  
  if (!text) {
    showNotification('Введите сообщение!');
    return;
  }
  
  if (blockedUsers.has(currentChatUserId)) {
    showNotification('Нельзя отправить сообщение заблокированному пользователю');
    return;
  }
  
  // Проверяем взаимную блокировку
  try {
    const otherUserDoc = await db.collection("users").doc(currentChatUserId).get();
    const otherUserData = otherUserDoc.exists ? otherUserDoc.data() : {};
    const theyBlockedMe = (otherUserData.blockedUsers || []).includes(currentUser.uid);
    
    if (theyBlockedMe) {
      showNotification('Пользователь заблокировал вас');
      return;
    }
  } catch(error) {
    console.error('Ошибка проверки блокировки:', error);
  }
  
  const messageData = {
    text: text,
    senderId: currentUser.uid,
    timestamp: new Date(),
    read: false
  };
  
  try {
    let chatId = currentChatId;
    
    if (!chatId) {
      // Создаем новый чат
      const newChatRef = await db.collection('chats').add({
        participants: [currentUser.uid, currentChatUserId],
        lastMessage: text,
        lastSender: currentUser.uid,
        lastMessageTime: new Date(),
        createdAt: new Date(),
        updatedAt: new Date(),
        unreadFor: [currentChatUserId]
      });
      
      chatId = newChatRef.id;
      currentChatId = chatId;
    } else {
      // Обновляем существующий чат
      await db.collection('chats').doc(chatId).update({
        lastMessage: text,
        lastSender: currentUser.uid,
        lastMessageTime: new Date(),
        updatedAt: new Date(),
        unreadFor: firebase.firestore.FieldValue.arrayUnion(currentChatUserId)
      });
    }
    
    // Добавляем сообщение
    await db.collection('chats').doc(chatId)
      .collection('messages')
      .add(messageData);
    
    // Очищаем поле ввода
    chatInput.value = '';
    chatInput.style.height = 'auto';
    
    // Показываем свое сообщение сразу
    messageData.read = false;
    addMessageToUI(messageData);
    
    // Обновляем список чатов
    loadChatsList();
    
  } catch(error) {
    console.error('Ошибка отправки сообщения:', error);
    showNotification('Ошибка отправки: ' + error.message);
  }
}

// Пометить сообщение как прочитанное
async function markMessageAsRead(messageId) {
  if (!currentChatId) return;
  
  try {
    await db.collection('chats').doc(currentChatId)
      .collection('messages')
      .doc(messageId)
      .update({
        read: true
      });
    
    const messageElements = document.querySelectorAll('.message-incoming .message-status');
    messageElements.forEach(el => {
      if (el.textContent === '✓') {
        el.textContent = '✓✓';
      }
    });
    
  } catch(error) {
    console.error('Ошибка пометки сообщения как прочитанного:', error);
  }
}

// Пометить весь чат как прочитанный
async function markChatAsRead(chatId) {
  try {
    // Обновляем статус чата
    await db.collection('chats').doc(chatId).update({
      unreadFor: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
    });
    
    // Помечаем все сообщения как прочитанные
    const messagesSnap = await db.collection('chats').doc(chatId)
      .collection('messages')
      .where('senderId', '==', currentChatUserId)
      .where('read', '==', false)
      .get();
    
    const batch = db.batch();
    messagesSnap.forEach(doc => {
      batch.update(doc.ref, { read: true });
    });
    
    if (!messagesSnap.empty) {
      await batch.commit();
    }
    
    const messageElements = document.querySelectorAll('.message-incoming .message-status');
    messageElements.forEach(el => {
      if (el.textContent === '✓') {
        el.textContent = '✓✓';
      }
    });
    
  } catch(error) {
    console.error('Ошибка пометки чата как прочитанного:', error);
  }
}

// Открытие профиля из чата
async function openProfileFromChat() {
  if (currentChatUserId && currentChatUsername) {
    const chatState = {
      userId: currentChatUserId,
      username: currentChatUsername,
      chatId: currentChatId
    };
    sessionStorage.setItem('returnToChat', JSON.stringify(chatState));
    
    location.href = `feed.html?openProfile=${currentChatUserId}`;
  }
}

// Показать уведомление
function showNotification(message, duration = 3000) {
  const notification = document.getElementById('notification');
  notification.textContent = message;
  notification.classList.add('show');
  
  setTimeout(() => {
    notification.classList.remove('show');
  }, duration);
}

// Выход
function logout() {
  if (confirm("Выйти из аккаунта?")) {
    auth.signOut().then(() => {
      location.href = "index.html";
    });
  }
}

// Авто-высота текстового поля
document.getElementById('chatInput')?.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = (this.scrollHeight) + 'px';
});

// Отправка по Enter (Shift+Enter для новой строки)
document.getElementById('chatInput')?.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Проверка нужно ли открыть чат при загрузке
async function checkOpenChatOnLoad() {
  const openChatData = sessionStorage.getItem('openChatWith');
  if (openChatData) {
    try {
      const { userId, username } = JSON.parse(openChatData);
      sessionStorage.removeItem('openChatWith');
      
      setTimeout(async () => {
        await openChat(userId, username);
      }, 500);
      
    } catch(e) {
      console.error('Ошибка открытия чата:', e);
    }
  }
}

// Авторизация
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    location.href = 'index.html';
    return;
  }
  
  currentUser = user;
  await loadUserData();
  await loadAdminUsers();
  await loadBlockedUsers();
  await loadChatsList();
  await checkOpenChatOnLoad();
  
  // Обновляем время
  setInterval(() => {
    const timeElement = document.getElementById('time');
    if (timeElement) {
      timeElement.textContent = new Date().toLocaleTimeString('ru-RU', {
        hour: '2-digit',
        minute: '2-digit'
      });
    }
  }, 1000);
});

// Проверка возврата из профиля
window.addEventListener('load', () => {
  const returnToChat = sessionStorage.getItem('returnToChat');
  if (returnToChat) {
    try {
      const { userId, username, chatId } = JSON.parse(returnToChat);
      sessionStorage.removeItem('returnToChat');
      
      if (userId && username) {
        currentChatUserId = userId;
        currentChatUsername = username;
        currentChatId = chatId;
        
        document.getElementById('chatUserAvatar').textContent = username?.[0]?.toUpperCase() || 'U';
        document.getElementById('chatUserName').textContent = '@' + username;
        
        const isBlocked = blockedUsers.has(userId);
        updateBlockButtons(isBlocked);
        
        loadChatMessages();
      }
    } catch(e) {
      console.error('Ошибка восстановления чата:', e);
    }
  }
});
</script>
