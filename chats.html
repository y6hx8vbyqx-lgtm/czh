<!DOCTYPE html>
<html>
<head>
    <title>Тест звонков</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
</head>
<body style="background:#000; color:#fff; padding:20px;">
    
    <div id="status">Загрузка...</div>
    <div id="userInfo"></div>
    
    <button id="callBtn" style="display:none; padding:20px; font-size:20px;">📞 Позвонить</button>
    <div id="incoming" style="display:none; margin:20px; padding:20px; background:#333;">
        <p id="incomingName"></p>
        <button onclick="acceptCall()">✅ Принять</button>
        <button onclick="declineCall()">❌ Отклонить</button>
    </div>
    
    <script>
    firebase.initializeApp({
        apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
        authDomain: "czhmass.firebaseapp.com",
        projectId: "czhmass"
    });
    
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let currentUser = null;
    let currentCall = null;
    let localStream = null;
    let peerConnection = null;
    let targetUserId = 'ВСТАВЬТЕ_ID_ПОЛЬЗОВАТЕЛЯ'; // Замените на реальный ID
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            await auth.signInAnonymously();
        } else {
            currentUser = user;
            document.getElementById('status').textContent = '✅ Вошли как: ' + user.uid;
            document.getElementById('callBtn').style.display = 'block';
            
            // Слушаем звонки
            db.collection('calls')
                .where('targetId', '==', user.uid)
                .where('status', '==', 'ringing')
                .onSnapshot(snapshot => {
                    snapshot.docChanges().forEach(change => {
                        if (change.type === 'added') {
                            const call = change.doc.data();
                            document.getElementById('incoming').style.display = 'block';
                            document.getElementById('incomingName').textContent = 'Звонок от: ' + call.callerId;
                            currentCall = change.doc.id;
                        }
                    });
                });
        }
    });
    
    async function startCall() {
        try {
            // Получаем доступ к микрофону
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('status').textContent = '✅ Микрофон работает';
            
            // Создаем соединение
            peerConnection = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });
            
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            
            peerConnection.ontrack = (event) => {
                document.getElementById('status').textContent = '✅ Получен аудиопоток!';
                const audio = new Audio();
                audio.srcObject = event.streams[0];
                audio.play();
            };
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    db.collection('calls').doc(currentCall).collection('iceCandidates').add({
                        candidate: {
                            candidate: event.candidate.candidate,
                            sdpMid: event.candidate.sdpMid,
                            sdpMLineIndex: event.candidate.sdpMLineIndex
                        },
                        sender: currentUser.uid
                    });
                }
            };
            
            // Создаем offer
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            // Сохраняем в Firebase
            const callId = 'call_' + Date.now();
            await db.collection('calls').doc(callId).set({
                callerId: currentUser.uid,
                targetId: targetUserId,
                offer: { type: offer.type, sdp: offer.sdp },
                status: 'ringing',
                createdAt: new Date()
            });
            
            currentCall = callId;
            document.getElementById('status').textContent = '📞 Звоним...';
            
            // Слушаем ответ
            db.collection('calls').doc(callId).onSnapshot(async (snap) => {
                const call = snap.data();
                if (call?.answer && peerConnection) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(call.answer));
                    document.getElementById('status').textContent = '✅ Соединение установлено!';
                }
            });
            
        } catch (e) {
            document.getElementById('status').textContent = '❌ Ошибка: ' + e.message;
        }
    }
    
    window.acceptCall = async function() {
        try {
            const callDoc = await db.collection('calls').doc(currentCall).get();
            const call = callDoc.data();
            
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            peerConnection = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });
            
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            
            peerConnection.ontrack = (event) => {
                const audio = new Audio();
                audio.srcObject = event.streams[0];
                audio.play();
            };
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(call.offer));
            
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            await db.collection('calls').doc(currentCall).update({
                answer: { type: answer.type, sdp: answer.sdp },
                status: 'connected'
            });
            
            document.getElementById('incoming').style.display = 'none';
            document.getElementById('status').textContent = '✅ Разговор начат!';
            
        } catch (e) {
            document.getElementById('status').textContent = '❌ Ошибка: ' + e.message;
        }
    };
    
    window.declineCall = function() {
        db.collection('calls').doc(currentCall).update({ status: 'declined' });
        document.getElementById('incoming').style.display = 'none';
    };
    
    document.getElementById('callBtn').onclick = startCall;
    </script>
</body>
</html>
