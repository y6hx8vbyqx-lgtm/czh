<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личные сообщения - czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#000;
  --card:rgba(28,28,30,.95);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
  --success:#30d158;
  --online:#30d158;
  --offline:#8e8e93;
  --views:#8e8e93;
  --message:#5ac8fa;
  --outgoing-message:#667eea;
  --pinned:#ffd60a;
  --reply:#5ac8fa;
  --heart:#ff375f;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  height:100vh;
  overflow:hidden;
}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);
  border-radius:18px;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}
.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  cursor:pointer;
}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}
.chats-btn{
  background:#5ac8fa;
  color:var(--bg);
}

.container{
  max-width:480px;
  margin:auto;
  padding:140px 14px 100px;
  height:100vh;
  overflow-y:auto;
  position:relative;
  z-index:1;
}

/* Список чатов */
.chats-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.chat-item {
  background: var(--card);
  border-radius: 20px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: transform 0.2s, background 0.2s;
  position: relative;
}
.chat-item:hover {
  background: rgba(255,255,255,0.05);
  transform: translateY(-2px);
}
.chat-item.unread {
  background: rgba(90,200,250,0.1);
}
.chat-item.unread::after {
  content: '';
  position: absolute;
  top: 18px;
  right: 18px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--message);
}
.chat-item.pinned {
  background: rgba(255,214,10,0.1);
  border-left: 4px solid var(--pinned);
}
.chat-item.pinned .pin-indicator {
  color: var(--pinned);
}
.chat-avatar {
  width: 56px;
  height: 56px;
  border-radius: 18px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 20px;
  flex-shrink: 0;
  position: relative;
}
.chat-info {
  flex: 1;
  min-width: 0;
  padding-right: 80px;
}
.chat-user {
  font-weight: 600;
  font-size: 16px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.verified-badge {
  color: #5ac8fa;
  font-size: 14px;
}
.chat-preview {
  color: var(--sub);
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-time {
  color: var(--sub);
  font-size: 12px;
  margin-top: 4px;
}
.chat-actions {
  position: absolute;
  top: 50%;
  right: 16px;
  transform: translateY(-50%);
  display: flex;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.2s;
}
.chat-item:hover .chat-actions {
  opacity: 1;
}
.action-btn {
  background: rgba(28,28,30,0.8);
  border: none;
  color: var(--sub);
  width: 36px;
  height: 36px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
}
.action-btn:hover {
  background: var(--card);
  color: var(--text);
  transform: scale(1.1);
}
.action-btn.pin-btn:hover {
  color: var(--pinned);
  background: rgba(255,214,10,0.1);
}
.action-btn.delete-btn:hover {
  color: var(--danger);
  background: rgba(255,69,58,0.1);
}
.no-chats {
  text-align: center;
  padding: 80px 20px;
  color: var(--sub);
}
.no-chats-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.no-chats-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}
.no-chats-description {
  font-size: 14px;
  line-height: 1.4;
}

/* Окно чата */
.chat-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 5000;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.chat-overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
}
.chat-header {
  background: var(--card);
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: relative;
  min-height: 72px;
  flex-shrink: 0;
  z-index: 10;
}
.chat-user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
}
.chat-header-avatar {
  width: 44px;
  height: 44px;
  border-radius: 16px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 18px;
}
.chat-header-username {
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
}
.chat-header-username:hover {
  opacity: 0.8;
}
.chat-header-time {
  font-size: 12px;
  margin-top: 2px;
  color: var(--sub);
}
.chat-close-btn {
  background: none;
  border: none;
  color: var(--sub);
  font-size: 24px;
  cursor: pointer;
  padding: 8px;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.chat-close-btn:hover {
  background: rgba(255,255,255,0.1);
}
.block-btn {
  background: var(--danger);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-right: 8px;
}
.block-btn:hover {
  opacity: 0.9;
}
.unblock-btn {
  background: var(--success);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-right: 8px;
}
.unblock-btn:hover {
  opacity: 0.9;
}

/* Ответ на сообщение */
.reply-preview {
  background: var(--card);
  border-left: 4px solid var(--reply);
  border-radius: 12px;
  padding: 10px 14px;
  margin-bottom: 8px;
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.reply-preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.reply-sender {
  font-size: 12px;
  color: var(--reply);
  font-weight: 600;
}
.reply-close-btn {
  background: none;
  border: none;
  color: var(--sub);
  font-size: 14px;
  cursor: pointer;
  width: 20px;
  height: 20px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.reply-close-btn:hover {
  background: rgba(255,255,255,0.1);
}
.reply-text {
  font-size: 13px;
  color: var(--sub);
  line-height: 1.3;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.reply-icon {
  color: var(--reply);
  font-size: 14px;
  flex-shrink: 0;
}

/* Сообщения */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  min-height: 0;
  -webkit-overflow-scrolling: touch;
}
.message {
  max-width: 75%;
  padding: 12px 16px;
  border-radius: 18px;
  line-height: 1.4;
  word-break: break-word;
  position: relative;
  animation: fade 0.3s ease;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.message:hover {
  background: rgba(255,255,255,0.03);
}
.message-outgoing {
  align-self: flex-end;
  background: var(--outgoing-message);
  color: white;
  border-bottom-right-radius: 4px;
}
.message-incoming {
  align-self: flex-start;
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.message-replied {
  margin-top: 4px;
}
.message-reply {
  background: rgba(90,200,250,0.1);
  border-left: 3px solid var(--reply);
  border-radius: 10px;
  padding: 8px 10px;
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.3;
  max-width: 100%;
  overflow: hidden;
}
.message-reply-sender {
  font-weight: 600;
  color: var(--reply);
  font-size: 11px;
  margin-bottom: 2px;
}
.message-reply-text {
  color: var(--sub);
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.message-text {
  font-size: 15px;
  line-height: 1.4;
}
.message-time {
  font-size: 11px;
  opacity: 0.7;
  margin-top: 6px;
  text-align: right;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
}
.message-status {
  font-size: 10px;
}

/* Реакции на сообщения */
.message-reactions {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.reaction {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 2px 6px;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  transition: all 0.2s;
}
.reaction:hover {
  background: rgba(255,255,255,0.15);
  transform: scale(1.1);
}
.reaction.liked {
  background: rgba(255,55,95,0.2);
  color: var(--heart);
}
.reaction-count {
  font-size: 11px;
}

/* Панель реакций */
.reactions-panel {
  position: absolute;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px;
  display: flex;
  gap: 8px;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.2s;
  pointer-events: none;
}
.reactions-panel.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.reaction-emoji {
  font-size: 18px;
  padding: 6px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(255,255,255,0.05);
}
.reaction-emoji:hover {
  background: rgba(255,255,255,0.15);
  transform: scale(1.2);
}

/* Ввод сообщения */
.message-input-container {
  background: var(--card);
  border-top: 1px solid var(--border);
  padding: 16px;
  position: sticky;
  bottom: 0;
  flex-shrink: 0;
  z-index: 5;
}
.message-form {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.message-input-wrapper {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 8px 16px;
  border: 1px solid var(--border);
}
.message-input {
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 16px;
  width: 100%;
  outline: none;
  resize: none;
  max-height: 120px;
  font-family: inherit;
}
.message-input::placeholder {
  color: var(--sub);
}
.send-btn {
  background: var(--accent);
  border: none;
  color: white;
  width: 44px;
  height: 44px;
  border-radius: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.2s;
}
.send-btn:hover {
  transform: scale(1.1);
}
</style>
</head>
<body>
<div class="dynamic-island">💬 Сообщения</div>

<nav class="navbar">
  <span class="logo">czhmass</span>
  <div class="nav-btns">
    <button class="nav-btn" onclick="window.location.href='feed.html'">🏠</button>
    <button class="nav-btn" onclick="window.location.href='profile.html'">👤</button>
    <button class="nav-btn chats-btn" onclick="window.location.href='chats.html'">💬</button>
  </div>
</nav>

<main class="container" id="mainContainer">
  <div id="chatsListView">
    <div class="chats-list" id="chatsList"></div>
  </div>
  
  <div id="chatView" style="display: none;">
    <div class="chat-container">
      <div class="chat-header">
        <div class="chat-user-info">
          <div class="chat-header-avatar" id="chatAvatar"></div>
          <div>
            <div class="chat-header-username" id="chatUsername"></div>
            <div class="chat-header-time" id="chatStatus"></div>
          </div>
        </div>
        <div>
          <button class="block-btn" id="blockBtn" onclick="toggleBlockUser()">Заблокировать</button>
          <button class="chat-close-btn" onclick="closeChat()">✕</button>
        </div>
      </div>
      
      <div class="chat-messages" id="chatMessages"></div>
      
      <div class="reply-preview" id="replyPreview" style="display: none;">
        <span class="reply-icon">↩️</span>
        <div style="flex: 1">
          <div class="reply-preview-header">
            <span class="reply-sender" id="replySender"></span>
            <button class="reply-close-btn" onclick="cancelReply()">✕</button>
          </div>
          <div class="reply-text" id="replyText"></div>
        </div>
      </div>
      
      <div class="message-input-container">
        <form class="message-form" id="messageForm">
          <div class="message-input-wrapper">
            <textarea 
              class="message-input" 
              id="messageInput" 
              placeholder="Написать сообщение..."
              rows="1"
            ></textarea>
          </div>
          <button type="submit" class="send-btn">➤</button>
        </form>
      </div>
    </div>
  </div>
</main><script>
// ==================== КОНФИГУРАЦИЯ FIREBASE ====================
const firebaseConfig = {
  apiKey: "AIzaSyA-hVM2J4d4Uo6fM4g5X7Q8j9k0l1m2n3o",
  authDomain: "czhmass.firebaseapp.com",
  projectId: "czhmass",
  storageBucket: "czhmass.firebasestorage.app",
  messagingSenderId: "123456789012",
  appId: "1:123456789012:web:abcdef1234567890"
};

// Инициализация Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
let currentUser = null;
let currentChatId = null;
let currentChatUser = null;
let messagesUnsubscribe = null;
let replyToMessage = null;
let currentReactionsPanel = null;

// ==================== АУТЕНТИФИКАЦИЯ ====================
auth.onAuthStateChanged((user) => {
  if (user) {
    currentUser = user;
    console.log('✅ Пользователь авторизован:', user.uid);
    loadChats();
  } else {
    console.log('❌ Пользователь не авторизован');
    window.location.href = 'login.html';
  }
});

// ==================== УВЕДОМЛЕНИЯ ====================
function showNotification(message, type = 'info') {
  const notification = document.createElement('div');
  notification.style.cssText = `
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: ${type === 'error' ? 'var(--danger)' : 'var(--success)'};
    color: white;
    padding: 12px 24px;
    border-radius: 20px;
    z-index: 10000;
    animation: fade 0.3s ease;
  `;
  notification.textContent = message;
  document.body.appendChild(notification);
  setTimeout(() => notification.remove(), 3000);
}

// ==================== ЗАГРУЗКА ЧАТОВ ====================
async function loadChats() {
  if (!currentUser) return;
  
  try {
    const chatsRef = db.collection('chats');
    const snapshot = await chatsRef
      .where('participants', 'array-contains', currentUser.uid)
      .orderBy('lastMessageTime', 'desc')
      .get();
    
    const chatsList = document.getElementById('chatsList');
    
    if (snapshot.empty) {
      chatsList.innerHTML = `
        <div class="no-chats">
          <div class="no-chats-icon">💬</div>
          <div class="no-chats-title">Нет сообщений</div>
          <div class="no-chats-description">Начните общение с другими пользователями</div>
        </div>
      `;
      return;
    }
    
    let html = '';
    snapshot.forEach(doc => {
      const chat = doc.data();
      const otherUserId = chat.participants.find(id => id !== currentUser.uid);
      html += `
        <div class="chat-item ${chat.unread ? 'unread' : ''} ${chat.pinned ? 'pinned' : ''}" onclick="openChat('${doc.id}', '${otherUserId}')">
          <div class="chat-avatar">${otherUserId ? otherUserId.charAt(0).toUpperCase() : '?'}</div>
          <div class="chat-info">
            <div class="chat-user">
              ${otherUserId ? `Пользователь ${otherUserId.slice(0, 6)}` : 'Чат'}
              <span class="verified-badge">✓</span>
            </div>
            <div class="chat-preview">${chat.lastMessage || 'Нет сообщений'}</div>
            <div class="chat-time">${formatTime(chat.lastMessageTime)}</div>
          </div>
          <div class="chat-actions">
            <button class="action-btn pin-btn" onclick="event.stopPropagation(); togglePinChat('${doc.id}')">
              ${chat.pinned ? '📌' : '📍'}
            </button>
            <button class="action-btn delete-btn" onclick="event.stopPropagation(); deleteChat('${doc.id}')">
              🗑️
            </button>
          </div>
        </div>
      `;
    });
    
    chatsList.innerHTML = html;
  } catch (error) {
    console.error('❌ Ошибка загрузки чатов:', error);
    showNotification('Ошибка загрузки чатов', 'error');
  }
}

// ==================== ФОРМАТИРОВАНИЕ ВРЕМЕНИ ====================
function formatTime(timestamp) {
  if (!timestamp) return '';
  if (!timestamp.toDate) return '';
  
  try {
    const date = timestamp.toDate();
    const now = new Date();
    const diff = now - date;
    
    if (diff < 60000) return 'только что';
    if (diff < 3600000) return `${Math.floor(diff / 60000)} мин`;
    if (diff < 86400000) return `${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;
    return `${date.getDate()}.${date.getMonth() + 1}`;
  } catch (e) {
    return '';
  }
}

// ==================== ОТКРЫТИЕ ЧАТА ====================
async function openChat(chatId, otherUserId) {
  if (!chatId || !otherUserId) {
    showNotification('❌ Ошибка открытия чата', 'error');
    return;
  }
  
  currentChatId = chatId;
  currentChatUser = otherUserId;
  
  document.getElementById('chatsListView').style.display = 'none';
  document.getElementById('chatView').style.display = 'block';
  document.querySelector('.container').style.padding = '0';
  
  document.getElementById('chatAvatar').textContent = otherUserId.charAt(0).toUpperCase();
  document.getElementById('chatUsername').textContent = `Пользователь ${otherUserId.slice(0, 6)}`;
  
  // Проверяем блокировку
  checkBlockStatus();
  
  // Отписываемся от предыдущего слушателя
  if (messagesUnsubscribe) {
    messagesUnsubscribe();
  }
  
  // Загружаем сообщения
  await loadMessages(chatId);
  
  // Слушаем новые сообщения
  messagesUnsubscribe = db.collection('chats')
    .doc(chatId)
    .collection('messages')
    .orderBy('createdAt', 'asc')
    .onSnapshot((snapshot) => {
      loadMessages(chatId);
    }, (error) => {
      console.error('❌ Ошибка слушателя сообщений:', error);
    });
  
  // Отмечаем чат как прочитанный
  try {
    await db.collection('chats').doc(chatId).update({
      unread: false
    });
  } catch (error) {
    console.error('❌ Ошибка обновления статуса чата:', error);
  }
}

// ==================== ЗАКРЫТИЕ ЧАТА ====================
function closeChat() {
  currentChatId = null;
  currentChatUser = null;
  replyToMessage = null;
  document.getElementById('replyPreview').style.display = 'none';
  
  if (messagesUnsubscribe) {
    messagesUnsubscribe();
    messagesUnsubscribe = null;
  }
  
  document.getElementById('chatsListView').style.display = 'block';
  document.getElementById('chatView').style.display = 'none';
  document.querySelector('.container').style.padding = '140px 14px 100px';
  
  loadChats();
}

// ==================== ПРОВЕРКА БЛОКИРОВКИ ====================
async function checkBlockStatus() {
  if (!currentUser || !currentChatUser) return;
  
  try {
    const blockId = [currentUser.uid, currentChatUser].sort().join('_');
    const blockRef = db.collection('blocks').doc(blockId);
    const blockDoc = await blockRef.get();
    
    const blockBtn = document.getElementById('blockBtn');
    if (blockDoc.exists) {
      blockBtn.textContent = 'Разблокировать';
      blockBtn.className = 'unblock-btn';
    } else {
      blockBtn.textContent = 'Заблокировать';
      blockBtn.className = 'block-btn';
    }
  } catch (error) {
    console.error('❌ Ошибка проверки блокировки:', error);
  }
}

// ==================== ЗАГРУЗКА СООБЩЕНИЙ ====================
async function loadMessages(chatId) {
  if (!chatId) return;
  
  try {
    const messagesRef = db.collection('chats')
      .doc(chatId)
      .collection('messages')
      .orderBy('createdAt', 'asc');
    
    const snapshot = await messagesRef.get();
    const messagesContainer = document.getElementById('chatMessages');
    
    if (snapshot.empty) {
      messagesContainer.innerHTML = '<div style="text-align: center; color: var(--sub); padding: 40px;">💬 Нет сообщений. Напишите первое сообщение!</div>';
      return;
    }
    
    let html = '';
    snapshot.forEach(doc => {
      const message = doc.data();
      const isOutgoing = message.authorId === currentUser?.uid;
      
      html += `
        <div class="message ${isOutgoing ? 'message-outgoing' : 'message-incoming'}" 
             onclick="showReactionsPanel('${doc.id}', this)">
          ${message.replyTo ? `
            <div class="message-reply">
              <div class="message-reply-sender">${escapeHtml(message.replyTo.authorName || 'Пользователь')}</div>
              <div class="message-reply-text">${escapeHtml(message.replyTo.text || '')}</div>
            </div>
          ` : ''}
          <div class="message-text">${escapeHtml(message.text || '')}</div>
          <div class="message-time">
            ${formatTime(message.createdAt)}
            <span class="message-status">${isOutgoing ? '✓✓' : ''}</span>
          </div>
          <div class="message-reactions" id="reactions-${doc.id}"></div>
        </div>
      `;
    });
    
    messagesContainer.innerHTML = html;
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
    
    // Загружаем реакции для каждого сообщения
    snapshot.forEach(doc => {
      loadReactions(chatId, doc.id);
    });
    
  } catch (error) {
    console.error('❌ Ошибка загрузки сообщений:', error);
    showNotification('Ошибка загрузки сообщений', 'error');
  }
}// ==================== ЗАГРУЗКА РЕАКЦИЙ ====================
function loadReactions(chatId, messageId) {
  if (!chatId || !messageId) return;
  
  db.collection('chats')
    .doc(chatId)
    .collection('messages')
    .doc(messageId)
    .collection('reactions')
    .onSnapshot((snapshot) => {
      const reactions = {};
      snapshot.forEach(doc => {
        const reaction = doc.data();
        if (!reactions[reaction.emoji]) {
          reactions[reaction.emoji] = {
            count: 0,
            users: []
          };
        }
        reactions[reaction.emoji].count++;
        reactions[reaction.emoji].users.push(reaction.userId);
      });
      
      displayReactions(chatId, messageId, reactions);
    }, (error) => {
      console.error('❌ Ошибка загрузки реакций:', error);
    });
}

// ==================== ОТОБРАЖЕНИЕ РЕАКЦИЙ ====================
function displayReactions(chatId, messageId, reactions) {
  const container = document.getElementById(`reactions-${messageId}`);
  if (!container) return;
  
  let html = '';
  for (const [emoji, data] of Object.entries(reactions)) {
    const isLiked = data.users.includes(currentUser?.uid);
    html += `
      <div class="reaction ${isLiked ? 'liked' : ''}" 
           onclick="event.stopPropagation(); addReactionToMessage('${messageId}', '${chatId}', '${emoji}')">
        <span>${emoji}</span>
        <span class="reaction-count">${data.count}</span>
      </div>
    `;
  }
  
  container.innerHTML = html;
}

// ==================== ИСПРАВЛЕННАЯ ФУНКЦИЯ ДОБАВЛЕНИЯ РЕАКЦИИ ====================
async function addReactionToMessage(messageId, chatId, emoji) {
  if (!currentUser) {
    showNotification('❌ Требуется авторизация');
    return;
  }
  
  if (!chatId || !messageId) {
    showNotification('❌ Ошибка: чат или сообщение не найдены');
    return;
  }
  
  try {
    const reactionRef = db
      .collection('chats')
      .doc(chatId)
      .collection('messages')
      .doc(messageId)
      .collection('reactions')
      .doc(`${currentUser.uid}_${emoji}`);
    
    const reactionDoc = await reactionRef.get();
    
    if (reactionDoc.exists) {
      await reactionRef.delete();
      console.log('✅ Реакция удалена');
    } else {
      await reactionRef.set({
        emoji: emoji,
        userId: currentUser.uid,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        userName: currentUser.displayName || 'Пользователь'
      });
      console.log('✅ Реакция добавлена');
    }
    
    // Закрываем панель реакций
    if (currentReactionsPanel) {
      currentReactionsPanel.remove();
      currentReactionsPanel = null;
    }
    
  } catch (error) {
    console.error('❌ Ошибка при добавлении реакции:', error);
    showNotification('❌ Не удалось добавить реакцию');
  }
}

// ==================== ПОКАЗ ПАНЕЛИ РЕАКЦИЙ ====================
function showReactionsPanel(messageId, element) {
  if (!currentChatId || !messageId) return;
  
  // Закрываем предыдущую панель
  if (currentReactionsPanel) {
    currentReactionsPanel.remove();
    currentReactionsPanel = null;
  }
  
  const panel = document.createElement('div');
  panel.className = 'reactions-panel show';
  panel.innerHTML = `
    <span class="reaction-emoji" onclick="addReactionToMessage('${messageId}', '${currentChatId}', '👍')">👍</span>
    <span class="reaction-emoji" onclick="addReactionToMessage('${messageId}', '${currentChatId}', '❤️')">❤️</span>
    <span class="reaction-emoji" onclick="addReactionToMessage('${messageId}', '${currentChatId}', '😂')">😂</span>
    <span class="reaction-emoji" onclick="addReactionToMessage('${messageId}', '${currentChatId}', '😮')">😮</span>
    <span class="reaction-emoji" onclick="addReactionToMessage('${messageId}', '${currentChatId}', '😢')">😢</span>
    <span class="reaction-emoji" onclick="addReactionToMessage('${messageId}', '${currentChatId}', '😡')">😡</span>
  `;
  
  const rect = element.getBoundingClientRect();
  panel.style.position = 'absolute';
  panel.style.left = `${rect.left}px`;
  panel.style.top = `${rect.top - 50}px`;
  
  document.body.appendChild(panel);
  currentReactionsPanel = panel;
  
  // Закрываем при клике вне панели
  setTimeout(() => {
    function closePanel(e) {
      if (!panel.contains(e.target) && e.target !== element) {
        panel.remove();
        currentReactionsPanel = null;
        document.removeEventListener('click', closePanel);
      }
    }
    document.addEventListener('click', closePanel);
  }, 100);
}

// ==================== ИСПРАВЛЕННАЯ ФУНКЦИЯ ОТПРАВКИ СООБЩЕНИЯ ====================
async function sendMessage(e) {
  e.preventDefault();
  
  if (!currentUser) {
    showNotification('❌ Требуется авторизация');
    return;
  }
  
  if (!currentChatId) {
    showNotification('❌ Чат не выбран');
    return;
  }
  
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  
  if (!text) return;
  
  // Проверяем блокировку
  try {
    const blockId = [currentUser.uid, currentChatUser].sort().join('_');
    const blockRef = db.collection('blocks').doc(blockId);
    const blockDoc = await blockRef.get();
    
    if (blockDoc.exists && blockDoc.data().blockedBy === currentChatUser) {
      showNotification('❌ Вы заблокированы этим пользователем');
      return;
    }
  } catch (error) {
    console.error('❌ Ошибка проверки блокировки:', error);
  }
  
  try {
    const messageData = {
      text: text,
      authorId: currentUser.uid,
      authorName: currentUser.displayName || 'Пользователь',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      replyTo: replyToMessage ? {
        messageId: replyToMessage.id,
        text: replyToMessage.text,
        authorName: replyToMessage.authorName
      } : null
    };
    
    // ✅ ПРАВИЛЬНЫЙ ПУТЬ: сообщение внутри чата
    await db.collection('chats')
      .doc(currentChatId)
      .collection('messages')
      .add(messageData);
    
    // Обновляем последнее сообщение в чате
    await db.collection('chats').doc(currentChatId).update({
      lastMessage: text,
      lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessageAuthor: currentUser.uid,
      unread: true
    });
    
    input.value = '';
    input.style.height = 'auto';
    
    if (replyToMessage) {
      cancelReply();
    }
    
    console.log('✅ Сообщение отправлено');
    
  } catch (error) {
    console.error('❌ Ошибка отправки сообщения:', error);
    showNotification('❌ Не удалось отправить сообщение');
  }
}

// ==================== ОТВЕТ НА СООБЩЕНИЕ ====================
function setReplyTo(messageId, messageText, authorName) {
    if (!messageId || !messageText || !authorName) return;
    
    replyToMessage = {
        id: messageId,
        text: messageText,
        authorName: authorName
    };
    
    document.getElementById('replySender').textContent = `Ответ ${authorName}`;
    document.getElementById('replyText').textContent = messageText;
    document.getElementById('replyPreview').style.display = 'flex';
    document.getElementById('messageInput').focus();
}

function cancelReply() {
    replyToMessage = null;
    document.getElementById('replyPreview').style.display = 'none';
}

// ==================== ЗАКРЕПЛЕНИЕ ЧАТА ====================
async function togglePinChat(chatId) {
    if (!chatId) return;
    
    try {
        const chatRef = db.collection('chats').doc(chatId);
        const chat = await chatRef.get();
        
        if (!chat.exists) return;
        
        await chatRef.update({
            pinned: !chat.data().pinned
        });
        
        loadChats();
        showNotification(chat.data().pinned ? '📌 Чат откреплен' : '📌 Чат закреплен');
        
    } catch (error) {
        console.error('❌ Ошибка закрепления чата:', error);
        showNotification('❌ Не удалось закрепить чат', 'error');
    }
}

// ==================== УДАЛЕНИЕ ЧАТА ====================
async function deleteChat(chatId) {
    if (!chatId) return;
    if (!confirm('Удалить чат? Это действие нельзя отменить.')) return;
    
    try {
        await db.collection('chats').doc(chatId).delete();
        showNotification('✅ Чат удален');
        loadChats();
        
    } catch (error) {
        console.error('❌ Ошибка удаления чата:', error);
        showNotification('❌ Не удалось удалить чат', 'error');
    }
}

// ==================== БЛОКИРОВКА ПОЛЬЗОВАТЕЛЯ ====================
async function toggleBlockUser() {
    if (!currentUser || !currentChatUser) return;
    
    try {
        const blockId = [currentUser.uid, currentChatUser].sort().join('_');
        const blockRef = db.collection('blocks').doc(blockId);
        const blockDoc = await blockRef.get();
        
        if (blockDoc.exists) {
            await blockRef.delete();
            document.getElementById('blockBtn').textContent = 'Заблокировать';
            document.getElementById('blockBtn').className = 'block-btn';
            showNotification('✅ Пользователь разблокирован');
        } else {
            await blockRef.set({
                blockedBy: currentUser.uid,
                blockedUser: currentChatUser,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('blockBtn').textContent = 'Разблокировать';
            document.getElementById('blockBtn').className = 'unblock-btn';
            showNotification('🔒 Пользователь заблокирован');
        }
        
    } catch (error) {
        console.error('❌ Ошибка блокировки:', error);
        showNotification('❌ Не удалось заблокировать пользователя', 'error');
    }
}// ==================== ЭКРАНИРОВАНИЕ HTML ====================
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ==================== ПОИСК ПОЛЬЗОВАТЕЛЕЙ ====================
async function searchUsers(query) {
    if (!query || query.length < 2) return [];
    
    try {
        const usersRef = db.collection('users');
        const snapshot = await usersRef
            .where('email', '>=', query)
            .where('email', '<=', query + '\uf8ff')
            .limit(10)
            .get();
        
        return snapshot.docs.map(doc => ({
            uid: doc.id,
            email: doc.data().email,
            displayName: doc.data().displayName || 'Пользователь'
        }));
    } catch (error) {
        console.error('❌ Ошибка поиска пользователей:', error);
        return [];
    }
}

// ==================== СОЗДАНИЕ НОВОГО ЧАТА ====================
async function createChat(otherUserId) {
    if (!currentUser || !otherUserId) return;
    
    try {
        // Проверяем, существует ли уже чат
        const chatsRef = db.collection('chats');
        const snapshot = await chatsRef
            .where('participants', 'array-contains', currentUser.uid)
            .get();
        
        let existingChat = null;
        snapshot.forEach(doc => {
            const chat = doc.data();
            if (chat.participants.includes(otherUserId)) {
                existingChat = doc.id;
            }
        });
        
        if (existingChat) {
            openChat(existingChat, otherUserId);
            return;
        }
        
        // Создаем новый чат
        const newChatRef = await chatsRef.add({
            participants: [currentUser.uid, otherUserId],
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
            lastMessage: 'Чат создан',
            unread: false,
            pinned: false
        });
        
        openChat(newChatRef.id, otherUserId);
        showNotification('✅ Чат создан');
        
    } catch (error) {
        console.error('❌ Ошибка создания чата:', error);
        showNotification('❌ Не удалось создать чат', 'error');
    }
}

// ==================== ИНИЦИАЛИЗАЦИЯ ====================
document.addEventListener('DOMContentLoaded', () => {
    const messageForm = document.getElementById('messageForm');
    if (messageForm) {
        messageForm.addEventListener('submit', sendMessage);
    }
    
    const messageInput = document.getElementById('messageInput');
    if (messageInput) {
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    }
    
    // Добавляем поддержку Enter для отправки (Shift+Enter для новой строки)
    if (messageInput) {
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const form = document.getElementById('messageForm');
                if (form) form.dispatchEvent(new Event('submit'));
            }
        });
    }
});

// ==================== ЭКСПОРТ ФУНКЦИЙ ДЛЯ ГЛОБАЛЬНОГО ИСПОЛЬЗОВАНИЯ ====================
window.openChat = openChat;
window.closeChat = closeChat;
window.sendMessage = sendMessage;
window.addReactionToMessage = addReactionToMessage;
window.showReactionsPanel = showReactionsPanel;
window.setReplyTo = setReplyTo;
window.cancelReply = cancelReply;
window.togglePinChat = togglePinChat;
window.deleteChat = deleteChat;
window.toggleBlockUser = toggleBlockUser;
window.createChat = createChat;
window.searchUsers = searchUsers;

</script>
