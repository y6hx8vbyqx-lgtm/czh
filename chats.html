<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личные сообщения - czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
/* Все стили остаются такими же как в предыдущей версии */
:root{
  --bg:#000;
  --card:rgba(28,28,30,.95);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
  --success:#30d158;
  --online:#30d158;
  --offline:#8e8e93;
  --views:#8e8e93;
  --message:#5ac8fa;
  --outgoing-message:#667eea;
  --pinned:#ffd60a;
  --reply:#5ac8fa;
  --heart:#ff375f;
  --call-bg:#1c1c1e;
  --call-accept:#30d158;
  --call-decline:#ff453a;
  --call-video:#5ac8fa;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  height:100vh;
  overflow:hidden;
}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);
  border-radius:18px;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}
.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  cursor:pointer;
}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}
.chats-btn{
  background:#5ac8fa;
  color:var(--bg);
}

.container{
  max-width:480px;
  margin:auto;
  padding:140px 14px 100px;
  height:100vh;
  overflow-y:auto;
  position:relative;
  z-index:1;
}

/* Список чатов */
.chats-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.chat-item {
  background: var(--card);
  border-radius: 20px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: transform 0.2s, background 0.2s;
  position: relative;
}
.chat-item:hover {
  background: rgba(255,255,255,0.05);
  transform: translateY(-2px);
}
.chat-item.unread {
  background: rgba(90,200,250,0.1);
}
.chat-item.unread::after {
  content: '';
  position: absolute;
  top: 18px;
  right: 18px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--message);
}
.chat-item.pinned {
  background: rgba(255,214,10,0.1);
  border-left: 4px solid var(--pinned);
}
.chat-item.pinned .pin-indicator {
  color: var(--pinned);
}
.chat-avatar {
  width: 56px;
  height: 56px;
  border-radius: 18px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 20px;
  flex-shrink: 0;
  position: relative;
}
.chat-info {
  flex: 1;
  min-width: 0;
  padding-right: 80px;
}
.chat-user {
  font-weight: 600;
  font-size: 16px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.verified-badge {
  color: #5ac8fa;
  font-size: 14px;
}
.chat-preview {
  color: var(--sub);
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-time {
  color: var(--sub);
  font-size: 12px;
  margin-top: 4px;
}
.chat-actions {
  position: absolute;
  top: 50%;
  right: 16px;
  transform: translateY(-50%);
  display: flex;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.2s;
}
.chat-item:hover .chat-actions {
  opacity: 1;
}
.action-btn {
  background: rgba(28,28,30,0.8);
  border: none;
  color: var(--sub);
  width: 36px;
  height: 36px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
}
.action-btn:hover {
  background: var(--card);
  color: var(--text);
  transform: scale(1.1);
}
.action-btn.pin-btn:hover {
  color: var(--pinned);
  background: rgba(255,214,10,0.1);
}
.action-btn.delete-btn:hover {
  color: var(--danger);
  background: rgba(255,69,58,0.1);
}
.no-chats {
  text-align: center;
  padding: 80px 20px;
  color: var(--sub);
}
.no-chats-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.no-chats-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}
.no-chats-description {
  font-size: 14px;
  line-height: 1.4;
}

/* Окно чата */
.chat-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 5000;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.chat-overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
}
.chat-header {
  background: var(--card);
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: relative;
  min-height: 72px;
  flex-shrink: 0;
  z-index: 10;
}
.chat-user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
}
.chat-header-avatar {
  width: 44px;
  height: 44px;
  border-radius: 16px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 18px;
}
.chat-header-username {
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
}
.chat-header-username:hover {
  opacity: 0.8;
}
.chat-header-time {
  font-size: 12px;
  margin-top: 2px;
  color: var(--sub);
}
.chat-close-btn {
  background: none;
  border: none;
  color: var(--sub);
  font-size: 24px;
  cursor: pointer;
  padding: 8px;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.chat-close-btn:hover {
  background: rgba(255,255,255,0.1);
}

/* Кнопки звонков */
.call-buttons {
  display: flex;
  gap: 8px;
  margin-right: 8px;
}
.call-btn {
  background: var(--card);
  border: none;
  color: #fff;
  width: 40px;
  height: 40px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
  transition: all 0.2s;
}
.call-btn.audio {
  background: var(--success);
}
.call-btn.audio:hover {
  background: #34c759;
  transform: scale(1.1);
}
.call-btn.video {
  background: var(--call-video);
}
.call-btn.video:hover {
  background: #5ac8fa;
  transform: scale(1.1);
}
.call-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.call-btn:disabled:hover {
  transform: none;
}

.block-btn {
  background: var(--danger);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-right: 8px;
}
.block-btn:hover {
  opacity: 0.9;
}
.unblock-btn {
  background: var(--success);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
  margin-right: 8px;
}
.unblock-btn:hover {
  opacity: 0.9;
}

/* Модальное окно звонка */
.call-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.95);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.call-modal.show {
  opacity: 1;
  pointer-events: auto;
}
.call-container {
  width: 100%;
  max-width: 400px;
  padding: 20px;
  text-align: center;
}
.call-avatar {
  width: 120px;
  height: 120px;
  border-radius: 60px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 60px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% {
    box-shadow: 0 0 0 0 rgba(90, 200, 250, 0.7);
  }
  70% {
    box-shadow: 0 0 0 20px rgba(90, 200, 250, 0);
  }
  100% {
    box-shadow: 0 0 0 0 rgba(90, 200, 250, 0);
  }
}
.call-info {
  margin-bottom: 30px;
}
.call-name {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  color: #fff;
}
.call-type {
  color: var(--sub);
  font-size: 16px;
}
.call-timer {
  font-size: 32px;
  font-weight: 600;
  color: #fff;
  margin: 20px 0;
  font-family: monospace;
}
.call-controls {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}
.call-control-btn {
  width: 70px;
  height: 70px;
  border-radius: 35px;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 28px;
  transition: all 0.3s ease;
}
.call-control-btn:hover {
  transform: scale(1.1);
}
.call-control-btn.audio-mute {
  background: var(--card);
  color: #fff;
}
.call-control-btn.audio-mute.muted {
  background: var(--danger);
}
.call-control-btn.video-toggle {
  background: var(--card);
  color: #fff;
}
.call-control-btn.video-toggle.off {
  background: var(--danger);
}
.call-control-btn.end-call {
  background: var(--danger);
  color: #fff;
}
.call-control-btn.accept-call {
  background: var(--success);
  color: #fff;
}
.call-control-btn.decline-call {
  background: var(--danger);
  color: #fff;
}

/* Видео контейнер */
.video-container {
  position: relative;
  width: 100%;
  height: 0;
  padding-bottom: 56.25%;
  background: #1c1c1e;
  border-radius: 20px;
  overflow: hidden;
  margin: 20px 0;
}
#remoteVideo {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
#localVideo {
  position: absolute;
  width: 120px;
  height: 160px;
  bottom: 20px;
  right: 20px;
  border-radius: 12px;
  border: 2px solid #fff;
  z-index: 2;
  object-fit: cover;
}

/* Входящий звонок */
.incoming-call {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--card);
  border-radius: 30px;
  padding: 30px;
  z-index: 10001;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
  animation: slideIn 0.3s ease;
  min-width: 320px;
  text-align: center;
}
@keyframes slideIn {
  from {
    transform: translate(-50%, -30%);
    opacity: 0;
  }
  to {
    transform: translate(-50%, -50%);
    opacity: 1;
  }
}
.incoming-avatar {
  width: 100px;
  height: 100px;
  border-radius: 50px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 15px;
  font-size: 50px;
  animation: pulse 2s infinite;
}
.incoming-name {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 8px;
  color: #fff;
}
.incoming-type {
  color: var(--sub);
  font-size: 16px;
  margin-bottom: 20px;
}
.incoming-buttons {
  display: flex;
  gap: 20px;
  justify-content: center;
}
.incoming-accept {
  background: var(--success);
  color: #fff;
  border: none;
  width: 60px;
  height: 60px;
  border-radius: 30px;
  font-size: 24px;
  cursor: pointer;
  transition: all 0.2s;
}
.incoming-accept:hover {
  transform: scale(1.1);
}
.incoming-decline {
  background: var(--danger);
  color: #fff;
  border: none;
  width: 60px;
  height: 60px;
  border-radius: 30px;
  font-size: 24px;
  cursor: pointer;
  transition: all 0.2s;
}
.incoming-decline:hover {
  transform: scale(1.1);
}

/* Остальные стили (сообщения, реакции и т.д.) остаются без изменений */
/* ... (сохраните все остальные стили из предыдущей версии) ... */

</style>
</head>

<body>

<div class="dynamic-island" id="time"></div>

<div class="navbar">
  <div class="logo" onclick="location.href='feed.html'">czhmass</div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="location.href='profile.html'">👤</button>
    <button class="nav-btn" id="adminBtn" style="display:none" onclick="location.href='admin.html'">👑</button>
    <button class="nav-btn chats-btn" onclick="location.href='chats.html'">💬</button>
    <button class="nav-btn" onclick="logout()">🚪</button>
  </div>
</div>

<div class="container">
  <div class="chats-list" id="chatsList">
    <div class="loader">
      <div class="loader-spinner"></div>
      <div>Загрузка чатов...</div>
    </div>
  </div>
</div>

<!-- Окно чата -->
<div class="chat-overlay" id="chatOverlay">
  <div class="chat-container">
    <div class="chat-header">
      <button class="back-btn" onclick="closeChat()">←</button>
      <div class="chat-user-info">
        <div class="chat-header-avatar" id="chatUserAvatar">U</div>
        <div>
          <div class="chat-header-username" id="chatUserName" onclick="openProfileFromChat()">@username</div>
          <div class="chat-header-time" id="chatUserStatus">онлайн</div>
        </div>
      </div>
      
      <!-- Кнопки звонков -->
      <div class="call-buttons">
        <button class="call-btn audio" id="audioCallBtn" onclick="startAudioCall()" title="Аудиозвонок">
          📞
        </button>
        <button class="call-btn video" id="videoCallBtn" onclick="startVideoCall()" title="Видеозвонок">
          📹
        </button>
      </div>
      
      <button class="block-btn" id="blockBtn" onclick="toggleBlockUser()">Заблокировать</button>
      <button class="unblock-btn" id="unblockBtn" onclick="toggleBlockUser()" style="display:none">Разблокировать</button>
      <button class="chat-close-btn" onclick="closeChat()">✕</button>
    </div>
    
    <div class="chat-messages" id="chatMessages">
      <div class="loader">
        <div class="loader-spinner"></div>
        <div>Загрузка сообщений...</div>
      </div>
    </div>
    
    <div class="chat-input-area">
      <div class="reply-container" id="replyContainer" style="display:none">
        <div class="reply-preview">
          <div class="reply-icon">↩️</div>
          <div style="flex:1">
            <div class="reply-preview-header">
              <div class="reply-sender" id="replySender">@username</div>
              <button class="reply-close-btn" onclick="cancelReply()">✕</button>
            </div>
            <div class="reply-text" id="replyText">Текст сообщения...</div>
          </div>
        </div>
      </div>
      <div class="chat-input-wrapper">
        <textarea class="chat-input" id="chatInput" 
                  placeholder="Напишите сообщение..." 
                  rows="1"
                  maxlength="1000"></textarea>
        <button class="chat-send-btn" id="chatSendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- Модальное окно звонка -->
<div class="call-modal" id="callModal">
  <div class="call-container">
    <div class="call-avatar" id="callAvatar">👤</div>
    
    <div class="call-info">
      <div class="call-name" id="callName">Пользователь</div>
      <div class="call-type" id="callType">Аудиозвонок</div>
    </div>
    
    <div class="video-container" id="videoContainer" style="display:none;">
      <video id="remoteVideo" autoplay playsinline></video>
      <video id="localVideo" autoplay muted playsinline></video>
    </div>
    
    <div class="call-timer" id="callTimer">00:00</div>
    
    <div class="call-controls" id="callControls">
      <div id="outgoingControls" style="display:none;">
        <button class="call-control-btn end-call" onclick="endCall()">📞</button>
      </div>
      <div id="incomingControls" style="display:none;">
        <button class="call-control-btn accept-call" onclick="acceptCall()">📞</button>
        <button class="call-control-btn decline-call" onclick="declineCall()">❌</button>
      </div>
      <div id="activeCallControls" style="display:none;">
        <button class="call-control-btn audio-mute" id="muteBtn" onclick="toggleMute()">🎤</button>
        <button class="call-control-btn video-toggle" id="videoToggleBtn" onclick="toggleVideo()" style="display:none;">📹</button>
        <button class="call-control-btn end-call" onclick="endCall()">📞</button>
      </div>
    </div>
  </div>
</div>

<!-- Входящий звонок -->
<div class="incoming-call" id="incomingCall" style="display:none;">
  <div class="incoming-avatar" id="incomingAvatar">👤</div>
  <div class="incoming-name" id="incomingName">Пользователь</div>
  <div class="incoming-type" id="incomingType">Входящий аудиозвонок</div>
  <div class="incoming-buttons">
    <button class="incoming-accept" onclick="acceptIncomingCall()">📞</button>
    <button class="incoming-decline" onclick="declineIncomingCall()">❌</button>
  </div>
</div>

<!-- Контекстные меню -->
<div class="context-menu" id="messageContextMenu">
  <div class="menu-item reply-item" id="contextReplyBtn">↩️ Ответить</div>
  <div class="menu-item reaction-item" id="contextReactionBtn">❤️ Сердечко</div>
  <div class="menu-item delete-message-item" id="contextDeleteMessageBtn">🗑️ Удалить</div>
</div>

<div class="reactions-panel" id="reactionsPanel">
  <div class="reaction-emoji heart" onclick="addReaction('❤️')">❤️</div>
  <div class="reaction-emoji" onclick="addReaction('👍')">👍</div>
  <div class="reaction-emoji" onclick="addReaction('😂')">😂</div>
  <div class="reaction-emoji" onclick="addReaction('😮')">😮</div>
</div>

<div class="notification" id="notification"></div>

<script>
// Инициализация Firebase
firebase.initializeApp({
  apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
  authDomain: "czhmass.firebaseapp.com",
  projectId: "czhmass"
});
const db = firebase.firestore();
const auth = firebase.auth();

// Глобальные переменные
let currentUser = null;
let userData = null;
let blockedUsers = [];
let adminUsers = [];
let currentChatUserId = null;
let currentChatUsername = null;
let currentChatId = null;
let chatMessagesListener = null;
let usersCache = new Map();
let pinnedChats = [];
let replyingToMessage = null;

// Переменные для звонков
let currentCall = null;
let callType = null;
let localStream = null;
let remoteStream = null;
let peerConnection = null;
let callTimer = null;
let callStartTime = null;
let incomingCallListener = null;
let callStatusListener = null;
let ringtoneAudio = null;

// ==================== ИНИЦИАЛИЗАЦИЯ ====================

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    location.href = 'index.html';
    return;
  }
  
  console.log('Пользователь авторизован:', user.uid);
  currentUser = user;
  
  try {
    // Загружаем данные пользователя
    await loadUserData();
    console.log('Данные пользователя загружены:', userData);
    
    await loadAdminUsers();
    console.log('Админы загружены:', adminUsers);
    
    await loadChatsList();
    
    // Слушаем входящие звонки
    listenForIncomingCalls();
    
    // Проверяем, нужно ли автоматически открыть чат
    await checkForAutoOpenChat();
    
    // Обновляем время
    setInterval(() => {
      const timeElement = document.getElementById('time');
      if (timeElement) {
        timeElement.textContent = new Date().toLocaleTimeString('ru-RU', {
          hour: '2-digit',

// Тест медиаустройств
async function testMediaDevices() {
  console.log('🔍 Тест медиаустройств...');
  
  try {
    // Проверяем поддержку
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      console.error('❌ getUserMedia не поддерживается');
      showNotification('Ваш браузер не поддерживает звонки');
      return false;
    }
    
    // Проверяем устройства
    const devices = await navigator.mediaDevices.enumerateDevices();
    const audioInputs = devices.filter(d => d.kind === 'audioinput');
    const videoInputs = devices.filter(d => d.kind === 'videoinput');
    
    console.log('📱 Найденные устройства:');
    console.log('- Аудио входы:', audioInputs.length);
    console.log('- Видео входы:', videoInputs.length);
    
    if (audioInputs.length === 0) {
      console.warn('⚠️ Нет микрофона');
      showNotification('Микрофон не найден');
      return false;
    }
    
    // Пробуем получить доступ к микрофону
    console.log('🎤 Запрос доступа к микрофону...');
    const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    console.log('✅ Доступ к микрофону получен');
    audioStream.getTracks().forEach(track => track.stop());
    
    return true;
    
  } catch (error) {
    console.error('❌ Ошибка теста медиа:', error);
    
    if (error.name === 'NotAllowedError') {
      showNotification('❌ Разрешите доступ к микрофону');
    } else if (error.name === 'NotFoundError') {
      showNotification('❌ Микрофон не найден');
    } else {
      showNotification('❌ Ошибка: ' + error.message);
    }
    return false;
  }
}

// Инициализация звонка
async function initializeCall() {
  try {
    console.log('Инициализация звонка...');
    
    // Запрашиваем доступ к медиа
    const constraints = {
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      },
      video: callType === 'video' ? {
        width: { ideal: 1280 },
        height: { ideal: 720 },
        facingMode: 'user'
      } : false
    };
    
    console.log('Запрос медиа с параметрами:', constraints);
    localStream = await navigator.mediaDevices.getUserMedia(constraints);
    console.log('✅ Медиа получены:', localStream.getTracks().map(t => t.kind).join(', '));
    
    // Проверяем аудио
    const audioTracks = localStream.getAudioTracks();
    if (audioTracks.length > 0) {
      console.log('🔊 Аудио трек:', audioTracks[0].label);
    } else {
      console.error('❌ Нет аудио трека');
      showNotification('Ошибка: нет доступа к микрофону');
      return;
    }
    
    // Показываем локальное видео
    if (callType === 'video') {
      document.getElementById('videoContainer').style.display = 'block';
      const localVideo = document.getElementById('localVideo');
      localVideo.srcObject = localStream;
      await localVideo.play();
      console.log('✅ Локальное видео запущено');
    }
    
    // Создаем peer connection
    peerConnection = new RTCPeerConnection({
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]
    });
    
    // Добавляем треки
    localStream.getTracks().forEach(track => {
      console.log('Добавление трека:', track.kind);
      peerConnection.addTrack(track, localStream);
    });
    
    // Обработка удаленного потока
    peerConnection.ontrack = (event) => {
      console.log('🎥 Получен удаленный поток');
      remoteStream = event.streams[0];
      const remoteVideo = document.getElementById('remoteVideo');
      if (remoteVideo) {
        remoteVideo.srcObject = remoteStream;
        remoteVideo.play().catch(e => console.error('Ошибка воспроизведения удаленного видео:', e));
      }
    };
    
    // ICE кандидаты
    peerConnection.onicecandidate = (event) => {
      if (event.candidate) {
        console.log('📦 Отправка ICE кандидата');
        sendIceCandidate(event.candidate);
      }
    };
    
    // Состояние соединения
    peerConnection.onconnectionstatechange = () => {
      console.log('🔌 Состояние соединения:', peerConnection.connectionState);
      if (peerConnection.connectionState === 'disconnected' || 
          peerConnection.connectionState === 'failed') {
        console.log('❌ Соединение потеряно');
        endCall();
      }
    };
    
    // Создаем оффер
    console.log('📞 Создание оффера...');
    const offer = await peerConnection.createOffer({
      offerToReceiveAudio: true,
      offerToReceiveVideo: callType === 'video'
    });
    
    await peerConnection.setLocalDescription(offer);
    console.log('✅ Оффер создан');
    
    // Сохраняем в Firebase
    const callId = 'call_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    
    const callData = {
      callerId: currentUser.uid,
      callerName: userData.username,
      targetId: currentChatUserId,
      offer: {
        type: offer.type,
        sdp: offer.sdp
      },
      type: callType,
      status: 'ringing',
      createdAt: new Date()
    };
    
    console.log('💾 Сохранение звонка в Firebase:', callId);
    await db.collection('calls').doc(callId).set(callData);
    
    currentCall = callId;
    
    // Показываем окно
    showCallModal('outgoing');
    
    // Слушаем статус
    watchCallStatus(callId);
    
  } catch (error) {
    console.error('❌ Ошибка инициализации звонка:', error);
    showNotification('Ошибка: ' + error.message);
    cleanupCall();
  }
}

// Отправить ICE кандидат
async function sendIceCandidate(candidate) {
  if (!currentCall) return;
  
  try {
    await db.collection('calls').doc(currentCall).collection('iceCandidates').add({
      candidate: candidate,
      sender: currentUser.uid,
      timestamp: new Date()
    });
  } catch (error) {
    console.error('Ошибка отправки ICE кандидата:', error);
  }
}

// Слушаем статус звонка
function watchCallStatus(callId) {
  if (callStatusListener) callStatusListener();
  
  callStatusListener = db.collection('calls').doc(callId).onSnapshot(async (snapshot) => {
    const call = snapshot.data();
    if (!call) return;
    
    console.log('Статус звонка:', call.status);
    
    if (call.status === 'connected') {
      document.getElementById('outgoingControls').style.display = 'none';
      document.getElementById('activeCallControls').style.display = 'flex';
      if (callType === 'video') {
        document.getElementById('videoToggleBtn').style.display = 'flex';
      }
      startCallTimer();
      
    } else if (call.status === 'ended') {
      console.log('Звонок завершен');
      showNotification('Звонок завершен');
      cleanupCall();
      
    } else if (call.status === 'declined') {
      console.log('Звонок отклонен');
      showNotification('Пользователь отклонил звонок');
      cleanupCall();
      
    } else if (call.answer && peerConnection && !peerConnection.currentRemoteDescription) {
      console.log('Получен ответ');
      await peerConnection.setRemoteDescription(new RTCSessionDescription(call.answer));
    }
  });
  
  // Слушаем ICE кандидаты
  db.collection('calls').doc(callId).collection('iceCandidates')
    .onSnapshot((snapshot) => {
      snapshot.docChanges().forEach((change) => {
        if (change.type === 'added' && peerConnection) {
          const data = change.doc.data();
          if (data.sender !== currentUser.uid) {
            console.log('Получен ICE кандидат от собеседника');
            peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate))
              .catch(e => console.error('Ошибка добавления ICE:', e));
          }
        }
      });
    });
}

// Принять входящий звонок
async function acceptIncomingCall() {
  console.log('✅ Принимаем звонок...');
  
  document.getElementById('incomingCall').style.display = 'none';
  stopRingtone();
  
  try {
    const callDoc = await db.collection('calls').doc(currentCall).get();
    const call = callDoc.data();
    
    // Запрашиваем медиа
    const constraints = {
      audio: true,
      video: call.type === 'video' ? { width: { ideal: 1280 }, height: { ideal: 720 } } : false
    };
    
    localStream = await navigator.mediaDevices.getUserMedia(constraints);
    console.log('✅ Медиа получены');
    
    showCallModal('incoming');
    
    if (call.type === 'video') {
      document.getElementById('videoContainer').style.display = 'block';
      const localVideo = document.getElementById('localVideo');
      localVideo.srcObject = localStream;
      await localVideo.play();
    }
    
    // Создаем peer connection
    peerConnection = new RTCPeerConnection({
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]
    });
    
    localStream.getTracks().forEach(track => {
      peerConnection.addTrack(track, localStream);
    });
    
    peerConnection.ontrack = (event) => {
      console.log('Получен удаленный поток');
      remoteStream = event.streams[0];
      const remoteVideo = document.getElementById('remoteVideo');
      remoteVideo.srcObject = remoteStream;
      remoteVideo.play().catch(e => console.error('Ошибка воспроизведения:', e));
    };
    
    peerConnection.onicecandidate = (event) => {
      if (event.candidate) {
        sendIceCandidate(event.candidate);
      }
    };
    
    // Устанавливаем удаленное описание
    await peerConnection.setRemoteDescription(new RTCSessionDescription(call.offer));
    
    // Создаем ответ
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    
    // Отправляем ответ
    await db.collection('calls').doc(currentCall).update({
      answer: {
        type: answer.type,
        sdp: answer.sdp
      },
      status: 'connected'
    });
    
    document.getElementById('incomingControls').style.display = 'none';
    document.getElementById('activeCallControls').style.display = 'flex';
    if (call.type === 'video') {
      document.getElementById('videoToggleBtn').style.display = 'flex';
    }
    
    startCallTimer();
    watchCallStatus(currentCall);
    
  } catch (error) {
    console.error('Ошибка принятия звонка:', error);
    showNotification('Ошибка: ' + error.message);
    cleanupCall();
  }
}

// Завершить звонок
async function endCall() {
  console.log('🔚 Завершение звонка');
  
  if (currentCall) {
    await db.collection('calls').doc(currentCall).update({ status: 'ended' });
  }
  
  cleanupCall();
}

// Очистка звонка
function cleanupCall() {
  console.log('🧹 Очистка звонка');
  
  if (localStream) {
    localStream.getTracks().forEach(track => track.stop());
  }
  
  if (peerConnection) {
    peerConnection.close();
  }
  
  document.getElementById('callModal').classList.remove('show');
  document.getElementById('incomingCall').style.display = 'none';
  document.getElementById('videoContainer').style.display = 'none';
  document.getElementById('localVideo').srcObject = null;
  document.getElementById('remoteVideo').srcObject = null;
  
  if (callTimer) clearInterval(callTimer);
  stopRingtone();
  if (callStatusListener) callStatusListener();
  
  localStream = null;
  remoteStream = null;
  peerConnection = null;
  currentCall = null;
  callTimer = null;
  callStatusListener = null;
}

// Запустить таймер
function startCallTimer() {
  callStartTime = Date.now();
  callTimer = setInterval(() => {
    const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
    const minutes = Math.floor(elapsed / 60);
    const seconds = elapsed % 60;
    document.getElementById('callTimer').textContent = 
      `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
  }, 1000);
}

// Звук звонка
function playRingtone() {
  ringtoneAudio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
  ringtoneAudio.loop = true;
  ringtoneAudio.play().catch(e => console.log('Не удалось воспроизвести звонок'));
}

function stopRingtone() {
  if (ringtoneAudio) {
    ringtoneAudio.pause();
    ringtoneAudio = null;
  }
}

// Переключить звук
function toggleMute() {
  if (localStream) {
    const audioTrack = localStream.getAudioTracks()[0];
    if (audioTrack) {
      audioTrack.enabled = !audioTrack.enabled;
      document.getElementById('muteBtn').classList.toggle('muted');
      document.getElementById('muteBtn').innerHTML = audioTrack.enabled ? '🎤' : '🔇';
    }
  }
}

// Переключить видео
function toggleVideo() {
  if (localStream && callType === 'video') {
    const videoTrack = localStream.getVideoTracks()[0];
    if (videoTrack) {
      videoTrack.enabled = !videoTrack.enabled;
      document.getElementById('videoToggleBtn').classList.toggle('off');
      document.getElementById('videoToggleBtn').innerHTML = videoTrack.enabled ? '📹' : '🚫';
    }
  }
}

async function loadChatsList() {
  const chatsList = document.getElementById('chatsList');
  
  try {
    const chatsSnap = await db.collection('chats').get();
    const userChats = [];
    
    for (const doc of chatsSnap.docs) {
      const chat = doc.data();
      if (chat.participants && chat.participants.includes(currentUser.uid)) {
        const otherUserId = chat.participants.find(id => id !== currentUser.uid);
        if (!otherUserId) continue;
        if (blockedUsers.includes(otherUserId)) continue;
        
        const otherUserInfo = await getUserInfo(otherUserId);
        const isPinned = pinnedChats.includes(doc.id);
        
        userChats.push({
          id: doc.id,
          ...chat,
          otherUserId,
          otherUserInfo,
          isPinned
        });
      }
    }
    
    if (userChats.length === 0) {
      chatsList.innerHTML = '<div class="no-chats">Нет чатов</div>';
      return;
    }
    
    // Сортируем и отображаем
    let chatsHTML = '';
    userChats.sort((a, b) => {
      const timeA = a.lastMessageTime?.toDate?.() || new Date(0);
      const timeB = b.lastMessageTime?.toDate?.() || new Date(0);
      return timeB - timeA;
    });
    
    for (const chat of userChats) {
      chatsHTML += `
        <div class="chat-item fade" onclick="openChat('${chat.otherUserId}', '${chat.otherUserInfo.username}', '${chat.id}')">
          <div class="chat-avatar">${chat.otherUserInfo.username?.[0]?.toUpperCase() || 'U'}</div>
          <div class="chat-info">
            <div class="chat-user">@${chat.otherUser.username}</div>
            <div class="chat-preview">${chat.lastMessage || 'Нет сообщений'}</div>
            <div class="chat-time">${formatTimeAgo(chat.lastMessageTime?.toDate?.() || new Date())}</div>
          </div>
        </div>
      `;
    }
    
    chatsList.innerHTML = chatsHTML;
    
  } catch (error) {
    console.error('Ошибка загрузки чатов:', error);
    chatsList.innerHTML = '<div class="no-chats">Ошибка загрузки</div>';
  }
}

function formatTimeAgo(date) {
  if (!date) return 'только что';
  const diff = Date.now() - date;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'только что';
  if (mins < 60) return `${mins} мин назад`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours} ч назад`;
  const days = Math.floor(hours / 24);
  return `${days} д назад`;
}

function showNotification(message) {
  const notification = document.getElementById('notification');
  notification.textContent = message;
  notification.classList.add('show');
  setTimeout(() => notification.classList.remove('show'), 3000);
}

function logout() {
  if (confirm('Выйти из аккаунта?')) {
    auth.signOut().then(() => location.href = 'index.html');
  }
}

async function checkForAutoOpenChat() {
  const data = sessionStorage.getItem('openChatWith');
  if (data) {
    try {
      const { userId, username } = JSON.parse(data);
      sessionStorage.removeItem('openChatWith');
      setTimeout(() => openChat(userId, username), 500);
    } catch (e) {
      console.error('Ошибка автооткрытия чата:', e);
    }
  }
}

// Обработчики
document.getElementById('chatInput')?.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

</script>
