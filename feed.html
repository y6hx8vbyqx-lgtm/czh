<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лента - czhmass.com</title>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 10px;
        }

        /* iOS Динамический островок */
        .dynamic-island {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 35px;
            background: rgba(40, 40, 40, 0.95);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 15px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        .island-time {
            font-size: 15px;
            font-weight: 600;
            color: white;
        }

        /* Навигация */
        .navbar {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(28, 28, 30, 0.8);
            padding: 12px 20px;
            border-radius: 15px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 999;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: auto;
            white-space: nowrap;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-admin {
            background: linear-gradient(135deg, #805ad5, #6b46c1);
        }

        .btn-admin:hover {
            background: linear-gradient(135deg, #6b46c1, #553c9a);
        }

        .btn-logout {
            background: rgba(255, 59, 48, 0.2);
            color: #ff3b30;
            padding: 8px 14px;
        }

        .btn-logout:hover {
            background: rgba(255, 59, 48, 0.3);
        }

        /* Кнопка профиля - УЛУЧШЕННАЯ ДЛЯ МОБИЛЬНЫХ */
        .profile-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            min-width: auto;
        }

        .profile-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .profile-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: white;
            flex-shrink: 0;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .profile-username {
            font-size: 12px;
            font-weight: 600;
            color: white;
            line-height: 1.2;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .profile-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.2;
        }

        /* Основной контент */
        .container {
            padding: 140px 20px 100px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Форма создания поста */
        .create-post {
            background: rgba(28, 28, 30, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .post-input {
            width: 100%;
            min-height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 16px;
            color: white;
            font-size: 16px;
            resize: vertical;
            margin-bottom: 15px;
            font-family: inherit;
        }

        .post-input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.07);
        }

        .post-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: transform 0.2s, opacity 0.2s;
        }

        .post-button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .post-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Пост в стиле iOS */
        .post-ios {
            background: rgba(28, 28, 30, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .post-ios:hover {
            transform: translateY(-2px);
            background: rgba(35, 35, 37, 0.9);
        }

        /* Аватар и заголовок */
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            flex-shrink: 0;
        }

        .post-user {
            flex: 1;
        }

        .username {
            font-size: 17px;
            font-weight: 600;
            color: white;
            margin-bottom: 3px;
        }

        .post-time {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Текст поста */
        .post-content {
            font-size: 16px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Футер поста с лайками */
        .post-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        /* Лайки */
        .like-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .like-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 6px;
            border-radius: 12px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            user-select: none;
        }

        .like-btn:hover {
            background: rgba(255, 59, 48, 0.1);
            transform: scale(1.05);
        }

        .like-btn.liked {
            color: #ff3b30;
            background: rgba(255, 59, 48, 0.15);
        }

        .like-btn:not(.liked) {
            color: rgba(255, 255, 255, 0.6);
        }

        .like-count {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            min-width: 24px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        /* Кнопка удаления */
        .delete-post {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s, background 0.3s;
        }

        .post-ios:hover .delete-post {
            opacity: 1;
        }

        .delete-post:hover {
            background: rgba(255, 59, 48, 0.2);
        }

        /* ===== КОММЕНТАРИИ В СТИЛЕ INSTAGRAM ===== */
        .comments-section {
            margin-top: 15px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }

        .comments-toggle {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 500;
            padding: 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .comments-toggle:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        .comments-toggle svg {
            transition: transform 0.3s ease;
        }

        .comments-toggle.active svg {
            transform: rotate(180deg);
        }

        .comments-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .comments-list.expanded {
            max-height: 500px;
            overflow-y: auto;
        }

        .comment-item {
            display: flex;
            gap: 10px;
            padding: 12px 0;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #48c6ef, #6f86d6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: white;
            flex-shrink: 0;
        }

        .comment-content {
            flex: 1;
        }

        .comment-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }

        .comment-username {
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .comment-time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        .comment-text {
            font-size: 14px;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.9);
            word-wrap: break-word;
        }

        .delete-comment {
            background: none;
            border: none;
            color: rgba(255, 59, 48, 0.6);
            font-size: 12px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            opacity: 0;
            transition: all 0.2s;
        }

        .comment-item:hover .delete-comment {
            opacity: 1;
        }

        .delete-comment:hover {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
        }

        .comment-form {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            align-items: flex-start;
        }

        .comment-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 100px;
            font-family: inherit;
        }

        .comment-input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.07);
        }

        .comment-submit {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: transform 0.2s, opacity 0.2s;
            flex-shrink: 0;
        }

        .comment-submit:hover:not(:disabled) {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .comment-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Иконка комментариев в футере */
        .comment-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .comment-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.9);
        }

        .comment-count {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Сообщения */
        .message {
            position: fixed;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1001;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            display: none;
            max-width: 90%;
            text-align: center;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translate(-50%, -20px);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        .success {
            background: rgba(52, 199, 89, 0.15);
            color: #34c759;
            border-color: rgba(52, 199, 89, 0.3);
        }

        .error {
            background: rgba(255, 59, 48, 0.15);
            color: #ff3b30;
            border-color: rgba(255, 59, 48, 0.3);
        }

        /* Загрузка */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }

        /* Анимация лайка */
        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .like-pop {
            animation: heartPop 0.3s ease;
        }

        /* ===== УЛУЧШЕННАЯ МОБИЛЬНАЯ ВЕРСИЯ ===== */
        @media (max-width: 768px) {
            .navbar {
                width: 95%;
                top: 65px;
                padding: 10px 15px;
            }

            .container {
                padding: 130px 15px 80px;
            }

            .dynamic-island {
                width: 110px;
                height: 32px;
                top: 10px;
            }

            .post-ios {
                padding: 16px;
            }

            .nav-buttons {
                gap: 6px;
            }

            .btn {
                padding: 8px 12px;
                font-size: 13px;
            }

            .comment-form {
                flex-direction: column;
                gap: 8px;
            }

            .comment-input {
                width: 100%;
            }

            .comment-submit {
                width: 100%;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- Динамический островок с временем -->
    <div class="dynamic-island">
        <div class="island-time" id="currentTime">00:00</div>
    </div>

    <!-- Навигация -->
    <nav class="navbar">
        <div class="logo">czhmass.com</div>
        <div class="nav-buttons">
            <button class="btn btn-admin" onclick="showMessage('Админ-панель в разработке', 'info')">
                <span>👑 Админ</span>
            </button>
            <div class="profile-btn" id="profileBtn" onclick="showMessage('Профиль в разработке', 'info')">
                <div class="profile-avatar" id="userAvatar">U</div>
                <div class="profile-info">
                    <div class="profile-username" id="userName">Гость</div>
                    <div class="profile-label">Профиль</div>
                </div>
            </div>
            <button class="btn btn-logout" onclick="logout()">
                <span>Выйти</span>
            </button>
        </div>
    </nav>

    <!-- Сообщения -->
    <div class="message" id="message"></div>

    <!-- Основной контент -->
    <div class="container">
        <!-- Форма создания поста -->
        <div class="create-post">
            <textarea 
                class="post-input" 
                id="postInput" 
                placeholder="Что у вас нового?" 
                maxlength="1000"></textarea>
            <button class="post-button" id="postButton" onclick="createPost()">Опубликовать</button>
        </div>

        <!-- Лента постов -->
        <div id="feed"></div>
    </div>

    <script>
        // Конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCg7qL9lLgGQfSgJ5Y5q5Z5Z5Z5Z5Z5Z5Z5Z5",
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };

        // Инициализация Firebase
        let app, db, auth;
        let currentUser = null;

        try {
            app = firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            auth = firebase.auth();
            console.log("Firebase инициализирован");
        } catch (error) {
            console.error("Ошибка инициализации Firebase:", error);
            showMessage("Ошибка подключения к базе данных", "error");
        }

        // Обновление времени
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ru-RU', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            document.getElementById('currentTime').textContent = timeString;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Показать сообщение
        function showMessage(text, type = 'success') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
            
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 3000);
        }

        // Вход/выход пользователя (заглушка)
        function login() {
            currentUser = {
                uid: 'user_' + Date.now(),
                displayName: 'Пользователь ' + Math.floor(Math.random() * 1000),
                email: 'user@example.com'
            };
            updateUserInfo();
            showMessage('Вход выполнен успешно', 'success');
            loadPosts();
        }

        function logout() {
            currentUser = null;
            updateUserInfo();
            document.getElementById('feed').innerHTML = '';
            showMessage('Вы вышли из системы', 'success');
        }

        function updateUserInfo() {
            const userNameEl = document.getElementById('userName');
            const userAvatarEl = document.getElementById('userAvatar');
            
            if (currentUser) {
                const name = currentUser.displayName || 'Пользователь';
                userNameEl.textContent = name;
                userAvatarEl.textContent = name.charAt(0).toUpperCase();
                document.getElementById('postButton').disabled = false;
            } else {
                userNameEl.textContent = 'Гость';
                userAvatarEl.textContent = 'G';
                document.getElementById('postButton').disabled = true;
            }
        }

        // Создание поста
        async function createPost() {
            if (!currentUser) {
                showMessage('Войдите, чтобы опубликовать пост', 'error');
                return;
            }

            const postInput = document.getElementById('postInput');
            const content = postInput.value.trim();
            
            if (!content) {
                showMessage('Введите текст поста', 'error');
                return;
            }

            if (content.length > 1000) {
                showMessage('Пост слишком длинный (макс. 1000 символов)', 'error');
                return;
            }

            const button = document.getElementById('postButton');
            button.disabled = true;
            button.textContent = 'Публикация...';

            try {
                const postData = {
                    content: content,
                    authorId: currentUser.uid,
                    authorName: currentUser.displayName || 'Аноним',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: 0,
                    likedBy: [],
                    commentsCount: 0
                };

                // Здесь будет запись в Firestore
                // await db.collection('posts').add(postData);
                
                showMessage('Пост опубликован!', 'success');
                postInput.value = '';
                
                // Добавляем пост локально для демонстрации
                addPostToFeed({
                    id: 'post_' + Date.now(),
                    ...postData,
                    createdAt: new Date()
                });
                
            } catch (error) {
                console.error('Ошибка создания поста:', error);
                showMessage('Ошибка при публикации', 'error');
            } finally {
                button.disabled = false;
                button.textContent = 'Опубликовать';
            }
        }

        // Загрузка постов
        async function loadPosts() {
            const feedEl = document.getElementById('feed');
            feedEl.innerHTML = '<div class="loading">Загрузка ленты...</div>';

            try {
                // Здесь будет загрузка из Firestore
                // const snapshot = await db.collection('posts')
                //     .orderBy('createdAt', 'desc')
                //     .limit(20)
                //     .get();
                
                // Для демонстрации создаем тестовые посты
                setTimeout(() => {
                    const testPosts = [
                        {
                            id: 'post1',
                            content: 'Привет! Это первый пост в нашей социальной сети. Как вам дизайн? 🎨',
                            authorName: 'Администратор',
                            authorId: 'admin',
                            createdAt: new Date(Date.now() - 3600000),
                            likes: 15,
                            likedBy: [],
                            commentsCount: 3
                        },
                        {
                            id: 'post2',
                            content: 'Только что добавил систему комментариев! Теперь можно обсуждать посты как в Instagram 💬',
                            authorName: 'Разработчик',
                            authorId: 'dev',
                            createdAt: new Date(Date.now() - 7200000),
                            likes: 42,
                            likedBy: [],
                            commentsCount: 7
                        },
                        {
                            id: 'post3',
                            content: 'Кто уже пробовал новые функции? Пишите в комментариях ваши впечатления! 👇',
                            authorName: 'Тестировщик',
                            authorId: 'tester',
                            createdAt: new Date(Date.now() - 10800000),
                            likes: 28,
                            likedBy: [],
                            commentsCount: 12
                        }
                    ];
                    
                    feedEl.innerHTML = '';
                    testPosts.forEach(post => addPostToFeed(post));
                }, 1000);
                
            } catch (error) {
                console.error('Ошибка загрузки постов:', error);
                feedEl.innerHTML = '<div class="error">Ошибка загрузки ленты</div>';
            }
        }

        // Добавление поста в ленту
        function addPostToFeed(post) {
            const feedEl = document.getElementById('feed');
            
            const timeAgo = getTimeAgo(post.createdAt);
            const isAuthor = currentUser && currentUser.uid === post.authorId;
            
            const postEl = document.createElement('div');
            postEl.className = 'post-ios';
            postEl.id = `post-${post.id}`;
            
            postEl.innerHTML = `
                <div class="post-header">
                    <div class="user-avatar">${post.authorName.charAt(0).toUpperCase()}</div>
                    <div class="post-user">
                        <div class="username">${post.authorName}</div>
                        <div class="post-time">${timeAgo}</div>
                    </div>
                </div>
                
                <div class="post-content">${escapeHtml(post.content)}</div>
                
                <div class="post-footer">
                    <div class="like-container">
                        <button class="like-btn ${post.likedBy.includes(currentUser?.uid) ? 'liked' : ''}" 
                                onclick="toggleLike('${post.id}')">
                            ${post.likedBy.includes(currentUser?.uid) ? '❤️' : '🤍'}
                        </button>
                        <span class="like-count">${post.likes}</span>
                    </div>
                    
                    <button class="comment-btn" onclick="toggleComments('${post.id}')">
                        <span>💬</span>
                        <span class="comment-count">${post.commentsCount}</span>
                    </button>
                </div>
                
                ${isAuthor ? `
                    <button class="delete-post" onclick="deletePost('${post.id}')">
                        🗑️
                    </button>
                ` : ''}
                
                <!-- Секция комментариев -->
                <div class="comments-section" id="comments-${post.id}">
                    <button class="comments-toggle" onclick="toggleComments('${post.id}')">
                        <span>Комментарии (${post.commentsCount})</span>
                        <svg width="12" height="8" viewBox="0 0 12 8" fill="currentColor">
                            <path d="M1.41 0L6 4.58L10.59 0L12 1.41L6 7.41L0 1.41L1.41 0Z"/>
                        </svg>
                    </button>
                    
                    <div class="comments-list" id="comments-list-${post.id}">
                        <!-- Комментарии загружаются здесь -->
                    </div>
                    
                    <form class="comment-form" onsubmit="addComment('${post.id}'); return false;">
                        <textarea class="comment-input" id="comment-input-${post.id}" 
                                  placeholder="Добавить комментарий..." 
                                  maxlength="500" required></textarea>
                        <button type="submit" class="comment-submit" id="comment-submit-${post.id}">
                            ➤
                        </button>
                    </form>
                </div>
            `;
            
            // Вставляем пост в начало ленты
            if (feedEl.firstChild) {
                feedEl.insertBefore(postEl, feedEl.firstChild);
            } else {
                feedEl.appendChild(postEl);
            }
            
            // Загружаем комментарии для этого поста
            loadComments(post.id);
        }

        // Функции для комментариев
        async function loadComments(postId) {
            const commentsList = document.getElementById(`comments-list-${postId}`);
            
            try {
                // Здесь будет загрузка комментариев из Firestore
                // const snapshot = await db.collection('posts').doc(postId)
                //     .collection('comments').orderBy('createdAt').get();
                
                // Тестовые комментарии для демонстрации
                const testComments = postId === 'post1' ? [
                    {
                        id: 'comment1',
                        text: 'Отличный дизайн! Очень похоже на iOS',
                        authorName: 'Дизайнер',
                        authorId: 'designer',
                        createdAt: new Date(Date.now() - 1800000)
                    },
                    {
                        id: 'comment2',
                        text: 'Нравится темная тема',
                        authorName: 'Пользователь',
                        authorId: 'user1',
                        createdAt: new Date(Date.now() - 2400000)
                    },
                    {
                        id: 'comment3',
                        text: 'Когда будут стикеры? 😄',
                        authorName: 'Весёлый',
                        authorId: 'funny',
                        createdAt: new Date(Date.now() - 3000000)
                    }
                ] : postId === 'post2' ? [
                    {
                        id: 'comment4',
                        text: 'Крутая функция! Теперь можно общаться',
                        authorName: 'Комментатор',
                        authorId: 'commenter',
                        createdAt: new Date(Date.now() - 3600000)
                    },
                    {
                        id: 'comment5',
                        text: 'Работает очень плавно, молодцы!',
                        authorName: 'Технолог',
                        authorId: 'tech',
                        createdAt: new Date(Date.now() - 4200000)
                    }
                ] : [];
                
                commentsList.innerHTML = '';
                
                if (testComments.length === 0) {
                    commentsList.innerHTML = '<div style="padding: 20px; text-align: center; color: rgba(255,255,255,0.5);">Пока нет комментариев</div>';
                    return;
                }
                
                testComments.forEach(comment => {
                    const commentEl = document.createElement('div');
                    commentEl.className = 'comment-item';
                    commentEl.id = `comment-${comment.id}`;
                    
                    const timeAgo = getTimeAgo(comment.createdAt);
                    const isAuthor = currentUser && currentUser.uid === comment.authorId;
                    
                    commentEl.innerHTML = `
                        <div class="comment-avatar">${comment.authorName.charAt(0).toUpperCase()}</div>
                        <div class="comment-content">
                            <div class="comment-header">
                                <div class="comment-username">${comment.authorName}</div>
                                <div class="comment-time">${timeAgo}</div>
                            </div>
                            <div class="comment-text">${escapeHtml(comment.text)}</div>
                        </div>
                        ${isAuthor ? `
                            <button class="delete-comment" onclick="deleteComment('${postId}', '${comment.id}')">
                                ✕
                            </button>
                        ` : ''}
                    `;
                    
                    commentsList.appendChild(commentEl);
                });
                
            } catch (error) {
                console.error('Ошибка загрузки комментариев:', error);
                commentsList.innerHTML = '<div style="color: #ff3b30; padding: 10px;">Ошибка загрузки комментариев</div>';
            }
        }

        async function addComment(postId) {
            if (!currentUser) {
                showMessage('Войдите, чтобы комментировать', 'error');
                return;
            }

            const input = document.getElementById(`comment-input-${postId}`);
            const text = input.value.trim();
            
            if (!text) {
                showMessage('Введите текст комментария', 'error');
                return;
            }

            if (text.length > 500) {
                showMessage('Комментарий слишком длинный (макс. 500 символов)', 'error');
                return;
            }

            const button = document.getElementById(`comment-submit-${postId}`);
            button.disabled = true;

            try {
                const commentData = {
                    text: text,
                    authorId: currentUser.uid,
                    authorName: currentUser.displayName || 'Аноним',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    postId: postId
                };

                // Здесь будет запись в Firestore
                // await db.collection('posts').doc(postId).collection('comments').add(commentData);
                // await db.collection('posts').doc(postId).update({
                //     commentsCount: firebase.firestore.FieldValue.increment(1)
                // });
                
                // Добавляем комментарий локально
                const commentsList = document.getElementById(`comments-list-${postId}`);
                const commentId = 'comment_' + Date.now();
                
                const commentEl = document.createElement('div');
                commentEl.className = 'comment-item';
                commentEl.id = `comment-${commentId}`;
                
                commentEl.innerHTML = `
                    <div class="comment-avatar">${commentData.authorName.charAt(0).toUpperCase()}</div>
                    <div class="comment-content">
                        <div class="comment-header">
                            <div class="comment-username">${commentData.authorName}</div>
                            <div class="comment-time">только что</div>
                        </div>
                        <div class="comment-text">${escapeHtml(text)}</div>
                    </div>
                    <button class="delete-comment" onclick="deleteComment('${postId}', '${commentId}')">
                        ✕
                    </button>
                `;
                
                // Если список пустой, очищаем сообщение "нет комментариев"
                if (commentsList.innerHTML.includes('Пока нет комментариев')) {
                    commentsList.innerHTML = '';
                }
                
                commentsList.appendChild(commentEl);
                
                // Обновляем счетчик комментариев
                const commentBtn = document.querySelector(`#post-${postId} .comment-count`);
                const commentsToggle = document.querySelector(`#post-${postId} .comments-toggle span`);
                
                const currentCount = parseInt(commentBtn.textContent) || 0;
                const newCount = currentCount + 1;
                
                commentBtn.textContent = newCount;
                commentsToggle.textContent = `Комментарии (${newCount})`;
                
                showMessage('Комментарий добавлен', 'success');
                input.value = '';
                
                // Автоматически раскрываем комментарии
                toggleComments(postId, true);
                
            } catch (error) {
                console.error('Ошибка добавления комментария:', error);
                showMessage('Ошибка при добавлении комментария', 'error');
            } finally {
                button.disabled = false;
            }
        }

        async function deleteComment(postId, commentId) {
            if (!confirm('Удалить комментарий?')) return;

            try {
                // Здесь будет удаление из Firestore
                // await db.collection('posts').doc(postId).collection('comments').doc(commentId).delete();
                // await db.collection('posts').doc(postId).update({
                //     commentsCount: firebase.firestore.FieldValue.increment(-1)
                // });
                
                // Удаляем локально
                const commentEl = document.getElementById(`comment-${commentId}`);
                if (commentEl) {
                    commentEl.remove();
                }
                
                // Обновляем счетчик
                const commentBtn = document.querySelector(`#post-${postId} .comment-count`);
                const commentsToggle = document.querySelector(`#post-${postId} .comments-toggle span`);
                
                const currentCount = parseInt(commentBtn.textContent) || 0;
                const newCount = Math.max(0, currentCount - 1);
                
                commentBtn.textContent = newCount;
                commentsToggle.textContent = `Комментарии (${newCount})`;
                
                showMessage('Комментарий удален', 'success');
                
            } catch (error) {
                console.error('Ошибка удаления комментария:', error);
                showMessage('Ошибка при удалении комментария', 'error');
            }
        }

        function toggleComments(postId, forceOpen = false) {
            const commentsList = document.getElementById(`comments-list-${postId}`);
            const toggleBtn = document.querySelector(`#comments-${postId} .comments-toggle`);
            
            if (forceOpen || !commentsList.classList.contains('expanded')) {
                commentsList.classList.add('expanded');
                toggleBtn.classList.add('active');
                
                // Прокручиваем к комментариям на мобильных
                if (window.innerWidth < 768) {
                    commentsList.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            } else {
                commentsList.classList.remove('expanded');
                toggleBtn.classList.remove('active');
            }
        }

        // Функции для лайков
        async function toggleLike(postId) {
            if (!currentUser) {
                showMessage('Войдите, чтобы ставить лайки', 'error');
                return;
            }

            const likeBtn = document.querySelector(`#post-${postId} .like-btn`);
            const likeCount = document.querySelector(`#post-${postId} .like-count`);
            
            const isLiked = likeBtn.classList.contains('liked');
            const currentLikes = parseInt(likeCount.textContent) || 0;
            
            try {
                if (isLiked) {
                    // Убираем лайк
                    // await db.collection('posts').doc(postId).update({
                    //     likes: firebase.firestore.FieldValue.increment(-1),
                    //     likedBy: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
                    // });
                    
                    likeBtn.classList.remove('liked');
                    likeBtn.innerHTML = '🤍';
                    likeCount.textContent = currentLikes - 1;
                } else {
                    // Ставим лайк
                    // await db.collection('posts').doc(postId).update({
                    //     likes: firebase.firestore.FieldValue.increment(1),
                    //     likedBy: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
                    // });
                    
                    likeBtn.classList.add('liked');
                    likeBtn.innerHTML = '❤️';
                    likeCount.textContent = currentLikes + 1;
                    
                    // Анимация
                    likeBtn.classList.add('like-pop');
                    setTimeout(() => likeBtn.classList.remove('like-pop'), 300);
                }
                
            } catch (error) {
                console.error('Ошибка обновления лайка:', error);
                showMessage('Ошибка при обновлении лайка', 'error');
            }
        }

        async function deletePost(postId) {
            if (!confirm('Удалить этот пост?')) return;

            try {
                // Здесь будет удаление из Firestore
                // await db.collection('posts').doc(postId).delete();
                
                // Удаляем локально
                const postEl = document.getElementById(`post-${postId}`);
                if (postEl) {
                    postEl.remove();
                    showMessage('Пост удален', 'success');
                }
                
            } catch (error) {
                console.error('Ошибка удаления поста:', error);
                showMessage('Ошибка при удалении поста', 'error');
            }
        }

        // Вспомогательные функции
        function getTimeAgo(date) {
            const now = new Date();
            const diff = now - new Date(date);
            
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return 'только что';
            if (minutes < 60) return `${minutes} мин назад`;
            if (hours < 24) return `${hours} ч назад`;
            if (days < 7) return `${days} дн назад`;
            
            return new Date(date).toLocaleDateString('ru-RU');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            updateUserInfo();
            login(); // Автоматический вход для демонстрации
        });
    </script>
</body>
