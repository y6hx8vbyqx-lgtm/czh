<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>

<style>
:root{
  --bg:#000;
  --card:rgba(28,28,30,.9);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
}
.fade-in{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);backdrop-filter:blur(16px);
  border-radius:18px;padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}
.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}

.container{
  max-width:480px;margin:auto;
  padding:130px 14px 80px;
}

.create{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:16px;
}
.create textarea{
  width:100%;min-height:90px;
  background:#1c1c1e;border:1px solid var(--border);
  border-radius:16px;padding:12px;color:#fff;
}

.preview{
  position:relative;
  margin-top:10px;
}
.preview img{
  width:100%;
  border-radius:16px;
}
.preview .remove{
  position:absolute;
  top:8px;
  right:8px;
  background:rgba(0,0,0,.6);
  border:none;
  color:#fff;
  border-radius:50%;
  width:28px;
  height:28px;
  font-size:16px;
}

.create-actions{
  display:flex;
  gap:8px;
  margin-top:12px;
}
.photo-btn{
  flex:1;
  background:#1c1c1e;
  border:none;
  border-radius:16px;
  color:#fff;
  font-size:18px;
}
.publish-btn{
  flex:2;
  background:var(--accent);
  border:none;
  border-radius:16px;
  color:#fff;
  font-weight:600;
}

.post{
  background:var(--card);
  border-radius:24px;
  padding:16px;
  margin-bottom:14px;
}
.post-header{
  display:flex;align-items:center;gap:10px;
}
.avatar{
  width:42px;height:42px;border-radius:14px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;
}
.post-user{font-weight:600}
.post-time{color:var(--sub);font-size:13px}
.post-text{margin:10px 0}
.post img{
  width:100%;
  border-radius:16px;
  margin-top:8px;
}
.post-actions{
  display:flex;gap:18px;margin-top:6px;
}
.action{
  background:none;border:none;
  color:var(--sub);font-size:18px;
}
.action.liked{color:#ff2d55}
.trash{
  margin-left:auto;
  background:none;border:none;
  color:var(--danger);font-size:18px;
}
</style>
</head>

<body>

<div class="dynamic-island" id="time"></div>

<div class="navbar">
  <div class="logo">czhmass</div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="location.href='profile.html'">👤</button>
    <button class="nav-btn" id="adminBtn" style="display:none" onclick="location.href='admin.html'">👑</button>
    <button class="nav-btn" onclick="logout()">🚪</button>
  </div>
</div>

<div class="container">
  <div class="create">
    <textarea id="postText" placeholder="Что у вас нового? Пишите анонимно..."></textarea>

    <div class="preview" id="imagePreview"></div>

    <div class="create-actions">
      <button class="photo-btn" onclick="postImage.click()">📷</button>
      <button class="publish-btn" onclick="createPost()">📝 Опубликовать</button>
    </div>

    <input type="file" id="postImage" accept="image/*" hidden>
  </div>

  <div id="feed"></div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
  authDomain:"czhmass.firebaseapp.com",
  projectId:"czhmass",
  storageBucket:"czhmass.appspot.com"
});

const db=firebase.firestore();
const auth=firebase.auth();
const storage=firebase.storage();

let currentUser,userData;
let imageFile=null;

auth.onAuthStateChanged(async u=>{
  if(!u) location.href="index.html";
  currentUser=u;
  const snap=await db.collection("users").doc(u.uid).get();
  userData=snap.data()||{};
  if(userData.isAdmin) adminBtn.style.display="block";
  loadPosts();
});

postImage.onchange=()=>{
  imagePreview.innerHTML="";
  imageFile=postImage.files[0];
  if(!imageFile) return;

  const img=document.createElement("img");
  img.src=URL.createObjectURL(imageFile);

  const btn=document.createElement("button");
  btn.className="remove";
  btn.textContent="✕";
  btn.onclick=()=>{
    imageFile=null;
    postImage.value="";
    imagePreview.innerHTML="";
  };

  imagePreview.appendChild(img);
  imagePreview.appendChild(btn);
};

async function createPost(){
  if(!postText.value.trim() && !imageFile) return;

  let imageUrl=null;

  if(imageFile){
    const ref=storage.ref(`posts/${currentUser.uid}_${Date.now()}`);
    await ref.put(imageFile);
    imageUrl=await ref.getDownloadURL();
  }

  await db.collection("posts").add({
    text:postText.value,
    image:imageUrl,
    userId:currentUser.uid,
    username:userData.username,
    createdAt:new Date(),
    likes:0,
    likedBy:[],
    commentsCount:0
  });

  postText.value="";
  imageFile=null;
  imagePreview.innerHTML="";
  loadPosts();
}

async function loadPosts(){
  feed.innerHTML="";
  const snap=await db.collection("posts").orderBy("createdAt","desc").get();
  snap.forEach(doc=>{
    const p=doc.data();
    feed.innerHTML+=`
    <div class="post fade-in">
      <div class="post-header">
        <div class="avatar">${p.username?.[0]||"A"}</div>
        <div>
          <div class="post-user">@${p.username||"anon"}</div>
          <div class="post-time">${new Date(p.createdAt.seconds*1000).toLocaleString()}</div>
        </div>
      </div>
      <div class="post-text">${p.text||""}</div>
      ${p.image?`<img src="${p.image}">`:""}
    </div>`;
  });
}

function logout(){
  auth.signOut().then(()=>location.href="index.html");
}

setInterval(()=>{
  time.textContent=new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
},1000);
</script>

</body>
</html>
