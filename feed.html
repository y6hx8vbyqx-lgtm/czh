<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
body { background:#000; color:#fff; font-family:system-ui; margin:0 }
.container { max-width:500px; margin:auto; padding:20px }
.post { background:#111; padding:16px; border-radius:16px; margin-bottom:14px }
.actions { display:flex; gap:16px; margin-top:10px }
button { background:none; border:none; color:#fff; cursor:pointer }
.modal {
  position:fixed; inset:0; background:#000;
  display:none; flex-direction:column;
}
.modal-header { padding:16px; border-bottom:1px solid #222 }
.modal-body { flex:1; overflow:auto; padding:16px }
.modal-footer { padding:16px; border-top:1px solid #222 }
.comment { padding:10px 0; border-bottom:1px solid #222 }
</style>
</head>

<body>

<div class="container">
  <textarea id="postInput" placeholder="Что нового?" style="width:100%;height:80px"></textarea>
  <button onclick="createPost()">Опубликовать</button>
  <div id="feed"></div>
</div>

<!-- COMMENTS MODAL -->
<div class="modal" id="commentsModal">
  <div class="modal-header">
    <button onclick="closeComments()">✕</button>
  </div>
  <div class="modal-body" id="commentsBody"></div>
  <div class="modal-footer">
    <input id="commentInput" placeholder="Комментарий..." style="width:80%">
    <button onclick="addComment()">Отправить</button>
  </div>
</div>

<script>
/* ================= FIREBASE ================= */
firebase.initializeApp({
  apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
  authDomain: "czhmass.firebaseapp.com",
  projectId: "czhmass"
});

const db = firebase.firestore();
const auth = firebase.auth();

/* ================= STATE ================= */
let currentUser = null;
let postsCache = new Map();
let currentPostId = null;

/* ================= AUTH ================= */
auth.onAuthStateChanged(user => {
  if (!user) return location.href = "index.html";
  currentUser = user;
  loadPosts();
});

/* ================= POSTS ================= */
async function loadPosts() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "Загрузка...";
  const snap = await db.collection("posts").orderBy("createdAt","desc").get();
  feed.innerHTML = "";

  snap.forEach(doc => {
    const post = doc.data();
    postsCache.set(doc.id, post);

    const el = document.createElement("div");
    el.className = "post";
    el.innerHTML = `
      <div>${post.text}</div>
      <div class="actions">
        <button onclick="toggleLike('${doc.id}')">❤️ ${post.likes||0}</button>
        <button onclick="openComments('${doc.id}')">💬 ${post.commentsCount||0}</button>
      </div>
    `;
    feed.appendChild(el);
  });
}

async function createPost() {
  const text = postInput.value.trim();
  if (!text) return;
  await db.collection("posts").add({
    text,
    userId: currentUser.uid,
    createdAt: new Date(),
    likes:0,
    commentsCount:0
  });
  postInput.value = "";
  loadPosts();
}

async function toggleLike(id) {
  const ref = db.collection("posts").doc(id);
  await ref.update({ likes: firebase.firestore.FieldValue.increment(1) });
  loadPosts();
}

/* ================= COMMENTS ================= */
function openComments(postId) {
  currentPostId = postId;
  commentsModal.style.display = "flex";
  loadComments();
}

function closeComments() {
  commentsModal.style.display = "none";
  currentPostId = null;
}

async function loadComments() {
  const body = document.getElementById("commentsBody");
  body.innerHTML = "";

  const snap = await db.collection("posts")
    .doc(currentPostId)
    .collection("comments")
    .orderBy("createdAt")
    .get();

  if (snap.empty) {
    body.innerHTML = "Комментариев нет";
    return;
  }

  snap.forEach(doc => {
    const c = doc.data();
    const el = document.createElement("div");
    el.className = "comment";
    el.textContent = c.text;
    body.appendChild(el);
  });
}

async function addComment() {
  const text = commentInput.value.trim();
  if (!text) return;

  await db.collection("posts")
    .doc(currentPostId)
    .collection("comments")
    .add({
      text,
      userId: currentUser.uid,
      createdAt: new Date()
    });

  await db.collection("posts")
    .doc(currentPostId)
    .update({
      commentsCount: firebase.firestore.FieldValue.increment(1)
    });

  commentInput.value = "";
  loadComments();
  loadPosts();
}
</script>

</body>
</html>
