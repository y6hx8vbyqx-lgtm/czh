<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>czhmass • Социальная сеть</title>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    
    <style>
        /* ================ ОСНОВНЫЕ ПЕРЕМЕННЫЕ ================ */
        :root {
            --bg: #000000;
            --bg-secondary: #0c0c0e;
            --card: rgba(28, 28, 30, 0.95);
            --card-hover: rgba(44, 44, 46, 0.95);
            --border: #1f1f1f;
            --border-light: #2c2c2e;
            --text: #ffffff;
            --text-secondary: #9a9a9a;
            --text-tertiary: #6c6c70;
            --accent-gradient: linear-gradient(135deg, #667eea, #764ba2);
            --accent-start: #667eea;
            --accent-end: #764ba2;
            --accent: #667eea;
            --danger: #ff453a;
            --danger-light: #ff6961;
            --success: #30d158;
            --warning: #ff9f0a;
            --info: #5ac8fa;
            --hashtag: #5ac8fa;
            --like: #ff2d55;
            --repost: #64d2ff;
            --view: #8e8e93;
            --verified: #5ac8fa;
            --pin: #ffcc00;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --radius-full: 999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        /* ================ АНИМАЦИИ ================ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .fade-in {
            animation: fadeIn 0.3s ease forwards;
        }

        .slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .pulse {
            animation: pulse 0.3s ease;
        }

        /* ================ СНЕЖИНКИ ================ */
        #snowflakes-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .snowflake {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            opacity: 0;
            animation-name: fall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .snowflake-small {
            width: 3px;
            height: 3px;
            background-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.3);
        }

        .snowflake-medium {
            width: 5px;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        }

        .snowflake-large {
            width: 7px;
            height: 7px;
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.6);
        }

        @keyframes fall {
            0% {
                transform: translateY(-10px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.9;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ================ DYNAMIC ISLAND ================ */
        .dynamic-island {
            position: fixed;
            top: max(12px, env(safe-area-inset-top, 12px));
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 36px;
            background: rgba(20, 20, 22, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0 18px;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 10000;
            font-weight: 600;
            font-size: 15px;
            color: white;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .dynamic-island:hover {
            background: rgba(30, 30, 32, 0.95);
            width: 140px;
        }

        .island-time {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .island-battery {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* ================ НАВИГАЦИОННАЯ ПАНЕЛЬ ================ */
        .navbar {
            position: fixed;
            top: max(60px, env(safe-area-inset-top, 60px));
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 500px;
            height: 56px;
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: var(--shadow-md);
            z-index: 9999;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logo::after {
            content: "β";
            font-size: 12px;
            font-weight: 600;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.8;
            margin-left: 2px;
        }

        .nav-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-button {
            background: rgba(255, 255, 255, 0.05);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .nav-button:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .nav-button:active {
            transform: translateY(1px);
        }

        /* ================ ТАБ-БАР (НИЖНЯЯ НАВИГАЦИЯ) ================ */
        .tab-bar {
            position: fixed;
            bottom: max(16px, env(safe-area-inset-bottom, 16px));
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 500px;
            height: 70px;
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 12px;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: var(--shadow-lg);
            z-index: 9998;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 22px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.2s ease;
            position: relative;
            flex: 1;
        }

        .tab-item.active {
            color: white;
            background: rgba(102, 126, 234, 0.15);
        }

        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background: var(--accent-start);
            border-radius: 50%;
        }

        .tab-label {
            font-size: 11px;
            font-weight: 500;
            color: inherit;
        }

        .tab-badge {
            position: absolute;
            top: 2px;
            right: 12px;
            background: var(--danger);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 12px;
            min-width: 18px;
            text-align: center;
        }

        /* ================ ОСНОВНОЙ КОНТЕЙНЕР ================ */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 120px 16px 100px;
            position: relative;
            z-index: 10;
        }

        /* ================ СОЗДАНИЕ ПОСТА ================ */
        .create-post-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 18px;
            margin-bottom: 20px;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .create-post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .create-post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .create-post-input-wrapper {
            flex: 1;
            position: relative;
        }

        .create-post-textarea {
            width: 100%;
            min-height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px;
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: all 0.2s ease;
            line-height: 1.5;
        }

        .create-post-textarea:focus {
            outline: none;
            border-color: var(--accent-start);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .create-post-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
        }

        .post-char-counter {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-full);
        }

        .post-char-counter.warning {
            color: var(--warning);
        }

        .post-char-counter.danger {
            color: var(--danger);
        }

        .create-post-button {
            background: var(--accent-gradient);
            border: none;
            color: white;
            font-weight: 700;
            padding: 12px 28px;
            border-radius: var(--radius-full);
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .create-post-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .create-post-button:active:not(:disabled) {
            transform: translateY(1px);
        }

        .create-post-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* ================ ПОИСК ================ */
        .search-section {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 18px;
            margin-bottom: 20px;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .search-input-container {
            position: relative;
            width: 100%;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 18px;
            z-index: 2;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            padding: 14px 20px 14px 50px;
            color: var(--text);
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-start);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-results {
            margin-top: 16px;
            max-height: 280px;
            overflow-y: auto;
            display: none;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }

        .search-results.show {
            display: block;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 0.5px solid transparent;
        }

        .search-result-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateX(4px);
        }

        .search-result-avatar {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: white;
        }

        .search-result-info {
            flex: 1;
        }

        .search-result-username {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .search-result-bio {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .no-results {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* ================ КАРТОЧКА ПОСТА ================ */
        .post-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 18px;
            margin-bottom: 16px;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        .post-card:hover {
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .post-card.highlighted {
            border: 2px solid var(--accent-start);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.2);
        }

        .post-pinned-badge {
            position: absolute;
            top: -8px;
            left: 20px;
            background: var(--pin);
            color: black;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-sm);
            z-index: 5;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            position: relative;
        }

        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .post-avatar:hover {
            transform: scale(1.05);
        }

        .post-author-info {
            flex: 1;
        }

        .post-author-name {
            font-weight: 700;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .post-author-name:hover {
            opacity: 0.8;
        }

        .verified-badge {
            color: var(--verified);
            font-size: 14px;
            background: rgba(90, 200, 250, 0.1);
            padding: 2px 6px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .post-time {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .post-visibility {
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
        }

        .post-actions-menu {
            position: absolute;
            top: 18px;
            right: 18px;
            display: flex;
            gap: 8px;
        }

        .post-menu-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .post-menu-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .post-menu-btn.danger:hover {
            background: rgba(255, 69, 58, 0.2);
            color: var(--danger);
        }

        .post-content {
            margin-bottom: 18px;
            font-size: 16px;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
            color: var(--text);
            padding: 0 4px;
        }

        .hashtag-link {
            color: var(--hashtag);
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
            text-decoration: none;
            display: inline-block;
            padding: 2px 4px;
            border-radius: 8px;
            background: rgba(90, 200, 250, 0.05);
        }

        .hashtag-link:hover {
            opacity: 0.7;
            background: rgba(90, 200, 250, 0.1);
        }

        .post-media {
            margin-top: 14px;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .post-media img {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
        }

        .post-stats {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 14px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin-bottom: 14px;
        }

        .post-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .post-stat-value {
            color: var(--text);
            font-weight: 700;
        }

        .post-actions-bar {
            display: flex;
            align-items: center;
            justify-content: space-around;
            margin-top: 8px;
        }

        .post-action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            padding: 10px 16px;
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .post-action-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .post-action-btn.liked {
            color: var(--like);
        }

        .post-action-btn.reposted {
            color: var(--repost);
        }

        .post-action-btn.viewed {
            color: var(--view);
        }

        /* ================ КОММЕНТАРИИ ================ */
        .comments-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .comments-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;

        if (!firebase.apps.length) {

            ignoreUndefinedProperties: true
        });

        /**
         * Показывает глобальное сообщение
         */
        function showMessage(text, type = 'info', duration = 3000) {
            const msg = document.getElementById('globalMessage');
            if (!msg) return;
            
            msg.textContent = text;
            msg.className = 'global-message ' + type;
            msg.style.display = 'flex';
            
            setTimeout(() => {
                msg.style.display = 'none';
            }, duration);
        }

        /**
         * Форматирует дату
         */
        function formatDate(timestamp) {
            if (!timestamp) return 'только что';
            
            let date;
            if (timestamp.toDate) {
                date = timestamp.toDate();
            } else if (timestamp.seconds) {
                date = new Date(timestamp.seconds * 1000);
            } else {
                date = new Date(timestamp);
            }
            
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            
            if (diff < 10) return 'только что';
            if (diff < 60) return `${diff} сек назад`;
            if (diff < 3600) return `${Math.floor(diff / 60)} мин назад`;
            if (diff < 86400) return `${Math.floor(diff / 3600)} ч назад`;
            if (diff < 604800) return `${Math.floor(diff / 86400)} д назад`;
            
            return date.toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });
        }

         * Экранирует HTML
         */

            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /**
         * Парсит хештеги из текста
         */
        function parseHashtags(text) {
            if (!text) return [];
            const regex = /#[\wа-яё]+/gi;
            return (text.match(regex) || []).map(tag => tag.toLowerCase());
        }

        /**
         * Форматирует текст с хештегами
         */
        function formatHashtags(text) {
            if (!text) return '';
            const regex = /(#[\wа-яё]+)/gi;
            return text.replace(regex, '<span class="hashtag-link" onclick="event.stopPropagation(); searchHashtag(\'$1\')">$1</span>');
        }

        /**
         * Дебаунс для поиска
         */
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // 4. РАБОТА С ПОЛЬЗОВАТЕЛЯМИ
        // ============================================
        
        /**
         * Получает данные пользователя по ID
         */
        async function getUserById(userId) {
            if (!userId) return null;
            
            // Проверяем кэш
            if (usersCache.has(userId)) {
                return usersCache.get(userId);
            }
            
            try {
                const doc = await db.collection('users').doc(userId).get();
                if (doc.exists) {
                    const userData = doc.data();
                    usersCache.set(userId, userData);
                    return userData;
                }
            } catch (error) {
                console.error('Ошибка получения пользователя:', error);
            }
            
            return null;
        }

        /**
         * Обновляет профиль пользователя
         */
        async function updateUserProfile(userId, data) {
            if (!userId || !data) return false;
            
            try {
                await db.collection('users').doc(userId).update({
                    ...data,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Обновляем кэш
                const userData = await getUserById(userId);
                usersCache.set(userId, { ...userData, ...data });
                
                return true;
            } catch (error) {
                console.error('Ошибка обновления профиля:', error);
                return false;
            }
        }

        /**

         */
        async function deletePost(postId, authorId) {
            if (!currentUser) {
                showMessage('Требуется авторизация', 'error');
                return;
            }

            // КРИТИЧЕСКИ ВАЖНО: Проверяем, что пользователь - автор поста
            if (currentUser.uid !== authorId) {
                showMessage('Вы не можете удалить этот пост', 'error');
                return;
            }

            // Показываем модальное окно подтверждения
            document.getElementById('modalTitle').textContent = 'Удаление поста';
            document.getElementById('modalText').textContent = 'Вы уверены, что хотите удалить этот пост? Это действие нельзя отменить.';
            
            const modal = document.getElementById('confirmModal');
            const confirmBtn = document.getElementById('modalConfirmBtn');
            
            modal.classList.add('show');
            
            // Убираем старые обработчики и добавляем новый
            confirmBtn.replaceWith(confirmBtn.cloneNode(true));
            const newConfirmBtn = document.getElementById('modalConfirmBtn');
            
            newConfirmBtn.onclick = async () => {
                try {
                    showMessage('Удаление...', 'info', 0);
                    
                    // Удаляем пост
                    await db.collection('posts').doc(postId).delete();
                    
                    // Удаляем все комментарии к посту
                    const commentsSnapshot = await db.collection('posts')
                        .doc(postId)
                        .collection('comments')
                        .get();
                    
                    const batch = db.batch();
                    commentsSnapshot.docs.forEach(doc => {
                        batch.delete(doc.ref);
                    });
                    
                    if (commentsSnapshot.size > 0) {
                        await batch.commit();
                    }
                    
                    // Удаляем все лайки/репосты связанные с постом
                    const interactionsSnapshot = await db.collection('interactions')
                        .where('postId', '==', postId)
                        .get();
                    
                    const interactionBatch = db.batch();
                    interactionsSnapshot.docs.forEach(doc => {
                        interactionBatch.delete(doc.ref);
                    });
                    
                    if (interactionsSnapshot.size > 0) {
                        await interactionBatch.commit();
                    }
                    
                    showMessage('Пост успешно удален', 'success');
                    
                    // Перезагружаем ленту в зависимости от текущей вкладки
                    if (currentTab === 'feed') {
                        loadFeed();
                    } else if (currentTab === 'profile' && currentProfileId === currentUserId) {
                        loadUserProfile(currentUserId);
                    } else if (currentHashtag) {
                        searchHashtag(currentHashtag);
                    }
                    
                } catch (error) {
                    console.error('Ошибка удаления поста:', error);
                    showMessage('Ошибка при удалении: ' + error.message, 'error');
                } finally {
                    modal.classList.remove('show');
                }
            };
            
            // Закрытие модалки по клику вне
            modal.onclick = (e) => {
                if (e.target === modal) {
                    modal.classList.remove('show');
                }
            };
        }

                const likedBy = postData.likedBy || [];

                if (isLiked) {
                    await postRef.update({

                        likedBy: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
                    });
                } else {
                    await postRef.update({
                        likes: firebase.firestore.FieldValue.increment(1),
                        likedBy: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
                    });
                    
                    // Создаем уведомление автору поста
                    if (postData.authorId !== currentUser.uid) {

                            userId: postData.authorId,
                            type: 'like',
                            postId: postId,
                            fromUserId: currentUser.uid,
                            fromUsername: currentUsername,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            isRead: false
                        });

                    const currentCount = parseInt(count.textContent) || 0;
                    count.textContent = isLiked ? currentCount - 1 : currentCount + 1;
                    likeBtn.classList.toggle('liked');

                console.error('Ошибка лайка:', error);
                showMessage('Ошибка', 'error');
            }

        /**
         * Рендеринг поста
         */
        function renderPost(post, postId) {
            const time = formatDate(post.createdAt);
            const isAuthor = currentUser && post.authorId === currentUser.uid;
            const isLiked = currentUser && post.likedBy?.includes(currentUser.uid);

        /**

        function updateCharCounter(textarea) {
            const counter = document.getElementById('postCharCount');
            if (counter) {
                const length = textarea.value.length;
                counter.textContent = `${length}/1000`;
                
                counter.classList.remove('warning', 'danger');

        const debounceSearchUsers = debounce(async function() {
            const input = document.getElementById('searchInput');
            const resultsDiv = document.getElementById('searchResults');
            
            if (!input || !resultsDiv) return;
            
            const query = input.value.trim();
            
            if (!query || query.length < 2) {
                resultsDiv.classList.remove('show');
                return;
            }

            try {
                const snapshot = await db.collection('users')
                    .where('username_lower', '>=', query.toLowerCase())
                    .where('username_lower', '<=', query.toLowerCase() + '\uf8ff')
                    .limit(10)
                    .get();

                if (snapshot.empty) {
                    resultsDiv.innerHTML = '<div class="no-results">😕 Пользователи не найдены</div>';
                    resultsDiv.classList.add('show');
                    return;
                }

                let html = '';

                    html += `
                        <div class="search-result-item" onclick="loadUserProfile('${doc.id}')">

                            </div>

                });

                console.error('Ошибка поиска:', error);

                resultsDiv.classList.add('show');

        /**

            if (!hashtag) return;
            
            currentHashtag = hashtag;
            currentTab = 'hashtag';
            
            const content = document.getElementById('feedContent');
            content.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            try {
                const normalizedTag = hashtag.toLowerCase();
                
                const snapshot = await db.collection('posts')
                    .where('hashtags', 'array-contains', normalizedTag)
                    .orderBy('createdAt', 'desc')
                    .limit(30)
                    .get();

                let html = `
                    <button class="back-button" onclick="switchTab('hashtags')">
                        ← Все хештеги
                    </button>
                    
                    <div class="hashtag-header fade-in">
                        <div class="hashtag-header-name">${escapeHtml(hashtag)}</div>
                        <div style="font-size: 16px; color: var(--text-secondary);">

                    snapshot.forEach(doc => {

                        const postId = doc.id;
                        html += renderPost(post, postId);

                        <div class="empty-state-title">Ошибка</div>
                        <div class="empty-state-text">${escapeHtml(error.message)}</div>
                    </div>
                `;
            }
        }

        /**
         * Загрузка популярных хештегов
         */
        async function loadHashtags() {
            const content = document.getElementById('feedContent');
            content.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            try {
                const snapshot = await db.collection('posts')
                    .where('hashtags', '!=', [])
                    .orderBy('hashtags')
                    .get();

                const hashtagCounts = new Map();
                
                snapshot.forEach(doc => {
                    const post = doc.data();
                    if (post.hashtags && Array.isArray(post.hashtags)) {
                        post.hashtags.forEach(tag => {
                            const normalized = tag.toLowerCase();
                            hashtagCounts.set(normalized, (hashtagCounts.get(normalized) || 0) + 1);
                        });
                    }
                });

                const sortedHashtags = Array.from(hashtagCounts.entries())
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 30);

                if (sortedHashtags.length === 0) {
                    content.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">🏷️</div>
                            <div class="empty-state-title">Нет хештегов</div>
                            <div class="empty-state-text">Используйте #хештеги в постах, чтобы они появились здесь</div>
                        </div>
                    `;
                    return;
                }

                let html = '<h2 style="margin-bottom: 16px; font-size: 22px;">📊 Популярные хештеги</h2>';
                html += '<div class="hashtags-grid">';
                
                sortedHashtags.forEach(([tag, count]) => {
                    html += `
                        <div class="hashtag-card fade-in" onclick="searchHashtag('${escapeHtml(tag)}')">
                            <div class="hashtag-name">${escapeHtml(tag)}</div>
                            <div class="hashtag-count">${count} ${count === 1 ? 'пост' : 'постов'}</div>
                        </div>
                    `;
                });
                
                html += '</div>';
                content.innerHTML = html;
                
            } catch (error) {
                console.error('Ошибка загрузки хештегов:', error);
                content.innerHTML = `
                    <div class="empty-state" style="color: var(--danger);">
                        <div class="empty-state-icon">❌</div>
                        <div class="empty-state-title">Ошибка загрузки</div>
                        <div class="empty-state-text">${escapeHtml(error.message)}</div>
                    </div>
                `;
            }
        }

        /**
         * Загрузка профиля пользователя
         */
        async function loadUserProfile(userId) {
            if (!userId) return;
            
            currentProfileId = userId;
            currentTab = 'profile';
            
            const content = document.getElementById('feedContent');
            content.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            try {
                const userData = await getUserById(userId);
                
                if (!userData) {
                    content.innerHTML = '<div class="empty-state">👤 Пользователь не найден</div>';
                    return;
                }

                // Получаем посты пользователя
                const postsSnapshot = await db.collection('posts')
                    .where('authorId', '==', userId)
                    .orderBy('createdAt', 'desc')
                    .limit(20)
                    .get();

                // Получаем подписчиков
                const followersSnapshot = await db.collection('follows')
                    .where('followingId', '==', userId)
                    .get();

                // Получаем подписки
                const followingSnapshot = await db.collection('follows')
                    .where('followerId', '==', userId)
                    .get();

                const isOwnProfile = currentUser && currentUser.uid === userId;
                const isFollowing = currentUser ? await checkFollow(currentUser.uid, userId) : false;

                let html = `
                    <div class="profile-header fade-in">
                        <div class="profile-cover"></div>
                        <div style="position: relative; z-index: 2;">
                            <div class="profile-avatar">${escapeHtml(userData.username?.[0]?.toUpperCase() || 'U')}</div>
                            <div class="profile-name">
                                @${escapeHtml(userData.username || userData.displayName || 'user')}
                                <span class="verified-badge">✔</span>
                            </div>
                            <div class="profile-bio">${escapeHtml(userData.bio || 'Нет информации')}</div>
                            
                            <div class="profile-stats">
                                <div class="profile-stat">
                                    <div class="profile-stat-value">${postsSnapshot.size}</div>
                                    <div class="profile-stat-label">постов</div>
                                </div>
                                <div class="profile-stat">
                                    <div class="profile-stat-value">${followersSnapshot.size}</div>
                                    <div class="profile-stat-label">подписчиков</div>
                                </div>
                                <div class="profile-stat">
                                    <div class="profile-stat-value">${followingSnapshot.size}</div>
                                    <div class="profile-stat-label">подписок</div>
                                </div>
                            </div>
                            
                            <div class="profile-actions">
                                ${isOwnProfile ? `
                                    <button class="profile-action-btn" onclick="editProfile()">
                                        ✏️ Редактировать
                                    </button>
                                    <button class="profile-action-btn" onclick="loadFeed()">
                                        🏠 Лента
                                    </button>
                                ` : `
                                    <button class="profile-action-btn ${isFollowing ? '' : 'primary'}" onclick="toggleFollow('${userId}')">
                                        ${isFollowing ? '✅ Подписан' : '🔔 Подписаться'}
                                    </button>
                                    <button class="profile-action-btn" onclick="startChat('${userId}')">
                                        💬 Сообщение
                                    </button>
                                `}
                            </div>
                        </div>
                    </div>
                `;

                if (postsSnapshot.empty) {
                    html += `
                        <div class="empty-state">
                            <div class="empty-state-icon">📝</div>
                            <div class="empty-state-title">Нет постов</div>
                            <div class="empty-state-text">${isOwnProfile ? 'Опубликуйте свой первый пост!' : 'У пользователя пока нет постов'}</div>
                        </div>
                    `;
                } else {
                    postsSnapshot.forEach(doc => {
                        const post = doc.data();
                        const postId = doc.id;
                        html += renderPost(post, postId);

                    <div class="empty-state" style="color: var(--danger);">

                        <div class="empty-state-title">Ошибка загрузки</div>
                        <div class="empty-state-text">${escapeHtml(error.message)}</div>
                    </div>
                `;

        /**
         * Проверка подписки
         */
        async function checkFollow(followerId, followingId) {
            if (!followerId || !followingId) return false;
            
            try {
                const snapshot = await db.collection('follows')
                    .where('followerId', '==', followerId)
                    .where('followingId', '==', followingId)
                    .limit(1)
                    .get();
                
                return !snapshot.empty;
            } catch (error) {
                console.error('Ошибка проверки подписки:', error);
                return false;
            }
        }

        /**
         * Подписка/отписка
         */
        async function toggleFollow(userId) {
            if (!currentUser) {
                showMessage('Войдите, чтобы подписываться', 'error');
                return;
            }

            if (currentUser.uid === userId) {
                showMessage('Нельзя подписаться на себя', 'error');
                return;
            }

            try {
                const isFollowing = await checkFollow(currentUser.uid, userId);
                
                if (isFollowing) {
                    const snapshot = await db.collection('follows')
                        .where('followerId', '==', currentUser.uid)
                        .where('followingId', '==', userId)
                        .limit(1)
                        .get();
                    
                    snapshot.docs.forEach(doc => doc.ref.delete());
                    showMessage('Вы отписались', 'info');
                } else {
                    await db.collection('follows').add({
                        followerId: currentUser.uid,
                        followingId: userId,
                        followerName: currentUsername,
                        followingName: (await getUserById(userId))?.username || 'user',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    showMessage('Вы подписались', 'success');
                }
                
                // Обновляем профиль
                if (currentProfileId === userId) {
                    loadUserProfile(userId);
                }
                
            } catch (error) {
                console.error('Ошибка подписки:', error);
                showMessage('Ошибка', 'error');
            }
        }

        // ============================================
        // 11. ПЕРЕКЛЮЧЕНИЕ ТАБОВ (БЕЗ ИЗМЕНЕНИЙ)
        // ============================================
        
        function switchTab(tab) {
            currentTab = tab;
            currentHashtag = null;
            
            // Обновляем активный класс в таб-баре
            document.querySelectorAll('.tab-item').forEach((btn, index) => {
                btn.classList.remove('active');
                if ((tab === 'feed' && index === 0) ||
                    (tab === 'subscriptions' && index === 1) ||
                    (tab === 'hashtags' && index === 2) ||
                    (tab === 'profile' && index === 3)) {
                    btn.classList.add('active');
                }
            });

            // Загружаем соответствующий контент
            switch(tab) {
                case 'feed':
                    loadFeed();
                    break;
                case 'subscriptions':
                    loadSubscriptions();
                    break;
                case 'hashtags':
                    loadHashtags();
                    break;
                case 'profile':
                    if (currentUser) {
                        loadUserProfile(currentUser.uid);
                    } else {
                        window.location.href = '/';
                    }
                    break;
            }
        }

        /**
         * Загрузка подписок
         */
        async function loadSubscriptions() {
            if (!currentUser) {
                document.getElementById('feedContent').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔒</div>
                        <div class="empty-state-title">Требуется авторизация</div>
                        <div class="empty-state-text">Войдите, чтобы видеть ленту подписок</div>
                    </div>
                `;
                return;
            }

            const content = document.getElementById('feedContent');
            content.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

            try {
                const followsSnapshot = await db.collection('follows')
                    .where('followerId', '==', currentUser.uid)
                    .get();

                if (followsSnapshot.empty) {
                    content.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">👥</div>
                            <div class="empty-state-title">Нет подписок</div>
                            <div class="empty-state-text">Подпишитесь на пользователей, чтобы видеть их посты</div>
                        </div>
                    `;
                    return;
                }

                const followingIds = followsSnapshot.docs.map(doc => doc.data().followingId);
                
                if (followingIds.length === 0) {
                    content.innerHTML = '<div class="empty-state">Нет подписок</div>';
                    return;
                }

                const postsSnapshot = await db.collection('posts')
                    .where('authorId', 'in', followingIds.slice(0, 10))
                    .orderBy('createdAt', 'desc')
                    .limit(30)
                    .get();

                if (postsSnapshot.empty) {
                    content.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <div class="empty-state-title">Нет новых постов</div>
                            <div class="empty-state-text">Посты пользователей, на которых вы подписаны, появятся здесь</div>
                        </div>
                    `;
                    return;
                }

                let html = '<h2 style="margin-bottom: 16px; font-size: 22px;">📱 Лента подписок</h2>';
                
                postsSnapshot.forEach(doc => {
                    const post = doc.data();
                    const postId = doc.id;
                    html += renderPost(post, postId);
                });

                content.innerHTML = html;
                
            } catch (error) {
                console.error('Ошибка загрузки подписок:', error);
                content.innerHTML = `
                    <div class="empty-state" style="color: var(--danger);">
                        <div class="empty-state-icon">❌</div>
                        <div class="empty-state-title">Ошибка</div>
                        <div class="empty-state-text">${escapeHtml(error.message)}</div>
                    </div>
                `;
            }
        }

        // ============================================
        // 12. АВТОРИЗАЦИЯ
        // ============================================
        
        // Слушаем состояние аутентификации
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                currentUserId = user.uid;
                
                try {
                    // Загружаем данные пользователя
                    const userData = await getUserById(user.uid);
                    
                    if (userData) {
                        currentUsername = userData.username || userData.displayName || user.email?.split('@')[0] || 'user';
                        currentUserAvatar = userData.username?.[0]?.toUpperCase() || 'U';
                    } else {
                        // Создаем профиль, если его нет
                        const defaultUsername = user.email?.split('@')[0] || `user_${Date.now()}`;
                        await db.collection('users').doc(user.uid).set({
                            username: defaultUsername,
                            username_lower: defaultUsername.toLowerCase(),
                            email: user.email,
                            displayName: defaultUsername,
                            avatar: defaultUsername[0].toUpperCase(),
                            bio: '',
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                            postsCount: 0,
                            followersCount: 0,
                            followingCount: 0,
                            isVerified: false
                        });
                        
                        currentUsername = defaultUsername;
                        currentUserAvatar = defaultUsername[0].toUpperCase();
                        
                        // Кэшируем
                        usersCache.set(user.uid, {
                            username: defaultUsername,
                            email: user.email
                        });
                    }
                    
                } catch (error) {
                    console.error('Ошибка загрузки профиля:', error);
                    currentUsername = user.email?.split('@')[0] || 'user';
                    currentUserAvatar = currentUsername[0].toUpperCase();
                }

                // Загружаем ленту
                loadFeed();
                
            } else {
                // Не авторизован - редирект на страницу входа
                window.location.href = '/';
            }
        });

                .catch((error) => {

        }

        function editPost(postId) {
            showMessage('Редактирование поста скоро будет доступно', 'info');
        }

        // ============================================
        // 14. ЧАСЫ И БАТАРЕЯ
        // ============================================
        
        function updateTime() {
            const now = new Date();
            const timeString = now.getHours().toString().padStart(2, '0') + ':' + 
                              now.getMinutes().toString().padStart(2, '0');
            document.getElementById('currentTime').textContent = timeString;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Информация о батарее
        if ('getBattery' in navigator) {
            navigator.getBattery().then(function(battery) {
                function updateBattery() {
                    const level = Math.round(battery.level * 100);
                    document.getElementById('batteryPercentage').textContent = level + '%';
                }
                updateBattery();
                battery.addEventListener('levelchange', updateBattery);
            });
        } else {
            document.getElementById('batteryPercentage').textContent = '--%';
        }

        // ============================================
        // 15. СНЕЖИНКИ
        // ============================================
        
        function createSnowflakes() {
            if (!settings.showSnowflakes) return;
            
            const container = document.getElementById('snowflakes-container');
            if (!container) return;
            
            container.innerHTML = '';
            const count = window.innerWidth < 768 ? 30 : 50;
            
            for (let i = 0; i < count; i++) {
                const snowflake = document.createElement('div');
                snowflake.classList.add('snowflake');
                
                const size = Math.random();
                if (size < 0.33) snowflake.classList.add('snowflake-small');
                else if (size < 0.66) snowflake.classList.add('snowflake-medium');
                else snowflake.classList.add('snowflake-large');
                
                const left = Math.random() * 100;
                const duration = Math.random() * 5 + 8;
                const delay = Math.random() * 5;
                const opacity = Math.random() * 0.5 + 0.3;
                
                snowflake.style.left = left + '%';
                snowflake.style.animationDuration = duration + 's';
                snowflake.style.animationDelay = delay + 's';
                snowflake.style.opacity = opacity;
                
                container.appendChild(snowflake);
            }
        }
        
        createSnowflakes();
        window.addEventListener('resize', createSnowflakes);

        // ============================================
        // 16. ГЛОБАЛЬНЫЙ ДОСТУП К ФУНКЦИЯМ
        // ============================================
        
        window.deletePost = deletePost;
        window.createPost = createPost;
        window.likePost = likePost;
        window.viewPost = viewPost;
        window.repost = repost;
        window.pinPost = pinPost;
        window.addComment = addComment;
        window.loadComments = loadComments;
        window.likeComment = likeComment;
        window.deleteComment = deleteComment;
        window.toggleComments = toggleComments;
        window.searchHashtag = searchHashtag;
        window.loadUserProfile = loadUserProfile;
        window.switchTab = switchTab;
        window.signOut = signOut;
        window.openSettings = openSettings;
        window.editProfile = editProfile;
        window.startChat = startChat;
        window.editPost = editPost;
        window.toggleFollow = toggleFollow;
        window.closeModal = closeModal;
        window.updateCharCounter = updateCharCounter;
        window.debounceSearchUsers = debounceSearchUsers;
        
        console.log('✅ Feed.js полностью загружен, удаление постов работает!');
    </script>
</body>
