<!DOCTYPE html>
<html>
<head>
    <title>Лента - czhmass.com</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .navbar {
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .search-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        .search-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-profile {
            background: #48bb78;
        }
        .create-post {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 10px;
            resize: vertical;
        }
        .post {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        .post-header {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
            font-style: italic;
        }
        .user-search-result {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h2 style="margin:0;">czhmass.com</h2>
        <div>
            <button class="btn btn-profile" onclick="window.location.href='profile.html'">👤 Профиль</button>
            <button class="btn" onclick="logout()">🚪 Выйти</button>
        </div>
    </div>
    
    <!-- ПРОСТОЙ ПОИСК -->
    <div class="search-box">
        <input type="text" class="search-input" id="searchInput" 
               placeholder="Найти пользователя...">
        <button class="btn" onclick="searchUsers()">🔍 Поиск</button>
    </div>
    
    <!-- РЕЗУЛЬТАТЫ ПОИСКА (скрыты по умолчанию) -->
    <div id="searchResults" style="display:none; margin-bottom:20px;">
        <h3>Найденные пользователи:</h3>
        <div id="usersList"></div>
    </div>
    
    <!-- СОЗДАНИЕ ПОСТА -->
    <div class="create-post">
        <h3 style="margin-top:0;">Новый пост</h3>
        <textarea id="postText" placeholder="Что у вас нового?"></textarea>
        <button class="btn" onclick="createPost()">📤 Опубликовать</button>
        <div id="message" style="margin-top:10px; display:none;"></div>
    </div>
    
    <!-- ЛЕНТА ПОСТОВ -->
    <div id="posts">
        <h3>📰 Лента постов:</h3>
        <div class="empty" id="emptyMsg">Загрузка постов...</div>
    </div>

    <script>
        // ===== ОСНОВНЫЕ ПЕРЕМЕННЫЕ =====
        let currentUser = localStorage.getItem('czhmass_currentUser');
        let users = JSON.parse(localStorage.getItem('czhmass_users') || '{}');
        
        // ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
        if (!currentUser) {
            alert('❌ Сначала войдите в систему!');
            window.location.href = 'index.html';
        }
        
        // ===== ЗАГРУЗКА ПОСТОВ =====
        function loadPosts() {
            const postsDiv = document.getElementById('posts');
            const emptyMsg = document.getElementById('emptyMsg');
            
            // Собираем ВСЕ посты
            let allPosts = [];
            for (const username in users) {
                if (users[username] && Array.isArray(users[username].posts)) {
                    users[username].posts.forEach((text, index) => {
                        allPosts.push({
                            username: username,
                            text: text,
                            time: users[username].postTimes ? 
                                  (users[username].postTimes[index] || new Date().toISOString()) : 
                                  new Date().toISOString()
                        });
                    });
                }
            }
            
            // Сортируем по времени (новые сверху)
            allPosts.sort((a, b) => new Date(b.time) - new Date(a.time));
            
            // Отображаем
            if (allPosts.length === 0) {
                postsDiv.innerHTML = '<h3>📰 Лента постов:</h3><div class="empty">Пока нет постов. Будьте первым!</div>';
                return;
            }
            
            let postsHTML = '<h3>📰 Лента постов:</h3>';
            allPosts.forEach(post => {
                postsHTML += `
                    <div class="post">
                        <div class="post-header">
                            <span>@${post.username}</span>
                            <span style="color:#a0aec0; font-size:14px;">${formatTime(post.time)}</span>
                        </div>
                        <div>${escapeHtml(post.text)}</div>
                    </div>
                `;
            });
            
            postsDiv.innerHTML = postsHTML;
        }
        
        // ===== ПОИСК ПОЛЬЗОВАТЕЛЕЙ =====
        function searchUsers() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultsDiv = document.getElementById('searchResults');
            const usersList = document.getElementById('usersList');
            
            if (!searchTerm) {
                resultsDiv.style.display = 'none';
                return;
            }
            
            // Ищем пользователей
            const results = [];
            for (const username in users) {
                if (username.toLowerCase().includes(searchTerm) && username !== currentUser) {
                    results.push(username);
                }
            }
            
            if (results.length === 0) {
                usersList.innerHTML = '<p style="color:#718096; text-align:center;">Пользователи не найдены</p>';
            } else {
                usersList.innerHTML = '';
                results.forEach(username => {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'user-search-result';
                    userDiv.innerHTML = `
                        <div>
                            <strong>@${username}</strong>
                            <div style="color:#718096; font-size:14px;">
                                Постов: ${users[username].posts ? users[username].posts.length : 0}
                            </div>
                        </div>
                        <button onclick="viewUserProfile('${username}')" 
                                style="background:#667eea; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">
                            👁️ Профиль
                        </button>
                    `;
                    usersList.appendChild(userDiv);
                });
            }
            
            resultsDiv.style.display = 'block';
        }
        
        // ===== ПРОСМОТР ПРОФИЛЯ =====
        function viewUserProfile(username) {
            const userData = users[username];
            if (!userData) return;
            
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1000;
            `;
            
            modal.innerHTML = `
                <div style="background:white; padding:30px; border-radius:15px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; position:relative;">
                    <button onclick="this.parentElement.parentElement.remove()" 
                            style="position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; cursor:pointer; color:#718096;">
                        ×
                    </button>
                    
                    <h3 style="margin-top:0;">@${username}</h3>
                    
                    <div style="margin:20px 0;">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <div style="width:50px; height:50px; background:#667eea; color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:bold;">
                                ${username.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <div><strong>Email:</strong> ${userData.email || 'не указан'}</div>
                                <div><strong>Постов:</strong> ${userData.posts ? userData.posts.length : 0}</div>
                            </div>
                        </div>
                    </div>
                    
                    <h4>Последние посты:</h4>
                    ${userData.posts && userData.posts.length > 0 ? 
                      userData.posts.slice(-3).reverse().map(post => 
                        `<div style="background:#f8f9fa; padding:12px; border-radius:8px; margin:8px 0;">
                            ${escapeHtml(post)}
                        </div>`
                      ).join('') : 
                      '<p style="color:#718096; text-align:center;">Нет постов</p>'}
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Закрытие по клику на фон
            modal.onclick = function(e) {
                if (e.target === modal) {
                    document.body.removeChild(modal);
                }
            };
        }
        
        // ===== СОЗДАНИЕ ПОСТА =====
        function createPost() {
            const text = document.getElementById('postText').value.trim();
            const messageEl = document.getElementById('message');
            
            if (!text) {
                showMessage('Введите текст поста', 'error');
                return;
            }
            
            if (!users[currentUser]) {
                showMessage('Ошибка: пользователь не найден', 'error');
                return;
            }
            
            if (!Array.isArray(users[currentUser].posts)) {
                users[currentUser].posts = [];
                users[currentUser].postTimes = [];
            }
            
            users[currentUser].posts.push(text);
            users[currentUser].postTimes.push(new Date().toISOString());
            
            try {
                localStorage.setItem('czhmass_users', JSON.stringify(users));
                showMessage('✅ Пост опубликован!', 'success');
            } catch (e) {
                showMessage('❌ Ошибка сохранения', 'error');
                return;
            }
            
            document.getElementById('postText').value = '';
            loadPosts();
        }
        
        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.style.display = 'block';
            messageEl.style.color = type === 'success' ? '#48bb78' : '#e53e3e';
            messageEl.style.padding = '10px';
            messageEl.style.borderRadius = '5px';
            
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 3000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }
        
        function formatTime(timeString) {
            try {
                const postTime = new Date(timeString);
                const now = new Date();
                const diff = now - postTime;
                const minutes = Math.floor(diff / 60000);
                
                if (minutes < 1) return 'только что';
                if (minutes < 60) return `${minutes} мин назад`;
                if (minutes < 1440) return `${Math.floor(minutes / 60)} ч назад`;
                return postTime.toLocaleDateString('ru-RU');
            } catch {
                return 'недавно';
            }
        }
        
        function logout() {
            if (confirm('Вы уверены, что хотите выйти?')) {
                localStorage.removeItem('czhmass_currentUser');
                window.location.href = 'index.html';
            }
        }
        
        // ===== ИНИЦИАЛИЗАЦИЯ =====
        window.onload = function() {
            console.log('Текущий пользователь:', currentUser);
            console.log('Все пользователи:', users);
            loadPosts();
            
            // Enter для поиска
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') searchUsers();
            });
            
            // Ctrl+Enter для публикации
            document.getElementById('postText').addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'Enter') createPost();
            });
        };
    </script>
</body>
</html>
