<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#000;
  --card:rgba(28,28,30,.95);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
  --success:#30d158;
  --views:#8e8e93;
  --old-posts:#ff9500;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);
  border-radius:18px;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}
.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}

.container{
  max-width:480px;
  margin:auto;
  padding:130px 14px 80px;
}

.create{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
}
.create textarea{
  width:100%;
  min-height:80px;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.create button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border:none;
  border-radius:16px;
  background:var(--accent);
  color:#fff;
  font-weight:600;
}

/* ПОИСК ПОЛЬЗОВАТЕЛЕЙ */
.search{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
  position:relative;
}
.search-input{
  width:100%;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px 16px 14px 46px;
  color:#fff;
  font-size:16px;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  line-height:normal;
}
.search-input:focus{
  outline:none;
  border-color:var(--accent);
}
.search-icon{
  position:absolute;
  left:30px;
  top:50%;
  transform:translateY(-50%);
  color:var(--sub);
  font-size:18px;
  width:18px;
  height:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.search-results{
  margin-top:12px;
  max-height:200px;
  overflow-y:auto;
}
.search-result{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:14px;
  background:#1c1c1e;
  margin-bottom:8px;
  cursor:pointer;
  transition:background 0.2s;
}
.search-result:hover{
  background:rgba(255,255,255,0.1);
}
.search-result:last-child{
  margin-bottom:0;
}
.search-avatar{
  width:40px;
  height:40px;
  border-radius:14px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:16px;
  flex-shrink:0;
}
.search-username{
  font-weight:600;
  font-size:15px;
  line-height:1.2;
}
.no-results{
  text-align:center;
  color:var(--sub);
  padding:20px 0;
  font-size:14px;
  line-height:1.4;
}

/* РАЗДЕЛИТЕЛИ ПОСТОВ */
.day-divider{
  margin:20px 0;
  text-align:center;
  position:relative;
}
.day-divider::before{
  content:"";
  position:absolute;
  left:0;
  right:0;
  top:50%;
  height:1px;
  background:var(--border);
}
.day-divider-text{
  background:var(--card);
  padding:8px 16px;
  border-radius:12px;
  color:var(--sub);
  font-size:13px;
  font-weight:600;
  display:inline-block;
  position:relative;
  z-index:1;
}

.old-posts-section{
  margin-top:20px;
  margin-bottom:30px;
}
.old-posts-toggle{
  width:100%;
  background:var(--old-posts);
  color:white;
  border:none;
  padding:16px;
  border-radius:18px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:opacity 0.2s;
}
.old-posts-toggle:hover{
  opacity:0.9;
}
.old-posts-toggle .icon{
  font-size:18px;
}

.post{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
  position:relative;
  transition:box-shadow 0.3s ease, transform 0.2s ease;
}
.post.highlighted{
  box-shadow:0 0 0 2px var(--accent), 0 0 20px rgba(102,126,234,0.3);
}
.post-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}
.avatar{
  width:40px;
  height:40px;
  border-radius:14px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  flex-shrink:0;
}
.post-user-info{
  display:flex;
  flex-direction:column;
  flex-grow:1;
  min-width:0;
}
.post-user{
  font-weight:600;
  cursor:pointer;
  transition:opacity 0.2s;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.post-user:hover{
  opacity:0.7;
}
.post-time{
  color:var(--sub);
  font-size:12px;
  margin-top:2px;
}
.post-text{
  margin:10px 0;
  line-height:1.4;
  word-break:break-word;
}
.post-actions{
  display:flex;
  gap:16px;
  margin-top:12px;
  align-items:center;
}
.action{
  background:none;
  border:none;
  color:var(--sub);
  font-size:18px;
  cursor:pointer;
  transition:transform 0.2s;
  display:flex;
  align-items:center;
  gap:6px;
  padding:0;
}
.action:hover{
  transform:scale(1.1);
}
.liked{
  color:#ff2d55;
  animation:heartBeat 0.3s ease;
}
@keyframes heartBeat{
  0%{transform:scale(1)}
  50%{transform:scale(1.2)}
  100%{transform:scale(1)}
}
.viewed{color:var(--views)}
.trash{
  margin-left:auto;
  background:none;border:none;
  color:var(--danger);font-size:18px;
  cursor:pointer;
  flex-shrink:0;
}

.sheet{
  position:fixed;
  inset:0;
  background:#000;
  transform:translateY(100%);
  transition:.35s ease;
  z-index:2000;
  display:flex;
  flex-direction:column;
}
.sheet.show{transform:translateY(0)}
.sheet-header{
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
}
.sheet-body{
  flex:1;
  overflow:auto;
  padding:14px;
}
.sheet-footer{
  padding:12px;
  border-top:1px solid var(--border);
  display:flex;
  gap:8px;
}
.sheet-footer input{
  flex:1;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* PROFILE SHEET */
.profile-header{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:20px;
}
.profile-avatar{
  width:72px;height:72px;
  border-radius:22px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:700;
  flex-shrink:0;
}
.profile-info{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:0;
}
.profile-name{
  font-size:18px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:8px;
}
.change-name-btn{
  background:none;
  border:none;
  color:var(--sub);
  font-size:14px;
  cursor:pointer;
  padding:4px 8px;
  border-radius:8px;
  transition:background 0.2s;
  flex-shrink:0;
}
.change-name-btn:hover{
  background:rgba(255,255,255,0.1);
}
.profile-stats{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
}
.profile-stat{
  display:flex;
  flex-direction:column;
  flex-shrink:0;
}
.profile-stat-value{
  font-size:16px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:4px;
}
.profile-stat-label{
  color:var(--sub);
  font-size:12px;
  margin-top:2px;
}
.likes-stat{
  color:#ff2d55;
}
.posts-stat{
  color:#5ac8fa;
}
.views-stat{
  color:var(--views);
}

/* Уведомление */
.notification{
  position:fixed;
  top:120px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:var(--accent);
  color:white;
  padding:12px 20px;
  border-radius:14px;
  font-weight:600;
  z-index:1999;
  opacity:0;
  transition:opacity 0.3s, transform 0.3s;
  pointer-events:none;
  max-width:90%;
  text-align:center;
}
.notification.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* Модальное окно для смены имени */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:3000;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s;
}
.modal-overlay.show{
  opacity:1;
  pointer-events:auto;
}
.modal{
  background:var(--card);
  border-radius:20px;
  padding:24px;
  width:90%;
  max-width:400px;
  transform:translateY(20px);
  transition:transform 0.3s;
}
.modal-overlay.show .modal{
  transform:translateY(0);
}
.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.modal-title{
  font-size:20px;
  font-weight:700;
}
.modal-close{
  background:none;
  border:none;
  color:var(--sub);
  font-size:20px;
  cursor:pointer;
}
.modal-input{
  width:100%;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  color:#fff;
  font-size:16px;
  margin-bottom:16px;
  font-family:inherit;
}
.modal-input:focus{
  outline:none;
  border-color:var(--accent);
}
.modal-buttons{
  display:flex;
  gap:12px;
}
.modal-btn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
  font-size:16px;
}
.modal-btn.primary{
  background:var(--accent);
  color:white;
}
.modal-btn.secondary{
  background:rgba(255,255,255,0.1);
  color:white;
}

/* SHEET ДЛЯ СТАРЫХ ПОСТОВ */
.old-posts-sheet .sheet-body{
  display:flex;
  flex-direction:column;
  gap:14px;
}
</style>
</head>

<body>

<div class="dynamic-island" id="time"></div>

<div class="navbar">

  <div class="nav-btns">

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
  authDomain:"czhmass.firebaseapp.com",
  projectId:"czhmass"
});
const db=firebase.firestore();
const auth=firebase.auth();

let currentUser,userData;
let postsCache=new Map();
let currentPostId=null;
let currentProfileUserId = null;
let searchTimeout = null;
let showOldPosts = false;

// Загружаем просмотренные посты из localStorage
let viewedPosts = JSON.parse(localStorage.getItem('viewedPosts') || '{}');

auth.onAuthStateChanged(async u=>{
  if(!u)return location.href="index.html";
  currentUser=u;
  await loadUserData();
  loadPosts();
  
  // Проверяем, нужно ли прокрутить к определенному посту
  setTimeout(checkPostToScroll, 1000);
});

// Загружаем данные пользователя
async function loadUserData() {
  const snap = await db.collection("users").doc(currentUser.uid).get();
  if (!snap.exists) {
    // Если документ не существует, создаем его
    userData = {
      username: "user" + currentUser.uid.slice(-6),
      email: currentUser.email || "не указан",
      createdAt: new Date(),
      isAdmin: false,
      lastLogin: new Date()
    };
    await db.collection("users").doc(currentUser.uid).set(userData);
  } else {
    userData = snap.data();
  }
  
  // Обновляем время последнего входа
  await db.collection("users").doc(currentUser.uid).update({
    lastLogin: new Date()
  });
  
  if(userData.isAdmin) {
    document.getElementById("adminBtn").style.display = "block";
  }
}

// Проверяем, нужно ли прокрутить к посту из профиля
function checkPostToScroll() {
  const postIdToScroll = localStorage.getItem('scrollToPostId');
  if (postIdToScroll) {
    console.log("Ищем пост для прокрутки:", postIdToScroll);
    
    // Даем время на загрузку всех постов
    setTimeout(() => {
      const postElement = document.getElementById(`post-${postIdToScroll}`);
      if (postElement) {
        console.log("Пост найден, прокручиваем...");
        postElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
        postElement.classList.add('highlighted');
        
        // Показываем уведомление
        showNotification('Найден пост из вашего профиля!');
        
        // Убираем подсветку через 5 секунд
        setTimeout(() => {
          postElement.classList.remove('highlighted');
        }, 5000);
      } else {
        console.log("Пост не найден в DOM");
        showNotification('Пост не найден в ленте');
      }
      
      // Очищаем после использования
      localStorage.removeItem('scrollToPostId');
    }, 500);
  }
}

// Функция для показа уведомления
function showNotification(message, duration = 3000) {
  const notification = document.getElementById('notification');
  notification.textContent = message;
  notification.classList.add('show');
  
  setTimeout(() => {
    notification.classList.remove('show');
  }, duration);
}

// Функция для форматирования времени (сколько времени прошло)
function formatTimeAgo(date) {
  if (!date) return "только что";
  
  const now = new Date();
  const diff = now - date;
  const seconds = Math.floor(diff / 1000);
  const minutes = Math.floor(seconds / 60);
  const hours = Math.floor(minutes / 60);
  const days = Math.floor(hours / 24);
  
  if (days > 7) {
    return "больше недели";
  } else if (days > 0) {
    return `${days} д назад`;
  } else if (hours > 0) {
    return `${hours} ч назад`;
  } else if (minutes > 0) {
    return `${minutes} мин назад`;
  } else {
    return "только что";
  }
}

// Функция для полного форматирования даты и времени
function formatFullDateTime(date) {
  if (!date) return "";
  
  return date.toLocaleDateString("ru-RU", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric"
  }) + ", " + date.toLocaleTimeString("ru-RU", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

// Получить возраст поста в днях
function getPostAgeInDays(date) {
  if (!date) return 0;
  const now = new Date();
  const diff = now - date;
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

// Функция для увеличения просмотров поста
async function incrementPostViews(postId) {
  // Проверяем, не просматривал ли пользователь уже этот пост
  if (viewedPosts[postId]) return;
  
  try {
    // Увеличиваем счетчик просмотров
    await db.collection("posts").doc(postId).update({
      views: firebase.firestore.FieldValue.increment(1)
    });
    
    // Сохраняем в localStorage, что пользователь просмотрел этот пост
    viewedPosts[postId] = true;
    localStorage.setItem('viewedPosts', JSON.stringify(viewedPosts));
    
    // Обновляем кэш
    if (postsCache.has(postId)) {
      const post = postsCache.get(postId);
      post.views = (post.views || 0) + 1;
      
      // Обновляем отображение счетчика
      const viewButton = document.querySelector(`#post-${postId} .action.viewed`);
      if (viewButton) {
        viewButton.innerHTML = `👁️ ${post.views}`;
      }
    }
    
  } catch(error) {
    console.error("Ошибка при увеличении просмотров:", error);
  }
}

// Проверка видимости поста для подсчета просмотров
function setupViewTracking() {
  const posts = document.querySelectorAll('.post');
  
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        // Находим ID поста
        const postId = entry.target.id.replace('post-', '');
        if (postId) {
          // Задержка перед увеличением просмотров
          setTimeout(() => {
            incrementPostViews(postId);
          }, 1000);
        }
      }
    });
  }, {
    threshold: 0.7,
    rootMargin: '0px 0px -100px 0px'
  });
  
  posts.forEach(post => {
    observer.observe(post);
  });
}

// Поиск пользователей
async function searchUsers(searchTerm) {
  const searchResults = document.getElementById('searchResults');
  
  if (!searchTerm.trim()) {
    searchResults.innerHTML = '';
    return;
  }
  
  try {
    // Показываем загрузку
    searchResults.innerHTML = '<div class="no-results">Поиск...</div>';
    
    // Ищем пользователей по нику
    const usersSnap = await db.collection("users")
      .where("username", ">=", searchTerm.toLowerCase())
      .where("username", "<=", searchTerm.toLowerCase() + '\uf8ff')
      .limit(10)
      .get();
    
    if (usersSnap.empty) {
      searchResults.innerHTML = '<div class="no-results">Пользователи не найдены</div>';
      return;
    }
    
    let resultsHTML = '';
    const currentUserId = currentUser.uid;
    
    usersSnap.forEach(doc => {
      const user = doc.data();
      const userId = doc.id;
      
      // Пропускаем текущего пользователя
      if (userId === currentUserId) return;
      
      resultsHTML += `
        <div class="search-result" onclick="openSearchedProfile('${userId}', '${user.username}')">
          <div class="search-avatar">${user.username?.[0]?.toUpperCase() || "U"}</div>
          <div class="search-username">@${user.username}</div>
        </div>
      `;
    });
    
    if (!resultsHTML) {
      searchResults.innerHTML = '<div class="no-results">Пользователи не найдены</div>';
    } else {
      searchResults.innerHTML = resultsHTML;
    }
    
  } catch(error) {
    console.error("Ошибка при поиске пользователей:", error);
    searchResults.innerHTML = '<div class="no-results">Ошибка при поиске</div>';
  }
}

// Загрузить старые посты (больше недели)
async function loadOldPosts() {
  const oldPostsBody = document.getElementById('oldPostsBody');
  oldPostsBody.innerHTML = '<div style="text-align:center;color:var(--sub);padding:40px 0;">Загрузка старых постов...</div>';
  
  try {
    // Вычисляем дату неделю назад
    const weekAgo = new Date();
    weekAgo.setDate(weekAgo.getDate() - 7);
    
    const snap = await db.collection("posts")
      .where("createdAt", "<", weekAgo)
      .orderBy("createdAt", "desc")
      .limit(50)
      .get();
    
    if (snap.empty) {
      oldPostsBody.innerHTML = '<div style="text-align:center;color:var(--sub);padding:40px 0;">Нет старых постов</div>';
      return;
    }
    
    let oldPostsHTML = '';
    let lastMonth = null;
    
    snap.forEach(doc=>{
      const p=doc.data();
      const liked=p.likedBy?.includes(currentUser.uid);
      
      // Группируем по месяцам
      let postDate = null;
      let monthYear = "";
      try {
        if (p.createdAt) {
          postDate = p.createdAt.toDate ? p.createdAt.toDate() : new Date(p.createdAt);
          monthYear = postDate.toLocaleDateString("ru-RU", { month: 'long', year: 'numeric' });
        }
      } catch (dateError) {
        console.log("Ошибка форматирования даты:", dateError);
      }
      
      // Добавляем разделитель месяца
      if (monthYear && monthYear !== lastMonth) {
        oldPostsHTML += `<div class="day-divider"><div class="day-divider-text">${monthYear}</div></div>`;
        lastMonth = monthYear;
      }
      
      // Форматируем время
      let timeAgo = formatTimeAgo(postDate);
      let fullDateTime = formatFullDateTime(postDate);
      
      oldPostsHTML+=`
      <div class="post fade">
        <div class="post-header">
          <div class="avatar">${p.username?.[0]||"A"}</div>
          <div class="post-user-info">
            <div class="post-user" onclick="openProfile('${p.userId}','${p.username}')">
              @${p.username}
            </div>
            <div class="post-time" title="${fullDateTime}">${timeAgo}</div>
          </div>
          ${(p.userId===currentUser.uid||userData.isAdmin)?
            `<button class="trash" onclick="deletePost('${doc.id}', '${p.userId}')">🗑</button>`:""}
        </div>
        <div class="post-text">${p.text}</div>
        <div class="post-actions">
          <button class="action ${liked?"liked":""}" onclick="toggleLike('${doc.id}')">
            ${liked?"❤️":"🤍"} <span class="like-count">${p.likes||0}</span>
          </button>
          <button class="action" onclick="openComments('${doc.id}')">
            💬 ${p.commentsCount||0}
          </button>
          <button class="action viewed" title="Просмотры">
            👁️ ${p.views||0}
          </button>
        </div>
      </div>`;
    });
    
    oldPostsBody.innerHTML = oldPostsHTML;
    
  } catch(error) {
    console.error("Ошибка при загрузке старых постов:", error);
    oldPostsBody.innerHTML = `<div style="text-align:center;color:var(--danger);padding:40px 0;">Ошибка при загрузке: ${error.message}</div>`;
  }
}

async function loadPosts(){
  const feed = document.getElementById("feed");
  feed.innerHTML = "<div style='text-align:center;color:var(--sub);padding:40px 0;'>Загрузка постов...</div>";
  
  try {
    const snap = await db.collection("posts").orderBy("createdAt","desc").limit(50).get();
    
    if (snap.empty) {
      feed.innerHTML = "<div style='text-align:center;color:var(--sub);padding:40px 0;'>Пока нет постов. Будьте первым!</div>";
      return;
    }
    
    let feedHTML = "";
    let lastDay = null;
    let hasOldPosts = false;
    
    snap.forEach(doc=>{
      const p=doc.data();
      postsCache.set(doc.id,p);
      const liked=p.likedBy?.includes(currentUser.uid);
      
      // Определяем возраст поста
      let postDate = null;
      let postAgeInDays = 0;
      try {
        if (p.createdAt) {
          postDate = p.createdAt.toDate ? p.createdAt.toDate() : new Date(p.createdAt);
          postAgeInDays = getPostAgeInDays(postDate);
        }
      } catch (dateError) {
        console.log("Ошибка форматирования даты:", dateError);
      }
      
      // Проверяем, есть ли посты старше недели
      if (postAgeInDays > 7) {
        hasOldPosts = true;
        return; // Пропускаем старые посты в основной ленте
      }
      
      // Добавляем разделитель для постов старше дня
      if (postAgeInDays >= 1) {
        const dayText = "Больше 1 дня";
        if (dayText !== lastDay) {
          feedHTML += `<div class="day-divider"><div class="day-divider-text">${dayText}</div></div>`;
          lastDay = dayText;
        }
      }
      
      // Форматируем время
      let timeAgo = formatTimeAgo(postDate);
      let fullDateTime = formatFullDateTime(postDate);
      
      feedHTML+=`
      <div class="post fade" id="post-${doc.id}">
        <div class="post-header">
          <div class="avatar">${p.username?.[0]||"A"}</div>
          <div class="post-user-info">
            <div class="post-user" onclick="openProfile('${p.userId}','${p.username}')">
              @${p.username}
            </div>
            <div class="post-time" title="${fullDateTime}">${timeAgo}</div>
          </div>
          ${(p.userId===currentUser.uid||userData.isAdmin)?
            `<button class="trash" onclick="deletePost('${doc.id}', '${p.userId}')">🗑</button>`:""}
        </div>
        <div class="post-text">${p.text}</div>
        <div class="post-actions">
          <button class="action ${liked?"liked":""}" onclick="toggleLike('${doc.id}')">
            ${liked?"❤️":"🤍"} <span class="like-count">${p.likes||0}</span>
          </button>
          <button class="action" onclick="openComments('${doc.id}')">
            💬 ${p.commentsCount||0}
          </button>
          <button class="action viewed" title="Просмотры">
            👁️ ${p.views||0}
          </button>
        </div>
      </div>`;
    });
    
    // Добавляем кнопку для старых постов
    if (hasOldPosts) {
      feedHTML += `
        <div class="old-posts-section">
          <button class="old-posts-toggle" onclick="openOldPosts()">
            <span class="icon">📜</span>
            <span>Показать старые посты</span>
          </button>
        </div>`;
    }
    
    feed.innerHTML = feedHTML;
    
    // Настраиваем отслеживание просмотров
    setTimeout(setupViewTracking, 500);
    
    // Проверяем еще раз после загрузки
    setTimeout(checkPostToScroll, 100);
    
  } catch(error) {
    console.error("Ошибка при загрузке постов:", error);
    feed.innerHTML = `<div style='text-align:center;color:var(--danger);padding:40px 0;'>Ошибка при загрузке постов: ${error.message}</div>`;
  }
}

async function createPost(){
  const postText = document.getElementById("postText");
  if(!postText.value.trim()){
    showNotification("Напишите что-нибудь перед отправкой!");
    return;
  }
  
  try {
    const username = userData.username || "anon" + currentUser.uid.slice(-4);
    
    await db.collection("posts").add({
      text: postText.value,
      userId: currentUser.uid,
      username: username,
      createdAt: new Date(),
      likes: 0,
      views: 0,
      likedBy: [],
      commentsCount: 0
    });
    
    postText.value = "";
    showNotification("Пост опубликован!");
    loadPosts();
    
  } catch(error) {
    console.error("Ошибка при создании поста:", error);
    showNotification("Ошибка при публикации: " + error.message);
  }
}

async function deletePost(postId, postUserId){
  if(!confirm("Удалить пост?"))return;
  
  try {
    await db.collection("posts").doc(postId).delete();
    showNotification("Пост удален!");
    
    // Удаляем из просмотренных
    if (viewedPosts[postId]) {
      delete viewedPosts[postId];
      localStorage.setItem('viewedPosts', JSON.stringify(viewedPosts));
    }
    
    // Перезагружаем основную ленту
    loadPosts();
    
    // Если профиль открыт и это пост того же пользователя, обновляем профиль
    if (currentProfileUserId === postUserId) {
      await refreshProfilePosts(postUserId);
    }
    
  } catch(error) {
    console.error("Ошибка при удалении поста:", error);
    showNotification("Не удалось удалить пост: " + error.message);
  }
}

async function toggleLike(id){
  const p=postsCache.get(id);
  const liked=p.likedBy?.includes(currentUser.uid);
  
  try {
    await db.collection("posts").doc(id).update({
      likes: firebase.firestore.FieldValue.increment(liked?-1:1),
      likedBy: liked
        ? firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
        : firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
    });
    
    // Обновляем локальный кэш
    if (postsCache.has(id)) {
      const post = postsCache.get(id);
      post.likes = (post.likes || 0) + (liked ? -1 : 1);
      post.likedBy = liked 
        ? post.likedBy.filter(uid => uid !== currentUser.uid)
        : [...(post.likedBy || []), currentUser.uid];
    }
    
    // Находим кнопку лайка и обновляем ее
    const likeButton = document.querySelector(`#post-${id} .action`);
    if (likeButton) {
      const likeCountSpan = likeButton.querySelector('.like-count');
      const newLikes = (p.likes || 0) + (liked ? -1 : 1);
      
      // Обновляем счетчик
      if (likeCountSpan) {
        likeCountSpan.textContent = newLikes;
      }
      
      // Обновляем иконку и класс
      if (liked) {
        likeButton.classList.remove('liked');
        likeButton.innerHTML = `🤍 <span class="like-count">${newLikes}</span>`;
      } else {
        likeButton.classList.add('liked');
        likeButton.innerHTML = `❤️ <span class="like-count">${newLikes}</span>`;
      }
    }
    
    showNotification(liked ? "Лайк убран" : "Посту понравилось!");
    
  } catch(error) {
    console.error("Ошибка при лайке:", error);
    showNotification("Ошибка: " + error.message);
  }
}

async function loadComments(){

  try {

      .collection("comments").orderBy("createdAt").get();
    
    if (snap.empty) {
      commentsBody.innerHTML = "<div style='text-align:center;color:var(--sub);padding:40px 0;'>Комментариев пока нет</div>";
      return;
    }
    
    commentsBody.innerHTML = "";
    
    snap.forEach(d=>{
      const c=d.data();
      
      // Форматируем время для комментария
      let timeAgo = "только что";
      try {
        if (c.createdAt) {
          const commentDate = c.createdAt.toDate ? c.createdAt.toDate() : new Date(c.createdAt);
          timeAgo = formatTimeAgo(commentDate);
        }
      } catch (dateError) {
        console.log("Ошибка форматирования даты комментария:", dateError);
      }
      
      commentsBody.innerHTML+=`
        <div class="post fade">
          <div class="post-header">
            <div class="avatar">${c.username?.[0]||"A"}</div>
            <div class="post-user-info">

              <div class="post-time">${timeAgo}</div>
            </div>
          </div>
          <div class="post-text">${c.text}</div>

    });
    
  } catch(error) {

    commentsBody.innerHTML = `<div style='text-align:center;color:var(--danger);padding:40px 0;'>Ошибка загрузки: ${error.message}</div>`;
  }
}

async function addComment(){
  const commentInput = document.getElementById("commentInput");
  if(!commentInput.value.trim()){
    showNotification("Напишите комментарий!");
    return;
  }
  
  try {
    const username = userData.username || "anon" + currentUser.uid.slice(-4);
    
    await db.collection("posts").doc(currentPostId)
      .collection("comments").add({
        text: commentInput.value,
        userId: currentUser.uid,
        username: username,
        createdAt: new Date()
      });
    
    await db.collection("posts").doc(currentPostId)
      .update({
        commentsCount: firebase.firestore.FieldValue.increment(1)
      });
    
    commentInput.value = "";
    showNotification("Комментарий добавлен!");
    loadComments();
    loadPosts();
    
  } catch(error) {
    console.error("Ошибка при добавлении комментария:", error);
    showNotification("Ошибка: " + error.message);
  }
}
