<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лента - czhmass.com</title>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>

    <style>
        /* ... ТОТ ЖЕ CSS СТИЛЬ БЕЗ ИЗМЕНЕНИЙ ... */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 10px;
        }

        /* ... ВСЕ ОСТАЛЬНЫЕ СТИЛИ ТАКИЕ ЖЕ КАК В ПРЕДЫДУЩЕЙ ВЕРСИИ ... */
        /* ДЛЯ КРАТКОСТИ ПРОПУСКАЮ, Т.К. СТИЛИ НЕ МЕНЯЛИСЬ */

    </style>
</head>
<body>
    <!-- iOS Динамический островок -->
    <div class="dynamic-island">
        <span class="island-time" id="currentTime">--:--</span>
    </div>

    <!-- Навигация -->
    <div class="navbar">
        <div class="logo">czhmass</div>
        <div class="nav-buttons">
            <button class="btn btn-admin" onclick="openAdmin()">
                <span class="btn-icon">⚙️</span>
                <span>Админ</span>
            </button>
            <button class="profile-btn" onclick="openProfile()">
                <div class="profile-avatar" id="userAvatar">U</div>
                <div class="profile-info">
                    <div class="profile-username" id="username">User</div>
                    <div class="profile-label">Профиль</div>
                </div>
            </button>
            <button class="btn btn-logout" onclick="logout()">
                <span class="btn-icon">↩️</span>
                <span>Выйти</span>
            </button>
        </div>
    </div>

    <!-- Основной контент -->
    <div class="container">
        <!-- Форма создания поста -->
        <div class="create-post">
            <textarea 
                id="postInput" 
                class="post-input" 
                placeholder="О чем думаете сегодня? Максимум 500 символов..."
                maxlength="500"
            ></textarea>

            <!-- Превью фото -->
            <div class="photo-preview-container" id="photoPreviewContainer">
                <img id="photoPreview" class="photo-preview" src="" alt="Превью фото">
                <button class="remove-photo" onclick="removePhoto()">✕</button>
            </div>

            <!-- Кнопки действий -->
            <div class="post-actions">
                <button 
                    id="photoButton" 
                    class="photo-button"
                    onclick="document.getElementById('photoInput').click()"
                >
                    📷 Фото
                </button>
                <button 
                    id="postButton" 
                    class="post-button"
                    onclick="createPost()"
                >
                    Опубликовать
                </button>
            </div>

            <!-- Скрытый input для загрузки фото -->
            <input 
                type="file" 
                id="photoInput" 
                accept="image/*" 
                style="display: none;"
                onchange="handlePhotoSelect(event)"
            >
        </div>

        <!-- Контейнер для постов -->
        <div id="postsContainer">
            <div class="loading">Загрузка постов...</div>
        </div>

        <!-- Сообщения -->
        <div id="message" class="message"></div>
    </div>

    <script>
        // ===== FIREBASE КОНФИГ И ИНИЦИАЛИЗАЦИЯ =====
        const firebaseConfig = {
            apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
            authDomain: "czhmass.firebaseapp.com",
            projectId: "czhmass",
            storageBucket: "czhmass.firebasestorage.app",
            messagingSenderId: "1064257019843",
            appId: "1:1064257019843:web:65488b45be2f86838ca776"
        };

        let db, auth, storage;
        let currentUser = null;
        let selectedPhoto = null;
        let currentUserData = null; // ДЛЯ ХРАНЕНИЯ ДАННЫХ ПОЛЬЗОВАТЕЛЯ ИЗ FIRESTORE

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        db = firebase.firestore();
        auth = firebase.auth();
        storage = firebase.storage();

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 4000);
        }

        function updateTime() {
            const now = new Date();
            const timeString = now.getHours().toString().padStart(2, '0') + ':' + 
                             now.getMinutes().toString().padStart(2, '0');
            document.getElementById('currentTime').textContent = timeString;
        }

        function formatTime(timestamp) {
            if (!timestamp) return 'только что';
            
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffSec = Math.floor(diffMs / 1000);
            const diffMin = Math.floor(diffSec / 60);
            const diffHour = Math.floor(diffMin / 60);
            const diffDay = Math.floor(diffHour / 24);

            if (diffSec < 60) return 'только что';
            if (diffMin < 60) return `${diffMin} мин назад`;
            if (diffHour < 24) return `${diffHour} ч назад`;
            if (diffDay < 7) return `${diffDay} дн назад`;
            
            return date.toLocaleDateString('ru-RU', {
                day: 'numeric',
                month: 'short',
                year: 'numeric'
            });
        }

        // ===== ЗАГРУЗКА ДАННЫХ ПОЛЬЗОВАТЕЛЯ ИЗ FIRESTORE =====
        async function loadUserData(userId) {
            try {
                const userDoc = await db.collection('users').doc(userId).get();
                if (userDoc.exists) {
                    currentUserData = userDoc.data();
                    console.log('Данные пользователя загружены:', currentUserData);
                    return currentUserData;
                } else {
                    console.log('Документ пользователя не найден, создаем...');
                    // Создаем документ если его нет
                    const userData = {
                        username: currentUser.displayName || currentUser.email.split('@')[0] || 'User',
                        email: currentUser.email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        role: 'user'
                    };
                    await db.collection('users').doc(userId).set(userData);
                    currentUserData = userData;
                    return userData;
                }
            } catch (error) {
                console.error('Ошибка загрузки данных пользователя:', error);
                return null;
            }
        }

        // ===== РАБОТА С ФОТОГРАФИЯМИ =====
        function handlePhotoSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Проверка типа файла
            if (!file.type.startsWith('image/')) {
                showMessage('Пожалуйста, выберите файл изображения', 'error');
                return;
            }

            // Проверка размера файла (максимум 5MB)
            if (file.size > 5 * 1024 * 1024) {
                showMessage('Файл слишком большой. Максимум 5MB', 'error');
                return;
            }

            selectedPhoto = file;

            // Показать превью
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('photoPreview');
                const container = document.getElementById('photoPreviewContainer');
                
                preview.src = e.target.result;
                container.style.display = 'block';
                
                // Прокрутить к превью
                container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            };
            reader.readAsDataURL(file);
        }

        function removePhoto() {
            selectedPhoto = null;
            document.getElementById('photoPreviewContainer').style.display = 'none';
            document.getElementById('photoInput').value = '';
        }

        async function uploadPhoto(file) {
            if (!file) return null;

            try {
                // Генерируем уникальное имя для файла
                const fileName = `posts/${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
                const storageRef = storage.ref().child(fileName);
                
                // Загружаем файл с прогрессом
                showMessage('Загрузка фото...', 'info');
                const snapshot = await storageRef.put(file);
                const downloadURL = await snapshot.ref.getDownloadURL();
                
                showMessage('Фото загружено!', 'success');
                return downloadURL;
            } catch (error) {
                console.error('Ошибка загрузки фото:', error);
                throw error;
            }
        }

        // ===== СОЗДАНИЕ ПОСТА С ФОТО =====
        async function createPost() {
            const postInput = document.getElementById('postInput');
            const postButton = document.getElementById('postButton');
            const photoButton = document.getElementById('photoButton');
            
            const text = postInput.value.trim();
            
            // Проверка ввода
            if (!text && !selectedPhoto) {
                showMessage('Введите текст или прикрепите фото', 'error');
                return;
            }

            if (text.length > 500) {
                showMessage('Текст слишком длинный. Максимум 500 символов', 'error');
                return;
            }

            // Блокируем кнопки
            postButton.disabled = true;
            photoButton.disabled = true;
            postButton.textContent = 'Публикация...';

            try {
                let photoURL = null;
                
                // Загружаем фото если есть
                if (selectedPhoto) {
                    photoURL = await uploadPhoto(selectedPhoto);
                }

                // Используем username из загруженных данных пользователя
                const username = currentUserData?.username || 
                               currentUser?.displayName || 
                               currentUser?.email?.split('@')[0] || 
                               'Анонимный пользователь';
                
                const userInitial = username.charAt(0).toUpperCase();

                // Создаем пост в Firestore
                const postData = {
                    text: text,
                    userId: currentUser.uid,
                    username: username,
                    userInitial: userInitial,
                    likes: 0,
                    likedBy: [],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    photoURL: photoURL
                };

                console.log('Создаем пост с данными:', postData);
                await db.collection('posts').add(postData);

                // Очищаем форму
                postInput.value = '';
                removePhoto();
                
                showMessage('Пост успешно опубликован!', 'success');

            } catch (error) {
                console.error('Ошибка создания поста:', error);
                
                // Показываем детальную ошибку
                let errorMessage = 'Ошибка при публикации поста';
                if (error.code === 'storage/unauthorized') {
                    errorMessage = 'Ошибка доступа к хранилищу. Проверьте правила Firebase Storage';
                } else if (error.code === 'storage/retry-limit-exceeded') {
                    errorMessage = 'Файл слишком большой или проблема с сетью';
                } else if (error.code === 'permission-denied') {
                    errorMessage = 'Нет прав на запись. Проверьте правила Firestore';
                }
                
                showMessage(errorMessage, 'error');
            } finally {
                // Разблокируем кнопки
                postButton.disabled = false;
                photoButton.disabled = false;
                postButton.textContent = 'Опубликовать';
            }
        }

        // ===== ОТОБРАЖЕНИЕ ПОСТОВ =====
        function renderPosts(posts) {
            const container = document.getElementById('postsContainer');
            
            if (posts.length === 0) {
                container.innerHTML = '<div class="empty">Пока нет постов. Будьте первым!</div>';
                return;
            }

            container.innerHTML = '';
            
            posts.forEach(post => {
                const postElement = document.createElement('div');
                postElement.className = 'post-ios';
                postElement.id = `post-${post.id}`;

                // Проверяем, лайкнул ли текущий пользователь этот пост
                const likedByArray = post.likedBy || [];
                const isLiked = currentUser ? likedByArray.includes(currentUser.uid) : false;
                
                let photoHTML = '';
                if (post.photoURL) {
                    photoHTML = `
                        <div class="post-photo">
                            <img src="${post.photoURL}" alt="Фото поста" onclick="openPhoto('${post.photoURL}')">
                        </div>
                    `;
                }

                postElement.innerHTML = `
                    <div class="post-header">
                        <div class="user-avatar">${post.userInitial || 'А'}</div>
                        <div class="post-user">
                            <div class="username">${post.username || 'Анонимный пользователь'}</div>
                            <div class="post-time">${formatTime(post.createdAt)}</div>
                        </div>
                    </div>
                    
                    ${post.text ? `<div class="post-content">${post.text.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>` : ''}
                    
                    ${photoHTML}
                    
                    <div class="post-footer">
                        <div class="like-container">
                            <button 
                                class="like-btn ${isLiked ? 'liked' : ''}" 
                                onclick="toggleLike('${post.id}', ${post.likes || 0})"
                                data-liked-by='${JSON.stringify(likedByArray)}'
                            >
                                ${isLiked ? '❤️' : '🤍'}
                            </button>
                            <span class="like-count">${post.likes || 0}</span>
                        </div>
                    </div>
                    
                    ${post.userId === (currentUser ? currentUser.uid : '') ? 
                        `<button class="delete-post" onclick="deletePost('${post.id}')">✕</button>` : 
                        ''
                    }
                `;

                container.appendChild(postElement);
            });
        }

        function openPhoto(photoURL) {
            window.open(photoURL, '_blank');
        }

        // ===== ЛАЙКИ =====
        async function toggleLike(postId, currentLikes) {
            if (!currentUser) {
                showMessage('Войдите в аккаунт чтобы ставить лайки', 'error');
                return;
            }

            const likeBtn = document.querySelector(`#post-${postId} .like-btn`);
            const likeCount = document.querySelector(`#post-${postId} .like-count`);
            
            // Получаем текущий массив лайков из data-атрибута
            const likedByArray = JSON.parse(likeBtn.getAttribute('data-liked-by') || '[]');
            const isLiked = likedByArray.includes(currentUser.uid);
            
            // Вычисляем новые значения
            const newLikes = isLiked ? currentLikes - 1 : currentLikes + 1;
            const newLikedBy = isLiked 
                ? likedByArray.filter(id => id !== currentUser.uid)
                : [...likedByArray, currentUser.uid];

            // Обновляем UI сразу для отзывчивости
            likeBtn.classList.toggle('liked');
            likeBtn.innerHTML = isLiked ? '🤍' : '❤️';
            likeCount.textContent = newLikes;
            likeBtn.setAttribute('data-liked-by', JSON.stringify(newLikedBy));
            likeBtn.classList.add('like-pop');
            setTimeout(() => likeBtn.classList.remove('like-pop'), 300);

            // Обновляем в Firestore
            try {
                await db.collection('posts').doc(postId).update({
                    likes: newLikes,
                    likedBy: newLikedBy
                });
                console.log('Лайк обновлен для поста', postId);
            } catch (error) {
                console.error('Ошибка обновления лайка:', error);
                // Откатываем изменения в UI
                likeBtn.classList.toggle('liked');
                likeBtn.innerHTML = isLiked ? '❤️' : '🤍';
                likeCount.textContent = currentLikes;
                likeBtn.setAttribute('data-liked-by', JSON.stringify(likedByArray));
                showMessage('Ошибка при обновлении лайка', 'error');
            }
        }

        // ===== УДАЛЕНИЕ ПОСТА =====
        async function deletePost(postId) {
            if (!confirm('Удалить этот пост?')) return;

            try {
                await db.collection('posts').doc(postId).delete();
                document.getElementById(`post-${postId}`).remove();
                showMessage('Пост удален', 'success');
            } catch (error) {
                console.error('Ошибка удаления поста:', error);
                showMessage('Ошибка при удалении поста', 'error');
            }
        }

        // ===== ЗАГРУЗКА ПОСТОВ =====
        function loadPosts() {
            const container = document.getElementById('postsContainer');
            container.innerHTML = '<div class="loading">Загрузка постов...</div>';

            db.collection('posts')
                .orderBy('createdAt', 'desc')
                .onSnapshot(snapshot => {
                    const posts = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        posts.push({
                            id: doc.id,
                            ...data
                        });
                    });
                    renderPosts(posts);
                }, error => {
                    console.error('Ошибка загрузки постов:', error);
                    container.innerHTML = '<div class="error">Ошибка загрузки постов. Проверьте консоль для деталей.</div>';
                });
        }

        // ===== АУТЕНТИФИКАЦИЯ И ЗАГРУЗКА ДАННЫХ =====
        function checkAuth() {
            auth.onAuthStateChanged(async (user) => {
                if (!user) {
                    window.location.href = 'index.html';
                    return;
                }

                currentUser = user;
                console.log('Пользователь авторизован:', user.uid);
                
                // Загружаем данные пользователя из Firestore
                const userData = await loadUserData(user.uid);
                
                // Обновляем информацию о пользователе в навигации
                const usernameElement = document.getElementById('username');
                const userAvatarElement = document.getElementById('userAvatar');
                
                if (userData && userData.username) {
                    usernameElement.textContent = userData.username;
                    userAvatarElement.textContent = userData.username.charAt(0).toUpperCase();
                } else if (user.displayName) {
                    usernameElement.textContent = user.displayName;
                    userAvatarElement.textContent = user.displayName.charAt(0).toUpperCase();
                } else if (user.email) {
                    const emailName = user.email.split('@')[0];
                    usernameElement.textContent = emailName;
                    userAvatarElement.textContent = emailName.charAt(0).toUpperCase();
                } else {
                    usernameElement.textContent = 'Пользователь';
                    userAvatarElement.textContent = 'U';
                }

                loadPosts();
            });
        }

        function logout() {
            auth.signOut()
                .then(() => {
                    window.location.href = 'index.html';
                })
                .catch(error => {
                    console.error('Ошибка выхода:', error);
                    showMessage('Ошибка при выходе', 'error');
                });
        }

        function openAdmin() {
            showMessage('Админ-панель в разработке', 'info');
        }

        function openProfile() {
            showMessage('Профиль в разработке', 'info');
        }

        // ===== ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ =====
        document.addEventListener('DOMContentLoaded', function() {
            updateTime();
            setInterval(updateTime, 60000);
            
            checkAuth();
        });
    </script>
</body>
</html>
