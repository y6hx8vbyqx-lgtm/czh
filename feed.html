<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>czhmass</title>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
/* --- твои стили, НЕ МЕНЯЛ --- */
:root{
  --bg:#000;
  --card:rgba(28,28,30,.9);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
}
*{box-sizing:border-box}
body{
  margin:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
}
.fade-in{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);backdrop-filter:blur(16px);
  border-radius:18px;padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}

.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}

.container{
  max-width:480px;margin:auto;
  padding:130px 14px 80px;
}

.create{
  background:var(--card);border-radius:22px;
  padding:16px;margin-bottom:16px;
}

.create textarea{
  width:100%;min-height:90px;
  background:#1c1c1e;border:1px solid var(--border);
  border-radius:16px;padding:12px;color:#fff;
}

.create button{
  width:100%;margin-top:12px;
  padding:14px;border:none;border-radius:16px;
  background:var(--accent);color:#fff;font-weight:600;
}

.post{
  background:var(--card);
  border-radius:24px;
  padding:16px;
  margin-bottom:14px;
}

.post-header{
  display:flex;align-items:center;gap:10px;
}

.avatar{
  width:42px;height:42px;border-radius:14px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;
  cursor:pointer;
}

.post-user{
  font-weight:600;
  cursor:pointer;
}

.post-time{color:var(--sub);font-size:13px}
.post-text{margin:10px 0 6px}

.post-actions{
  display:flex;gap:18px;
}

.action{
  background:none;border:none;color:var(--sub);font-size:18px;
}

.action.liked{color:#ff2d55}

.trash{
  margin-left:auto;background:none;border:none;
  color:var(--danger);font-size:18px;
}

/* --- SHEETS --- */
.sheet{
  position:fixed;inset:0;background:#000;
  transform:translateY(100%);
  transition:.35s ease;
  display:flex;flex-direction:column;
  z-index:2000;
}
.sheet.show{transform:translateY(0)}
.sheet-header{
  padding:16px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;
}
.sheet-body{flex:1;overflow:auto;padding:16px}
</style>
</head>

<body>

<div class="dynamic-island" id="time"></div>

<div class="navbar">
  <div class="logo">czhmass</div>
  <div>
    <button class="nav-btn" onclick="logout()">🚪</button>
  </div>
</div>

<div class="container">
  <div class="create">
    <textarea id="postText" placeholder="Что у вас нового?"></textarea>
    <button onclick="createPost()">Опубликовать</button>
  </div>
  <div id="feed"></div>
</div>

<!-- ПРОФИЛЬ -->
<div class="sheet" id="profileSheet">
  <div class="sheet-header">
    <strong id="profileName"></strong>
    <button class="action" onclick="closeProfile()">✕</button>
  </div>
  <div class="sheet-body" id="profilePosts"></div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
  authDomain:"czhmass.firebaseapp.com",
  projectId:"czhmass"
});

const db=firebase.firestore();
const auth=firebase.auth();

let currentUser,userData;

auth.onAuthStateChanged(async u=>{
  if(!u) return;
  currentUser=u;
  const snap=await db.collection("users").doc(u.uid).get();
  userData=snap.data()||{};
  loadPosts();
});

async function loadPosts(){
  feed.innerHTML="";
  const snap=await db.collection("posts").orderBy("createdAt","desc").get();
  snap.forEach(doc=>{
    const p=doc.data();
    feed.innerHTML+=`
    <div class="post fade-in">
      <div class="post-header">
        <div class="avatar" onclick="openProfile('${p.userId}','${p.username||"anon"}')">
          ${p.username?.[0]||"A"}
        </div>
        <div>
          <div class="post-user" onclick="openProfile('${p.userId}','${p.username||"anon"}')">
            @${p.username||"anon"}
          </div>
          <div class="post-time">
            ${new Date(p.createdAt.seconds*1000).toLocaleString()}
          </div>
        </div>
      </div>
      <div class="post-text">${p.text}</div>
    </div>`;
  });
}

async function openProfile(uid,username){
  profileName.textContent="@"+username;
  profilePosts.innerHTML="";
  profileSheet.classList.add("show");

  const snap=await db.collection("posts")
    .where("userId","==",uid)
    .orderBy("createdAt","desc").get();

  snap.forEach(d=>{
    const p=d.data();
    profilePosts.innerHTML+=`
      <div class="post fade-in">
        <div class="post-text">${p.text}</div>
      </div>`;
  });
}

function closeProfile(){
  profileSheet.classList.remove("show");
}

async function createPost(){
  if(!postText.value.trim()) return;
  await db.collection("posts").add({
    text:postText.value,
    userId:currentUser.uid,
    username:userData.username,
    createdAt:new Date()
  });
  postText.value="";
  loadPosts();
}

function logout(){
  auth.signOut();
}

setInterval(()=>{
  time.textContent=new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
},1000);
</script>

</body>
</html>
