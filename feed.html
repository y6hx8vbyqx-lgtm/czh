<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фид</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root {
            --bg: #ffffff;
            --surface: #f5f5f5;
            --text: #000000;
            --sub: #666666;
            --border: #e0e0e0;
            --accent: #007aff;
            --sheet-bg: rgba(0,0,0,0.5);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --surface: #1c1c1e;
                --text: #ffffff;
                --sub: #8e8e93;
                --border: #38383a;
                --accent: #0a84ff;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .title {
            font-size: 28px;
            font-weight: 700;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* POST INPUT */
        .post-input {
            background: var(--surface);
            border-radius: 15px;
            padding: 16px;
            margin-bottom: 30px;
        }

        .post-textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 16px;
            resize: none;
            min-height: 60px;
            outline: none;
        }

        .post-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }

        /* POSTS */
        .posts {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .post {
            background: var(--surface);
            border-radius: 15px;
            padding: 16px;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .post-avatar {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .post-username {
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .post-username:hover {
            opacity: 0.7;
        }

        .post-time {
            color: var(--sub);
            font-size: 14px;
        }

        .post-text {
            font-size: 16px;
            line-height: 1.5;
        }

        /* SHEET */
        .sheet {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--sheet-bg);
            display: flex;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .sheet.show {
            opacity: 1;
            pointer-events: auto;
        }

        .sheet-content {
            background: var(--bg);
            width: 100%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s;
            max-height: 90vh;
            overflow-y: auto;
        }

        .sheet.show .sheet-content {
            transform: translateY(0);
        }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        /* LOADER */
        .loader {
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--sub);
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--sub);
        }

        /* PROFILE */
        .profile-header{
          display:flex;
          align-items:center;
          gap:16px;
          margin-bottom:20px;
        }

        .profile-avatar{
          width:72px;
          height:72px;
          border-radius:22px;
          background:var(--accent);
          display:flex;
          align-items:center;
          justify-content:center;
          font-size:28px;
          font-weight:700;
        }

        .profile-info{
          display:flex;
          flex-direction:column;
          gap:6px;
        }

        .profile-name{
          font-size:18px;
          font-weight:700;
        }

        .profile-stats{
          color:var(--sub);
          font-size:14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Фид</div>
        <div class="actions">
            <button class="btn" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div class="post-input">
        <textarea class="post-textarea" id="postText" placeholder="Что у вас нового?"></textarea>
        <div class="post-actions">
            <button class="btn" onclick="sendPost()">Отправить</button>
        </div>
    </div>

    <div class="posts" id="posts"></div>

    <div class="sheet" id="profileSheet">
        <div class="sheet-content">
            <div class="sheet-header">
                <strong>Профиль</strong>
                <button class="action" onclick="closeProfile()">✕</button>
            </div>

            <div class="sheet-body">

                <!-- HEADER PROFILE -->
                <div class="profile-header">
                    <div class="profile-avatar" id="profileAvatar">A</div>
                    <div class="profile-info">
                        <div class="profile-name" id="profileName">@anon</div>
                        <div class="profile-stats">
                            <span id="profilePostsCount">0</span> постов
                        </div>
                    </div>
                </div>

                <!-- POSTS -->
                <div id="profilePosts"></div>

            </div>
        </div>
    </div>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyDINaXN-l4T_ob0G3g8-B4QxX4jeYbsmHY",
            authDomain: "feed-3f2d7.firebaseapp.com",
            projectId: "feed-3f2d7",
            storageBucket: "feed-3f2d7.firebasestorage.app",
            messagingSenderId: "186229575699",
            appId: "1:186229575699:web:4d5d1fe8f8c7e81881f645"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // DOM elements
        const postsDiv = document.getElementById("posts");
        const postText = document.getElementById("postText");
        const profileSheet = document.getElementById("profileSheet");
        const profileName = document.getElementById("profileName");
        const profilePosts = document.getElementById("profilePosts");
        const profileAvatar = document.getElementById("profileAvatar");
        const profilePostsCount = document.getElementById("profilePostsCount");

        // Auth state observer
        auth.onAuthStateChanged((user) => {
            if (user) {
                loadPosts();
            } else {
                // Sign in anonymously
                auth.signInAnonymously().catch(console.error);
            }
        });

        // Load posts
        async function loadPosts() {
            const snap = await db.collection("posts")
                .orderBy("createdAt", "desc")
                .get();

            postsDiv.innerHTML = "";

            snap.forEach(doc => {
                const post = doc.data();
                const postDiv = document.createElement("div");
                postDiv.className = "post fade-in";
                postDiv.innerHTML = `
                    <div class="post-header">
                        <div class="post-author">
                            <div class="post-avatar">${post.username?.[0]?.toUpperCase() || "A"}</div>
                            <div class="post-username" onclick="openProfile('${post.userId}', '${post.username}')">
                                @${post.username}
                            </div>
                        </div>
                        <div class="post-time">${formatTime(post.createdAt?.toDate())}</div>
                    </div>
                    <div class="post-text">${post.text}</div>
                `;
                postsDiv.appendChild(postDiv);
            });
        }

        // Send post
        async function sendPost() {
            const user = auth.currentUser;
            if (!user) return;

            const text = postText.value.trim();
            if (!text) return;

            const username = user.isAnonymous ? "anon" + user.uid.slice(-4) : user.displayName || "user";

            await db.collection("posts").add({
                text: text,
                userId: user.uid,
                username: username,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            postText.value = "";
            loadPosts();
        }

        // Open profile
        async function openProfile(uid, username){
            profileSheet.classList.add("show");

            // header
            profileName.textContent = "@"+username;
            profileAvatar.textContent = username?.[0]?.toUpperCase() || "A";
            profilePosts.innerHTML = "";
            profilePostsCount.textContent = "0";

            const snap = await db.collection("posts")
                .where("userId","==",uid)
                .orderBy("createdAt","desc")
                .get();

            let count = 0;

            snap.forEach(d=>{
                const p = d.data();
                count++;

                profilePosts.innerHTML += `
                    <div class="post fade-in">
                        <div class="post-text">${p.text}</div>
                    </div>
                `;
            });

            profilePostsCount.textContent = count;
        }

        // Close profile
        function closeProfile() {
            profileSheet.classList.remove("show");
        }

        // Format time
        function formatTime(date) {
            if (!date) return "только что";
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            
            if (minutes < 1) return "только что";
            if (minutes < 60) return `${minutes} мин назад`;
            
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours} ч назад`;
            
            const days = Math.floor(hours / 24);
            if (days < 7) return `${days} д назад`;
            
            return date.toLocaleDateString("ru-RU");
        }

        // Logout
        function logout() {
            if (confirm("Выйти из аккаунта?")) {
                auth.signOut();
                location.reload();
            }
        }

        // Enter to send
        postText.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendPost();
            }
        });
    </script>
</body>
</html>
