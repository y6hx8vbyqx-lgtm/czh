<style>

  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);

  --success:#30d158;

}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);
  border-radius:18px;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}
.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}

.container{
  max-width:480px;
  margin:auto;
  padding:130px 14px 80px;
}

.create{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
}
.create textarea{
  width:100%;
  min-height:80px;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.create button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border:none;
  border-radius:16px;
  background:var(--accent);
  color:#fff;
  font-weight:600;
}

/* ПОИСК ПОЛЬЗОВАТЕЛЕЙ */
.search{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
  position:relative;
}
.search-input{
  width:100%;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px 16px 14px 44px;
  color:#fff;
  font-size:16px;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  border:1px solid var(--border);
}
.search-input:focus{
  outline:none;
  border-color:var(--accent);
}
.search-icon{
  position:absolute;
  left:28px;
  top:28px;
  color:var(--sub);
  font-size:18px;
  pointer-events:none;
}
.search-results{
  margin-top:12px;
  max-height:200px;
  overflow-y:auto;
  display:none;
}
.search-results.show{
  display:block;
}
.search-result{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:14px;
  background:#1c1c1e;
  margin-bottom:8px;
  cursor:pointer;
  transition:background 0.2s;
}
.search-result:hover{
  background:rgba(255,255,255,0.1);
}
.search-result:last-child{
  margin-bottom:0;
}
.search-avatar{
  width:40px;
  height:40px;
  border-radius:14px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:16px;
}
.search-username{
  font-weight:600;
  font-size:15px;
}
.no-results{
  text-align:center;
  color:var(--sub);
  padding:20px 0;
  font-size:14px;
}

.post{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
  position:relative;
  transition:box-shadow 0.3s ease;
}
.post.highlighted{
  box-shadow:0 0 0 2px var(--accent), 0 0 20px rgba(102,126,234,0.3);
}
.post-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}
.avatar{
  width:40px;
  height:40px;
  border-radius:14px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}
.post-user-info{
  display:flex;
  flex-direction:column;
  flex-grow:1;
}
.post-user{
  font-weight:600;
  cursor:pointer;
  transition:opacity 0.2s;
}
.post-user:hover{
  opacity:0.7;
}
.post-time{
  color:var(--sub);
  font-size:12px;
  margin-top:2px;
}
.post-text{
  margin:10px 0;
  line-height:1.4;
  word-break:break-word;
}
.post-actions{
  display:flex;
  gap:16px;
  margin-top:12px;
}
.action{
  background:none;
  border:none;
  color:var(--sub);
  font-size:18px;
  cursor:pointer;
  transition:transform 0.2s;
  display:flex;
  align-items:center;
  gap:4px;
}
.action:hover{
  transform:scale(1.1);
}
.liked{color:#ff2d55}
.viewed{color:var(--views)}
.trash{
  margin-left:auto;
  background:none;border:none;
  color:var(--danger);font-size:18px;
  cursor:pointer;
  padding:0;
}

.sheet{
  position:fixed;
  inset:0;
  background:#000;
  transform:translateY(100%);
  transition:.35s ease;
  z-index:2000;
  display:flex;
  flex-direction:column;
}
.sheet.show{transform:translateY(0)}
.sheet-header{
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
}
.sheet-body{
  flex:1;
  overflow:auto;
  padding:14px;
}
.sheet-footer{
  padding:12px;
  border-top:1px solid var(--border);
  display:flex;
  gap:8px;
}
.sheet-footer input{
  flex:1;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* PROFILE SHEET */
.profile-header{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:20px;
}
.profile-avatar{
  width:72px;height:72px;
  border-radius:22px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:700;
}
.profile-info{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.profile-name{
  font-size:18px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:8px;
}
.change-name-btn{
  background:none;
  border:none;
  color:var(--sub);
  font-size:14px;
  cursor:pointer;
  padding:4px 8px;
  border-radius:8px;
  transition:background 0.2s;
}
.change-name-btn:hover{
  background:rgba(255,255,255,0.1);
}
.profile-stats{
  display:flex;
  gap:16px;
}
.profile-stat{
  display:flex;
  flex-direction:column;
}
.profile-stat-value{
  font-size:16px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:4px;
}
.profile-stat-label{
  color:var(--sub);
  font-size:12px;
  margin-top:2px;
}
.likes-stat{
  color:#ff2d55;
}
.posts-stat{
  color:#5ac8fa;
}
.views-stat{
  color:var(--views);
}

/* Уведомление */
.notification{
  position:fixed;
  top:120px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:var(--accent);
  color:white;
  padding:12px 20px;
  border-radius:14px;
  font-weight:600;
  z-index:1999;
  opacity:0;
  transition:opacity 0.3s, transform 0.3s;
  pointer-events:none;
  max-width:90%;
  text-align:center;
}
.notification.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.modal-overlay{

  justify-content:center;
  z-index:3000;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s;
}
.modal-overlay.show{
  opacity:1;
  pointer-events:auto;
}
.modal{
  background:var(--card);
  border-radius:20px;
  padding:24px;
  width:90%;
  max-width:400px;
  transform:translateY(20px);
  transition:transform 0.3s;
}
.modal-overlay.show .modal{
  transform:translateY(0);
}
.modal-header{

.modal-title{

  font-weight:700;
}

  border:none;

  font-size:20px;

  padding:0;

  height:24px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.modal-input{

  background:#1c1c1e;

  padding:14px;
  color:#fff;
  font-size:16px;
  margin-bottom:16px;
  font-family:inherit;
}
.modal-input:focus{
  outline:none;
  border-color:var(--accent);
}
.modal-buttons{

  gap:12px;
}
.modal-btn{

  border-radius:14px;
  font-weight:600;
  cursor:pointer;
  font-size:16px;
}
.modal-btn.primary{
  background:var(--accent);
  color:white;
}
.modal-btn.secondary{
  background:rgba(255,255,255,0.1);
  color:white;
}

  margin-left:auto;
}
.comment-delete-btn:hover{
  background:rgba(255,69,58,0.1);
}
