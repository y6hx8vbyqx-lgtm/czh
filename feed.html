<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лента - czhmass.com</title>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 10px;
        }

        /* iOS Динамический островок */
        .dynamic-island {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 35px;
            background: rgba(40, 40, 40, 0.95);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 15px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        .island-time {
            font-size: 15px;
            font-weight: 600;
            color: white;
        }

        /* Навигация */
        .navbar {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(28, 28, 30, 0.8);
            padding: 12px 20px;
            border-radius: 15px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 999;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: auto;
            white-space: nowrap;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-admin {
            background: linear-gradient(135deg, #805ad5, #6b46c1);
        }

        .btn-admin:hover {
            background: linear-gradient(135deg, #6b46c1, #553c9a);
        }

        .btn-logout {
            background: rgba(255, 59, 48, 0.2);
            color: #ff3b30;
            padding: 8px 14px;
        }

        .btn-logout:hover {
            background: rgba(255, 59, 48, 0.3);
        }

        /* Кнопка профиля */
        .profile-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            min-width: auto;
        }

        .profile-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .profile-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: white;
            flex-shrink: 0;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .profile-username {
            font-size: 12px;
            font-weight: 600;
            color: white;
            line-height: 1.2;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .profile-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.2;
        }

        /* Основной контент */
        .container {
            padding: 140px 20px 100px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Форма создания поста */
        .create-post {
            background: rgba(28, 28, 30, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .post-input {
            width: 100%;
            min-height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 16px;
            color: white;
            font-size: 16px;
            resize: vertical;
            margin-bottom: 15px;
            font-family: inherit;
        }

        .post-input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.07);
        }

        .post-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: transform 0.2s, opacity 0.2s;
        }

        .post-button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .post-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Пост в стиле iOS */
        .post-ios {
            background: rgba(28, 28, 30, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .post-ios:hover {
            transform: translateY(-2px);
            background: rgba(35, 35, 37, 0.9);
        }

        /* Аватар и заголовок */
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            flex-shrink: 0;
        }

        .post-user {
            flex: 1;
        }

        .username {
            font-size: 17px;
            font-weight: 600;
            color: white;
            margin-bottom: 3px;
        }

        .post-time {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Текст поста */
        .post-content {
            font-size: 16px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Футер поста с лайками */
        .post-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        /* Лайки */
        .like-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .like-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 6px;
            border-radius: 12px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            user-select: none;
        }

        .like-btn:hover {
            background: rgba(255, 59, 48, 0.1);
            transform: scale(1.05);
        }

        .like-btn.liked {
            color: #ff3b30;
            background: rgba(255, 59, 48, 0.15);
        }

        .like-btn:not(.liked) {
            color: rgba(255, 255, 255, 0.6);
        }

        .like-count {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            min-width: 24px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        /* Кнопка удаления */
        .delete-post {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s, background 0.3s;
        }

        .post-ios:hover .delete-post {
            opacity: 1;
        }

        .delete-post:hover {
            background: rgba(255, 59, 48, 0.2);
        }

        /* ===== КОММЕНТАРИИ В СТИЛЕ INSTAGRAM ===== */
        .comments-section {
            margin-top: 15px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }

        .comments-toggle {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 500;
            padding: 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .comments-toggle:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        .comments-toggle svg {
            transition: transform 0.3s ease;
        }

        .comments-toggle.active svg {
            transform: rotate(180deg);
        }

        .comments-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .comments-list.expanded {
            max-height: 500px;
            overflow-y: auto;
        }

        .comment-item {
            display: flex;
            gap: 10px;
            padding: 12px 0;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #48c6ef, #6f86d6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: white;
            flex-shrink: 0;
        }

        .comment-content {
            flex: 1;
        }

        .comment-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }

        .comment-username {
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .comment-time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        .comment-text {
            font-size: 14px;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.9);
            word-wrap: break-word;
        }

        .delete-comment {
            background: none;
            border: none;
            color: rgba(255, 59, 48, 0.6);
            font-size: 12px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            opacity: 0;
            transition: all 0.2s;
        }

        .comment-item:hover .delete-comment {
            opacity: 1;
        }

        .delete-comment:hover {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
        }

        .comment-form {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            align-items: flex-start;
        }

        .comment-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 100px;
            font-family: inherit;
        }

        .comment-input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.07);
        }

        .comment-submit {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: transform 0.2s, opacity 0.2s;
            flex-shrink: 0;
        }

        .comment-submit:hover:not(:disabled) {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .comment-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Иконка комментариев в футере */
        .comment-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .comment-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.9);
        }

        .comment-count {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Сообщения */
        .message {
            position: fixed;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1001;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            display: none;
            max-width: 90%;
            text-align: center;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translate(-50%, -20px);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        .success {
            background: rgba(52, 199, 89, 0.15);
            color: #34c759;
            border-color: rgba(52, 199, 89, 0.3);
        }

        .error {
            background: rgba(255, 59, 48, 0.15);
            color: #ff3b30;
            border-color: rgba(255, 59, 48, 0.3);
        }

        .info {
            background: rgba(0, 122, 255, 0.15);
            color: #007aff;
            border-color: rgba(0, 122, 255, 0.3);
        }

        /* Загрузка */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }

        /* Анимация лайка */
        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .like-pop {
            animation: heartPop 0.3s ease;
        }

        /* ===== УЛУЧШЕННАЯ МОБИЛЬНАЯ ВЕРСИЯ ===== */
        @media (max-width: 768px) {
            .navbar {
                width: 95%;
                top: 65px;
                padding: 10px 15px;
            }

            .container {
                padding: 130px 15px 80px;
            }

            .dynamic-island {
                width: 110px;
                height: 32px;
                top: 10px;
            }

            .post-ios {
                padding: 16px;
            }

            .nav-buttons {
                gap: 6px;
            }

            .btn {
                padding: 8px 12px;
                font-size: 13px;
            }

            .comment-form {
                flex-direction: column;
                gap: 8px;
            }

            .comment-input {
                width: 100%;
            }

            .comment-submit {
                width: 100%;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- Динамический островок с временем -->
    <div class="dynamic-island">
        <div class="island-time" id="currentTime">00:00</div>
    </div>

    <!-- Навигация -->
    <nav class="navbar">
        <div class="logo">czhmass.com</div>
        <div class="nav-buttons">
            <button class="btn btn-admin" onclick="showMessage('Админ-панель в разработке', 'info')">
                <span>👑 Админ</span>
            </button>
            <div class="profile-btn" id="profileBtn" onclick="window.location.href='profile.html'">
                <div class="profile-avatar" id="userAvatar">U</div>
                <div class="profile-info">
                    <div class="profile-username" id="userName">Гость</div>
                    <div class="profile-label">Профиль</div>
                </div>
            </div>
            <button class="btn btn-logout" onclick="logout()">
                <span>Выйти</span>
            </button>
        </div>
    </nav>

    <!-- Сообщения -->
    <div class="message" id="message"></div>

    <!-- Основной контент -->
    <div class="container">
        <!-- Форма создания поста -->
        <div class="create-post">
            <textarea 
                class="post-input" 
                id="postInput" 
                placeholder="Что у вас нового?" 
                maxlength="1000"></textarea>
            <button class="post-button" id="postButton" onclick="createPost()">Опубликовать</button>
        </div>

        <!-- Лента постов -->
        <div id="feed"></div>
    </div>

    <script>
        // === ВАЖНО: ЗАМЕНИ ЭТОТ КОНФИГ НА СВОЙ ИЗ FIREBASE ===
        const firebaseConfig = {
            apiKey: "AIzaSyA_wcR_XpnP3q6E_uaOyaI8y6fL-Wl2MhE",
            authDomain: "czhmass.firebaseapp.com",
            projectId: "czhmass",
            storageBucket: "czhmass.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abcdef123456"
        };

        // Инициализация Firebase
        let app, db, auth;
        let currentUser = null;
        let unsubscribePosts = null;
        let unsubscribeComments = {};

        function initializeFirebase() {
            try {
                // Проверяем, загружены ли Firebase SDK
                if (typeof firebase === 'undefined') {
                    showMessage('Firebase SDK не загружен', 'error');
                    setupLocalMode();
                    return;
                }

                // Инициализируем Firebase
                if (!firebase.apps.length) {
                    app = firebase.initializeApp(firebaseConfig);
                    console.log("✅ Firebase инициализирован");
                } else {
                    app = firebase.app();
                }

                db = firebase.firestore();
                auth = firebase.auth();

                // Настройка слушателя авторизации
                auth.onAuthStateChanged(async (user) => {
                    console.log("Состояние авторизации:", user ? "Вошел" : "Не вошел");
                    
                    if (user) {
                        // Пользователь вошел
                        currentUser = {
                            uid: user.uid,
                            displayName: user.displayName || `User_${user.uid.slice(0, 6)}`,
                            email: user.email
                        };
                        
                        updateUserInfo();
                        loadPostsRealtime();
                        showMessage('Вход выполнен', 'success');
                    } else {
                        // Пробуем анонимный вход
                        try {
                            console.log("Попытка анонимного входа...");
                            const result = await auth.signInAnonymously();
                            console.log("✅ Анонимный вход успешен:", result.user.uid);
                        } catch (authError) {
                            console.error("❌ Ошибка анонимного входа:", authError);
                            
                            // Если Firebase не работает, переходим в локальный режим
                            if (authError.code === 'auth/invalid-api-key' || 
                                authError.code === 'auth/network-request-failed') {
                                setupLocalMode();
                            } else {
                                showMessage('Ошибка входа: ' + authError.message, 'error');
                            }
                        }
                    }
                });

            } catch (error) {
                console.error("❌ Критическая ошибка Firebase:", error);
                showMessage('Ошибка инициализации Firebase', 'error');
                setupLocalMode();
            }
        }

        function setupLocalMode() {
            console.log("🔄 Включаю локальный режим");
            
            currentUser = {
                uid: 'local_' + Date.now(),
                displayName: 'Локальный пользователь',
                email: null
            };
            
            updateUserInfo();
            loadLocalPosts();
            showMessage('Работаю в локальном режиме', 'info');
        }

        // Обновление времени
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ru-RU', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            const timeEl = document.getElementById('currentTime');
            if (timeEl) timeEl.textContent = timeString;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Показать сообщение
        function showMessage(text, type = 'success') {
            const messageEl = document.getElementById('message');
            if (!messageEl) return;
            
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
            
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 3000);
        }

        // Обновление информации о пользователе
        function updateUserInfo() {
            const userNameEl = document.getElementById('userName');
            const userAvatarEl = document.getElementById('userAvatar');
            const postButton = document.getElementById('postButton');
            
            if (!userNameEl || !userAvatarEl || !postButton) return;
            
            if (currentUser) {
                const name = currentUser.displayName || 'Пользователь';
                userNameEl.textContent = name;
                userAvatarEl.textContent = name.charAt(0).toUpperCase();
                postButton.disabled = false;
            } else {
                userNameEl.textContent = 'Гость';
                userAvatarEl.textContent = 'G';
                postButton.disabled = true;
            }
        }

        // Создание поста
        async function createPost() {
            if (!currentUser) {
                showMessage('Войдите, чтобы опубликовать пост', 'error');
                return;
            }

            const postInput = document.getElementById('postInput');
            const content = postInput.value.trim();
            
            if (!content) {
                showMessage('Введите текст поста', 'error');
                return;
            }

            const button = document.getElementById('postButton');
            button.disabled = true;
            button.textContent = 'Публикация...';

            try {
                const postData = {
                    content: content,
                    authorId: currentUser.uid,
                    authorName: currentUser.displayName,
                    createdAt: new Date(),
                    likes: 0,
                    likedBy: [],
                    commentsCount: 0
                };

                if (db) {
                    // Режим Firebase
                    await db.collection('posts').add({
                        ...postData,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    showMessage('Пост опубликован!', 'success');
                } else {
                    // Локальный режим
                    postData.id = 'local_' + Date.now();
                    addPostToFeed(postData);
                    savePostToLocalStorage(postData);
                    showMessage('Пост сохранен локально', 'info');
                }
                
                postInput.value = '';
                
            } catch (error) {
                console.error('Ошибка создания поста:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            } finally {
                button.disabled = false;
                button.textContent = 'Опубликовать';
            }
        }

        // Загрузка постов в реальном времени
        function loadPostsRealtime() {
            const feedEl = document.getElementById('feed');
            if (!feedEl) return;
            
            feedEl.innerHTML = '<div class="loading">Загрузка ленты...</div>';

            if (!db) {
                loadLocalPosts();
                return;
            }

            try {
                // Отписываемся от предыдущего слушателя
                if (unsubscribePosts) {
                    unsubscribePosts();
                }

                unsubscribePosts = db.collection('posts')
                    .orderBy('createdAt', 'desc')
                    .limit(50)
                    .onSnapshot((snapshot) => {
                        feedEl.innerHTML = '';
                        
                        if (snapshot.empty) {
                            feedEl.innerHTML = '<div class="empty">Пока нет постов. Будь первым!</div>';
                            return;
                        }
                        
                        snapshot.forEach(doc => {
                            const post = doc.data();
                            post.id = doc.id;
                            addPostToFeed(post);
                        });
                    }, (error) => {
                        console.error('Ошибка Firestore:', error);
                        showMessage('Ошибка загрузки постов', 'error');
                        setupLocalMode();
                    });
                    
            } catch (error) {
                console.error('Ошибка подключения:', error);
                setupLocalMode();
            }
        }

        // Локальные посты
        function loadLocalPosts() {
            const feedEl = document.getElementById('feed');
            if (!feedEl) return;
            
            feedEl.innerHTML = '<div class="loading">Загрузка локальных постов...</div>';
            
            setTimeout(() => {
                const localPosts = JSON.parse(localStorage.getItem('localPosts') || '[]');
                
                if (localPosts.length === 0) {
                    feedEl.innerHTML = '<div class="empty">Пока нет постов. Будь первым!</div>';
                    return;
                }
                
                feedEl.innerHTML = '';
                localPosts.forEach(post => addPostToFeed(post));
            }, 500);
        }

        function savePostToLocalStorage(post) {
            const posts = JSON.parse(localStorage.getItem('localPosts') || '[]');
            posts.unshift(post);
            localStorage.setItem('localPosts', JSON.stringify(posts.slice(0, 50)));
        }

        // Добавление поста в ленту
        function addPostToFeed(post) {
            const feedEl = document.getElementById('feed');
            if (!feedEl) return;
            
            // Проверяем, нет ли уже такого поста
            if (document.getElementById(`post-${post.id}`)) {
                return;
            }
            
            const timeAgo = getTimeAgo(post.createdAt);
            const isAuthor = currentUser && currentUser.uid === post.authorId;
            const isLiked = post.likedBy?.includes(currentUser?.uid) || false;
            
            const postEl = document.createElement('div');
            postEl.className = 'post-ios';
            postEl.id = `post-${post.id}`;
            
            postEl.innerHTML = `
                <div class="post-header">
                    <div class="user-avatar">${(post.authorName || 'А').charAt(0).toUpperCase()}</div>
                    <div class="post-user">
                        <div class="username">${post.authorName || 'Аноним'}</div>
                        <div class="post-time">${timeAgo}</div>
                    </div>
                </div>
                
                <div class="post-content">${escapeHtml(post.content || '')}</div>
                
                <div class="post-footer">
                    <div class="like-container">
                        <button class="like-btn ${isLiked ? 'liked' : ''}" 
                                onclick="toggleLike('${post.id}')">
                            ${isLiked ? '❤️' : '🤍'}
                        </button>
                        <span class="like-count">${post.likes || 0}</span>
                    </div>
                    
                    <button class="comment-btn" onclick="toggleComments('${post.id}')">
                        <span>💬</span>
                        <span class="comment-count">${post.commentsCount || 0}</span>
                    </button>
                </div>
                
                ${isAuthor ? `
                    <button class="delete-post" onclick="deletePost('${post.id}')">
                        🗑️
                    </button>
                ` : ''}
                
                <!-- Секция комментариев -->
                <div class="comments-section" id="comments-${post.id}">
                    <button class="comments-toggle" onclick="toggleComments('${post.id}')">
                        <span>Комментарии (${post.commentsCount || 0})</span>
                        <svg width="12" height="8" viewBox="0 0 12 8" fill="currentColor">
                            <path d="M1.41 0L6 4.58L10.59 0L12 1.41L6 7.41L0 1.41L1.41 0Z"/>
                        </svg>
                    </button>
                    
                    <div class="comments-list" id="comments-list-${post.id}">
                        <!-- Комментарии загружаются здесь -->
                    </div>
                    
                    <form class="comment-form" onsubmit="addComment('${post.id}'); return false;">
                        <textarea class="comment-input" id="comment-input-${post.id}" 
                                  placeholder="Добавить комментарий..." 
                                  maxlength="500" required></textarea>
                        <button type="submit" class="comment-submit" id="comment-submit-${post.id}">
                            ➤
                        </button>
                    </form>
                </div>
            `;
            
            // Вставляем пост в начало ленты
            if (feedEl.firstChild) {
                feedEl.insertBefore(postEl, feedEl.firstChild);
            } else {
                feedEl.appendChild(postEl);
            }
            
            // Загружаем комментарии для этого поста
            loadComments(post.id);
        }

        // Загрузка комментариев
        async function loadComments(postId) {
            const commentsList = document.getElementById(`comments-list-${postId}`);
            if (!commentsList) return;
            
            try {
                if (db) {
                    // Отписываемся от предыдущего слушателя
                    if (unsubscribeComments[postId]) {
                        unsubscribeComments[postId]();
                    }
                    
                    // Режим Firebase
                    unsubscribeComments[postId] = db.collection('posts').doc(postId)
                        .collection('comments')
                        .orderBy('createdAt')
                        .onSnapshot((snapshot) => {
                            commentsList.innerHTML = '';
                            
                            if (snapshot.empty) {
                                commentsList.innerHTML = '<div style="padding: 20px; text-align: center; color: rgba(255,255,255,0.5);">Пока нет комментариев</div>';
                                return;
                            }
                            
                            snapshot.forEach(doc => {
                                const comment = {
                                    id: doc.id,
                                    ...doc.data()
                                };
                                addCommentToPost(postId, comment);
                            });
                        }, (error) => {
                            console.error('Ошибка загрузки комментариев:', error);
                        });
                } else {
                    // Локальный режим
                    const localComments = JSON.parse(localStorage.getItem(`comments_${postId}`) || '[]');
                    commentsList.innerHTML = '';
                    
                    if (localComments.length === 0) {
                        commentsList.innerHTML = '<div style="padding: 20px; text-align: center; color: rgba(255,255,255,0.5);">Пока нет комментариев</div>';
                        return;
                    }
                    
                    localComments.forEach(comment => {
                        addCommentToPost(postId, comment);
                    });
                }
                
            } catch (error) {
                console.error('Ошибка загрузки комментариев:', error);
                commentsList.innerHTML = '<div style="color: rgba(255,255,255,0.5); padding: 10px;">Ошибка загрузки комментариев</div>';
            }
        }

        function addCommentToPost(postId, comment) {
            const commentsList = document.getElementById(`comments-list-${postId}`);
            if (!commentsList) return;
            
            // Проверяем, нет ли уже такого комментария
            if (document.getElementById(`comment-${comment.id}`)) {
                return;
            }
            
            const timeAgo = getTimeAgo(comment.createdAt);
            const isAuthor = currentUser && currentUser.uid === comment.authorId;
            
            const commentEl = document.createElement('div');
            commentEl.className = 'comment-item';
            commentEl.id = `comment-${comment.id}`;
            
            commentEl.innerHTML = `
                <div class="comment-avatar">${(comment.authorName || 'А').charAt(0).toUpperCase()}</div>
                <div class="comment-content">
                    <div class="comment-header">
                        <div class="comment-username">${comment.authorName || 'Аноним'}</div>
                        <div class="comment-time">${timeAgo}</div>
                    </div>
                    <div class="comment-text">${escapeHtml(comment.text || '')}</div>
                </div>
                ${isAuthor ? `
                    <button class="delete-comment" onclick="deleteComment('${postId}', '${comment.id}')">
                        ✕
                    </button>
                ` : ''}
            `;
            
            // Если список пустой, очищаем сообщение "нет комментариев"
            if (commentsList.innerHTML.includes('Пока нет комментариев')) {
                commentsList.innerHTML = '';
            }
            
            commentsList.appendChild(commentEl);
        }

        // Добавление комментария
        async function addComment(postId) {
            if (!currentUser) {
                showMessage('Войдите, чтобы комментировать', 'error');
                return;
            }

            const input = document.getElementById(`comment-input-${postId}`);
            const text = input.value.trim();
            
            if (!text) {
                showMessage('Введите текст комментария', 'error');
                return;
            }

            if (text.length > 500) {
                showMessage('Комментарий слишком длинный (макс. 500 символов)', 'error');
                return;
            }

            const button = document.getElementById(`comment-submit-${postId}`);
            button.disabled = true;

            try {
                const commentData = {
                    text: text,
                    authorId: currentUser.uid,
                    authorName: currentUser.displayName,
                    createdAt: new Date(),
                    postId: postId
                };

                if (db) {
                    // Режим Firebase
                    await db.collection('posts').doc(postId).collection('comments').add({
                        ...commentData,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    // Обновляем счетчик комментариев
                    await db.collection('posts').doc(postId).update({
                        commentsCount: firebase.firestore.FieldValue.increment(1)
                    });
                } else {
                    // Локальный режим
                    commentData.id = 'comment_' + Date.now();
                    addCommentToPost(postId, commentData);
                    
                    // Сохраняем в localStorage
                    const comments = JSON.parse(localStorage.getItem(`comments_${postId}`) || '[]');
                    comments.push(commentData);
                    localStorage.setItem(`comments_${postId}`, JSON.stringify(comments));
                    
                    // Обновляем счетчик в посте
                    const postElement = document.getElementById(`post-${postId}`);
                    if (postElement) {
                        const commentCountEl = postElement.querySelector('.comment-count');
                        const commentsToggleEl = postElement.querySelector('.comments-toggle span');
                        
                        const currentCount = parseInt(commentCountEl.textContent) || 0;
                        const newCount = currentCount + 1;
                        
                        commentCountEl.textContent = newCount;
                        commentsToggleEl.textContent = `Комментарии (${newCount})`;
                    }
                }
                
                showMessage('Комментарий добавлен', 'success');
                input.value = '';
                
                // Автоматически раскрываем комментарии
                toggleComments(postId, true);
                
            } catch (error) {
                console.error('Ошибка добавления комментария:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            } finally {
                button.disabled = false;
            }
        }

        // Удаление комментария
        async function deleteComment(postId, commentId) {
            if (!confirm('Удалить комментарий?')) return;

            try {
                if (db) {
                    // Режим Firebase
                    await db.collection('posts').doc(postId).collection('comments').doc(commentId).delete();
                    
                    // Обновляем счетчик
                    await db.collection('posts').doc(postId).update({
                        commentsCount: firebase.firestore.FieldValue.increment(-1)
                    });
                } else {
                    // Локальный режим
                    const commentEl = document.getElementById(`comment-${commentId}`);
                    if (commentEl) {
                        commentEl.remove();
                    }
                    
                    // Обновляем localStorage
                    const comments = JSON.parse(localStorage.getItem(`comments_${postId}`) || '[]');
                    const filteredComments = comments.filter(c => c.id !== commentId);
                    localStorage.setItem(`comments_${postId}`, JSON.stringify(filteredComments));
                    
                    // Обновляем счетчик
                    const postElement = document.getElementById(`post-${postId}`);
                    if (postElement) {
                        const commentCountEl = postElement.querySelector('.comment-count');
                        const commentsToggleEl = postElement.querySelector('.comments-toggle span');
                        
                        const currentCount = parseInt(commentCountEl.textContent) || 0;
                        const newCount = Math.max(0, currentCount - 1);
                        
                        commentCountEl.textContent = newCount;
                        commentsToggleEl.textContent = `Комментарии (${newCount})`;
                    }
                }
                
                showMessage('Комментарий удален', 'success');
                
            } catch (error) {
                console.error('Ошибка удаления комментария:', error);
                showMessage('Ошибка при удалении комментария', 'error');
            }
        }

        // Переключение видимости комментариев
        function toggleComments(postId, forceOpen = false) {
            const commentsList = document.getElementById(`comments-list-${postId}`);
            const toggleBtn = document.querySelector(`#comments-${postId} .comments-toggle`);
            
            if (!commentsList || !toggleBtn) return;
            
            if (forceOpen || !commentsList.classList.contains('expanded')) {
                commentsList.classList.add('expanded');
                toggleBtn.classList.add('active');
                
                // Прокручиваем к комментариям на мобильных
                if (window.innerWidth < 768) {
                    commentsList.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            } else {
                commentsList.classList.remove('expanded');
                toggleBtn.classList.remove('active');
            }
        }

        // Лайки
        async function toggleLike(postId) {
            if (!currentUser) {
                showMessage('Войдите, чтобы ставить лайки', 'error');
                return;
            }

            const likeBtn = document.querySelector(`#post-${postId} .like-btn`);
            const likeCount = document.querySelector(`#post-${postId} .like-count`);
            
            if (!likeBtn || !likeCount) return;
            
            const isLiked = likeBtn.classList.contains('liked');
            const currentLikes = parseInt(likeCount.textContent) || 0;
            
            try {
                if (db) {
                    // Режим Firebase
                    const postRef = db.collection('posts').doc(postId);
                    
                    if (isLiked) {
                        // Убираем лайк
                        await postRef.update({
                            likes: firebase.firestore.FieldValue.increment(-1),
                            likedBy: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
                        });
                    } else {
                        // Ставим лайк
                        await postRef.update({
                            likes: firebase.firestore.FieldValue.increment(1),
                            likedBy: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
                        });
                    }
                } else {
                    // Локальный режим
                    if (isLiked) {
                        likeBtn.classList.remove('liked');
                        likeBtn.innerHTML = '🤍';
                        likeCount.textContent = currentLikes - 1;
                    } else {
                        likeBtn.classList.add('liked');
                        likeBtn.innerHTML = '❤️';
                        likeCount.textContent = currentLikes + 1;
                        likeBtn.classList.add('like-pop');
                        setTimeout(() => likeBtn.classList.remove('like-pop'), 300);
                    }
                }
                
            } catch (error) {
                console.error('Ошибка обновления лайка:', error);
                showMessage('Ошибка при обновлении лайка', 'error');
            }
        }

        // Удаление поста
        async function deletePost(postId) {
            if (!confirm('Удалить этот пост?')) return;

            try {
                if (db) {
                    // Режим Firebase
                    await db.collection('posts').doc(postId).delete();
                } else {
                    // Локальный режим
                    const posts = JSON.parse(localStorage.getItem('localPosts') || '[]');
                    const filteredPosts = posts.filter(p => p.id !== postId);
                    localStorage.setItem('localPosts', JSON.stringify(filteredPosts));
                    
                    // Удаляем комментарии
                    localStorage.removeItem(`comments_${postId}`);
                }
                
                const postEl = document.getElementById(`post-${postId}`);
                if (postEl) postEl.remove();
                
                showMessage('Пост удален', 'success');
                
            } catch (error) {
                console.error('Ошибка удаления поста:', error);
                showMessage('Ошибка при удалении поста', 'error');
            }
        }

        // Выход
        async function logout() {
            try {
                if (auth) {
                    await auth.signOut();
                }
                currentUser = null;
                updateUserInfo();
                showMessage('Вы вышли из системы', 'success');
            } catch (error) {
                console.error('Ошибка выхода:', error);
            }
        }

        // Вспомогательные функции
        function getTimeAgo(dateInput) {
            if (!dateInput) return 'давно';
            
            const date = dateInput.toDate ? dateInput.toDate() : new Date(dateInput);
            const now = new Date();
            const diff = now - date;
            
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (seconds < 60) return 'только что';
            if (minutes < 60) return `${minutes} мин назад`;
            if (hours < 24) return `${hours} ч назад`;
            if (days < 7) return `${days} дн назад`;
            
            return date.toLocaleDateString('ru-RU');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            console.log("DOM загружен, инициализирую приложение...");
            initializeFirebase();
            updateTime();
        });
    </script>
</body>
