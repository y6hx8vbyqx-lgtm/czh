<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#000;
  --card:rgba(28,28,30,.95);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
  --success:#30d158;
  --views:#8e8e93;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);
  border-radius:18px;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}
.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}

.container{
  max-width:480px;
  margin:auto;
  padding:130px 14px 80px;
}

.create{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
}
.create textarea{
  width:100%;
  min-height:80px;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.create button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border:none;
  border-radius:16px;
  background:var(--accent);
  color:#fff;
  font-weight:600;
}

/* ПОИСК ПОЛЬЗОВАТЕЛЕЙ - ФИКС ЛУПЫ */
.search{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
  position:relative;
}
.search-input{
  width:100%;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px 16px 14px 44px;
  color:#fff;
  font-size:16px;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  border:1px solid var(--border);
  line-height:normal; /* ФИКС: предотвращает смещение */
  height:48px; /* ФИКС: фиксированная высота */
}
.search-input:focus{
  outline:none;
  border-color:var(--accent);
}
.search-icon{
  position:absolute;
  left:28px;
  top:28px; /* ФИКС: фиксированная позиция вместо 50% */
  color:var(--sub);
  font-size:18px;
  pointer-events:none;
  z-index:2;
}
.search-results{
  margin-top:12px;
  max-height:200px;
  overflow-y:auto;
  display:none;
}
.search-results.show{
  display:block;
}
.search-result{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:14px;
  background:#1c1c1e;
  margin-bottom:8px;
  cursor:pointer;
  transition:background 0.2s;
}
.search-result:hover{
  background:rgba(255,255,255,0.1);
}
.search-result:last-child{
  margin-bottom:0;
}
.search-avatar{
  width:40px;
  height:40px;
  border-radius:14px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:16px;
}
.search-username{
  font-weight:600;
  font-size:15px;
}
.no-results{
  text-align:center;
  color:var(--sub);
  padding:20px 0;
  font-size:14px;
}

/* РАЗДЕЛИТЕЛЬ МЕЖДУ ДНЯМИ - ДОБАВЛЕН НОВЫЙ СТИЛЬ */
.day-separator {
  text-align: center;
  margin: 20px 0;
  color: var(--sub);
  font-size: 13px;
  font-weight: 600;
  position: relative;
}
.day-separator::before,
.day-separator::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 30%;
  height: 1px;
  background: var(--border);
}
.day-separator::before {
  left: 10%;
}
.day-separator::after {
  right: 10%;
}
.day-separator span {
  background: var(--card);
  padding: 6px 12px;
  border-radius: 10px;
  display: inline-block;
}

.post{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
  position:relative;
  transition:box-shadow 0.3s ease;
}
.post.highlighted{
  box-shadow:0 0 0 2px var(--accent), 0 0 20px rgba(102,126,234,0.3);
}
.post-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}
.avatar{
  width:40px;
  height:40px;
  border-radius:14px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}
.post-user-info{
  display:flex;
  flex-direction:column;
  flex-grow:1;
}
.post-user{
  font-weight:600;
  cursor:pointer;
  transition:opacity 0.2s;
}
.post-user:hover{
  opacity:0.7;
}
.post-time{
  color:var(--sub);
  font-size:12px;
  margin-top:2px;
}
.post-text{
  margin:10px 0;
  line-height:1.4;
  word-break:break-word;
}
.post-actions{
  display:flex;
  gap:16px;
  margin-top:12px;
}
.action{
  background:none;
  border:none;
  color:var(--sub);
  font-size:18px;
  cursor:pointer;
  transition:transform 0.2s;
  display:flex;
  align-items:center;
  gap:4px;
}
.action:hover{
  transform:scale(1.1);
}
.liked{color:#ff2d55}
.viewed{color:var(--views)}
.trash{
  margin-left:auto;
  background:none;border:none;
  color:var(--danger);font-size:18px;
  cursor:pointer;
  padding:0;
}

.sheet{
  position:fixed;
  inset:0;
  background:#000;
  transform:translateY(100%);
  transition:.35s ease;
  z-index:2000;
  display:flex;
  flex-direction:column;
}
.sheet.show{transform:translateY(0)}
.sheet-header{
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
}
.sheet-body{
  flex:1;
  overflow:auto;
  padding:14px;
}
.sheet-footer{
  padding:12px;
  border-top:1px solid var(--border);
  display:flex;
  gap:8px;
}
.sheet-footer input{
  flex:1;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* PROFILE SHEET */
.profile-header{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:20px;
}
.profile-avatar{
  width:72px;height:72px;
  border-radius:22px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:700;
}
.profile-info{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.profile-name{
  font-size:18px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:8px;
}
.change-name-btn{
  background:none;
  border:none;
  color:var(--sub);
  font-size:14px;
  cursor:pointer;
  padding:4px 8px;
  border-radius:8px;
  transition:background 0.2s;
}
.change-name-btn:hover{
  background:rgba(255,255,255,0.1);
}
.profile-stats{
  display:flex;
  gap:16px;
}
.profile-stat{
  display:flex;
  flex-direction:column;
}
.profile-stat-value{
  font-size:16px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:4px;
}
.profile-stat-label{
  color:var(--sub);
  font-size:12px;
  margin-top:2px;
}
.likes-stat{
  color:#ff2d55;
}
.posts-stat{
  color:#5ac8fa;
}
.views-stat{
  color:var(--views);
}

/* Уведомление */
.notification{
  position:fixed;
  top:120px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:var(--accent);
  color:white;
  padding:12px 20px;
  border-radius:14px;
  font-weight:600;
  z-index:1999;
  opacity:0;
  transition:opacity 0.3s, transform 0.3s;
  pointer-events:none;
  max-width:90%;
  text-align:center;
}
.notification.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* Модальное окно для смены имени */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:3000;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s;
}
.modal-overlay.show{
  opacity:1;
  pointer-events:auto;
}
.modal{
  background:var(--card);
  border-radius:20px;
  padding:24px;
  width:90%;
  max-width:400px;
  transform:translateY(20px);
  transition:transform 0.3s;
}
.modal-overlay.show .modal{
  transform:translateY(0);
}
.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.modal-title{
  font-size:20px;
  font-weight:700;
}
.modal-close{
  background:none;
  border:none;
  color:var(--sub);
  font-size:20px;
  cursor:pointer;
  padding:0;
  width:24px;
  height:24px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.modal-input{
  width:100%;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  color:#fff;
  font-size:16px;
  margin-bottom:16px;
  font-family:inherit;
}
.modal-input:focus{
  outline:none;
  border-color:var(--accent);
}
.modal-buttons{
  display:flex;
  gap:12px;
}
.modal-btn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
  font-size:16px;
}
.modal-btn.primary{
  background:var(--accent);
  color:white;
}
.modal-btn.secondary{
  background:rgba(255,255,255,0.1);
  color:white;
}

/* Кнопка удаления комментария */
.comment-delete-btn{
  background:none;
  border:none;
  color:var(--danger);
  cursor:pointer;
  font-size:14px;
  padding:4px 8px;
  border-radius:6px;
  margin-left:auto;
}
.comment-delete-btn:hover{
  background:rgba(255,69,58,0.1);
}
</style>
</head>

<body>

<div class="dynamic-island" id="time"></div>

<div class="navbar">
  <div class="logo">czhmass</div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="location.href='profile.html'">👤</button>
    <button class="nav-btn" id="adminBtn" style="display:none" onclick="location.href='admin.html'">👑</button>
    <button class="nav-btn" onclick="logout()">🚪</button>
  </div>
</div>

<div class="container">

  <div class="create">
    <textarea id="postText" placeholder="Что у вас нового? Пишите анонимно..."></textarea>
    <button onclick="createPost()">Опубликовать</button>
  </div>

  <!-- ПОИСК ПОЛЬЗОВАТЕЛЕЙ -->
  <div class="search">
    <div class="search-icon">🔍</div>
    <input type="text" class="search-input" id="searchInput" placeholder="Поиск пользователей по нику..." autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>

  <div id="feed"></div>

</div>

<!-- Уведомление -->
<div class="notification" id="notification"></div>

<!-- Модальное окно для смены имени -->
<div class="modal-overlay" id="changeNameModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Сменить имя</div>
      <button class="modal-close" onclick="closeChangeNameModal()">✕</button>
    </div>
    <input type="text" class="modal-input" id="newUsernameInput" placeholder="Новое имя (без @)" maxlength="20">
    <div class="modal-buttons">
      <button class="modal-btn secondary" onclick="closeChangeNameModal()">Отмена</button>
      <button class="modal-btn primary" onclick="changeUsername()">Сохранить</button>
    </div>
  </div>
</div>

<script>
// Конфигурация Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBu8dS-1pvUozzQ5gePiJpZ1IdkR6H5kUc",
  authDomain: "czhmass.firebaseapp.com",
  projectId: "czhmass",
  storageBucket: "czhmass.firebasestorage.app",
  messagingSenderId: "228122602851",
  appId: "1:228122602851:web:bc186c1718b5cf5c01af27"
};

// Инициализация Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let unsubscribePosts = null;
let unsubscribeUser = null;
let lastDayDivider = null;

// Обновление времени в Dynamic Island
function updateTime() {
  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2, '0') + ':' + 
                  now.getMinutes().toString().padStart(2, '0');
  document.getElementById('time').textContent = timeStr;
}
setInterval(updateTime, 1000);
updateTime();

// Авторизация
auth.onAuthStateChanged((user) => {
  if (user) {
    currentUser = user;
    console.log("Пользователь авторизован:", user.email);
    
    // Проверка админских прав
    checkAdminStatus();
    
    // Загрузка данных пользователя
    loadUserData();
    
    // Подписка на посты
    subscribeToPosts();
    
    // Слушатель для поиска
    setupSearchListener();
  } else {
    console.log("Пользователь не авторизован");
    // Редирект на страницу входа
    window.location.href = 'index.html';
  }
});

// Проверка статуса администратора
async function checkAdminStatus() {
  try {
    const userDoc = await db.collection('users').doc(currentUser.uid).get();
    if (userDoc.exists && userDoc.data().isAdmin) {
      document.getElementById('adminBtn').style.display = 'block';
    }
  } catch (error) {
    console.error("Ошибка проверки админ статуса:", error);
  }
}

// Загрузка данных пользователя
function loadUserData() {
  unsubscribeUser = db.collection('users').doc(currentUser.uid)
    .onSnapshot((doc) => {
      if (doc.exists) {
        const userData = doc.data();
        console.log("Данные пользователя обновлены:", userData);
      }
    }, (error) => {
      console.error("Ошибка подписки на данные пользователя:", error);
    });
}

// Подписка на посты
function subscribeToPosts() {
  unsubscribePosts = db.collection('posts')
    .orderBy('timestamp', 'desc')
    .onSnapshot((snapshot) => {
      const feed = document.getElementById('feed');
      feed.innerHTML = '';
      lastDayDivider = null;
      
      snapshot.forEach((doc) => {
        const post = doc.data();
        post.id = doc.id;
        createPostElement(post);
      });
      
      // Анимация появления
      const posts = document.querySelectorAll('.post');
      posts.forEach((post, index) => {
        post.style.animationDelay = (index * 0.05) + 's';
        post.classList.add('fade');
      });
    }, (error) => {
      console.error("Ошибка подписки на посты:", error);
      showNotification('Ошибка загрузки ленты');
    });
}

// Создание элемента поста
function createPostElement(post) {
  const feed = document.getElementById('feed');
  
  const postElement = document.createElement('div');
  postElement.className = 'post';
  postElement.dataset.id = post.id;
  
  // Форматирование времени
  const time = post.timestamp?.toDate();
  const timeStr = time ? formatTime(time) : 'только что';
  
  // Проверяем день для добавления разделителя
  if (time) {
    const postDay = getDayString(time);
    if (lastDayDivider !== postDay) {
      // Добавляем разделитель дня
      const separator = document.createElement('div');
      separator.className = 'day-separator';
      separator.innerHTML = `<span>${getDayLabel(time)}</span>`;
      feed.appendChild(separator);
      lastDayDivider = postDay;
    }
  }
  
  // Аватар из первой буквы ника
  const avatarLetter = post.username ? post.username.charAt(0).toUpperCase() : 'А';
  
  postElement.innerHTML = `
    <div class="post-header">
      <div class="avatar">${avatarLetter}</div>
      <div class="post-user-info">
        <div class="post-user" onclick="viewProfile('${post.userId}', '${post.username}')">
          ${post.username || 'Аноним'}
        </div>
        <div class="post-time">${timeStr}</div>
      </div>
      ${post.userId === currentUser?.uid ? 
        `<button class="trash" onclick="deletePost('${post.id}')">🗑️</button>` : ''}
    </div>
    <div class="post-text">${escapeHtml(post.text)}</div>
    <div class="post-actions">
      <button class="action ${post.likes?.includes(currentUser?.uid) ? 'liked' : ''}" 
              onclick="likePost('${post.id}')">
        ❤️ <span>${post.likes?.length || 0}</span>
      </button>
      <button class="action ${post.views?.includes(currentUser?.uid) ? 'viewed' : ''}" 
              onclick="viewPost('${post.id}')">
        👁️ <span>${post.views?.length || 0}</span>
      </button>
    </div>
  `;
  
  feed.appendChild(postElement);
}

// Получение строкового представления дня
function getDayString(date) {
  return date.toLocaleDateString('ru-RU');
}

// Получение метки для дня
function getDayLabel(date) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);
  
  const postDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  
  if (postDay.getTime() === today.getTime()) {
    return 'Сегодня';
  } else if (postDay.getTime() === yesterday.getTime()) {
    return 'Вчера';
  } else {
    return date.toLocaleDateString('ru-RU', { 
      day: 'numeric', 
      month: 'long',
      year: date.getFullYear() !== now.getFullYear() ? 'numeric' : undefined
    });
  }
}

// Создание поста
async function createPost() {
  const text = document.getElementById('postText').value.trim();
  if (!text) {
    showNotification('Введите текст поста');
    return;
  }
  
  try {
    // Получаем username пользователя
    const userDoc = await db.collection('users').doc(currentUser.uid).get();
    const username = userDoc.exists ? userDoc.data().username : null;
    
    const post = {
      text: text,
      userId: currentUser.uid,
      username: username,
      likes: [],
      views: [],
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    };
    
    await db.collection('posts').add(post);
    document.getElementById('postText').value = '';
    showNotification('Пост опубликован');
  } catch (error) {
    console.error("Ошибка создания поста:", error);
    showNotification('Ошибка публикации');
  }
}

// Лайк поста
async function likePost(postId) {
  if (!currentUser) return;
  
  try {
    const postRef = db.collection('posts').doc(postId);
    const postDoc = await postRef.get();
    
    if (!postDoc.exists) return;
    
    const post = postDoc.data();
    const likes = post.likes || [];
    const hasLiked = likes.includes(currentUser.uid);
    
    if (hasLiked) {
      // Удаляем лайк
      await postRef.update({
        likes: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
      });
    } else {
      // Добавляем лайк
      await postRef.update({
        likes: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
      });
    }
  } catch (error) {
    console.error("Ошибка лайка поста:", error);
  }
}

// Просмотр поста
async function viewPost(postId) {
  if (!currentUser) return;
  
  try {
    const postRef = db.collection('posts').doc(postId);
    const postDoc = await postRef.get();
    
    if (!postDoc.exists) return;
    
    const post = postDoc.data();
    const views = post.views || [];
    
    if (!views.includes(currentUser.uid)) {
      await postRef.update({
        views: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
      });
    }
  } catch (error) {
    console.error("Ошибка просмотра поста:", error);
  }
}

// Удаление поста
async function deletePost(postId) {
  if (!confirm('Удалить этот пост?')) return;
  
  try {
    await db.collection('posts').doc(postId).delete();
    showNotification('Пост удален');
  } catch (error) {
    console.error("Ошибка удаления поста:", error);
    showNotification('Ошибка удаления');
  }
}

// Просмотр профиля
function viewProfile(userId, username) {
  // Редирект на страницу профиля
  window.location.href = `profile.html?uid=${userId}&username=${encodeURIComponent(username)}`;
}

// Настройка слушателя поиска
function setupSearchListener() {
  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');
  
  let searchTimeout;
  
  searchInput.addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    const query = e.target.value.trim();
    
    if (query.length < 2) {
      searchResults.classList.remove('show');
      searchResults.innerHTML = '';
      return;
    }
    
    searchTimeout = setTimeout(async () => {
      try {
        const usersSnapshot = await db.collection('users')
          .where('username', '>=', query)
          .where('username', '<=', query + '\uf8ff')
          .limit(10)
          .get();
        
        searchResults.innerHTML = '';
        
        if (usersSnapshot.empty) {
          searchResults.innerHTML = '<div class="no-results">Пользователи не найдены</div>';
          searchResults.classList.add('show');
          return;
        }
        
        usersSnapshot.forEach((doc) => {
          const user = doc.data();
          if (user.username && doc.id !== currentUser.uid) {
            const resultElement = document.createElement('div');
            resultElement.className = 'search-result';
            resultElement.innerHTML = `
              <div class="search-avatar">${user.username.charAt(0).toUpperCase()}</div>
              <div class="search-username">${user.username}</div>
            `;
            resultElement.addEventListener('click', () => {
              viewProfile(doc.id, user.username);
            });
            searchResults.appendChild(resultElement);
          }
        });
        
        searchResults.classList.add('show');
      } catch (error) {
        console.error("Ошибка поиска:", error);
      }
    }, 300);
  });
  
  // Закрытие результатов при клике вне поиска
  document.addEventListener('click', (e) => {
    if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
      searchResults.classList.remove('show');
    }
  });
}

// Вспомогательные функции
function formatTime(date) {
  const now = new Date();
  const diff = now - date;
  const diffMinutes = Math.floor(diff / 60000);
  const diffHours = Math.floor(diff / 3600000);
  const diffDays = Math.floor(diff / 86400000);
  
  if (diffMinutes < 1) return 'только что';
  if (diffMinutes < 60) return `${diffMinutes} мин назад`;
  if (diffHours < 24) return `${diffHours} ч назад`;
  if (diffDays < 7) return `${diffDays} д назад`;
  return date.toLocaleDateString('ru-RU');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showNotification(message) {
  const notification = document.getElementById('notification');
  notification.textContent = message;
  notification.classList.add('show');
  
  setTimeout(() => {
    notification.classList.remove('show');
  }, 3000);
}

// Функции для модального окна смены имени
function openChangeNameModal() {
  document.getElementById('changeNameModal').classList.add('show');
}

function closeChangeNameModal() {
  document.getElementById('changeNameModal').classList.remove('show');
}

async function changeUsername() {
  const newUsername = document.getElementById('newUsernameInput').value.trim();
  
  if (!newUsername) {
    showNotification('Введите новое имя');
    return;
  }
  
  if (newUsername.length > 20) {
    showNotification('Имя не должно превышать 20 символов');
    return;
  }
  
  try {
    // Проверка уникальности имени
    const usernameSnapshot = await db.collection('users')
      .where('username', '==', newUsername)
      .get();
    
    if (!usernameSnapshot.empty) {
      showNotification('Это имя уже занято');
      return;
    }
    
    // Обновление имени
    await db.collection('users').doc(currentUser.uid).update({
      username: newUsername
    });
    
    closeChangeNameModal();
    showNotification('Имя успешно изменено');
    document.getElementById('newUsernameInput').value = '';
  } catch (error) {
    console.error("Ошибка смены имени:", error);
    showNotification('Ошибка смены имени');
  }
}

// Выход
function logout() {
  if (unsubscribePosts) unsubscribePosts();
  if (unsubscribeUser) unsubscribeUser();
  auth.signOut();
}
