<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#000;
  --card:rgba(28,28,30,.9);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
}
.fade-in{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);backdrop-filter:blur(16px);
  border-radius:18px;padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}
.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}

.container{
  max-width:480px;margin:auto;
  padding:130px 14px 80px;
}

/* CREATE POST */
.create{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
}
.create textarea{
  width:100%;min-height:90px;
  background:#1c1c1e;border:1px solid var(--border);
  border-radius:16px;padding:12px;color:#fff;
}
.create button{
  width:100%;margin-top:12px;
  padding:14px;border:none;border-radius:16px;
  background:var(--accent);color:#fff;font-weight:600;
}

/* SEARCH + TABS */
.search-block{
  background:var(--card);
  border-radius:22px;
  padding:14px;
  margin-bottom:14px;
}
.search-block input{
  width:100%;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px 12px;
  color:#fff;
}
.tabs{
  display:flex;
  margin-top:10px;
  gap:8px;
}
.tab{
  flex:1;
  padding:10px;
  border-radius:14px;
  background:#1c1c1e;
  border:none;
  color:var(--sub);
}
.tab.active{
  background:var(--accent);
  color:#fff;
}

/* LAUNCHPAD USERS */
.users-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
  gap:12px;
  margin-top:14px;
}
.user-card{
  background:#1c1c1e;
  border-radius:18px;
  padding:14px 8px;
  text-align:center;
  cursor:pointer;
}
.user-avatar{
  width:44px;height:44px;
  border-radius:14px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 6px;
  font-weight:700;
}
.user-name{font-size:14px}

/* POSTS */
.post{
  background:var(--card);
  border-radius:24px;
  padding:16px;
  margin-bottom:14px;
}
.post-header{
  display:flex;align-items:center;gap:10px;
}
.avatar{
  width:42px;height:42px;border-radius:14px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;
}
.post-user{font-weight:600}
.post-time{color:var(--sub);font-size:13px}
.post-text{margin:10px 0}
.post-actions{
  display:flex;gap:18px;
}
.action{
  background:none;border:none;
  color:var(--sub);font-size:18px;
}
.action.liked{color:#ff2d55}
.trash{
  margin-left:auto;
  background:none;border:none;
  color:var(--danger);font-size:18px;
}
</style>
</head>

<body>

<div class="dynamic-island" id="time"></div>

<div class="navbar">
  <div class="logo">czhmass</div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="location.href='profile.html'">👤</button>
    <button class="nav-btn" id="adminBtn" style="display:none" onclick="location.href='admin.html'">👑</button>
    <button class="nav-btn" onclick="logout()">🚪</button>
  </div>
</div>

<div class="container">

  <!-- CREATE -->
  <div class="create">
    <textarea id="postText" placeholder="Что у вас нового?"></textarea>
    <button onclick="createPost()">📝 Опубликовать</button>
  </div>

  <!-- SEARCH + TABS -->
  <div class="search-block">
    <input id="searchInput" placeholder="Поиск по нику">
    <div class="tabs">
      <button class="tab active" id="allTab" onclick="switchTab('all')">Все посты</button>
      <button class="tab" id="favTab" onclick="switchTab('fav')">Избранные</button>
    </div>
    <div id="usersGrid" class="users-grid"></div>
  </div>

  <div id="feed"></div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
  authDomain:"czhmass.firebaseapp.com",
  projectId:"czhmass"
});

const db=firebase.firestore();
const auth=firebase.auth();

let currentUser,userData;
let currentTab="all";

auth.onAuthStateChanged(async u=>{
  if(!u) location.href="index.html";
  currentUser=u;
  const snap=await db.collection("users").doc(u.uid).get();
  userData=snap.data()||{};
  if(userData.isAdmin) adminBtn.style.display="block";
  loadPosts();
});

/* POSTS */
async function loadPosts(){
  feed.innerHTML="";
  let query;

  if(currentTab==="fav" && userData.favorites?.length){
    query=db.collection("posts")
      .where("userId","in",userData.favorites)
      .orderBy("createdAt","desc");
  }else{
    query=db.collection("posts")
      .orderBy("createdAt","desc");
  }

  const snap=await query.get();
  snap.forEach(doc=>{
    const p=doc.data();
    const liked=p.likedBy?.includes(currentUser.uid);
    feed.innerHTML+=`
    <div class="post fade-in">
      <div class="post-header">
        <div class="avatar">${p.username?.[0]||"A"}</div>
        <div>
          <div class="post-user">@${p.username||"anon"}</div>
          <div class="post-time">${new Date(p.createdAt.seconds*1000).toLocaleString()}</div>
        </div>
        ${(p.userId===currentUser.uid||userData.isAdmin)?
          `<button class="trash" onclick="deletePost('${doc.id}')">🗑</button>`:""}
      </div>
      <div class="post-text">${p.text}</div>
      <div class="post-actions">
        <button class="action ${liked?"liked":""}" onclick="toggleLike('${doc.id}',${liked})">
          ${liked?"❤️":"🤍"} ${p.likes||0}
        </button>
      </div>
    </div>`;
  });
}

/* CREATE */
async function createPost(){
  if(!postText.value.trim()) return;
  await db.collection("posts").add({
    text:postText.value,
    userId:currentUser.uid,
    username:userData.username,
    createdAt:new Date(),
    likes:0,
    likedBy:[]
  });
  postText.value="";
  loadPosts();
}

/* LIKE */
async function toggleLike(id,liked){
  await db.collection("posts").doc(id).update({
    likes:firebase.firestore.FieldValue.increment(liked?-1:1),
    likedBy:liked
      ?firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
      :firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
  });
  loadPosts();
}

/* DELETE */
async function deletePost(id){
  if(!confirm("Удалить пост?"))return;
  await db.collection("posts").doc(id).delete();
  loadPosts();
}

/* SEARCH USERS */
let searchTimeout;
searchInput.oninput=()=>{
  clearTimeout(searchTimeout);
  searchTimeout=setTimeout(searchUsers,300);
};

async function searchUsers(){
  const q=searchInput.value.trim().toLowerCase();
  usersGrid.innerHTML="";
  if(!q) return;

  const snap=await db.collection("users")
    .where("username",">=",q)
    .where("username","<=",q+"\uf8ff")
    .get();

  snap.forEach(d=>{
    const u=d.data();
    usersGrid.innerHTML+=`
      <div class="user-card fade-in" onclick="openUser('${d.id}')">
        <div class="user-avatar">${u.username?.[0]||"A"}</div>
        <div class="user-name">@${u.username}</div>
      </div>`;
  });
}

function openUser(id){
  location.href="user.html?id="+id;
}

/* TABS */
function switchTab(tab){
  currentTab=tab;
  allTab.classList.toggle("active",tab==="all");
  favTab.classList.toggle("active",tab==="fav");
  loadPosts();
}

function logout(){
  auth.signOut().then(()=>location.href="index.html");
}

setInterval(()=>{
  time.textContent=new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
},1000);
</script>

</body>
</html>
