<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
/* ===== ORIGINAL DESIGN — НЕ МЕНЯЛ ===== */
:root{
  --bg:#000;
  --card:rgba(28,28,30,.95);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);
  border-radius:18px;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}
.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}

.container{
  max-width:480px;
  margin:auto;
  padding:130px 14px 80px;
}

.create{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
}
.create textarea{
  width:100%;
  min-height:80px;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
  color:#fff;
}
.create button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border:none;
  border-radius:16px;
  background:var(--accent);
  color:#fff;
  font-weight:600;
}

.post{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
}
.post-header{
  display:flex;
  align-items:center;
  gap:10px;
}
.avatar{
  width:40px;
  height:40px;
  border-radius:14px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}
.post-user{
  font-weight:600;
  cursor:pointer;
}
.post-text{margin:10px 0}
.post-actions{
  display:flex;
  gap:16px;
}
.action{
  background:none;
  border:none;
  color:var(--sub);
  font-size:18px;
}
.liked{color:#ff2d55}
.trash{
  margin-left:auto;
  background:none;border:none;
  color:var(--danger);font-size:18px;
}

/* SHEETS */
.sheet{
  position:fixed;
  inset:0;
  background:#000;
  transform:translateY(100%);
  transition:.35s ease;
  z-index:2000;
  display:flex;
  flex-direction:column;
}
.sheet.show{transform:translateY(0)}
.sheet-header{
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
}
.sheet-body{
  flex:1;
  overflow:auto;
  padding:14px;
}
.sheet-footer{
  padding:12px;
  border-top:1px solid var(--border);
  display:flex;
  gap:8px;
}
.sheet-footer input{
  flex:1;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  color:#fff;
}

/* PROFILE */
.profile-header{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:20px;
}
.profile-avatar{
  width:72px;height:72px;
  border-radius:22px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:700;
}
.profile-name{
  font-size:18px;
  font-weight:700;
}
.profile-stats{
  color:var(--sub);
  font-size:14px;
}
</style>
</head>

<body>

<div class="dynamic-island" id="time"></div>

<div class="navbar">
  <div class="logo">czhmass</div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="openMyProfile()">👤</button>
    <button class="nav-btn" id="adminBtn" style="display:none">👑</button>
    <button class="nav-btn" onclick="logout()">🚪</button>
  </div>
</div>

<div class="container">

  <div class="create">
    <textarea id="postText" placeholder="Что у вас нового?"></textarea>
    <button onclick="createPost()">Опубликовать</button>
  </div>

  <div id="feed"></div>

</div>

<!-- COMMENTS -->
<div class="sheet" id="commentsSheet">
  <div class="sheet-header">
    <strong>Комментарии</strong>
    <button class="action" onclick="closeComments()">✕</button>
  </div>
  <div class="sheet-body" id="commentsBody"></div>
  <div class="sheet-footer">
    <input id="commentInput" placeholder="Комментарий">
    <button class="action" onclick="addComment()">📤</button>
  </div>
</div>

<!-- PROFILE -->
<div class="sheet" id="profileSheet">
  <div class="sheet-header">
    <strong>Профиль</strong>
    <button class="action" onclick="closeProfile()">✕</button>
  </div>
  <div class="sheet-body">
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar">A</div>
      <div>
        <div class="profile-name" id="profileName">@anon</div>
        <div class="profile-stats">
          <span id="profilePostsCount">0</span> постов
        </div>
      </div>
    </div>
    <div id="profilePosts"></div>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
  authDomain:"czhmass.firebaseapp.com",
  projectId:"czhmass"
});
const db=firebase.firestore();
const auth=firebase.auth();

let currentUser,userData;
let postsCache=new Map();
let currentPostId=null;

/* AUTH */
auth.onAuthStateChanged(async u=>{
  if(!u)return location.href="index.html";
  currentUser=u;
  const snap=await db.collection("users").doc(u.uid).get();
  userData=snap.data()||{};
  if(userData.isAdmin) adminBtn.style.display="block";
  loadPosts();
});

/* POSTS */
async function loadPosts(){
  feed.innerHTML="";
  const snap=await db.collection("posts").orderBy("createdAt","desc").get();
  snap.forEach(doc=>{
    const p=doc.data();
    postsCache.set(doc.id,p);
    const liked=p.likedBy?.includes(currentUser.uid);
    feed.innerHTML+=`
    <div class="post fade">
      <div class="post-header">
        <div class="avatar">${p.username?.[0]||"A"}</div>
        <div class="post-user" onclick="openProfile('${p.userId}','${p.username}')">
          @${p.username}
        </div>
        ${(p.userId===currentUser.uid||userData.isAdmin)?
          `<button class="trash" onclick="deletePost('${doc.id}')">🗑</button>`:""}
      </div>
      <div class="post-text">${p.text}</div>
      <div class="post-actions">
        <button class="action ${liked?"liked":""}" onclick="toggleLike('${doc.id}')">
          ${liked?"❤️":"🤍"} ${p.likes||0}
        </button>
        <button class="action" onclick="openComments('${doc.id}')">
          💬 ${p.commentsCount||0}
        </button>
      </div>
    </div>`;
  });
}

async function createPost(){
  if(!postText.value.trim())return;
  await db.collection("posts").add({
    text:postText.value,
    userId:currentUser.uid,
    username:userData.username||"anon",
    createdAt:new Date(),
    likes:0,
    likedBy:[],
    commentsCount:0
  });
  postText.value="";
  loadPosts();
}

async function deletePost(id){
  if(!confirm("Удалить пост?"))return;
  await db.collection("posts").doc(id).delete();
  loadPosts();
}

/* LIKES */
async function toggleLike(id){
  const p=postsCache.get(id);
  const liked=p.likedBy?.includes(currentUser.uid);
  await db.collection("posts").doc(id).update({
    likes:firebase.firestore.FieldValue.increment(liked?-1:1),
    likedBy:liked
      ?firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
      :firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
  });
  loadPosts();
}

/* COMMENTS */
function openComments(id){
  currentPostId=id;
  commentsSheet.classList.add("show");
  loadComments();
}
function closeComments(){
  commentsSheet.classList.remove("show");
}

async function loadComments(){
  commentsBody.innerHTML="";
  const snap=await db.collection("posts").doc(currentPostId)
    .collection("comments").orderBy("createdAt").get();
  snap.forEach(d=>{
    const c=d.data();
    commentsBody.innerHTML+=`
      <div class="post fade">
        <div class="post-header">
          <div class="avatar">${c.username?.[0]||"A"}</div>
          <strong>@${c.username}</strong>
        </div>
        <div class="post-text">${c.text}</div>
      </div>`;
  });
}

async function addComment(){
  if(!commentInput.value.trim())return;
  await db.collection("posts").doc(currentPostId)
    .collection("comments").add({
      text:commentInput.value,
      userId:currentUser.uid,
      username:userData.username||"anon",
      createdAt:new Date()
    });
  await db.collection("posts").doc(currentPostId)
    .update({
      commentsCount:firebase.firestore.FieldValue.increment(1)
    });
  commentInput.value="";
  loadComments();
  loadPosts();
}

/* PROFILE */
async function openProfile(uid,name){
  profileSheet.classList.add("show");
  profileName.textContent="@"+name;
  profileAvatar.textContent=name?.[0]||"A";
  profilePosts.innerHTML="";
  let count=0;
  const snap=await db.collection("posts")
    .where("userId","==",uid)
    .orderBy("createdAt","desc").get();
  snap.forEach(d=>{
    count++;
    profilePosts.innerHTML+=`
      <div class="post fade">
        <div class="post-text">${d.data().text}</div>
      </div>`;
  });
  profilePostsCount.textContent=count;
}
function openMyProfile(){
  openProfile(currentUser.uid,userData.username||"anon");
}
function closeProfile(){
  profileSheet.classList.remove("show");
}

/* LOGOUT */
function logout(){
  auth.signOut().then(()=>location.href="index.html");
}

/* TIME */
setInterval(()=>{
  time.textContent=new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
},1000);
</script>

</body>
</html>
