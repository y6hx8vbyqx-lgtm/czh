<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лента - czhmass.com</title>
    
    <!-- Firebase скрипты -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        .post { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        .btn { background: #4CAF50; color: white; padding: 10px; border: none; cursor: pointer; }
        .navbar { display: flex; justify-content: space-between; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>czhmass.com</h2>
        <div>
            <button class="btn" onclick="window.location.href='profile.html'">Профиль</button>
            <button class="btn" id="adminBtn" style="display:none;" onclick="window.location.href='admin.html'">Админ</button>
            <button class="btn" onclick="logout()">Выйти</button>
        </div>
    </div>
    
    <div>
        <h3>Новый пост:</h3>
        <textarea id="postText" placeholder="Что нового?"></textarea>
        <button class="btn" onclick="createPost()">Опубликовать</button>
        <div id="message" style="margin:10px 0;"></div>
    </div>
    
    <hr>
    
    <h3>Лента постов:</h3>
    <div id="posts">Загрузка...</div>

    <script>
        // ===== FIREBASE КОНФИГ (ТОЛЬКО ОДИН РАЗ!) =====
        const firebaseConfig = {
            apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
            authDomain: "czhmass.firebaseapp.com",
            projectId: "czhmass",
            storageBucket: "czhmass.firebasestorage.app",
            messagingSenderId: "1064257019843",
            appId: "1:1064257019843:web:65488b45be2f86838ca776"
        };
        
        // ===== ИНИЦИАЛИЗАЦИЯ =====
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            console.log('✅ Firebase инициализирован');
        }
        
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        // ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
        auth.onAuthStateChanged((user) => {
            if (!user) {
                alert('Сначала войдите!');
                window.location.href = 'index.html';
            } else {
                console.log('Пользователь:', user.email);
                loadPosts();
                checkAdmin(user.uid);
            }
        });
        
        // ===== ЗАГРУЗКА ПОСТОВ =====
        async function loadPosts() {
            try {
                const snapshot = await db.collection('posts')
                    .orderBy('createdAt', 'desc')
                    .limit(50)
                    .get();
                
                let html = '';
                snapshot.forEach(doc => {
                    const post = doc.data();
                    html += `
                        <div class="post">
                            <strong>@${post.username}</strong>
                            <small>(${formatTime(post.createdAt)})</small>
                            <p>${post.text}</p>
                        </div>
                    `;
                });
                
                document.getElementById('posts').innerHTML = html || '<p>Пока нет постов</p>';
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('posts').innerHTML = '<p>Ошибка загрузки</p>';
            }
        }
        
        // ===== СОЗДАНИЕ ПОСТА =====
        async function createPost() {
            const text = document.getElementById('postText').value.trim();
            if (!text) return;
            
            const user = auth.currentUser;
            if (!user) return;
            
            try {
                // Получаем username из Firestore
                const userDoc = await db.collection('users').doc(user.uid).get();
                const username = userDoc.data().username;
                
                // Создаем пост
                await db.collection('posts').add({
                    userId: user.uid,
                    username: username,
                    text: text,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: 0
                });
                
                document.getElementById('postText').value = '';
                showMessage('✅ Пост опубликован!', 'success');
                loadPosts();
                
            } catch (error) {
                console.error('Ошибка:', error);
                showMessage('❌ Ошибка: ' + error.message, 'error');
            }
        }
        
        // ===== ПРОВЕРКА АДМИНА =====
        async function checkAdmin(userId) {
            try {
                const userDoc = await db.collection('users').doc(userId).get();
                if (userDoc.exists && userDoc.data().isAdmin) {
                    document.getElementById('adminBtn').style.display = 'inline-block';
                }
            } catch (error) {
                console.log('Ошибка проверки админа:', error);
            }
        }
        
        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.style.color = type === 'success' ? 'green' : 'red';
            setTimeout(() => el.textContent = '', 3000);
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return 'недавно';
            try {
                const date = timestamp.toDate();
                const now = new Date();
                const diff = now - date;
                const minutes = Math.floor(diff / 60000);
                
                if (minutes < 1) return 'только что';
                if (minutes < 60) return `${minutes} мин назад`;
                if (minutes < 1440) return `${Math.floor(minutes / 60)} ч назад`;
                return date.toLocaleDateString('ru-RU');
            } catch {
                return 'недавно';
            }
        }
        
        function logout() {
            auth.signOut();
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
