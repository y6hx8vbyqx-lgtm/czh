<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>czhmass</title>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#000;
  --card:rgba(28,28,30,.95);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.container{
  max-width:480px;
  margin:auto;
  padding:110px 14px 80px;
}

.navbar{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:430px;
  background:var(--card);
  border-radius:18px;
  padding:10px 14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.nav-right{
  display:flex;
  gap:8px;
}

.nav-btn{
  background:#1c1c1e;
  border:none;
  color:#fff;
  padding:8px 12px;
  border-radius:12px;
  cursor:pointer;
}

.create{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
}
.create textarea{
  width:100%;
  min-height:80px;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
  color:#fff;
}
.create button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border:none;
  border-radius:16px;
  background:var(--accent);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.search-box{
  background:var(--card);
  border-radius:18px;
  padding:12px;
  margin-bottom:14px;
}
.search-box input{
  width:100%;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  color:#fff;
}

.tabs{
  display:flex;
  gap:8px;
  margin-top:10px;
}
.tab{
  flex:1;
  padding:8px;
  border-radius:12px;
  background:#1c1c1e;
  border:none;
  color:#fff;
  cursor:pointer;
}
.tab.active{
  background:var(--accent);
}

.post{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
}
.post-header{
  display:flex;
  align-items:center;
  gap:10px;
}
.avatar{
  width:40px;
  height:40px;
  border-radius:14px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}
.post-user{
  font-weight:600;
  cursor:pointer;
}
.post-text{margin:10px 0}
.post-actions{
  display:flex;
  gap:16px;
}
.action{
  background:none;
  border:none;
  color:var(--sub);
  font-size:18px;
  cursor:pointer;
}
.liked{color:#ff2d55}

.sheet{
  position:fixed;
  inset:0;
  background:#000;
  transform:translateY(100%);
  transition:.35s ease;
  z-index:2000;
  display:flex;
  flex-direction:column;
}
.sheet.show{transform:translateY(0)}
.sheet-header{
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
}
.sheet-body{
  flex:1;
  overflow:auto;
  padding:14px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">czhmass</div>
  <div class="nav-right">
    <button class="nav-btn" onclick="openProfile(currentUser.uid, currentUser.displayName)">👤</button>
    <button class="nav-btn" onclick="logout()">🚪</button>
  </div>
</div>

<div class="container">

  <div class="create">
    <textarea id="postText" placeholder="Что у вас нового?"></textarea>
    <button onclick="createPost()">Опубликовать</button>
  </div>

  <div class="search-box">
    <input id="searchInput" placeholder="Поиск по нику" oninput="loadPosts()">
    <div class="tabs">
      <button class="tab active" onclick="setMode('all',this)">Все посты</button>
      <button class="tab" onclick="setMode('fav',this)">Избранные</button>
    </div>
  </div>

  <div id="feed"></div>

</div>

<div class="sheet" id="profileSheet">
  <div class="sheet-header">
    <strong id="profileName"></strong>
    <button class="action" onclick="closeProfile()">✕</button>
  </div>
  <div class="sheet-body">
    <button class="nav-btn" onclick="toggleFavorite()" id="favBtn">⭐ В избранные</button>
    <div id="profilePosts"></div>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
  authDomain:"czhmass.firebaseapp.com",
  projectId:"czhmass"
});

const db=firebase.firestore();
const auth=firebase.auth();

let currentUser;
let mode="all";
let favorites=[];
let openedProfile=null;

auth.onAuthStateChanged(async u=>{
  if(!u)return location.href="index.html";
  currentUser=u;
  const snap=await db.collection("users").doc(u.uid).get();
  favorites=snap.exists ? snap.data().favorites||[] : [];
  loadPosts();
});

function setMode(m,el){
  mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  loadPosts();
}

async function loadPosts(){
  feed.innerHTML="";
  const search=searchInput.value.toLowerCase();
  const q=await db.collection("posts").orderBy("createdAt","desc").get();

  q.forEach(d=>{
    const p=d.data();
    if(search && !p.username.toLowerCase().includes(search)) return;
    if(mode==="fav" && !favorites.includes(p.userId)) return;

    const liked=p.likes?.includes(currentUser.uid);

    feed.innerHTML+=`
    <div class="post fade">
      <div class="post-header">
        <div class="avatar">${p.username[0]}</div>
        <div class="post-user" onclick="openProfile('${p.userId}','${p.username}')">@${p.username}</div>
      </div>
      <div class="post-text">${p.text}</div>
      <div class="post-actions">
        <button class="action ${liked?'liked':''}" onclick="toggleLike('${d.id}')">❤️ ${p.likes?.length||0}</button>
        <button class="action" onclick="alert('Комментарии будут позже')">💬</button>
      </div>
    </div>`;
  });
}

async function toggleLike(id){
  const ref=db.collection("posts").doc(id);
  const snap=await ref.get();
  let likes=snap.data().likes||[];
  if(likes.includes(currentUser.uid)){
    likes=likes.filter(l=>l!==currentUser.uid);
  }else{
    likes.push(currentUser.uid);
  }
  await ref.update({likes});
  loadPosts();
}

async function openProfile(uid,name){
  openedProfile=uid;
  profileName.textContent="@"+name;
  profileSheet.classList.add("show");
  favBtn.textContent=favorites.includes(uid)?"❌ Убрать из избранных":"⭐ В избранные";
  profilePosts.innerHTML="";
  const snap=await db.collection("posts").where("userId","==",uid).get();
  snap.forEach(d=>{
    profilePosts.innerHTML+=`<div class="post fade"><div class="post-text">${d.data().text}</div></div>`;
  });
}

function closeProfile(){
  profileSheet.classList.remove("show");
}

async function toggleFavorite(){
  if(favorites.includes(openedProfile)){
    favorites=favorites.filter(f=>f!==openedProfile);
  }else{
    favorites.push(openedProfile);
  }
  await db.collection("users").doc(currentUser.uid).set({favorites},{merge:true});
  favBtn.textContent=favorites.includes(openedProfile)?"❌ Убрать из избранных":"⭐ В избранные";
}

async function createPost(){
  if(!postText.value.trim())return;
  await db.collection("posts").add({
    text:postText.value,
    userId:currentUser.uid,
    username:currentUser.displayName||"anon",
    createdAt:new Date(),
    likes:[]
  });
  postText.value="";
  loadPosts();
}

function logout(){
  auth.signOut().then(()=>location.href="index.html");
}
</script>

</body>
</html>
