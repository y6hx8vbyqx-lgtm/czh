<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лента - czhmass.com</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #1a202c;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        /* Динамический островок */
        .dynamic-island {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 40px;
            background: rgba(40, 40, 40, 0.95);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        .island-time {
            font-size: 15px;
            font-weight: 600;
            color: white;
        }

        /* Навигация */
        .navbar {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(28, 28, 30, 0.8);
            padding: 12px 20px;
            border-radius: 15px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 999;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-admin {
            background: linear-gradient(135deg, #805ad5, #6b46c1);
        }

        .btn-logout {
            background: rgba(255, 59, 48, 0.2);
            color: #ff3b30;
        }

        /* Кнопка профиля */
        .profile-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .profile-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .profile-avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: white;
            flex-shrink: 0;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .profile-username {
            font-size: 12px;
            font-weight: 600;
            color: white;
            line-height: 1.2;
        }

        .profile-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.2;
        }

        /* Основной контент */
        .container {
            padding-top: 140px;
            padding-bottom: 100px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Пост в стиле iOS */
        .post-ios {
            background: rgba(28, 28, 30, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, background 0.3s;
        }

        .post-ios:hover {
            transform: translateY(-2px);
            background: rgba(35, 35, 37, 0.9);
        }

        /* Аватар и заголовок */
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            flex-shrink: 0;
        }

        .post-user {
            flex: 1;
        }

        .username {
            font-size: 17px;
            font-weight: 600;
            color: white;
            margin-bottom: 3px;
        }

        .post-time {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Текст поста */
        .post-content {
            font-size: 16px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Футер поста с лайками */
        .post-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        /* Лайки в левом нижнем углу */
        .like-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .like-heart {
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
        }

        .like-heart:hover {
            background: rgba(255, 59, 48, 0.1);
            transform: scale(1.1);
        }

        .like-heart.liked {
            background: rgba(255, 59, 48, 0.15);
        }

        .like-count {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            min-width: 20px;
        }

        /* Кнопка удаления */
        .delete-post {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s, background 0.3s;
        }

        .post-ios:hover .delete-post {
            opacity: 1;
        }

        .delete-post:hover {
            background: rgba(255, 59, 48, 0.2);
        }

        /* Форма создания поста */
        .create-post {
            background: rgba(28, 28, 30, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .post-input {
            width: 100%;
            min-height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 16px;
            color: white;
            font-size: 16px;
            resize: vertical;
            margin-bottom: 15px;
            font-family: inherit;
        }

        .post-input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.07);
        }

        .post-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: transform 0.2s, opacity 0.2s;
        }

        .post-button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .post-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Счетчик символов */
        .char-counter {
            text-align: right;
            margin-top: 8px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }

        .char-counter.warning {
            color: #ff9500;
        }

        .char-counter.danger {
            color: #ff3b30;
        }

        /* Сообщения */
        .message {
            position: fixed;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1001;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            display: none;
            max-width: 90%;
            text-align: center;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translate(-50%, -20px);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        .success {
            background: rgba(52, 199, 89, 0.15);
            color: #34c759;
            border-color: rgba(52, 199, 89, 0.3);
        }

        .error {
            background: rgba(255, 59, 48, 0.15);
            color: #ff3b30;
            border-color: rgba(255, 59, 48, 0.3);
        }

        /* Загрузка */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }

        /* Анимация лайка */
        @keyframes heartBeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1); }
            75% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .like-animation {
            animation: heartBeat 0.6s ease;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .navbar {
                width: 95%;
                top: 65px;
            }
            
            .container {
                padding-top: 130px;
                padding-left: 15px;
                padding-right: 15px;
            }
            
            .dynamic-island {
                width: 130px;
                height: 36px;
            }
            
            .post-ios {
                padding: 16px;
            }
            
            .profile-btn {
                padding: 5px 10px;
            }
            
            .profile-username {
                font-size: 11px;
            }
            
            .nav-buttons {
                gap: 8px;
            }
        }

        @media (max-width: 480px) {
            .profile-btn .profile-label {
                display: none;
            }
            
            .profile-btn {
                padding: 6px;
            }
        }
    </style>
</head>
<body>
    <!-- Динамический островок (как на iPhone) -->
    <div class="dynamic-island">
        <span class="island-time" id="currentTime">--:--</span>
    </div>

    <!-- Навигация -->
    <nav class="navbar">
        <div class="logo">czhmass</div>
        <div class="nav-buttons">
            <!-- Кнопка профиля с аватаркой -->
            <button class="profile-btn" onclick="window.location.href='profile.html'" id="profileBtn">
                <div class="profile-avatar" id="profileAvatar">?</div>
                <div class="profile-info">
                    <span class="profile-username" id="profileUsername">Загрузка...</span>
                    <span class="profile-label">Профиль</span>
                </div>
            </button>
            
            <button class="btn btn-admin" onclick="window.location.href='admin.html'" id="adminBtn" style="display:none;">
                👑 Админ
            </button>
            <button class="btn btn-logout" onclick="logout()">
                🚪 Выйти
            </button>
        </div>
    </nav>

    <!-- Основной контейнер -->
    <div class="container">
        <!-- Форма создания поста -->
        <div class="create-post">
            <textarea 
                id="postText" 
                class="post-input" 
                placeholder="Что у вас нового? Пишите анонимно..."
                maxlength="500"
            ></textarea>
            <div id="charCounter" class="char-counter">0/500</div>
            <button id="postButton" class="post-button" onclick="createPost()">
                📝 Опубликовать пост
            </button>
        </div>

        <!-- Лента постов -->
        <div id="postsContainer">
            <div class="loading">Загрузка ленты...</div>
        </div>
    </div>

    <!-- Сообщения -->
    <div id="message" class="message"></div>

    <script>
        // ===== КОНФИГУРАЦИЯ FIREBASE =====
        const firebaseConfig = {
            apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
            authDomain: "czhmass.firebaseapp.com",
            projectId: "czhmass",
            storageBucket: "czhmass.firebasestorage.app",
            messagingSenderId: "1064257019843",
            appId: "1:1064257019843:web:65488b45be2f86838ca776"
        };

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        let db, auth;
        let currentUser = null;
        let currentUserData = null;

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        db = firebase.firestore();
        auth = firebase.auth();

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 4000);
        }

        function formatTime(timestamp) {
            if (!timestamp) return 'Только что';
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                const now = new Date();
                const diff = now - date;
                
                if (diff < 60000) return 'Только что';
                if (diff < 3600000) return `${Math.floor(diff / 60000)} мин назад`;
                if (diff < 86400000) return `${Math.floor(diff / 3600000)} ч назад`;
                if (diff < 604800000) return `${Math.floor(diff / 86400000)} дн назад`;
                
                return date.toLocaleDateString('ru-RU', {
                    day: 'numeric',
                    month: 'short'
                });
            } catch (e) {
                return 'Недавно';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getAvatarLetter(username) {
            return username ? username.charAt(0).toUpperCase() : 'А';
        }

        // ===== ОБНОВЛЕНИЕ ВРЕМЕНИ В ОСТРОВКЕ =====
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
            document.getElementById('currentTime').textContent = timeString;
        }

        setInterval(updateTime, 1000);
        updateTime();

        // ===== ОБНОВЛЕНИЕ КНОПКИ ПРОФИЛЯ =====
        function updateProfileButton(userData) {
            const avatar = document.getElementById('profileAvatar');
            const username = document.getElementById('profileUsername');
            
            if (userData && userData.username) {
                avatar.textContent = getAvatarLetter(userData.username);
                username.textContent = userData.username;
            }
        }

        // ===== СЧЕТЧИК СИМВОЛОВ =====
        document.getElementById('postText').addEventListener('input', function() {
            const length = this.value.length;
            const counter = document.getElementById('charCounter');
            counter.textContent = `${length}/500`;
            
            // Сбрасываем классы
            counter.className = 'char-counter';
            
            // Меняем цвет в зависимости от длины
            if (length >= 480) {
                counter.classList.add('danger');
            } else if (length >= 400) {
                counter.classList.add('warning');
            }
        });

        // ===== СОЗДАНИЕ ПОСТА =====
        async function createPost() {
            const postText = document.getElementById('postText').value.trim();
            const postButton = document.getElementById('postButton');
            
            if (!postText) {
                showMessage('Введите текст поста', 'error');
                return;
            }
            
            if (postText.length > 500) {
                showMessage('Пост слишком длинный (макс. 500 символов)', 'error');
                return;
            }
            
            if (!currentUser) {
                showMessage('Вы не авторизованы', 'error');
                return;
            }
            
            // Блокируем кнопку
            postButton.disabled = true;
            postButton.textContent = 'Публикация...';
            
            try {
                // Создаем пост
                await db.collection('posts').add({
                    text: postText,
                    userId: currentUser.uid,
                    username: currentUserData.username,
                    createdAt: new Date(),
                    likesCount: 0
                });
                
                // Обновляем счетчик постов пользователя
                await db.collection('users').doc(currentUser.uid).update({
                    postsCount: firebase.firestore.FieldValue.increment(1)
                });
                
                // Очищаем поле
                document.getElementById('postText').value = '';
                document.getElementById('charCounter').textContent = '0/500';
                document.getElementById('charCounter').className = 'char-counter';
                
                showMessage('Пост опубликован!', 'success');
                
                // Перезагружаем ленту
                setTimeout(loadPosts, 500);
                
            } catch (error) {
                console.error('Ошибка создания поста:', error);
                showMessage('Ошибка публикации: ' + error.message, 'error');
            } finally {
                // Разблокируем кнопку
                postButton.disabled = false;
                postButton.textContent = '📝 Опубликовать пост';
            }
        }

        // ===== СИСТЕМА ЛАЙКОВ =====
        async function toggleLike(postId, heartElement) {
            if (!currentUser) {
                showMessage('Войдите, чтобы ставить лайки', 'error');
                return;
            }
            
            const likeRef = db.collection('posts').doc(postId).collection('likes').doc(currentUser.uid);
            const postRef = db.collection('posts').doc(postId);
            
            try {
                // Проверяем, есть ли уже лайк
                const likeDoc = await likeRef.get();
                const container = heartElement.closest('.post-footer').querySelector('.like-container');
                const countEl = container.querySelector('.like-count');
                let currentCount = parseInt(countEl.textContent) || 0;
                
                if (likeDoc.exists) {
                    // Убираем лайк
                    await likeRef.delete();
                    await postRef.update({
                        likesCount: firebase.firestore.FieldValue.increment(-1)
                    });
                    
                    heartElement.textContent = '🤍';
                    heartElement.className = 'like-heart';
                    countEl.textContent = Math.max(0, currentCount - 1);
                    
                    // Анимация
                    heartElement.classList.add('like-animation');
                    setTimeout(() => heartElement.classList.remove('like-animation'), 600);
                    
                } else {
                    // Добавляем лайк
                    await likeRef.set({
                        userId: currentUser.uid,
                        createdAt: new Date(),
                        username: currentUserData?.username || 'Аноним'
                    });
                    
                    await postRef.update({
                        likesCount: firebase.firestore.FieldValue.increment(1)
                    });
                    
                    heartElement.textContent = '❤️';
                    heartElement.className = 'like-heart liked';
                    countEl.textContent = currentCount + 1;
                    
                    // Анимация
                    heartElement.classList.add('like-animation');
                    setTimeout(() => heartElement.classList.remove('like-animation'), 600);
                    
                    showMessage('Лайк поставлен!', 'success');
                }
                
            } catch (error) {
                console.error('Ошибка лайка:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        // Проверяем лайкнул ли пользователь пост
        async function checkIfLiked(postId, heartElement) {
            if (!currentUser) return;
            
            try {
                const likeDoc = await db.collection('posts')
                    .doc(postId)
                    .collection('likes')
                    .doc(currentUser.uid)
                    .get();
                    
                if (likeDoc.exists) {
                    heartElement.textContent = '❤️';
                    heartElement.className = 'like-heart liked';
                }
            } catch (error) {
                console.error('Ошибка проверки лайка:', error);
            }
        }

        // ===== ЗАГРУЗКА ПОСТОВ =====
        async function loadPosts() {
            try {
                const snapshot = await db.collection('posts')
                    .orderBy('createdAt', 'desc')
                    .limit(50)
                    .get();
                    
                const postsContainer = document.getElementById('postsContainer');
                
                if (snapshot.empty) {
                    postsContainer.innerHTML = '<div class="empty">Пока нет постов. Будьте первым!</div>';
                    return;
                }
                
                let postsHTML = '';
                
                snapshot.forEach((doc) => {
                    const post = doc.data();
                    const postId = doc.id;
                    const likesCount = post.likesCount || 0;
                    
                    postsHTML += `
                        <div class="post-ios" data-post-id="${postId}">
                            <div class="post-header">
                                <div class="user-avatar">${getAvatarLetter(post.username)}</div>
                                <div class="post-user">
                                    <div class="username">@${escapeHtml(post.username)}</div>
                                    <div class="post-time">${formatTime(post.createdAt)}</div>
                                </div>
                                ${post.userId === currentUser?.uid ? `
                                    <button class="delete-post" onclick="deletePost('${postId}')" title="Удалить пост">
                                        🗑️
                                    </button>
                                ` : ''}
                            </div>
                            <div class="post-content">${escapeHtml(post.text)}</div>
                            <div class="post-footer">
                                <div class="like-container">
                                    <span class="like-heart" onclick="toggleLike('${postId}', this)">
                                        🤍
                                    </span>
                                    <span class="like-count">${likesCount}</span>
                                </div>
                                <div class="post-time">${formatTime(post.createdAt)}</div>
                            </div>
                        </div>
                    `;
                });
                
                postsContainer.innerHTML = postsHTML;
                
                // Проверяем лайки для каждого поста
                snapshot.forEach(async (doc) => {
                    const postId = doc.id;
                    const postElement = document.querySelector(`[data-post-id="${postId}"]`);
                    if (postElement) {
                        const heart = postElement.querySelector('.like-heart');
                        await checkIfLiked(postId, heart);
                    }
                });
                
            } catch (error) {
                console.error('Ошибка загрузки постов:', error);
                document.getElementById('postsContainer').innerHTML = 
                    '<div class="error">Ошибка загрузки ленты. Попробуйте обновить страницу.</div>';
            }
        }

        // ===== УДАЛЕНИЕ ПОСТА =====
        async function deletePost(postId) {
            if (!confirm('Удалить этот пост?')) return;
            
            try {
                await db.collection('posts').doc(postId).delete();
                
                // Уменьшаем счетчик постов пользователя
                if (currentUser) {
                    await db.collection('users').doc(currentUser.uid).update({
                        postsCount: firebase.firestore.FieldValue.increment(-1)
                    });
                }
                
                showMessage('Пост удален', 'success');
                
                // Удаляем пост из DOM
                const postElement = document.querySelector(`[data-post-id="${postId}"]`);
                if (postElement) {
                    postElement.style.opacity = '0';
                    postElement.style.transform = 'translateY(-20px)';
                    setTimeout(() => {
                        postElement.remove();
                        loadPosts(); // Перезагружаем для обновления счетчиков
                    }, 300);
                }
                
            } catch (error) {
                console.error('Ошибка удаления поста:', error);
                showMessage('Ошибка удаления: ' + error.message, 'error');
            }
        }

        // ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                
                try {
                    // Загружаем данные пользователя
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    if (userDoc.exists) {
                        currentUserData = userDoc.data();
                        
                        // Обновляем кнопку профиля
                        updateProfileButton(currentUserData);
                        
                        // Показываем кнопку админа если нужно
                        if (currentUserData.isAdmin) {
                            document.getElementById('adminBtn').style.display = 'inline-block';
                        }
                        
                        // Загружаем посты
                        loadPosts();
                    } else {
                        showMessage('Профиль не найден', 'error');
                        setTimeout(() => window.location.href = 'profile.html', 2000);
                    }
                } catch (error) {
                    console.error('Ошибка загрузки профиля:', error);
                    showMessage('Ошибка загрузки', 'error');
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        // ===== ВЫХОД =====
        function logout() {
            if (confirm('Выйти из аккаунта?')) {
                auth.signOut().then(() => {
                    window.location.href = 'index.html';
                });
            }
        }

        // ===== REAL-TIME ОБНОВЛЕНИЕ ЛАЙКОВ =====
        function setupLikesListener() {
            if (!currentUser) return;
            
            // Слушаем изменения в лайках текущего пользователя
            db.collectionGroup('likes')
                .where('userId', '==', currentUser.uid)
                .onSnapshot((snapshot) => {
                    snapshot.docChanges().forEach((change) => {
                        if (change.type === 'added' || change.type === 'removed') {
                            const postId = change.doc.ref.parent.parent.id;
                            const postElement = document.querySelector(`[data-post-id="${postId}"]`);
                            if (postElement) {
                                const heart = postElement.querySelector('.like-heart');
                                checkIfLiked(postId, heart);
                            }
                        }
                    });
                });
            
            // Слушаем изменения в счетчиках лайков
            db.collection('posts').onSnapshot((snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === 'modified') {
                        const postId = change.doc.id;
                        const postData = change.doc.data();
                        const postElement = document.querySelector(`[data-post-id="${postId}"]`);
                        if (postElement) {
                            const countEl = postElement.querySelector('.like-count');
                            if (countEl) {
                                countEl.textContent = postData.likesCount || 0;
                            }
                        }
                    }
                });
            });
        }

        // Запускаем real-time обновление после авторизации
        setTimeout(setupLikesListener, 2000);

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        window.addEventListener('load', () => {
            console.log('🚀 Лента загружена');
            
            // Фокус на поле ввода
            document.getElementById('postText').focus();
            
            // Enter для отправки (Shift+Enter для новой строки)
            document.getElementById('postText').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    createPost();
                }
            });
        });
    </script>
</body>
</html>
