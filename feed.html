<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лента - czhmass.com</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #1c1e21;
            min-height: 100vh;
            padding: 20px;
        }

        .navbar {
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #1877f2;
            text-decoration: none;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            background: #1877f2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #166fe5;
            transform: translateY(-1px);
        }

        .btn-admin {
            background: #805ad5;
            display: none;
        }

        .btn-logout {
            background: #e4e6eb;
            color: #050505;
        }

        .btn-logout:hover {
            background: #d8dadf;
        }

        .create-post {
            background: white;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .create-post h2 {
            margin-bottom: 16px;
            color: #050505;
            font-size: 20px;
        }

        .post-textarea {
            width: 100%;
            min-height: 120px;
            padding: 16px;
            border: 1px solid #dddfe2;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 16px;
            transition: border 0.2s;
        }

        .post-textarea:focus {
            outline: none;
            border-color: #1877f2;
            box-shadow: 0 0 0 2px rgba(24, 119, 242, 0.2);
        }

        .feed-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .feed-title {
            font-size: 22px;
            margin-bottom: 20px;
            color: #050505;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .post {
            background: white;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border-left: 4px solid #1877f2;
            transition: transform 0.2s;
        }

        .post:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .post-author {
            font-weight: 600;
            color: #1877f2;
            font-size: 16px;
        }

        .post-time {
            color: #65676b;
            font-size: 14px;
        }

        .post-content {
            font-size: 16px;
            line-height: 1.5;
            color: #050505;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message {
            padding: 14px;
            border-radius: 8px;
            margin: 16px 0;
            display: none;
            font-size: 14px;
        }

        .success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .error {
            background: #fee2e2;
            color: #7f1d1d;
            border: 1px solid #fecaca;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #65676b;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #65676b;
            font-style: italic;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="feed.html" class="logo">czhmass.com</a>
        <div class="nav-buttons">
            <button class="btn" onclick="window.location.href='profile.html'">👤 Профиль</button>
            <button class="btn btn-admin" id="adminBtn" onclick="window.location.href='admin.html'">👑 Админ</button>
            <button class="btn btn-logout" onclick="logout()">🚪 Выйти</button>
        </div>
    </nav>

    <div class="create-post">
        <h2>💬 О чем думаете?</h2>
        <textarea class="post-textarea" id="postText" placeholder="Поделитесь чем-нибудь с сообществом..."></textarea>
        <button class="btn" onclick="createPost()">📤 Опубликовать</button>
        <div id="message" class="message"></div>
    </div>

    <div class="feed-container">
        <h2 class="feed-title">📰 Лента постов</h2>
        <div id="posts">
            <div class="loading">Загрузка постов...</div>
        </div>
    </div>

    <script>
        // ===== FIREBASE КОНФИГ =====
        const firebaseConfig = {
            apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
            authDomain: "czhmass.firebaseapp.com",
            projectId: "czhmass",
            storageBucket: "czhmass.firebasestorage.app",
            messagingSenderId: "1064257019843",
            appId: "1:1064257019843:web:65488b45be2f86838ca776"
        };

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        let db, auth;
        let currentUserData = null;

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            console.log('✅ Firebase инициализирован');
        }

        db = firebase.firestore();
        auth = firebase.auth();

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 4000);
        }

        function formatTime(timestamp) {
            if (!timestamp) return 'Недавно';
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                const now = new Date();
                const diff = now - date;
                if (diff < 60000) return 'Только что';
                if (diff < 3600000) return `${Math.floor(diff / 60000)} мин назад`;
                if (diff < 86400000) return `${Math.floor(diff / 3600000)} ч назад`;
                return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
            } catch (e) {
                return 'Недавно';
            }
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // ===== ВЫХОД =====
        function logout() {
            auth.signOut().then(() => {
                localStorage.clear();
                window.location.href = 'index.html';
            });
        }

        // ===== ОБРАБОТЧИК АВТОРИЗАЦИИ =====
        auth.onAuthStateChanged(async (user) => {
            console.log('🔐 Проверка авторизации:', user ? user.email : 'нет');

            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            console.log('✅ Пользователь авторизован:', user.email);

            try {
                // Проверяем/создаем документ пользователя
                const userDocRef = db.collection('users').doc(user.uid);
                const userDoc = await userDocRef.get();

                if (!userDoc.exists) {
                    console.log('📝 Создаем документ для пользователя...');
                    const username = user.email.split('@')[0];
                    
                    await userDocRef.set({
                        username: username,
                        email: user.email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        isAdmin: false,
                        postsCount: 0,
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    console.log('✅ Документ создан для:', username);
                    currentUserData = { username: username, email: user.email, isAdmin: false };
                } else {
                    const data = userDoc.data();
                    currentUserData = data;
                    console.log('👤 Данные пользователя:', data.username);
                    
                    // Обновляем время входа
                    await userDocRef.update({
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }

                // Сохраняем в localStorage
                localStorage.setItem('czhmass_userId', user.uid);
                localStorage.setItem('czhmass_currentUser', currentUserData.username);
                localStorage.setItem('czhmass_userEmail', user.email);

                // Проверка админки
                if (currentUserData.isAdmin) {
                    document.getElementById('adminBtn').style.display = 'inline-block';
                    console.log('👑 Админ-права доступны');
                }

                // Загружаем посты
                loadPosts();

                // Настройка горячих клавиш
                document.getElementById('postText').addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.key === 'Enter') createPost();
                });

            } catch (error) {
                console.error('❌ Ошибка загрузки пользователя:', error);
                showMessage('Ошибка загрузки данных: ' + error.message, 'error');
            }
        });

        // ===== ЗАГРУЗКА ПОСТОВ =====
        async function loadPosts() {
            console.log('📥 Загрузка постов...');
            const postsContainer = document.getElementById('posts');

            try {
                const snapshot = await db.collection('posts')
                    .orderBy('createdAt', 'desc')
                    .limit(50)
                    .get();

                if (snapshot.empty) {
                    postsContainer.innerHTML = '<div class="empty">😴 Пока нет постов. Будьте первым!</div>';
                    return;
                }

                let html = '';
                snapshot.forEach(doc => {
                    const post = doc.data();
                    html += `
                        <div class="post">
                            <div class="post-header">
                                <span class="post-author">@${escapeHtml(post.username || 'Аноним')}</span>
                                <span class="post-time">${formatTime(post.createdAt)}</span>
                            </div>
                            <div class="post-content">${escapeHtml(post.text || '')}</div>
                        </div>
                    `;
                });

                postsContainer.innerHTML = html;
                console.log(`✅ Загружено ${snapshot.size} постов`);

            } catch (error) {
                console.error('❌ Ошибка загрузки постов:', error);
                postsContainer.innerHTML = '<div class="error">Ошибка загрузки постов. Проверьте правила Firestore.</div>';
                showMessage('Ошибка загрузки ленты', 'error');
            }
        }

        // ===== СОЗДАНИЕ ПОСТА =====
        async function createPost() {
            const textInput = document.getElementById('postText');
            const text = textInput.value.trim();
            const user = auth.currentUser;

            if (!text) {
                showMessage('Введите текст поста', 'error');
                return;
            }

            if (!user) {
                showMessage('Вы не авторизованы', 'error');
                window.location.href = 'index.html';
                return;
            }

            try {
                // Получаем username (из кэша или Firestore)
                let username = currentUserData ? currentUserData.username : null;
                
                if (!username) {
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    if (userDoc.exists) {
                        username = userDoc.data().username;
                    } else {
                        username = user.email.split('@')[0];
                    }
                }

                console.log('📝 Создание поста от:', username);

                // Создаем пост
                await db.collection('posts').add({
                    text: text,
                    userId: user.uid,
                    username: username,
                    userEmail: user.email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: 0,
                    likedBy: [],
                    comments: []
                });

                // Очищаем и показываем успех
                textInput.value = '';
                showMessage('✅ Пост опубликован!', 'success');

                // Обновляем ленту через 1 сек
                setTimeout(loadPosts, 1000);

            } catch (error) {
                console.error('❌ Ошибка создания поста:', error);
                showMessage('Ошибка публикации: ' + error.message, 'error');
            }
        }

        // ===== ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ =====
        window.addEventListener('load', () => {
            console.log('🚀 Страница feed.html загружена');
        });
    </script>
</body>
</html>
