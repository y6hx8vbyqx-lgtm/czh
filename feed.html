<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#000;
  --card:rgba(28,28,30,.95);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
  --success:#30d158;
  --views:#8e8e93;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);
  border-radius:18px;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}
.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}

/* Таб бар (iOS стиль) */
.tab-bar{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:430px;
  height:60px;
  background:var(--card);
  border-radius:20px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:998;
  padding:0 20px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:0 -4px 20px rgba(0,0,0,0.3);
}
.tab-btn{
  background:none;
  border:none;
  color:var(--sub);
  font-size:24px;
  cursor:pointer;
  padding:10px;
  transition:all 0.3s;
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}
.tab-btn.active{
  color:#fff;
  transform:scale(1.1);
}
.tab-label{
  font-size:12px;
  margin-top:2px;
  text-align:center;
}

.container{
  max-width:480px;
  margin:auto;
  padding:130px 14px 100px;
}

.create{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
}
.create textarea{
  width:100%;
  min-height:80px;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  resize:vertical;
}
.create button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border:none;
  border-radius:16px;
  background:var(--accent);
  color:#fff;
  font-weight:600;
}
.word-counter{
  text-align:right;
  font-size:12px;
  color:var(--sub);
  margin-top:4px;
}
.word-counter.warning{
  color:#ff9500;
}
.word-counter.error{
  color:#ff453a;
}

/* ПОИСК ПОЛЬЗОВАТЕЛЕЙ */
.search{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
  position:relative;
}
.search-input{
  width:100%;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px 16px 14px 44px;
  color:#fff;
  font-size:16px;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  border:1px solid var(--border);
}
.search-input:focus{
  outline:none;
  border-color:var(--accent);
}
.search-icon{
  position:absolute;
  left:28px;
  top:50%;
  transform:translateY(-50%);
  color:var(--sub);
  font-size:18px;
  pointer-events:none;
}
.search-results{
  margin-top:12px;
  max-height:200px;
  overflow-y:auto;
  display:none;
}
.search-results.show{
  display:block;
}
.search-result{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:14px;
  background:#1c1c1e;
  margin-bottom:8px;
  cursor:pointer;
  transition:background 0.2s;
}
.search-result:hover{
  background:rgba(255,255,255,0.1);
}
.search-result:last-child{
  margin-bottom:0;
}
.search-avatar{
  width:40px;
  height:40px;
  border-radius:14px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:16px;
}
.search-username{
  font-weight:600;
  font-size:15px;
}
.no-results{
  text-align:center;
  color:var(--sub);
  padding:20px 0;
  font-size:14px;
}

.post{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
  position:relative;
  transition:box-shadow 0.3s ease;
}
.post.highlighted{
  box-shadow:0 0 0 2px var(--accent), 0 0 20px rgba(102,126,234,0.3);
}
.post-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}
.avatar{
  width:40px;
  height:40px;
  border-radius:14px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}
.post-user-info{
  display:flex;
  flex-direction:column;
  flex-grow:1;
}
.post-user{
  font-weight:600;
  cursor:pointer;
  transition:opacity 0.2s;
  display:flex;
  align-items:center;
  gap:4px;
}
.post-user:hover{
  opacity:0.7;
}
.verified-badge{
  color:#5ac8fa;
  font-size:14px;
}
.post-time{
  color:var(--sub);
  font-size:12px;
  margin-top:2px;
}
.post-text{
  margin:10px 0;
  line-height:1.4;
  word-break:break-word;
}
.post-actions{
  display:flex;
  gap:16px;
  margin-top:12px;
}
.action{
  background:none;
  border:none;
  color:var(--sub);
  font-size:18px;
  cursor:pointer;
  transition:transform 0.2s;
  display:flex;
  align-items:center;
  gap:4px;
}
.action:hover{
  transform:scale(1.1);
}
.liked{color:#ff2d55}
.viewed{color:var(--views)}
.trash{
  margin-left:auto;
  background:none;border:none;
  color:var(--danger);font-size:18px;
  cursor:pointer;
  padding:0;
}

/* Кнопка подписки */
.subscribe-btn{
  background:var(--accent);
  border:none;
  color:#fff;
  padding:6px 12px;
  border-radius:12px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
  white-space:nowrap;
}
.subscribe-btn:hover{
  opacity:0.9;
}
.subscribe-btn.subscribed{
  background:var(--sub);
  color:var(--bg);
}

/* Кнопка чата */
.chat-btn {
  background: #5ac8fa;
  border: none;
  color: var(--bg);
  padding: 6px 12px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  margin-left: 8px;
}
.chat-btn:hover {
  opacity: 0.9;
}
.chat-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Кнопка чатов в навбаре */
.chats-btn {
  background: #5ac8fa;
  color: var(--bg);
}

.sheet{
  position:fixed;
  inset:0;
  background:#000;
  transform:translateY(100%);
  transition:.35s ease;
  z-index:2000;
  display:flex;
  flex-direction:column;
}
.sheet.show{transform:translateY(0)}
.sheet-header{
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
}
.sheet-body{
  flex:1;
  overflow:auto;
  padding:14px;
}
.sheet-footer{
  padding:12px;
  border-top:1px solid var(--border);
  display:flex;
  gap:8px;
}
.sheet-footer input{
  flex:1;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* PROFILE SHEET */
.profile-header{
  display:flex;
  align-items:flex-start;
  gap:16px;
  margin-bottom:20px;
}
.profile-avatar{
  width:72px;height:72px;
  border-radius:22px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:700;
  flex-shrink:0;
}
.profile-info{
  display:flex;
  flex-direction:column;
  gap:6px;
  flex:1;
}
.profile-name{
  font-size:18px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.profile-name-with-badge{
  display:flex;
  align-items:center;
  gap:4px;
}
.change-name-btn{
  background:none;
  border:none;
  color:var(--sub);
  font-size:14px;
  cursor:pointer;
  padding:4px 8px;
  border-radius:8px;
  transition:background 0.2s;
}
.change-name-btn:hover{
  background:rgba(255,255,255,0.1);
}
.profile-stats{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
}
.profile-stat{
  display:flex;
  flex-direction:column;
}
.profile-stat-value{
  font-size:16px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:4px;
}
.profile-stat-label{
  color:var(--sub);
  font-size:12px;
  margin-top:2px;
}
.likes-stat{
  color:#ff2d55;
}
.posts-stat{
  color:#5ac8fa;
}
.views-stat{
  color:var(--views);
}

/* Описание профиля */
.profile-bio{
  background:var(--card);
  border-radius:18px;
  padding:16px;
  margin-top:16px;
  margin-bottom:20px;
  position:relative;
}
.profile-bio-text{
  line-height:1.4;
  word-break:break-word;
  white-space:pre-wrap;
}
.profile-bio-empty{
  color:var(--sub);
  font-style:italic;
  font-size:14px;
}
.profile-bio-edit-btn{
  position:absolute;
  top:12px;
  right:12px;
  background:none;
  border:none;
  color:var(--sub);
  font-size:14px;
  cursor:pointer;
  padding:4px 8px;
  border-radius:8px;
  transition:background 0.2s;
}
.profile-bio-edit-btn:hover{
  background:rgba(255,255,255,0.1);
}
.bio-word-counter{
  text-align:right;
  font-size:12px;
  color:var(--sub);
  margin-top:8px;
}
.bio-word-counter.warning{
  color:#ff9500;
}
.bio-word-counter.error{
  color:#ff453a;
}

/* Уведомление */
.notification{
  position:fixed;
  top:120px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:var(--accent);
  color:white;
  padding:12px 20px;
  border-radius:14px;
  font-weight:600;
  z-index:1999;
  opacity:0;
  transition:opacity 0.3s, transform 0.3s;
  pointer-events:none;
  max-width:90%;
  text-align:center;
}
.notification.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* Модальные окна */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:3000;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s;
}
.modal-overlay.show{
  opacity:1;
  pointer-events:auto;
}
.modal{
  background:var(--card);
  border-radius:20px;
  padding:24px;
  width:90%;
  max-width:400px;
  transform:translateY(20px);
  transition:transform 0.3s;
}
.modal-overlay.show .modal{
  transform:translateY(0);
}
.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.modal-title{
  font-size:20px;
  font-weight:700;
}
.modal-close{
  background:none;
  border:none;
  color:var(--sub);
  font-size:20px;
  cursor:pointer;
  padding:0;
  width:24px;
  height:24px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.modal-input{
  width:100%;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  color:#fff;
  font-size:16px;
  margin-bottom:16px;
  font-family:inherit;
}
.modal-input:focus{
  outline:none;
  border-color:var(--accent);
}
.modal-textarea{
  width:100%;
  min-height:120px;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  color:#fff;
  font-size:16px;
  margin-bottom:8px;
  font-family:inherit;
  resize:vertical;
}
.modal-textarea:focus{
  outline:none;
  border-color:var(--accent);
}
.modal-buttons{
  display:flex;
  gap:12px;
}
.modal-btn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
  font-size:16px;
}
.modal-btn.primary{
  background:var(--accent);
  color:white;
}
.modal-btn.secondary{
  background:rgba(255,255,255,0.1);
  color:white;
}

/* Кнопка удаления комментария */
.comment-delete-btn{
  background:none;
  border:none;
  color:var(--danger);
  cursor:pointer;
  font-size:14px;
  padding:4px 8px;
  border-radius:6px;
  margin-left:auto;
}
.comment-delete-btn:hover{
  background:rgba(255,69,58,0.1);
}
</style>
</head>

<body>

<div class="dynamic-island" id="time"></div>

<div class="navbar">
  <div class="logo">czhmass</div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="location.href='profile.html'">👤</button>
    <button class="nav-btn" id="adminBtn" style="display:none" onclick="location.href='admin.html'">👑</button>
    <button class="nav-btn chats-btn" onclick="location.href='chats.html'">💬</button>
    <button class="nav-btn" onclick="logout()">🚪</button>
  </div>
</div>

<!-- Таб бар для переключения ленты -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchFeed('all')">
    <div>
      <div>📄</div>
      <div class="tab-label">Все посты</div>
    </div>
  </button>
  <button class="tab-btn" onclick="switchFeed('subscriptions')">
    <div>
      <div>👥</div>
      <div class="tab-label">Подписки</div>
    </div>
  </button>
</div>

<div class="container">

  <div class="create">
    <textarea id="postText" placeholder="Что у вас нового? Пишите анонимно..." maxlength="500"></textarea>
    <div class="word-counter" id="postWordCounter">Слов: 0/50</div>
    <button onclick="createPost()">Опубликовать</button>
  </div>

  <!-- ПОИСК ПОЛЬЗОВАТЕЛЕЙ -->
  <div class="search">
    <div class="search-icon">🔍</div>
    <input type="text" class="search-input" id="searchInput" placeholder="Поиск пользователей по нику..." autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>

  <div id="feed"></div>

</div>

<!-- Уведомление -->
<div class="notification" id="notification"></div>

<!-- Модальное окно для смены имени -->
<div class="modal-overlay" id="changeNameModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Сменить имя</div>
      <button class="modal-close" onclick="closeChangeNameModal()">✕</button>
    </div>
    <input type="text" class="modal-input" id="newUsernameInput" placeholder="Новое имя (без @)" maxlength="20">
    <div class="modal-buttons">
      <button class="modal-btn secondary" onclick="closeChangeNameModal()">Отмена</button>
      <button class="modal-btn primary" onclick="changeUsername()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Модальное окно для редактирования описания -->
<div class="modal-overlay" id="editBioModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Редактировать описание</div>
      <button class="modal-close" onclick="closeEditBioModal()">✕</button>
    </div>
    <textarea class="modal-textarea" id="bioText" placeholder="Расскажите о себе... (до 50 слов)" maxlength="500"></textarea>
    <div class="bio-word-counter" id="bioWordCounter">Слов: 0/50</div>
    <div class="modal-buttons">
      <button class="modal-btn secondary" onclick="closeEditBioModal()">Отмена</button>
      <button class="modal-btn primary" onclick="saveBio()">Сохранить</button>
    </div>
  </div>
</div>

<!-- COMMENTS -->
<div class="sheet" id="commentsSheet">
  <div class="sheet-header">
    <strong>Комментарии</strong>
    <button class="action" onclick="closeComments()">✕</button>
  </div>
  <div class="sheet-body" id="commentsBody"></div>
  <div class="sheet-footer">
    <input id="commentInput" placeholder="Комментарий" onkeypress="if(event.key==='Enter') addComment()">
    <button class="action" onclick="addComment()">📤</button>
  </div>
</div>

<!-- PROFILE (только для кликов по нику) -->
<div class="sheet" id="profileSheet">
  <div class="sheet-header">
    <strong>Профиль</strong>
    <button class="action" onclick="closeProfile()">✕</button>
  </div>
  <div class="sheet-body">
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar">A</div>
      <div class="profile-info">
        <div class="profile-name">
          <div class="profile-name-with-badge">
            <span id="profileName">@anon</span>
            <span class="verified-badge" id="profileVerifiedBadge" style="display:none" title="Администратор">✓</span>
          </div>
          <button class="subscribe-btn" id="profileSubscribeBtn" style="margin-left:8px;display:none">Подписаться</button>
          <button class="chat-btn" id="profileChatBtn" style="display:none" onclick="goToChatWithUser()">В чат</button>
          <button class="change-name-btn" id="changeNameBtn" onclick="openChangeNameModal()">✏️</button>
        </div>
        <div class="profile-stats">
          <div class="profile-stat">
            <div class="profile-stat-value posts-stat">
              <span>📝</span>
              <span id="profilePostsCount">0</span>
            </div>
            <div class="profile-stat-label">постов</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-value likes-stat">
              <span>❤️</span>
              <span id="profileLikesCount">0</span>
            </div>
            <div class="profile-stat-label">лайков</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-value views-stat">
              <span>👁️</span>
              <span id="profileViewsCount">0</span>
            </div>
            <div class="profile-stat-label">просмотров</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-value" style="color:#5ac8fa">
              <span>👥</span>
              <span id="profileSubscribersCount">0</span>
            </div>
            <div class="profile-stat-label">подписчиков</div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Блок описания профиля -->
    <div class="profile-bio" id="profileBio">
      <button class="profile-bio-edit-btn" id="editBioBtn" onclick="openEditBioModal()" style="display:none">✏️</button>
      <div id="profileBioText" class="profile-bio-text"></div>
      <div id="profileBioEmpty" class="profile-bio-empty" style="display:none">
        Пользователь еще не добавил описание...
      </div>
      <div class="bio-word-counter" id="profileBioWordCounter" style="display:none"></div>
    </div>
    
    <div id="profilePosts"></div>
  </div>
</div>

<script>
// Инициализация Firebase
firebase.initializeApp({
  apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
  authDomain: "czhmass.firebaseapp.com",
  projectId: "czhmass"
});
const db = firebase.firestore();
const auth = firebase.auth();

// Глобальные переменные
let currentUser = null;
let userData = null;
let postsCache = new Map();
let currentPostId = null;
let currentProfileUserId = null;
let searchTimeout = null;
let currentFeed = 'all';
let subscriptions = new Set();
let adminUsers = new Set();

    return;

});

// Функция для подсчета слов
function countWords(text) {
  if (!text || !text.trim()) return 0;
  return text.trim().split(/\s+/).length;
}

// Функция для обновления счетчика слов
function updateWordCounter(textareaId, counterId, maxWords) {
  const textarea = document.getElementById(textareaId);
  const counter = document.getElementById(counterId);
  
  if (!textarea || !counter) return;
  
  function updateCounter() {
    const text = textarea.value;
    const wordCount = countWords(text);
    
    counter.textContent = `Слов: ${wordCount}/${maxWords}`;
    
    // Изменяем цвет в зависимости от количества слов
    counter.classList.remove('warning', 'error');
    if (wordCount > maxWords * 0.8 && wordCount <= maxWords) {
      counter.classList.add('warning');
    } else if (wordCount > maxWords) {
      counter.classList.add('error');
    }
  }
  
  // Обновляем при загрузке и при каждом вводе
  updateCounter();
  textarea.addEventListener('input', updateCounter);
}

// Загрузка данных пользователя
async function loadUserData() {
  try {
    const snap = await db.collection("users").doc(currentUser.uid).get();
    
    if (!snap.exists) {
      // Создаем нового пользователя
      userData = {
        username: "user" + currentUser.uid.slice(-6),
        email: currentUser.email || "не указан",
        createdAt: new Date(),
        isAdmin: false,
        lastLogin: new Date(),
        subscribers: [],
        bio: "",
        blockedUsers: []
      };
      await db.collection("users").doc(currentUser.uid).set(userData);
    } else {
      userData = snap.data();
    }
    
    // Обновляем время последнего входа
    await db.collection("users").doc(currentUser.uid).update({
      lastLogin: new Date()
    });
    
    // Показываем кнопку админа если пользователь админ
    if (userData.isAdmin === true) {
      document.getElementById("adminBtn").style.display = "block";
      console.log("Админ найден, показываем кнопку");
    } else {
      document.getElementById("adminBtn").style.display = "none";
    }
    
  } catch (error) {
    console.error("Ошибка загрузки данных пользователя:", error);
    throw error;
  }
}

// Загрузка списка админов
async function loadAdminUsers() {
  try {
    const adminSnap = await db.collection("users")
      .where("isAdmin", "==", true)
      .get();
    
    adminUsers.clear();
    adminSnap.forEach(doc => {
      adminUsers.add(doc.id);
    });
    console.log("Загружено админов:", adminUsers.size);
  } catch (error) {
    console.error("Ошибка загрузки админов:", error);
  }
}

// Загрузка подписок
async function loadSubscriptions() {
  try {
    const userDoc = await db.collection("users").doc(currentUser.uid).get();
    if (userDoc.exists) {
      const data = userDoc.data();
      subscriptions = new Set(data.subscriptions || []);
      console.log("Загружено подписок:", subscriptions.size);
    }
  } catch (error) {
    console.error("Ошибка загрузки подписок:", error);
  }
}

// Загрузка заблокированных пользователей
async function loadBlockedUsers() {
  try {
    const userDoc = await db.collection("users").doc(currentUser.uid).get();
    if (userDoc.exists) {
      const data = userDoc.data();
      blockedUsers = new Set(data.blockedUsers || []);
      console.log("Загружено заблокированных пользователей:", blockedUsers.size);

// Загрузка постов
async function loadPosts() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "<div style='text-align:center;color:var(--sub);padding:40px 0;'>Загрузка постов...</div>";
  
  try {
    if (currentFeed === 'subscriptions' && subscriptions.size > 0) {
      // Загружаем посты только от подписок
      await loadSubscriptionPosts();
    } else if (currentFeed === 'subscriptions') {
      // Нет подписок
      feed.innerHTML = `
        <div style='text-align:center;color:var(--sub);padding:40px 0;'>
          Вы пока ни на кого не подписаны<br><br>
          Подпишитесь на интересных пользователей,<br>
          чтобы видеть их посты здесь!
        </div>`;
    } else {
      // Загружаем все посты
      await loadAllPosts();
    }
    
  } catch (error) {
    console.error("Ошибка при загрузке постов:", error);
    feed.innerHTML = `
      <div style='text-align:center;color:var(--danger);padding:40px 0;'>
        Ошибка при загрузке постов: ${error.message}
      </div>`;
  }
}

// Загрузка всех постов
async function loadAllPosts() {
  const feed = document.getElementById("feed");
  
  try {
    const snap = await db.collection("posts")
      .orderBy("createdAt", "desc")
      .limit(100)
      .get();
    
    if (snap.empty) {
      feed.innerHTML = "<div style='text-align:center;color:var(--sub);padding:40px 0;'>Пока нет постов. Будьте первым!</div>";
      return;
    }
    
    const posts = [];
    snap.forEach(doc => {
      const postData = doc.data();
      // Фильтруем посты от заблокированных пользователей
      if (!blockedUsers.has(postData.userId)) {
        posts.push({ id: doc.id, ...postData });
      }
    });
    
    if (posts.length === 0) {
      feed.innerHTML = "<div style='text-align:center;color:var(--sub);padding:40px 0;'>Нет доступных постов</div>";
      return;
    }
    
    displayPosts(posts);
    
  } catch (error) {
    console.error("Ошибка при загрузке всех постов:", error);
    throw error;
  }
}

// Загрузка постов от подписок
async function loadSubscriptionPosts() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "<div style='text-align:center;color:var(--sub);padding:40px 0;'>Загрузка постов от подписок...</div>";
  
  try {
    const snap = await db.collection("posts")
      .orderBy("createdAt", "desc")
      .limit(100)
      .get();
    
    if (snap.empty) {
      feed.innerHTML = "<div style='text-align:center;color:var(--sub);padding:40px 0;'>Нет постов</div>";
      return;
    }
    
    const posts = [];
    snap.forEach(doc => {
      const postData = doc.data();
      // Фильтруем посты от подписок и не от заблокированных
      if (subscriptions.has(postData.userId) && !blockedUsers.has(postData.userId)) {
        posts.push({ id: doc.id, ...postData });
      }
    });
    
    if (posts.length === 0) {
      feed.innerHTML = `
        <div style='text-align:center;color:var(--sub);padding:40px 0;'>
          Нет новых постов от ваших подписок
        </div>`;
      return;
    }
    
    displayPosts(posts);
    
  } catch (error) {
    console.error("Ошибка при загрузке постов подписок:", error);
    throw error;
  }
}

    const post = postData;
    const postId = postData.id;

    // Получаем дату поста
    let postDate = null;
    try {
      postDate = post.createdAt?.toDate ? post.createdAt.toDate() : new Date(post.createdAt);
    } catch (e) {
      console.log("Ошибка получения даты поста:", e);
    }
    
    // Добавляем разделитель даты если нужно
    if (lastPostDate && postDate) {
      const dividerLabel = getTimeDividerLabel(lastPostDate, postDate);
      if (dividerLabel) {

          <div class="post fade" style="text-align:center;color:var(--sub);font-size:14px">

          </div>
        `;

    }
    
    if (postDate) lastPostDate = postDate;
    
    // Проверяем лайк и подписку
    const liked = post.likedBy?.includes(currentUser.uid);
    const isSubscribed = subscriptions.has(post.userId);
    const isAdmin = adminUsers.has(post.userId);
    
    // Форматируем время
    let timeAgo = "только что";
    let fullDateTime = "";
    try {
      if (post.createdAt) {
        const postDate = post.createdAt.toDate ? post.createdAt.toDate() : new Date(post.createdAt);
        timeAgo = formatTimeAgo(postDate);
        fullDateTime = formatFullDateTime(postDate);
      }
    } catch (dateError) {
      console.log("Ошибка форматирования даты:", dateError);
    }
    
    // Создаем HTML для поста
    feed.innerHTML += `
    <div class="post fade" id="post-${postId}">
      <div class="post-header">
        <div class="avatar">${post.username?.[0]||"A"}</div>
        <div class="post-user-info">

            @${post.username}
            ${isAdmin ? '<span class="verified-badge" title="Администратор">✓</span>' : ''}
          </div>
          <div class="post-time" title="${fullDateTime}">${timeAgo}</div>
        </div>
        ${post.userId !== currentUser.uid ? 
          `<button class="subscribe-btn ${isSubscribed ? 'subscribed' : ''}"

                  style="margin-right:8px">

      </div>

        <button class="action ${liked ? "liked" : ""}" onclick="toggleLike('${postId}')">
          ${liked ? "❤️" : "🤍"} <span id="likes-${postId}">${post.likes || 0}</span>
        </button>
        <button class="action" onclick="openComments('${postId}')">
          💬 ${post.commentsCount || 0}
        </button>
        <button class="action viewed" title="Просмотры">
          👁️ ${post.views || 0}
        </button>
      </div>
    </div>`;
  });
  
  // Настраиваем отслеживание просмотров
  setTimeout(setupViewTracking, 500);
  // Проверяем нужно ли прокрутить к посту
  setTimeout(checkPostToScroll, 100);
}

// Создание поста
async function createPost() {
  const postText = document.getElementById("postText");
  const text = postText.value.trim();
  
  if (!text) {
    showNotification("Напишите что-нибудь перед отправкой!");
    return;
  }
  
  const wordCount = countWords(text);
  if (wordCount > 50) {
    showNotification("Пост не может превышать 50 слов!");
    return;
  }
  
  try {
    const username = userData.username || "anon" + currentUser.uid.slice(-4);
    
    await db.collection("posts").add({
      text: text,
      userId: currentUser.uid,
      username: username,
      createdAt: new Date(),
      likes: 0,
      views: 0,
      likedBy: [],
      commentsCount: 0
    });
    
    postText.value = "";
    updateWordCounter('postText', 'postWordCounter', 50);
    showNotification("Пост опубликован!");
    loadPosts();
    
  } catch (error) {
    console.error("Ошибка при создании поста:", error);
    showNotification("Ошибка при публикации: " + error.message);
  }
}

// Удаление поста
async function deletePost(postId, postUserId) {
  if (!confirm("Удалить пост?")) return;
  
  try {
    await db.collection("posts").doc(postId).delete();
    showNotification("Пост удален!");
    
    // Удаляем из просмотренных
    if (viewedPosts[postId]) {
      delete viewedPosts[postId];
      localStorage.setItem('viewedPosts', JSON.stringify(viewedPosts));
    }
    
    loadPosts();
    
    // Обновляем профиль если открыт
    if (currentProfileUserId === postUserId) {
      await refreshProfilePosts(postUserId);
    }
    
  } catch (error) {
    console.error("Ошибка при удалении поста:", error);
    showNotification("Не удалось удалить пост: " + error.message);
  }
}

// Лайк поста
async function toggleLike(id) {
  const post = postsCache.get(id);
  if (!post) return;
  
  const liked = post.likedBy?.includes(currentUser.uid);
  
  try {
    await db.collection("posts").doc(id).update({
      likes: firebase.firestore.FieldValue.increment(liked ? -1 : 1),
      likedBy: liked
        ? firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
        : firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
    });
    
    // Обновляем кэш
    post.likes = (post.likes || 0) + (liked ? -1 : 1);
    if (liked) {
      post.likedBy = post.likedBy?.filter(uid => uid !== currentUser.uid) || [];
    } else {
      if (!post.likedBy) post.likedBy = [];
      post.likedBy.push(currentUser.uid);
    }
    
    // Обновляем отображение
    const likeButton = document.querySelector(`#post-${id} .action`);
    const likesSpan = document.getElementById(`likes-${id}`);
    if (likeButton && likesSpan) {
      likeButton.classList.toggle('liked', !liked);
      likeButton.innerHTML = `${!liked ? "❤️" : "🤍"} <span id="likes-${id}">${post.likes}</span>`;
    }
    
    showNotification(liked ? "Лайк убран" : "Посту понравилось!");
    
  } catch (error) {
    console.error("Ошибка при лайке:", error);
    showNotification("Ошибка: " + error.message);
  }
}

// Открытие профиля
async function openProfile(uid, name) {
  if (!uid || !name) return;
  
  currentProfileUserId = uid;
  document.getElementById("profileSheet").classList.add("show");
  
  document.getElementById("profileName").textContent = "@" + name;
  document.getElementById("profileAvatar").textContent = name?.[0] || "A";
  
  // Настраиваем кнопки
  const changeNameBtn = document.getElementById("changeNameBtn");
  if (uid === currentUser.uid) {
    changeNameBtn.style.display = "inline-block";
  } else {
    changeNameBtn.style.display = "none";
  }
  
  updateProfileSubscribeButton(uid);
  updateProfileChatButton(uid);
  await updateProfileSubscribersCount(uid);
  await loadUserBio(uid);
  
  document.getElementById("profilePosts").innerHTML = `
    <div style="text-align:center;color:var(--sub);padding:40px 0;">
      Загрузка постов...
    </div>`;
  
  await refreshProfilePosts(uid);
}

// Закрытие профиля
function closeProfile() {
  currentProfileUserId = null;
  document.getElementById("profileSheet").classList.remove("show");
}

// Обновление кнопки подписки в профиле
function updateProfileSubscribeButton(userId) {
  const button = document.getElementById('profileSubscribeBtn');
  if (!button) return;
  
  if (userId === currentUser.uid) {
    button.style.display = 'none';
  } else {
    button.style.display = 'inline-block';
    const isSubscribed = subscriptions.has(userId);
    button.textContent = isSubscribed ? 'В подписках' : 'Подписаться';
    button.className = isSubscribed ? 'subscribe-btn subscribed' : 'subscribe-btn';
    button.onclick = () => toggleSubscribe(userId, document.getElementById('profileName').textContent.replace('@', ''));
  }
}

// Обновление кнопки чата в профиле
function updateProfileChatButton(userId) {
  const chatBtn = document.getElementById('profileChatBtn');
  if (!chatBtn) return;
  
  if (userId === currentUser.uid) {
    chatBtn.style.display = 'none';
  } else {
    chatBtn.style.display = 'inline-block';
    const isBlocked = blockedUsers.has(userId);
    chatBtn.disabled = isBlocked;
    chatBtn.title = isBlocked ? 'Пользователь заблокирован' : 'Написать сообщение';
    chatBtn.style.opacity = isBlocked ? '0.5' : '1';
  }
}

// Подписка/отписка
async function toggleSubscribe(userId, username) {
  try {
    const isSubscribed = subscriptions.has(userId);
    
    if (isSubscribed) {
      // Отписываемся
      await db.collection("users").doc(currentUser.uid).update({
        subscriptions: firebase.firestore.FieldValue.arrayRemove(userId)
      });
      
      await db.collection("users").doc(userId).update({
        subscribers: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
      });
      
      subscriptions.delete(userId);
      showNotification(`Вы отписались от @${username}`);
    } else {
      // Подписываемся
      await db.collection("users").doc(currentUser.uid).update({
        subscriptions: firebase.firestore.FieldValue.arrayUnion(userId)
      });
      
      await db.collection("users").doc(userId).update({
        subscribers: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
      });
      
      subscriptions.add(userId);
      showNotification(`Вы подписались на @${username}`);
    }
    
    // Обновляем UI
    if (currentProfileUserId === userId) {
      updateProfileSubscribeButton(userId);
      updateProfileChatButton(userId);
      await updateProfileSubscribersCount(userId);
    }
    
    // Перезагружаем посты, если мы в ленте подписок
    if (currentFeed === 'subscriptions') {
      loadPosts();
    }
    
    return !isSubscribed;
  } catch (error) {
    console.error("Ошибка при подписке:", error);
    showNotification("Ошибка при изменении подписки: " + error.message);
    return false;
  }
}

// Обновление количества подписчиков
async function updateProfileSubscribersCount(userId) {
  try {
    const userDoc = await db.collection("users").doc(userId).get();
    if (userDoc.exists) {
      const user = userDoc.data();
      const count = (user.subscribers || []).length;
      document.getElementById('profileSubscribersCount').textContent = count;
    }
  } catch (error) {
    console.error("Ошибка получения количества подписчиков:", error);
  }
}

// Загрузка описания профиля
async function loadUserBio(userId) {
  try {
    const userDoc = await db.collection("users").doc(userId).get();
    if (userDoc.exists) {
      const user = userDoc.data();
      const bio = user.bio || "";
      const bioText = document.getElementById('profileBioText');
      const bioEmpty = document.getElementById('profileBioEmpty');
      const wordCounter = document.getElementById('profileBioWordCounter');
      
      if (bio.trim()) {
        bioText.textContent = bio;
        bioText.style.display = 'block';
        bioEmpty.style.display = 'none';
        
        // Показываем счетчик слов только для своего профиля
        if (userId === currentUser.uid) {
          const wordCount = countWords(bio);
          wordCounter.textContent = `Слов: ${wordCount}/50`;
          wordCounter.style.display = 'block';
          
          wordCounter.classList.remove('warning', 'error');
          if (wordCount > 40 && wordCount <= 50) {
            wordCounter.classList.add('warning');
          } else if (wordCount > 50) {
            wordCounter.classList.add('error');
          }
        } else {
          wordCounter.style.display = 'none';
        }
      } else {
        bioText.style.display = 'none';
        bioEmpty.style.display = 'block';
        wordCounter.style.display = 'none';
      }
      
      // Показываем кнопку редактирования только для своего профиля
      const editBtn = document.getElementById('editBioBtn');
      if (userId === currentUser.uid) {
        editBtn.style.display = 'block';
      } else {
        editBtn.style.display = 'none';
      }
      
      // Показываем галочку для админов
      const verifiedBadge = document.getElementById('profileVerifiedBadge');
      if (adminUsers.has(userId)) {
        verifiedBadge.style.display = 'inline';
      } else {
        verifiedBadge.style.display = 'none';
      }
    }
  } catch (error) {
    console.error("Ошибка загрузки описания:", error);
  }
}

}

// Закрытие модального окна для редактирования описания
function closeEditBioModal() {
  document.getElementById('editBioModal').classList.remove('show');
}

// Сохранение описания
async function saveBio() {
  const bioTextarea = document.getElementById('bioText');
  const newBio = bioTextarea.value.trim();
  const wordCount = countWords(newBio);
  
  if (wordCount > 50) {
    showNotification("Описание не может превышать 50 слов!");
    return;
  }
  
  try {
    await db.collection("users").doc(currentUser.uid).update({
      bio: newBio
    });
    
    userData.bio = newBio;
    
    // Обновляем отображение описания
    if (currentProfileUserId === currentUser.uid) {
      await loadUserBio(currentUser.uid);
    }
    
    showNotification("Описание обновлено!");
    closeEditBioModal();
    
  } catch (error) {
    console.error("Ошибка при сохранении описания:", error);
    showNotification("Ошибка при сохранении описания: " + error.message);
  }
}

// Обновление постов в профиле
async function refreshProfilePosts(uid) {
  const profilePosts = document.getElementById("profilePosts");
  const profilePostsCount = document.getElementById("profilePostsCount");
  const profileLikesCount = document.getElementById("profileLikesCount");
  const profileViewsCount = document.getElementById("profileViewsCount");
  
  if (!profilePosts) return;
  
  try {
    const postsCount = await getUserPostsCount(uid);
    profilePostsCount.textContent = postsCount;
    
    const likesCount = await getUserLikesCount(uid);
    profileLikesCount.textContent = likesCount;
    
    const viewsCount = await getUserViewsCount(uid);
    profileViewsCount.textContent = viewsCount;
    
    profilePosts.innerHTML = "";
    
    if (postsCount === 0) {
      profilePosts.innerHTML = `
        <div style="text-align:center;color:var(--sub);padding:40px 0;">
          У пользователя пока нет постов
        </div>`;
      return;
    }
    
    const userPosts = await getUserPosts(uid);
    
    userPosts.forEach(post => {
      const canDelete = post.userId === currentUser.uid || userData?.isAdmin;
      
      let timeAgo = "только что";
      let fullDateTime = "";
      
      try {
        if (post.createdAt) {
          const postDate = post.createdAt.toDate ? post.createdAt.toDate() : new Date(post.createdAt);
          timeAgo = formatTimeAgo(postDate);
          fullDateTime = formatFullDateTime(postDate);
        }
      } catch (dateError) {
        console.log("Ошибка форматирования даты:", dateError);
      }
      
      profilePosts.innerHTML += `
        <div class="post fade" id="profile-post-${post.id}">
          <div class="post-text">${post.text}</div>
          <div class="post-time" title="${fullDateTime}">
            <span>${timeAgo}</span>
            <span style="color:#ff2d55;margin-left:10px;">❤️ ${post.likes || 0}</span>
            <span style="color:#5ac8fa;margin-left:10px;">💬 ${post.commentsCount || 0}</span>
            <span style="color:var(--views);margin-left:10px;">👁️ ${post.views || 0}</span>
          </div>
          ${canDelete ? 
            `<button class="trash" style="position:absolute;top:16px;right:16px;" 
                     onclick="deletePostFromProfile('${post.id}', '${uid}')">🗑</button>` : 
            ""}
        </div>`;
    });
    
  } catch (error) {
    console.error("Ошибка при загрузке постов профиля:", error);
    profilePosts.innerHTML = `
      <div style="text-align:center;color:var(--danger);padding:40px 0;">
        ${error.message.includes("index") ? 
          "Пожалуйста, создайте индекс в Firebase Console" : 
          "Ошибка при загрузке постов"}
      </div>`;
  }
}

// Получение количества постов пользователя
async function getUserPostsCount(uid) {
  try {
    const snap = await db.collection("posts")
      .where("userId", "==", uid)
      .get();
    return snap.size;
  } catch (error) {
    console.error("Ошибка при получении количества постов:", error);
    return 0;
  }
}

// Получение количества лайков пользователя
async function getUserLikesCount(uid) {
  try {
    const snap = await db.collection("posts")
      .where("userId", "==", uid)
      .get();
    
    let totalLikes = 0;
    snap.forEach(doc => {
      const post = doc.data();
      totalLikes += (post.likes || 0);
    });
    
    return totalLikes;
  } catch (error) {
    console.error("Ошибка при получении лайков пользователя:", error);
    return 0;
  }
}

// Получение количества просмотров пользователя
async function getUserViewsCount(uid) {
  try {
    const snap = await db.collection("posts")
      .where("userId", "==", uid)
      .get();
    
    let totalViews = 0;
    snap.forEach(doc => {
      const post = doc.data();
      totalViews += (post.views || 0);
    });
    
    return totalViews;
  } catch (error) {
    console.error("Ошибка при получении просмотров пользователя:", error);
    return 0;
  }
}

// Получение постов пользователя
async function getUserPosts(uid) {
  try {
    const allPostsSnap = await db.collection("posts")
      .where("userId", "==", uid)
      .get();
    
    const userPosts = [];
    allPostsSnap.forEach(doc => {
      userPosts.push({
        id: doc.id,
        ...doc.data()
      });
    });
    
    // Сортируем по дате (новые первыми)
    userPosts.sort((a, b) => {
      const dateA = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.createdAt);
      const dateB = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(b.createdAt);
      return dateB - dateA;
    });
    
    return userPosts;
  } catch (error) {
    console.error("Ошибка при получении постов пользователя:", error);
    return [];
  }
}

// Удаление поста из профиля
async function deletePostFromProfile(postId, userId) {
  if (!confirm("Удалить этот пост из профиля?")) return;
  
  try {
    await db.collection("posts").doc(postId).delete();
    
    if (viewedPosts[postId]) {
      delete viewedPosts[postId];
      localStorage.setItem('viewedPosts', JSON.stringify(viewedPosts));
    }
    
    const postElement = document.getElementById(`profile-post-${postId}`);
    if (postElement) {
      postElement.remove();
    }
    
    const postsCount = await getUserPostsCount(userId);
    const likesCount = await getUserLikesCount(userId);
    const viewsCount = await getUserViewsCount(userId);
    
    document.getElementById("profilePostsCount").textContent = postsCount;
    document.getElementById("profileLikesCount").textContent = likesCount;
    document.getElementById("profileViewsCount").textContent = viewsCount;
    
    loadPosts();
    showNotification("Пост удален из профиля!");
    
  } catch (error) {
    console.error("Ошибка при удалении поста:", error);
    showNotification("Не удалось удалить пост: " + error.message);
  }
}

// Загрузка комментариев
async function loadComments() {
  const commentsBody = document.getElementById("commentsBody");
  commentsBody.innerHTML = "<div style='text-align:center;color:var(--sub);padding:40px 0;'>Загрузка комментариев...</div>";
  
  try {
    const snap = await db.collection("posts").doc(currentPostId)
      .collection("comments").orderBy("createdAt").get();
    
    if (snap.empty) {
      commentsBody.innerHTML = "<div style='text-align:center;color:var(--sub);padding:40px 0;'>Комментариев пока нет</div>";
      return;
    }
    
    commentsBody.innerHTML = "";
    
    snap.forEach(doc => {
      const comment = doc.data();
      
      let timeAgo = "только что";
      try {
        if (comment.createdAt) {
          const commentDate = comment.createdAt.toDate ? comment.createdAt.toDate() : new Date(comment.createdAt);
          timeAgo = formatTimeAgo(commentDate);
        }
      } catch (dateError) {
        console.log("Ошибка форматирования даты комментария:", dateError);
      }
      
      const canDelete = comment.userId === currentUser.uid || userData?.isAdmin;
      const isAdmin = adminUsers.has(comment.userId);
      
      commentsBody.innerHTML += `
        <div class="post fade">
          <div class="post-header">
            <div class="avatar">${comment.username?.[0]||"A"}</div>
            <div class="post-user-info">
              <strong>@${comment.username} ${isAdmin ? '<span class="verified-badge" title="Администратор">✓</span>' : ''}</strong>
              <div class="post-time">${timeAgo}</div>
            </div>
            ${canDelete ? `<button class="comment-delete-btn" onclick="deleteComment('${doc.id}')">🗑</button>` : ''}
          </div>
          <div class="post-text">${comment.text}</div>
        </div>`;
    });
    
  } catch (error) {
    console.error("Ошибка при загрузке комментариев:", error);
    commentsBody.innerHTML = `<div style='text-align:center;color:var(--danger);padding:40px 0;'>Ошибка загрузки: ${error.message}</div>`;
  }
}

// Добавление комментария
async function addComment() {
  const commentInput = document.getElementById("commentInput");
  const text = commentInput.value.trim();
  
  if (!text) {
    showNotification("Напишите комментарий!");
    return;
  }
  
  const wordCount = countWords(text);
  if (wordCount > 50) {
    showNotification("Комментарий не может превышать 50 слов!");
    return;
  }
  
  try {
    const username = userData.username || "anon" + currentUser.uid.slice(-4);
    
    await db.collection("posts").doc(currentPostId)
      .collection("comments").add({
        text: text,
        userId: currentUser.uid,
        username: username,
        createdAt: new Date()
      });
    
    await db.collection("posts").doc(currentPostId)
      .update({
        commentsCount: firebase.firestore.FieldValue.increment(1)
      });
    
    commentInput.value = "";
    showNotification("Комментарий добавлен!");
    loadComments();
    loadPosts();
    
  } catch (error) {
    console.error("Ошибка при добавлении комментария:", error);
    showNotification("Ошибка: " + error.message);
  }
}

// Удаление комментария
async function deleteComment(commentId) {
  if (!confirm("Удалить комментарий?")) return;
  
  try {
    await db.collection("posts").doc(currentPostId)
      .collection("comments").doc(commentId).delete();
    
    await db.collection("posts").doc(currentPostId)
      .update({
        commentsCount: firebase.firestore.FieldValue.increment(-1)
      });
    
    showNotification("Комментарий удален!");
    loadComments();
    loadPosts();
    
  } catch (error) {
    console.error("Ошибка при удалении комментария:", error);
    showNotification("Ошибка: " + error.message);
  }
}

// Смена имени пользователя
async function changeUsername() {
  const input = document.getElementById('newUsernameInput');
  const newUsername = input.value.trim();
  
  if (!newUsername) {
    showNotification("Введите новое имя!");
    return;
  }
  
  if (newUsername.length < 3) {
    showNotification("Имя должно быть не менее 3 символов!");
    return;
  }
  
  if (newUsername.length > 20) {
    showNotification("Имя должно быть не более 20 символов!");
    return;
  }
  
  if (!/^[a-zA-Zа-яА-Я0-9_]+$/.test(newUsername)) {
    showNotification("Имя может содержать только буквы, цифры и подчеркивание!");
    return;
  }
  
  try {
    await db.collection("users").doc(currentUser.uid).update({
      username: newUsername
    });
    
    userData.username = newUsername;
    
    const updateSuccess = await updateUsernameInAllPosts(currentUser.uid, newUsername);
    
    if (updateSuccess) {
      showNotification("Имя успешно изменено! Обновляю данные...");
      
      if (currentProfileUserId === currentUser.uid) {
        document.getElementById("profileName").textContent = "@" + newUsername;
        document.getElementById("profileAvatar").textContent = newUsername[0]?.toUpperCase() || "U";
      }
      
      closeChangeNameModal();
      
      setTimeout(() => {
        loadPosts();
      }, 1000);
      
    } else {
      showNotification("Имя изменено, но возникла ошибка при обновлении старых постов");
    }
    
  } catch (error) {
    console.error("Ошибка при смене имени:", error);
    showNotification("Ошибка при смене имени: " + error.message);
  }
}

// Обновление имени во всех постах и комментариях
async function updateUsernameInAllPosts(userId, newUsername) {
  try {
    // Обновляем имя в постах
    const postsSnap = await db.collection("posts")
      .where("userId", "==", userId)
      .get();
    
    const batch = db.batch();
    postsSnap.forEach(doc => {
      batch.update(doc.ref, { username: newUsername });
    });
    
    // Обновляем имя в комментариях
    const allPostsSnap = await db.collection("posts").get();
    const commentUpdates = [];
    
    allPostsSnap.forEach(postDoc => {
      const commentsRef = postDoc.ref.collection("comments")
        .where("userId", "==", userId);
      
      commentUpdates.push(
        commentsRef.get().then(commentsSnap => {
          commentsSnap.forEach(commentDoc => {
            batch.update(commentDoc.ref, { username: newUsername });
          });
        })
      );
    });
    
    await Promise.all(commentUpdates);
    await batch.commit();
    
    return true;
  } catch (error) {
    console.error("Ошибка при обновлении имени в постах:", error);
    return false;
  }
}

// Форматирование времени
function formatTimeAgo(date) {
  if (!date) return "только что";
  
  const now = new Date();
  const diff = now - date;
  const seconds = Math.floor(diff / 1000);
  const minutes = Math.floor(seconds / 60);
  const hours = Math.floor(minutes / 60);
  const days = Math.floor(hours / 24);
  
  if (days > 7) {
    return date.toLocaleDateString("ru-RU", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric"
    }) + ", " + date.toLocaleTimeString("ru-RU", {
      hour: "2-digit",
      minute: "2-digit"
    });
  } else if (days > 0) {
    return `${days} д назад`;
  } else if (hours > 0) {
    return `${hours} ч назад`;
  } else if (minutes > 0) {
    return `${minutes} мин назад`;
  } else {
    return "только что";
  }
}

// Форматирование полной даты и времени
function formatFullDateTime(date) {
  if (!date) return "";
  
  return date.toLocaleDateString("ru-RU", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric"
  }) + ", " + date.toLocaleTimeString("ru-RU", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

// Получение метки разделителя времени
function getTimeDividerLabel(prevDate, currentDate) {
  if (!prevDate || !currentDate) return null;
  
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);
  
  const prevDay = new Date(prevDate.getFullYear(), prevDate.getMonth(), prevDate.getDate());
  const currentDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate());
  
  if (currentDay.getTime() !== prevDay.getTime()) {
    if (currentDay.getTime() === today.getTime()) {
      return "Сегодня";
    } else if (currentDay.getTime() === yesterday.getTime()) {
      return "Вчера";
    } else {
      return currentDate.toLocaleDateString("ru-RU", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });
    }
  }
  
  return null;
}

  if (postIdToScroll) {

// Увеличение счетчика просмотров
async function incrementPostViews(postId) {
  if (viewedPosts[postId]) return;
  
  try {
    await db.collection("posts").doc(postId).update({
      views: firebase.firestore.FieldValue.increment(1)
    });
    
    viewedPosts[postId] = true;
    localStorage.setItem('viewedPosts', JSON.stringify(viewedPosts));
    
    if (postsCache.has(postId)) {
      const post = postsCache.get(postId);
      post.views = (post.views || 0) + 1;
      
      const viewButton = document.querySelector(`#post-${postId} .action.viewed`);
      if (viewButton) {
        viewButton.innerHTML = `👁️ ${post.views}`;
      }
    }
    
  } catch (error) {
    console.error("Ошибка при увеличении просмотров:", error);
  }
}

// Настройка отслеживания просмотров
function setupViewTracking() {
  const posts = document.querySelectorAll('.post');
  
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const postId = entry.target.id.replace('post-', '');
        if (postId) {
          setTimeout(() => {
            incrementPostViews(postId);
          }, 1000);
        }
      }
    });
  }, {
    threshold: 0.7,
    rootMargin: '0px 0px -100px 0px'
  });
  
  posts.forEach(post => {
    observer.observe(post);
  });
}

// Поиск пользователей
async function searchUsers(searchTerm) {
  const searchResults = document.getElementById('searchResults');
  
  if (!searchTerm.trim() || searchTerm.length < 2) {
    searchResults.innerHTML = '';
    searchResults.classList.remove('show');
    return;
  }
  
  try {
    searchResults.innerHTML = '<div class="no-results">Поиск...</div>';
    searchResults.classList.add('show');
    
    const usersSnap = await db.collection("users")
      .where("username", ">=", searchTerm.toLowerCase())
      .where("username", "<=", searchTerm.toLowerCase() + '\uf8ff')
      .limit(10)
      .get();
    
    if (usersSnap.empty) {
      searchResults.innerHTML = '<div class="no-results">Пользователи не найдены</div>';
      return;
    }
    
    let resultsHTML = '';
    
    usersSnap.forEach(doc => {
      const user = doc.data();
      const userId = doc.id;
      
      if (userId === currentUser.uid) return;
      
      const isSubscribed = subscriptions.has(userId);
      const isAdmin = user.isAdmin || false;
      
      resultsHTML += `
        <div class="search-result" onclick="openSearchedProfile('${userId}', '${user.username}')">
          <div class="search-avatar">${user.username?.[0]?.toUpperCase() || "U"}</div>
          <div class="search-username">
            @${user.username}
            ${isAdmin ? '<span class="verified-badge" title="Администратор">✓</span>' : ''}
          </div>
          <button class="subscribe-btn ${isSubscribed ? 'subscribed' : ''}" 
                  onclick="event.stopPropagation(); toggleSubscribe('${userId}', '${user.username}')"
                  style="margin-left:auto">
            ${isSubscribed ? 'В подписках' : 'Подписаться'}
          </button>
        </div>
      `;
    });
    
    if (!resultsHTML) {
      searchResults.innerHTML = '<div class="no-results">Пользователи не найдены</div>';
    } else {
      searchResults.innerHTML = resultsHTML;
    }
    
  } catch (error) {
    console.error("Ошибка при поиске пользователей:", error);
    searchResults.innerHTML = '<div class="no-results">Ошибка при поиске</div>';
  }
}

  }
}

// Инициализация при загрузке страницы
window.addEventListener('load', () => {
  // Проверяем нужно ли открыть профиль при загрузке
  const urlParams = new URLSearchParams(window.location.search);
  const openProfileUserId = urlParams.get('openProfile');
  
  if (openProfileUserId) {
    // Нужно открыть профиль пользователя
    // Для этого нужно сначала получить имя пользователя
    db.collection("users").doc(openProfileUserId).get().then(doc => {
      if (doc.exists) {
        const userData = doc.data();
        setTimeout(() => {
          openProfile(openProfileUserId, userData.username);
        }, 1000);
      }
    });
  }
});
</script>
