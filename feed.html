<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лента - czhmass.com</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 10px;
        }

        /* iOS Динамический островок */
        .dynamic-island {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 35px;
            background: rgba(40, 40, 40, 0.95);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 15px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        .island-time {
            font-size: 15px;
            font-weight: 600;
            color: white;
        }

        /* Навигация */
        .navbar {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(28, 28, 30, 0.8);
            padding: 12px 20px;
            border-radius: 15px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 999;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: auto;
            white-space: nowrap;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-admin {
            background: linear-gradient(135deg, #805ad5, #6b46c1);
        }

        .btn-admin:hover {
            background: linear-gradient(135deg, #6b46c1, #553c9a);
        }

        .btn-logout {
            background: rgba(255, 59, 48, 0.2);
            color: #ff3b30;
            padding: 8px 14px;
        }

        .btn-logout:hover {
            background: rgba(255, 59, 48, 0.3);
        }

        /* Кнопка профиля */
        .profile-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            min-width: auto;
        }

        .profile-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .profile-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: white;
            flex-shrink: 0;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .profile-username {
            font-size: 12px;
            font-weight: 600;
            color: white;
            line-height: 1.2;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .profile-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.2;
        }

        /* Основной контент */
        .container {
            padding: 140px 20px 100px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Форма создания поста */
        .create-post {
            background: rgba(28, 28, 30, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .post-input {
            width: 100%;
            min-height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 16px;
            color: white;
            font-size: 16px;
            resize: vertical;
            margin-bottom: 15px;
            font-family: inherit;
        }

        .post-input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.07);
        }

        .post-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: transform 0.2s, opacity 0.2s;
        }

        .post-button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .post-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Пост в стиле iOS */
        .post-ios {
            background: rgba(28, 28, 30, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .post-ios:hover {
            transform: translateY(-2px);
            background: rgba(35, 35, 37, 0.9);
        }

        /* Аватар и заголовок */
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            flex-shrink: 0;
        }

        .post-user {
            flex: 1;
        }

        .username {
            font-size: 17px;
            font-weight: 600;
            color: white;
            margin-bottom: 3px;
        }

        .post-time {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Текст поста */
        .post-content {
            font-size: 16px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Футер поста с действиями */
        .post-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .post-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .action-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .action-btn.liked {
            color: #ff3b30;
        }

        .action-count {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Кнопка удаления */
        .delete-post {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s, background 0.3s;
        }

        .post-ios:hover .delete-post {
            opacity: 1;
        }

        .delete-post:hover {
            background: rgba(255, 59, 48, 0.2);
        }

        /* ===== МОДАЛЬНОЕ ОКНО КОММЕНТАРИЕВ ===== */
        .comments-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000000;
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        .comments-header {
            padding: 60px 20px 20px;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .comments-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .close-comments {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .close-comments:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .comments-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #000000;
        }

        /* Оригинальный пост в модалке */
        .original-post {
            background: rgba(28, 28, 30, 0.8);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .original-post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .original-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: white;
        }

        .original-username {
            font-size: 15px;
            font-weight: 600;
            color: white;
        }

        .original-time {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }

        .original-content {
            font-size: 15px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Комментарий */
        .comment {
            display: flex;
            gap: 12px;
            padding: 16px 0;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: white;
            flex-shrink: 0;
        }

        .comment-content {
            flex: 1;
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .comment-username {
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .comment-time {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .comment-text {
            font-size: 14px;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
            word-break: break-word;
        }

        .comment-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .comment-action-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .comment-action-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .comment-like-btn.liked {
            color: #ff3b30;
        }

        .delete-comment {
            color: #ff3b30;
            font-size: 11px;
        }

        /* Форма добавления комментария */
        .add-comment-form {
            padding: 20px;
            background: rgba(28, 28, 30, 0.8);
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .comment-input-container {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .comment-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 44px;
            max-height: 100px;
        }

        .comment-input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.07);
        }

        .send-comment-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-comment-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .send-comment-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Счетчик комментариев */
        .comments-count {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
        }

        /* Сообщения */
        .message {
            position: fixed;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1001;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            display: none;
            max-width: 90%;
            text-align: center;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translate(-50%, -20px);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        .success {
            background: rgba(52, 199, 89, 0.15);
            color: #34c759;
            border-color: rgba(52, 199, 89, 0.3);
        }

        .error {
            background: rgba(255, 59, 48, 0.15);
            color: #ff3b30;
            border-color: rgba(255, 59, 48, 0.3);
        }

        /* Загрузка */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }

        /* Анимации */
        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .like-pop {
            animation: heartPop 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .comment {
            animation: slideIn 0.3s ease;
        }

        /* ===== МОБИЛЬНАЯ ВЕРСИЯ ===== */
        @media (max-width: 768px) {
            .navbar {
                width: 95%;
                top: 65px;
                padding: 10px 15px;
            }
            
            .container {
                padding: 130px 15px 80px;
            }
            
            .dynamic-island {
                width: 110px;
                height: 32px;
                top: 10px;
            }
            
            .post-ios {
                padding: 16px;
            }
            
            .nav-buttons {
                gap: 6px;
            }
            
            .btn span:not(.btn-icon) {
                display: none;
            }
            
            .btn-icon {
                display: inline-block;
                font-size: 16px;
            }
            
            .profile-btn {
                padding: 6px;
                min-width: 44px;
                justify-content: center;
            }
            
            .profile-avatar {
                width: 32px;
                height: 32px;
                margin: 0;
            }
            
            .profile-info {
                display: none;
            }
            
            .btn-logout,
            .btn-admin {
                padding: 8px 12px;
                min-width: 44px;
                justify-content: center;
            }
            
            .logo {
                font-size: 18px;
            }
            
            /* Комментарии на мобильных */
            .comments-header {
                padding-top: 50px;
                padding-bottom: 15px;
            }
            
            .comments-container {
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                padding: 8px 12px;
            }
            
            .logo {
                font-size: 16px;
            }
            
            .profile-btn,
            .btn-logout,
            .btn-admin {
                min-width: 40px;
                padding: 6px 8px;
            }
            
            .profile-avatar {
                width: 28px;
                height: 28px;
                font-size: 13px;
            }
            
            .user-avatar {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
            
            .username {
                font-size: 15px;
            }
            
            .post-content {
                font-size: 15px;
            }
            
            .action-btn {
                font-size: 20px;
                gap: 4px;
            }
        }
    </style>
</head>
<body>
    <!-- iOS Динамический островок -->
    <div class="dynamic-island">
        <span class="island-time" id="currentTime">--:--</span>
    </div>

    <!-- Навигация -->
    <nav class="navbar">
        <div class="logo">czhmass</div>
        <div class="nav-buttons">
            <!-- Кнопка профиля -->
            <button class="profile-btn" onclick="window.location.href='profile.html'" id="profileBtn" title="Профиль">
                <div class="profile-avatar" id="profileAvatar">
                    <span class="btn-icon">👤</span>
                </div>
                <div class="profile-info">
                    <span class="profile-username" id="profileUsername">Профиль</span>
                    <span class="profile-label">Мой аккаунт</span>
                </div>
            </button>
            
            <!-- Кнопка администратора -->
            <button class="btn btn-admin" onclick="window.location.href='admin.html'" id="adminBtn" style="display:none;" title="Админ панель">
                <span class="btn-icon">👑</span>
                <span>Админ</span>
            </button>
            
            <!-- Кнопка выхода -->
            <button class="btn btn-logout" onclick="logout()" title="Выйти">
                <span class="btn-icon">🚪</span>
                <span>Выйти</span>
            </button>
        </div>
    </nav>

    <!-- Основной контейнер -->
    <div class="container">
        <!-- Форма создания поста -->
        <div class="create-post">
            <textarea 
                id="postText" 
                class="post-input" 
                placeholder="Что у вас нового? Пишите анонимно..."
                maxlength="500"
            ></textarea>
            <button id="postButton" class="post-button" onclick="createPost()">
                📝 Опубликовать
            </button>
        </div>

        <!-- Лента постов -->
        <div id="postsContainer">
            <div class="loading">Загрузка ленты...</div>
        </div>
    </div>

    <!-- ===== МОДАЛЬНОЕ ОКНО КОММЕНТАРИЕВ ===== -->
    <div class="comments-modal" id="commentsModal">
        <div class="comments-header">
            <h2 class="comments-title">Комментарии</h2>
            <button class="close-comments" onclick="closeComments()">✕</button>
        </div>
        
        <div class="comments-container" id="commentsContainer">
            <!-- Оригинальный пост и комментарии загрузятся через JS -->
        </div>
        
        <div class="add-comment-form">
            <div class="comment-input-container">
                <textarea 
                    class="comment-input" 
                    id="commentInput"
                    placeholder="Добавьте комментарий..."
                    maxlength="300"
                ></textarea>
                <button class="send-comment-btn" id="sendCommentBtn" onclick="addComment()">
                    📤
                </button>
            </div>
        </div>
    </div>

    <!-- Сообщения -->
    <div id="message" class="message"></div>

    <script>
        // ===== КОНФИГУРАЦИЯ FIREBASE =====
        const firebaseConfig = {
            apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
            authDomain: "czhmass.firebaseapp.com",
            projectId: "czhmass",
            storageBucket: "czhmass.firebasestorage.app",
            messagingSenderId: "1064257019843",
            appId: "1:1064257019843:web:65488b45be2f86838ca776"
        };

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        let db, auth;
        let currentUser = null;
        let currentUserData = null;
        let postsCache = new Map();
        let currentPostId = null; // ID поста для комментариев

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        db = firebase.firestore();
        auth = firebase.auth();

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 3000);
        }

        function formatTime(timestamp) {
            if (!timestamp) return 'Только что';
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                const now = new Date();
                const diff = now - date;
                
                if (diff < 60000) return 'Только что';
                if (diff < 3600000) return `${Math.floor(diff / 60000)} мин назад`;
                if (diff < 86400000) return `${Math.floor(diff / 3600000)} ч назад`;
                if (diff < 604800000) return `${Math.floor(diff / 86400000)} дн назад`;
                
                return date.toLocaleDateString('ru-RU', {
                    day: 'numeric',
                    month: 'short'
                });
            } catch (e) {
                return 'Недавно';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getAvatarLetter(username) {
            return username ? username.charAt(0).toUpperCase() : 'А';
        }

        // ===== ОБНОВЛЕНИЕ ВРЕМЕНИ =====
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
            document.getElementById('currentTime').textContent = timeString;
        }

        setInterval(updateTime, 1000);
        updateTime();

        // ===== КОММЕНТАРИИ =====
        // Открыть комментарии
        function openComments(postId, postData) {
            currentPostId = postId;
            const modal = document.getElementById('commentsModal');
            const container = document.getElementById('commentsContainer');
            
            // Показываем модальное окно
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            
            // Показываем загрузку
            container.innerHTML = `
                <div class="loading">Загрузка комментариев...</div>
            `;
            
            // Загружаем оригинальный пост
            const postHTML = `
                <div class="original-post">
                    <div class="original-post-header">
                        <div class="original-avatar">${getAvatarLetter(postData.username)}</div>
                        <div>
                            <div class="original-username">@${escapeHtml(postData.username)}</div>
                            <div class="original-time">${formatTime(postData.createdAt)}</div>
                        </div>
                    </div>
                    <div class="original-content">${escapeHtml(postData.text)}</div>
                </div>
                <div id="commentsList"></div>
            `;
            
            container.innerHTML = postHTML;
            
            // Загружаем комментарии
            loadComments(postId);
            
            // Фокус на поле ввода
            setTimeout(() => {
                document.getElementById('commentInput').focus();
            }, 300);
        }

        // Закрыть комментарии
        function closeComments() {
            const modal = document.getElementById('commentsModal');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
            currentPostId = null;
            
            // Очищаем поле ввода
            document.getElementById('commentInput').value = '';
        }

        // Загрузить комментарии
        async function loadComments(postId) {
            try {
                const commentsList = document.getElementById('commentsList');
                
                const snapshot = await db.collection('posts')
                    .doc(postId)
                    .collection('comments')
                    .orderBy('createdAt', 'asc')
                    .get();
                
                if (snapshot.empty) {
                    commentsList.innerHTML = '<div class="empty">Пока нет комментариев. Будьте первым!</div>';
                    return;
                }
                
                let commentsHTML = '';
                
                snapshot.forEach((doc) => {
                    const comment = doc.data();
                    const commentId = doc.id;
                    const likes = comment.likes || 0;
                    const likedBy = comment.likedBy || [];
                    const isLiked = likedBy.includes(currentUser?.uid);
                    
                    commentsHTML += `
                        <div class="comment" data-comment-id="${commentId}">
                            <div class="comment-avatar">${getAvatarLetter(comment.username)}</div>
                            <div class="comment-content">
                                <div class="comment-header">
                                    <span class="comment-username">@${escapeHtml(comment.username)}</span>
                                    <span class="comment-time">${formatTime(comment.createdAt)}</span>
                                </div>
                                <div class="comment-text">${escapeHtml(comment.text)}</div>
                                <div class="comment-actions">
                                    <button class="comment-action-btn comment-like-btn ${isLiked ? 'liked' : ''}" 
                                            onclick="toggleCommentLike('${postId}', '${commentId}', this)">
                                        <span>${isLiked ? '❤️' : '🤍'}</span>
                                        <span>${likes}</span>
                                    </button>
                                    ${comment.userId === currentUser?.uid ? `
                                        <button class="comment-action-btn delete-comment" 
                                                onclick="deleteComment('${postId}', '${commentId}')">
                                            Удалить
                                        </button>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                commentsList.innerHTML = commentsHTML;
                
            } catch (error) {
                console.error('Ошибка загрузки комментариев:', error);
                const commentsList = document.getElementById('commentsList');
                commentsList.innerHTML = '<div class="error">Ошибка загрузки комментариев</div>';
            }
        }

        // Добавить комментарий
        async function addComment() {
            if (!currentPostId || !currentUser) return;
            
            const commentInput = document.getElementById('commentInput');
            const commentText = commentInput.value.trim();
            const sendBtn = document.getElementById('sendCommentBtn');
            
            if (!commentText) {
                showMessage('Введите комментарий', 'error');
                return;
            }
            
            if (commentText.length > 300) {
                showMessage('Комментарий слишком длинный (макс. 300 символов)', 'error');
                return;
            }
            
            sendBtn.disabled = true;
            sendBtn.textContent = '...';
            
            try {
                // Добавляем комментарий
                await db.collection('posts')
                    .doc(currentPostId)
                    .collection('comments')
                    .add({
                        text: commentText,
                        userId: currentUser.uid,
                        username: currentUserData.username,
                        createdAt: new Date(),
                        likes: 0,
                        likedBy: []
                    });
                
                // Обновляем счетчик комментариев в посте
                await db.collection('posts')
                    .doc(currentPostId)
                    .update({
                        commentsCount: firebase.firestore.FieldValue.increment(1)
                    });
                
                // Очищаем поле ввода
                commentInput.value = '';
                
                // Перезагружаем комментарии
                loadComments(currentPostId);
                
                // Обновляем счетчик комментариев в ленте
                updatePostCommentsCount(currentPostId);
                
            } catch (error) {
                console.error('Ошибка добавления комментария:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '📤';
            }
        }

        // Лайк комментария
        async function toggleCommentLike(postId, commentId, likeBtn) {
            if (!currentUser) {
                showMessage('Войдите, чтобы оценивать комментарии', 'error');
                return;
            }
            
            const likeSpan = likeBtn.querySelector('span:first-child');
            const countSpan = likeBtn.querySelector('span:last-child');
            let currentCount = parseInt(countSpan.textContent) || 0;
            const isLiked = likeBtn.classList.contains('liked');
            
            // Оптимистичное обновление UI
            if (isLiked) {
                likeBtn.classList.remove('liked');
                likeSpan.textContent = '🤍';
                countSpan.textContent = Math.max(0, currentCount - 1);
            } else {
                likeBtn.classList.add('liked');
                likeSpan.textContent = '❤️';
                countSpan.textContent = currentCount + 1;
            }
            
            // Анимация
            likeBtn.classList.add('like-pop');
            setTimeout(() => likeBtn.classList.remove('like-pop'), 300);
            
            // Фоновая операция
            updateCommentLikeInFirestore(postId, commentId, !isLiked).catch(error => {
                console.error('Ошибка синхронизации лайка комментария:', error);
                // Откатываем UI
                if (isLiked) {
                    likeBtn.classList.add('liked');
                    likeSpan.textContent = '❤️';
                    countSpan.textContent = currentCount;
                } else {
                    likeBtn.classList.remove('liked');
                    likeSpan.textContent = '🤍';
                    countSpan.textContent = Math.max(0, currentCount - 1);
                }
            });
        }

        async function updateCommentLikeInFirestore(postId, commentId, shouldLike) {
            const commentRef = db.collection('posts')
                .doc(postId)
                .collection('comments')
                .doc(commentId);
            
            try {
                if (shouldLike) {
                    await commentRef.update({
                        likes: firebase.firestore.FieldValue.increment(1),
                        likedBy: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
                    });
                } else {
                    await commentRef.update({
                        likes: firebase.firestore.FieldValue.increment(-1),
                        likedBy: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
                    });
                }
            } catch (error) {
                throw error;
            }
        }

        // Удалить комментарий
        async function deleteComment(postId, commentId) {
            if (!confirm('Удалить этот комментарий?')) return;
            
            try {
                await db.collection('posts')
                    .doc(postId)
                    .collection('comments')
                    .doc(commentId)
                    .delete();
                
                // Обновляем счетчик комментариев в посте
                await db.collection('posts')
                    .doc(postId)
                    .update({
                        commentsCount: firebase.firestore.FieldValue.increment(-1)
                    });
                
                // Удаляем из UI
                const commentElement = document.querySelector(`[data-comment-id="${commentId}"]`);
                if (commentElement) {
                    commentElement.style.opacity = '0';
                    commentElement.style.transform = 'translateX(-20px)';
                    setTimeout(() => {
                        commentElement.remove();
                    }, 300);
                }
                
                // Обновляем счетчик в ленте
                updatePostCommentsCount(postId);
                
            } catch (error) {
                console.error('Ошибка удаления комментария:', error);
                showMessage('Ошибка удаления', 'error');
            }
        }

        // Обновить счетчик комментариев в посте ленты
        function updatePostCommentsCount(postId) {
            const postElement = document.querySelector(`[data-post-id="${postId}"]`);
            if (postElement) {
                const commentsBtn = postElement.querySelector('.comments-btn');
                const countSpan = commentsBtn.querySelector('.action-count');
                let currentCount = parseInt(countSpan.textContent) || 0;
                
                // Инкрементируем счетчик (можно сделать точнее через real-time)
                countSpan.textContent = currentCount + 1;
            }
        }

        // ===== СОЗДАНИЕ ПОСТА =====
        async function createPost() {
            const postText = document.getElementById('postText').value.trim();
            const postButton = document.getElementById('postButton');
            
            if (!postText) {
                showMessage('Введите текст поста', 'error');
                return;
            }
            
            if (postText.length > 500) {
                showMessage('Пост слишком длинный (макс. 500 символов)', 'error');
                return;
            }
            
            if (!currentUser) {
                showMessage('Вы не авторизованы', 'error');
                return;
            }
            
            postButton.disabled = true;
            postButton.textContent = 'Публикация...';
            
            try {
                await db.collection('posts').add({
                    text: postText,
                    userId: currentUser.uid,
                    username: currentUserData.username,
                    createdAt: new Date(),
                    likes: 0,
                    likedBy: [],
                    commentsCount: 0 // Добавляем счетчик комментариев
                });
                
                await db.collection('users').doc(currentUser.uid).update({
                    postsCount: firebase.firestore.FieldValue.increment(1)
                });
                
                document.getElementById('postText').value = '';
                
                showMessage('Пост опубликован!', 'success');
                
                setTimeout(loadPosts, 300);
                
            } catch (error) {
                console.error('Ошибка создания поста:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            } finally {
                postButton.disabled = false;
                postButton.textContent = '📝 Опубликовать';
            }
        }

        // ===== ЛАЙКИ ПОСТОВ =====
        async function toggleLike(postId, likeBtn) {
            if (!currentUser) {
                showMessage('Войдите, чтобы ставить лайки', 'error');
                return;
            }
            
            const countSpan = likeBtn.querySelector('.action-count');
            let currentCount = parseInt(countSpan.textContent) || 0;
            const isLiked = likeBtn.classList.contains('liked');
            
            if (isLiked) {
                likeBtn.classList.remove('liked');
                likeBtn.innerHTML = '🤍 <span class="action-count">' + Math.max(0, currentCount - 1) + '</span>';
            } else {
                likeBtn.classList.add('liked');
                likeBtn.innerHTML = '❤️ <span class="action-count">' + (currentCount + 1) + '</span>';
            }
            
            likeBtn.classList.add('like-pop');
            setTimeout(() => likeBtn.classList.remove('like-pop'), 300);
            
            updateLikeInFirestore(postId, !isLiked).catch(error => {
                console.error('Ошибка синхронизации лайка:', error);
                if (isLiked) {
                    likeBtn.classList.add('liked');
                    likeBtn.innerHTML = '❤️ <span class="action-count">' + currentCount + '</span>';
                } else {
                    likeBtn.classList.remove('liked');
                    likeBtn.innerHTML = '🤍 <span class="action-count">' + Math.max(0, currentCount - 1) + '</span>';
                }
            });
        }

        async function updateLikeInFirestore(postId, shouldLike) {
            const postRef = db.collection('posts').doc(postId);
            
            try {
                if (shouldLike) {
                    await postRef.update({
                        likes: firebase.firestore.FieldValue.increment(1),
                        likedBy: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
                    });
                } else {
                    await postRef.update({
                        likes: firebase.firestore.FieldValue.increment(-1),
                        likedBy: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
                    });
                }
            } catch (error) {
                throw error;
            }
        }

        // ===== ЗАГРУЗКА ПОСТОВ =====
        async function loadPosts() {
            try {
                const snapshot = await db.collection('posts')
                    .orderBy('createdAt', 'desc')
                    .limit(30)
                    .get();
                    
                const postsContainer = document.getElementById('postsContainer');
                
                if (snapshot.empty) {
                    postsContainer.innerHTML = '<div class="empty">Пока нет постов. Будьте первым!</div>';
                    return;
                }
                
                let postsHTML = '';
                postsCache.clear();
                
                snapshot.forEach((doc) => {
                    const post = doc.data();
                    const postId = doc.id;
                    const likes = post.likes || 0;
                    const commentsCount = post.commentsCount || 0;
                    const likedBy = post.likedBy || [];
                    const isLiked = likedBy.includes(currentUser?.uid);
                    
                    postsCache.set(postId, {
                        ...post,
                        id: postId,
                        isLiked: isLiked
                    });
                    
                    postsHTML += `
                        <div class="post-ios" data-post-id="${postId}">
                            <div class="post-header">
                                <div class="user-avatar">${getAvatarLetter(post.username)}</div>
                                <div class="post-user">
                                    <div class="username">@${escapeHtml(post.username)}</div>
                                    <div class="post-time">${formatTime(post.createdAt)}</div>
                                </div>
                                ${post.userId === currentUser?.uid ? `
                                    <button class="delete-post" onclick="deletePost('${postId}')" title="Удалить пост">
                                        🗑️
                                    </button>
                                ` : ''}
                            </div>
                            <div class="post-content">${escapeHtml(post.text)}</div>
                            <div class="post-footer">
                                <div class="post-actions">
                                    <button class="action-btn ${isLiked ? 'liked' : ''}" 
                                            onclick="toggleLike('${postId}', this)">
                                        ${isLiked ? '❤️' : '🤍'}
                                        <span class="action-count">${likes}</span>
                                    </button>
                                    <button class="action-btn comments-btn" 
                                            onclick="openComments('${postId}', ${JSON.stringify(post).replace(/'/g, "\\'")})">
                                        💬
                                        <span class="action-count">${commentsCount}</span>
                                    </button>
                                </div>
                                <div class="post-time">${formatTime(post.createdAt)}</div>
                            </div>
                        </div>
                    `;
                });
                
                postsContainer.innerHTML = postsHTML;
                
            } catch (error) {
                console.error('Ошибка загрузки постов:', error);
                postsContainer.innerHTML = '<div class="error">Ошибка загрузки ленты</div>';
            }
        }

        // ===== УДАЛЕНИЕ ПОСТА =====
        async function deletePost(postId) {
            if (!confirm('Удалить этот пост и все комментарии?')) return;
            
            try {
                // Удаляем все комментарии поста
                const commentsSnapshot = await db.collection('posts')
                    .doc(postId)
                    .collection('comments')
                    .get();
                
                if (!commentsSnapshot.empty) {
                    const batch = db.batch();
                    commentsSnapshot.forEach(doc => {
                        batch.delete(doc.ref);
                    });
                    await batch.commit();
                }
                
                // Удаляем пост
                await db.collection('posts').doc(postId).delete();
                
                if (currentUser) {
                    await db.collection('users').doc(currentUser.uid).update({
                        postsCount: firebase.firestore.FieldValue.increment(-1)
                    });
                }
                
                showMessage('Пост удален', 'success');
                
                const postElement = document.querySelector(`[data-post-id="${postId}"]`);
                if (postElement) {
                    postElement.style.opacity = '0';
                    postElement.style.transform = 'scale(0.9)';
                    setTimeout(() => {
                        postElement.remove();
                    }, 300);
                }
                
            } catch (error) {
                console.error('Ошибка удаления поста:', error);
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        // ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                
                try {
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    if (userDoc.exists) {
                        currentUserData = userDoc.data();
                        
                        // Обновляем профиль
                        updateProfileButton();
                        
                        // Показываем админку если нужно
                        if (currentUserData.isAdmin) {
                            document.getElementById('adminBtn').style.display = 'flex';
                        }
                        
                        loadPosts();
                    } else {
                        showMessage('Профиль не найден', 'error');
                        setTimeout(() => window.location.href = 'profile.html', 2000);
                    }
                } catch (error) {
                    console.error('Ошибка загрузки профиля:', error);
                    showMessage('Ошибка загрузки', 'error');
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        // ===== REAL-TIME ОБНОВЛЕНИЯ =====
        function setupRealtimeUpdates() {
            if (!currentUser) return;
            
            // Обновления лайков постов
            db.collection('posts')
                .orderBy('createdAt', 'desc')
                .limit(30)
                .onSnapshot((snapshot) => {
                    snapshot.docChanges().forEach((change) => {
                        if (change.type === 'modified') {
                            const postId = change.doc.id;
                            const postData = change.doc.data();
                            const postElement = document.querySelector(`[data-post-id="${postId}"]`);
                            
                            if (postElement) {
                                // Обновляем лайки
                                const likeBtn = postElement.querySelector('.action-btn:first-child');
                                const likeCount = postElement.querySelector('.action-count:first-child');
                                const isLiked = (postData.likedBy || []).includes(currentUser?.uid);
                                
                                if (likeBtn && likeCount) {
                                    likeCount.textContent = postData.likes || 0;
                                    if (isLiked) {
                                        likeBtn.classList.add('liked');
                                        likeBtn.innerHTML = '❤️ <span class="action-count">' + (postData.likes || 0) + '</span>';
                                    } else {
                                        likeBtn.classList.remove('liked');
                                        likeBtn.innerHTML = '🤍 <span class="action-count">' + (postData.likes || 0) + '</span>';
                                    }
                                }
                                
                                // Обновляем комментарии
                                const commentsBtn = postElement.querySelector('.comments-btn .action-count');
                                if (commentsBtn) {
                                    commentsBtn.textContent = postData.commentsCount || 0;
                                }
                            }
                        }
                    });
                });
            
            // Обновления комментариев если открыто модальное окно
            if (currentPostId) {
                db.collection('posts')
                    .doc(currentPostId)
                    .collection('comments')
                    .onSnapshot((snapshot) => {
                        snapshot.docChanges().forEach((change) => {
                            if (change.type === 'added' && document.getElementById('commentsModal').style.display === 'flex') {
                                loadComments(currentPostId);
                            }
                        });
                    });
            }
        }

        setTimeout(setupRealtimeUpdates, 2000);

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ПРОФИЛЯ =====
        function updateProfileButton() {
            const avatar = document.getElementById('profileAvatar');
            const username = document.getElementById('profileUsername');
            
            if (currentUserData && currentUserData.username) {
                username.textContent = currentUserData.username;
                if (window.innerWidth > 768) {
                    avatar.textContent = getAvatarLetter(currentUserData.username);
                    avatar.querySelector('.btn-icon')?.remove();
                }
            }
        }

        // ===== ВЫХОД =====
        function logout() {
            if (confirm('Выйти из аккаунта?')) {
                auth.signOut().then(() => {
                    window.location.href = 'index.html';
                });
            }
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        window.addEventListener('load', () => {
            console.log('🚀 Лента с комментариями загружена');
            
            // Обновляем UI для мобильных
            updateProfileButton();
            
            // Фокус на поле ввода поста
            document.getElementById('postText').focus();
            
            // Enter для отправки поста
            document.getElementById('postText').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    createPost();
                }
            });
            
            // Enter для отправки комментария
            document.getElementById('commentInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    addComment();
                }
            });
            
            // Адаптация к размеру окна
            window.addEventListener('resize', updateProfileButton);
        });
    </script>
</body>
</html>
