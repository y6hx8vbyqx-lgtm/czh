<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - czhmass.com</title>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 10px;
        }

        /* iOS Динамический островок */
        .dynamic-island {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 35px;
            background: rgba(40, 40, 40, 0.95);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 15px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        .island-time {
            font-size: 15px;
            font-weight: 600;
            color: white;
        }

        /* Основной контейнер */
        .container {
            padding: 140px 20px 60px;
            max-width: 400px;
            margin: 0 auto;
        }

        /* Заголовок */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            line-height: 1.5;
        }

        /* Форма входа/регистрации */
        .auth-card {
            background: rgba(28, 28, 30, 0.8);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .form-title {
            font-size: 24px;
            font-weight: 700;
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.07);
        }

        .input-field.error {
            border-color: #ff3b30;
        }

        .error-message {
            color: #ff3b30;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .checkbox {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }

        .checkbox-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            line-height: 1.4;
        }

        /* Кнопки */
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
            text-align: center;
            margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Переключатель форм */
        .form-switch {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .switch-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .switch-link {
            color: #667eea;
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
        }

        .switch-link:hover {
            color: #764ba2;
        }

        /* Сообщения */
        .message {
            padding: 14px;
            border-radius: 12px;
            margin: 20px 0;
            display: none;
            font-size: 14px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .success {
            background: rgba(52, 199, 89, 0.15);
            color: #34c759;
            border-color: rgba(52, 199, 89, 0.3);
        }

        .error {
            background: rgba(255, 59, 48, 0.15);
            color: #ff3b30;
            border-color: rgba(255, 59, 48, 0.3);
        }

        .info {
            background: rgba(0, 122, 255, 0.15);
            color: #007aff;
            border-color: rgba(0, 122, 255, 0.3);
        }

        /* Индикатор загрузки */
        .loading {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            display: none;
        }

        /* Адаптивность для мобильных */
        @media (max-width: 768px) {
            .container {
                padding: 130px 15px 40px;
            }

            .dynamic-island {
                width: 110px;
                height: 32px;
                top: 10px;
            }

            .auth-card {
                padding: 25px;
            }

            .logo {
                font-size: 32px;
            }

            .form-title {
                font-size: 22px;
            }

            .btn {
                padding: 16px;
                font-size: 15px;
            }

            .input-field {
                padding: 14px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 120px 12px 30px;
            }

            .auth-card {
                padding: 20px;
            }

            .logo {
                font-size: 28px;
            }

            .form-title {
                font-size: 20px;
                margin-bottom: 25px;
            }

            .btn {
                padding: 15px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 110px 10px 20px;
            }

            .dynamic-island {
                width: 100px;
                height: 30px;
                font-size: 13px;
            }

            .logo {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- iOS Динамический островок -->
    <div class="dynamic-island">
        <span class="island-time" id="currentTime">--:--</span>
    </div>

    <!-- Основной контейнер -->
    <div class="container">
        <div class="header">
            <div class="logo">czhmass</div>
            <div class="subtitle">Анонимная социальная сеть.<br>Ваша приватность — наш приоритет.</div>
        </div>

        <!-- Форма входа -->
        <div class="auth-card" id="loginForm">
            <h2 class="form-title">Вход в аккаунт</h2>

            <div class="form-group">
                <label class="input-label">Email</label>
                <input type="email" id="loginEmail" class="input-field" placeholder="your@email.com">
                <div class="error-message" id="loginEmailError"></div>
            </div>

            <div class="form-group">
                <label class="input-label">Пароль</label>
                <input type="password" id="loginPassword" class="input-field" placeholder="••••••••">
                <div class="error-message" id="loginPasswordError"></div>
            </div>

            <button class="btn btn-primary" onclick="login()" id="loginButton">
                Войти в аккаунт
            </button>

            <div class="form-switch">
                <div class="switch-text">Нет аккаунта?</div>
                <button class="switch-link" onclick="showRegisterForm()">
                    Создать новый аккаунт
                </button>
            </div>

            <div class="loading" id="loginLoading">Вход...</div>
        </div>

        <!-- Форма регистрации (скрыта по умолчанию) -->
        <div class="auth-card" id="registerForm" style="display: none;">
            <h2 class="form-title">Создать аккаунт</h2>

            <div class="form-group">
                <label class="input-label">Имя пользователя</label>
                <input type="text" id="registerUsername" class="input-field" placeholder="Придумайте имя" maxlength="20">
                <div class="error-message" id="usernameError"></div>
            </div>

            <div class="form-group">
                <label class="input-label">Email</label>
                <input type="email" id="registerEmail" class="input-field" placeholder="your@email.com">
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label class="input-label">Пароль</label>
                <input type="password" id="registerPassword" class="input-field" placeholder="Минимум 6 символов">
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="termsCheckbox" class="checkbox">
                <label for="termsCheckbox" class="checkbox-label">
                    Я согласен с условиями использования и политикой конфиденциальности
                </label>
            </div>

            <button class="btn btn-primary" onclick="register()" id="registerButton">
                Создать аккаунт
            </button>

            <div class="form-switch">
                <div class="switch-text">Уже есть аккаунт?</div>
                <button class="switch-link" onclick="showLoginForm()">
                    Войти в существующий
                </button>
            </div>

            <div class="loading" id="registerLoading">Регистрация...</div>
        </div>

        <!-- Сообщения -->
        <div id="message" class="message"></div>
    </div>

    <script>
        // ===== FIREBASE КОНФИГ =====
        const firebaseConfig = {
            apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
            authDomain: "czhmass.firebaseapp.com",
            projectId: "czhmass",
            storageBucket: "czhmass.firebasestorage.app",
            messagingSenderId: "1064257019843",
            appId: "1:1064257019843:web:65488b45be2f86838ca776"
        };

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        let db, auth;

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            console.log('✅ Firebase инициализирован');
        }

        db = firebase.firestore();
        auth = firebase.auth();

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 4000);
        }

        function clearErrors() {
            const errors = document.querySelectorAll('.error-message');
            errors.forEach(error => {
                error.style.display = 'none';
                error.textContent = '';
            });

            const inputs = document.querySelectorAll('.input-field');
            inputs.forEach(input => input.classList.remove('error'));
        }

        function showLoading(buttonId, loadingId) {
            document.getElementById(buttonId).disabled = true;
            document.getElementById(loadingId).style.display = 'block';
        }

        function hideLoading(buttonId, loadingId) {
            document.getElementById(buttonId).disabled = false;
            document.getElementById(loadingId).style.display = 'none';
        }

        function showRegisterForm() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            clearErrors();
            showMessage('Заполните поля для создания аккаунта', 'info');
        }

        function showLoginForm() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            clearErrors();
            showMessage('Введите данные для входа', 'info');
        }

        function updateTime() {
            const now = new Date();
            const timeString = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('currentTime').textContent = timeString;
        }

        // ===== РЕГИСТРАЦИЯ =====
        async function register() {
            clearErrors();

            const username = document.getElementById('registerUsername').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const terms = document.getElementById('termsCheckbox').checked;

            let isValid = true;

            if (!username) {
                document.getElementById('usernameError').textContent = 'Введите имя пользователя';
                document.getElementById('usernameError').style.display = 'block';
                document.getElementById('registerUsername').classList.add('error');
                isValid = false;
            }

            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('emailError').textContent = 'Введите корректный email';
                document.getElementById('emailError').style.display = 'block';
                document.getElementById('registerEmail').classList.add('error');
                isValid = false;
            }

            if (!password || password.length < 6) {
                document.getElementById('passwordError').textContent = 'Пароль должен быть не менее 6 символов';
                document.getElementById('passwordError').style.display = 'block';
                document.getElementById('registerPassword').classList.add('error');
                isValid = false;
            }

            if (!terms) {
                showMessage('Необходимо принять условия использования', 'error');
                isValid = false;
            }

            if (!isValid) return;

            showLoading('registerButton', 'registerLoading');

            try {
                // 1. Создаем пользователя в Firebase Auth
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // 2. Сохраняем дополнительную информацию в Firestore
                await db.collection('users').doc(user.uid).set({
                    username: username,
                    email: email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    role: 'user'
                });

                showMessage('Аккаунт успешно создан! Идет перенаправление...', 'success');
                // Через 2 секунды перенаправляем на главную страницу feed.html
                setTimeout(() => {
                    window.location.href = 'feed.html';
                }, 2000);

            } catch (error) {
                hideLoading('registerButton', 'registerLoading');
                console.error('Ошибка регистрации:', error);
                
                let errorMessage = 'Ошибка при регистрации. Попробуйте еще раз.';
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'Этот email уже зарегистрирован.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Пароль слишком слабый.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Некорректный email.';
                }
                
                showMessage(errorMessage, 'error');
            }
        }

        // ===== ВХОД =====
        async function login() {
            clearErrors();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            let isValid = true;

            if (!email) {
                document.getElementById('loginEmailError').textContent = 'Введите email';
                document.getElementById('loginEmailError').style.display = 'block';
                document.getElementById('loginEmail').classList.add('error');
                isValid = false;
            }

            if (!password) {
                document.getElementById('loginPasswordError').textContent = 'Введите пароль';
                document.getElementById('loginPasswordError').style.display = 'block';
                document.getElementById('loginPassword').classList.add('error');
                isValid = false;
            }

            if (!isValid) return;

            showLoading('loginButton', 'loginLoading');

            try {
                await auth.signInWithEmailAndPassword(email, password);
                showMessage('Вход выполнен! Перенаправление...', 'success');
                
                // Перенаправляем на feed.html
                setTimeout(() => {
                    window.location.href = 'feed.html';
                }, 1500);

            } catch (error) {
                hideLoading('loginButton', 'loginLoading');
                console.error('Ошибка входа:', error);
                
                let errorMessage = 'Ошибка входа. Проверьте данные.';
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    errorMessage = 'Неверный email или пароль.';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Слишком много попыток. Попробуйте позже.';
                }
                
                showMessage(errorMessage, 'error');
            }
        }

        // ===== ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ =====
        document.addEventListener('DOMContentLoaded', function() {
            updateTime();
            setInterval(updateTime, 60000); // Обновлять время каждую минуту
            
            // Проверяем, авторизован ли пользователь
            auth.onAuthStateChanged((user) => {
                if (user) {
                    // Если пользователь уже вошел, перенаправляем на feed.html
                    window.location.href = 'feed.html';
                }
            });
        });
    </script>
</body>
</html>
