<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>czhmass - Вход / Регистрация</title>
    <meta name="theme-color" content="#24292e">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif}
        body{background:#000;color:#fff;min-height:100vh;overflow-x:hidden;padding-top:10px}
        .dynamic-island{position:fixed;top:15px;left:50%;transform:translateX(-50%);width:120px;height:35px;background:rgba(40,40,40,0.95);border-radius:20px;display:flex;align-items:center;justify-content:center;gap:8px;padding:0 15px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid rgba(255,255,255,0.1);box-shadow:0 8px 32px rgba(0,0,0,0.3);z-index:1000}
        .island-time{font-size:15px;font-weight:600;color:white}
        .container{padding:140px 20px 60px;max-width:400px;margin:0 auto}
        .header{text-align:center;margin-bottom:40px}
        .logo{font-size:36px;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
        .subtitle{color:rgba(255,255,255,0.6);font-size:16px;line-height:1.5}
        .auth-card{background:rgba(28,28,30,0.8);border-radius:20px;padding:30px;margin-bottom:20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid rgba(255,255,255,0.1);position:relative;overflow:hidden}
        .form-title{font-size:24px;font-weight:700;color:white;margin-bottom:30px;text-align:center}
        .form-group{margin-bottom:20px}
        .input-label{display:block;font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:8px;font-weight:500}
        .input-field{width:100%;padding:16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:white;font-size:16px;transition:all 0.2s}
        .input-field:focus{outline:none;border-color:#667eea;background:rgba(255,255,255,0.07)}
        .input-field.error{border-color:#ff3b30}
        .error-message{color:#ff3b30;font-size:13px;margin-top:6px;display:none}
        .checkbox-group{display:flex;align-items:center;margin-bottom:25px}
        .checkbox{margin-right:10px;width:18px;height:18px;accent-color:#667eea}
        .checkbox-label{color:rgba(255,255,255,0.7);font-size:14px;line-height:1.4}
        .btn{width:100%;padding:18px;border:none;border-radius:15px;cursor:pointer;font-size:16px;font-weight:600;transition:all 0.2s;text-align:center;margin-bottom:15px}
        .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
        .btn-primary:hover{transform:translateY(-2px);opacity:0.9}
        .btn-secondary{background:rgba(255,255,255,0.1);color:white;backdrop-filter:blur(10px)}
        .btn-secondary:hover{background:rgba(255,255,255,0.15);transform:translateY(-1px)}
        .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none!important}
        .form-switch{text-align:center;margin-top:25px;padding-top:25px;border-top:0.5px solid rgba(255,255,255,0.1)}
        .switch-text{color:rgba(255,255,255,0.6);font-size:14px;margin-bottom:10px}
        .switch-link{color:#667eea;background:none;border:none;font-size:14px;font-weight:600;cursor:pointer;text-decoration:underline}
        .switch-link:hover{color:#764ba2}
        .message{padding:14px;border-radius:12px;margin:20px 0;display:none;font-size:14px;text-align:center;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid rgba(255,255,255,0.1);animation:slideDown 0.3s ease}
        @keyframes slideDown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
        .success{background:rgba(52,199,89,0.15);color:#34c759;border-color:rgba(52,199,89,0.3)}
        .error{background:rgba(255,59,48,0.15);color:#ff3b30;border-color:rgba(255,59,48,0.3)}
        .info{background:rgba(0,122,255,0.15);color:#007aff;border-color:rgba(0,122,255,0.3)}
        .loading{text-align:center;padding:20px;color:rgba(255,255,255,0.5);font-size:14px;display:none}
        @media (max-width:768px){.container{padding:130px 15px 40px}.dynamic-island{width:110px;height:32px;top:10px}.auth-card{padding:25px}.logo{font-size:32px}.form-title{font-size:22px}.btn{padding:16px;font-size:15px}.input-field{padding:14px}}
        @media (max-width:480px){.container{padding:120px 12px 30px}.auth-card{padding:20px}.logo{font-size:28px}.form-title{font-size:20px;margin-bottom:25px}.btn{padding:15px}}
        @media (max-width:360px){.container{padding:110px 10px 20px}.dynamic-island{width:100px;height:30px;font-size:13px}.logo{font-size:24px}}
        
        .login-tabs{display:flex;margin-bottom:25px;border-bottom:1px solid rgba(255,255,255,0.1)}
        .login-tab{flex:1;text-align:center;padding:12px;cursor:pointer;color:rgba(255,255,255,0.5);font-weight:600;transition:all 0.2s}
        .login-tab.active{color:#667eea;border-bottom:2px solid #667eea}
        .tab-content{display:none}
        .tab-content.active{display:block}
    </style>
</head>
<body>
    <div class="dynamic-island"><span class="island-time" id="currentTime">--:--</span></div>
    <div class="container">
        <div class="header">
            <div class="logo">czhmass</div>
            <div class="subtitle">Анонимная социальная сеть.<br>Ваша приватность — наш приоритет.</div>
        </div>
        
        <div class="auth-card" id="loginForm">
            <h2 class="form-title">Вход в аккаунт</h2>
            
            <div class="login-tabs">
                <div class="login-tab active" onclick="switchLoginTab('email')">Email</div>
                <div class="login-tab" onclick="switchLoginTab('username')">Username</div>
            </div>
            
            <div id="loginEmailTab" class="tab-content active">
                <div class="form-group">
                    <label class="input-label">Email</label>
                    <input type="email" id="loginEmail" class="input-field" placeholder="your@email.com">
                    <div class="error-message" id="loginEmailError"></div>
                </div>
            </div>
            
            <div id="loginUsernameTab" class="tab-content">
                <div class="form-group">
                    <label class="input-label">Имя пользователя</label>
                    <input type="text" id="loginUsername" class="input-field" placeholder="@username">
                    <div class="error-message" id="loginUsernameError"></div>
                </div>
            </div>
            
            <div class="form-group">
                <label class="input-label">Пароль</label>
                <input type="password" id="loginPassword" class="input-field" placeholder="••••••••">
                <div class="error-message" id="loginPasswordError"></div>
            </div>
            
            <button class="btn btn-primary" onclick="login()" id="loginButton">Войти в аккаунт</button>
            
            <div class="form-switch">
                <div class="switch-text">Нет аккаунта?</div>
                <button class="switch-link" onclick="showRegisterForm()">Создать новый аккаунт</button>
            </div>
            <div class="loading" id="loginLoading">Вход...</div>
        </div>
        
        <div class="auth-card" id="registerForm" style="display:none">
            <h2 class="form-title">Создать аккаунт</h2>
            <div class="form-group">
                <label class="input-label">Имя пользователя</label>
                <input type="text" id="registerUsername" class="input-field" placeholder="@username" maxlength="20">
                <div class="error-message" id="usernameError"></div>
            </div>
            <div class="form-group">
                <label class="input-label">Email</label>
                <input type="email" id="registerEmail" class="input-field" placeholder="your@email.com">
                <div class="error-message" id="emailError"></div>
            </div>
            <div class="form-group">
                <label class="input-label">Пароль</label>
                <input type="password" id="registerPassword" class="input-field" placeholder="Минимум 6 символов">
                <div class="error-message" id="passwordError"></div>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="termsCheckbox" class="checkbox">
                <label for="termsCheckbox" class="checkbox-label">Я согласен с условиями использования и политикой конфиденциальности</label>
            </div>
            <button class="btn btn-primary" onclick="register()" id="registerButton">Создать аккаунт</button>
            <div class="form-switch">
                <div class="switch-text">Уже есть аккаунт?</div>
                <button class="switch-link" onclick="showLoginForm()">Войти в существующий</button>
            </div>
            <div class="loading" id="registerLoading">Регистрация...</div>
        </div>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        // ===== FIREBASE КОНФИГУРАЦИЯ =====
        const firebaseConfig = {
            apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
            authDomain: "czhmass.firebaseapp.com",
            projectId: "czhmass",
            storageBucket: "czhmass.firebasestorage.app",
            messagingSenderId: "1064257019843",
            appId: "1:1064257019843:web:65488b45be2f86838ca776"
        };
        
        let db, auth;
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            console.log('✅ Firebase инициализирован');
        }
        db = firebase.firestore();
        auth = firebase.auth();
        
        // Локальный кэш username (без загрузки из Firestore для избежания permission errors)
        let usernameCache = new Map();
        
        // ===== ФУНКЦИИ ДЛЯ РАБОТЫ С USERNAME (без permission errors) =====
        
        // Получение email по username (только для авторизованных пользователей)
        async function getEmailByUsername(username) {
            const normalized = username.toLowerCase().trim();
            
            // Сначала проверяем локальный кэш
            if (usernameCache.has(normalized)) {
                return usernameCache.get(normalized);
            }
            
            // Если пользователь не авторизован, используем Firebase Functions или другие методы
            // Но для входа нам нужно проверить существование пользователя
            // Вместо прямого запроса к Firestore используем специальный подход
            
            try {
                // Пытаемся найти пользователя через auth (не работает напрямую)
                // Поэтому используем localStorage для временного хранения
                const users = JSON.parse(localStorage.getItem('czhmass_users') || '{}');
                if (users[normalized]) {
                    usernameCache.set(normalized, users[normalized]);
                    return users[normalized];
                }
            } catch (e) {
                console.error('Ошибка чтения localStorage:', e);
            }
            
            return null;
        }
        
        // Сохранение username в localStorage (временное решение до настройки правил Firestore)
        function saveUsernameMapping(username, email, uid) {
            try {
                const normalized = username.toLowerCase();
                const users = JSON.parse(localStorage.getItem('czhmass_users') || '{}');
                users[normalized] = { email, uid };
                localStorage.setItem('czhmass_users', JSON.stringify(users));
                usernameCache.set(normalized, { email, uid });
                console.log(`✅ Сохранен username: ${username} -> ${email}`);
            } catch (e) {
                console.error('Ошибка сохранения в localStorage:', e);
            }
        }
        
        // Проверка уникальности username через localStorage
        async function isUsernameAvailable(username) {
            const normalized = username.toLowerCase();
            
            // Проверяем в localStorage
            const users = JSON.parse(localStorage.getItem('czhmass_users') || '{}');
            if (users[normalized]) {
                return false;
            }
            
            // Также проверяем в кэше
            if (usernameCache.has(normalized)) {
                return false;
            }
            
            return true;
        }
        
        // ===== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК =====
        window.switchLoginTab = function(tab) {
            const tabs = document.querySelectorAll('.login-tab');
            const contents = document.querySelectorAll('.tab-content');
            
            tabs.forEach(t => t.classList.remove('active'));
            contents.forEach(c => c.classList.remove('active'));
            
            if (tab === 'email') {
                tabs[0].classList.add('active');
                document.getElementById('loginEmailTab').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('loginUsernameTab').classList.add('active');
            }
            
            clearErrors();
        }
        
        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 4000);
        }
        
        function clearErrors() {
            const errors = document.querySelectorAll('.error-message');
            errors.forEach(error => {
                error.style.display = 'none';
                error.textContent = '';
            });
            const inputs = document.querySelectorAll('.input-field');
            inputs.forEach(input => input.classList.remove('error'));
        }
        
        function showLoginForm() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            clearErrors();
        }
        
        function showRegisterForm() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            clearErrors();
        }
        
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
        
        function validateUsername(username) {
            const re = /^[a-zA-Z0-9_]{3,20}$/;
            return re.test(username);
        }
        
        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            const inputElement = document.getElementById(elementId.replace('Error', ''));
            errorElement.textContent = message;
            errorElement.style.display = 'block';
            if (inputElement) inputElement.classList.add('error');
        }
        
        // ===== РЕГИСТРАЦИЯ =====
        async function register() {
            clearErrors();
            
            const username = document.getElementById('registerUsername').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const termsCheckbox = document.getElementById('termsCheckbox');
            const registerButton = document.getElementById('registerButton');
            const loading = document.getElementById('registerLoading');
            
            // Валидация
            if (!username) { showError('usernameError', 'Введите имя пользователя'); return; }
            if (!validateUsername(username)) { 
                showError('usernameError', 'Только буквы, цифры и _, от 3 до 20 символов'); 
                return; 
            }
            if (!email) { showError('emailError', 'Введите email'); return; }
            if (!validateEmail(email)) { showError('emailError', 'Некорректный email'); return; }
            if (!password) { showError('passwordError', 'Введите пароль'); return; }
            if (password.length < 6) { showError('passwordError', 'Пароль от 6 символов'); return; }
            if (!termsCheckbox.checked) { showMessage('Примите условия использования', 'error'); return; }
            
            registerButton.disabled = true;
            loading.style.display = 'block';
            
            try {
                // Проверяем уникальность username (локально)
                const available = await isUsernameAvailable(username);
                if (!available) {
                    showError('usernameError', 'Это имя пользователя уже занято');
                    registerButton.disabled = false;
                    loading.style.display = 'none';
                    return;
                }
                
                // Создаем пользователя в Firebase Auth
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Пытаемся сохранить данные в Firestore, но не критично если не получится
                try {
                    await db.collection('users').doc(user.uid).set({
                        username: username,
                        username_lower: username.toLowerCase(),
                        email: email,
                        createdAt: new Date().toISOString(),
                        lastLogin: new Date().toISOString(),
                        displayName: username,
                        bio: '',
                        avatar: ''
                    });
                    console.log('✅ Данные сохранены в Firestore');
                } catch (firestoreError) {
                    console.warn('⚠️ Не удалось сохранить в Firestore, используем localStorage:', firestoreError.message);
                    // Если Firestore недоступен, сохраняем локально
                }
                
                // Сохраняем mapping username -> email в localStorage
                saveUsernameMapping(username, email, user.uid);
                
                // Сохраняем данные пользователя в localStorage
                localStorage.setItem('czhmass_user', JSON.stringify({
                    uid: user.uid,
                    username: username,
                    email: email
                }));
                
                showMessage(`Аккаунт создан! Добро пожаловать, ${username}!`, 'success');
                
                // Перенаправляем на ленту
                setTimeout(() => { 
                    window.location.href = '/feed.html'; 
                }, 1500);
                
            } catch (error) {
                console.error('❌ Ошибка регистрации:', error);
                let errorMessage = 'Ошибка регистрации';
                
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'Этот email уже используется';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Пароль слишком слабый';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Некорректный email';
                } else if (error.code === 'auth/network-request-failed') {
                    errorMessage = 'Ошибка сети. Проверьте подключение';
                }
                
                showMessage(errorMessage, 'error');
                
            } finally {
                registerButton.disabled = false;
                loading.style.display = 'none';
            }
        }
        
        // ===== ВХОД =====
        async function login() {
            clearErrors();
            
            const password = document.getElementById('loginPassword').value;
            const loginButton = document.getElementById('loginButton');
            const loading = document.getElementById('loginLoading');
            
            const activeTab = document.querySelector('.login-tab.active');
            const isEmailTab = activeTab?.textContent === 'Email';
            
            let email;
            let username;
            
            if (isEmailTab) {
                email = document.getElementById('loginEmail').value.trim();
            } else {
                username = document.getElementById('loginUsername').value.trim();
            }
            
            // Валидация
            if (isEmailTab) {
                if (!email) { showError('loginEmailError', 'Введите email'); return; }
                if (!validateEmail(email)) { showError('loginEmailError', 'Некорректный email'); return; }
            } else {
                if (!username) { showError('loginUsernameError', 'Введите имя пользователя'); return; }
                if (!validateUsername(username)) {
                    showError('loginUsernameError', 'Некорректное имя пользователя');
                    return;
                }
            }
            
            if (!password) { showError('loginPasswordError', 'Введите пароль'); return; }
            
            loginButton.disabled = true;
            loading.style.display = 'block';
            
            try {
                // Если вход по username - получаем email
                if (!isEmailTab) {
                    const mapping = await getEmailByUsername(username);
                    
                    if (mapping?.email) {
                        email = mapping.email;
                    } else {
                        // Если не нашли в localStorage, пробуем альтернативный метод
                        // Показываем подсказку пользователю
                        showError('loginUsernameError', 'Пользователь не найден. Попробуйте войти по email');
                        loginButton.disabled = false;
                        loading.style.display = 'none';
                        return;
                    }
                }
                
                // Вход в Firebase Auth
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Получаем username пользователя
                let displayUsername = username || email.split('@')[0];
                
                // Пытаемся получить сохраненный username
                try {
                    // Ищем в localStorage
                    const users = JSON.parse(localStorage.getItem('czhmass_users') || '{}');
                    for (const [uname, data] of Object.entries(users)) {
                        if (data.email === email) {
                            displayUsername = uname;
                            break;
                        }
                    }
                } catch (e) {
                    console.error('Ошибка чтения localStorage:', e);
                }
                
                // Обновляем время последнего входа в Firestore (не критично если не получится)
                try {
                    await db.collection('users').doc(user.uid).update({
                        lastLogin: new Date().toISOString()
                    });
                } catch (e) {
                    console.warn('⚠️ Не удалось обновить lastLogin:', e.message);
                }
                
                // Сохраняем данные пользователя в localStorage
                localStorage.setItem('czhmass_user', JSON.stringify({
                    uid: user.uid,
                    username: displayUsername,
                    email: user.email
                }));
                
                showMessage(`Добро пожаловать, ${displayUsername}!`, 'success');
                
                // Перенаправляем
                setTimeout(() => { 
                    window.location.href = '/feed.html'; 
                }, 1500);
                
            } catch (error) {
                console.error('❌ Ошибка входа:', error);
                let errorMessage = 'Ошибка входа';
                
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'Пользователь не найден';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Неверный пароль';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Некорректный email';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Слишком много попыток. Попробуйте позже';
                } else if (error.code === 'auth/network-request-failed') {
                    errorMessage = 'Ошибка сети. Проверьте подключение';
                }
                
                showMessage(errorMessage, 'error');
                
            } finally {
                loginButton.disabled = false;
                loading.style.display = 'none';
            }
        }
        
        // ===== СМЕНА USERNAME =====
        window.updateUsername = async function(newUsername, userId) {
            if (!validateUsername(newUsername)) {
                throw new Error('Некорректное имя пользователя');
            }
            
            const available = await isUsernameAvailable(newUsername);
            if (!available) {
                throw new Error('Имя пользователя занято');
            }
            
            try {
                // Пытаемся обновить в Firestore
                await db.collection('users').doc(userId).update({
                    username: newUsername,
                    username_lower: newUsername.toLowerCase(),
                    displayName: newUsername
                });
            } catch (e) {
                console.warn('⚠️ Не удалось обновить в Firestore:', e.message);
            }
            
            // Обновляем localStorage
            const users = JSON.parse(localStorage.getItem('czhmass_users') || '{}');
            const userData = JSON.parse(localStorage.getItem('czhmass_user') || '{}');
            
            // Удаляем старый username
            if (userData.username) {
                delete users[userData.username.toLowerCase()];
            }
            
            // Добавляем новый
            users[newUsername.toLowerCase()] = {
                email: userData.email,
                uid: userId
            };
            
            localStorage.setItem('czhmass_users', JSON.stringify(users));
            
            // Обновляем текущего пользователя
            userData.username = newUsername;
            localStorage.setItem('czhmass_user', JSON.stringify(userData));
            
            // Обновляем кэш
            usernameCache.set(newUsername.toLowerCase(), {
                email: userData.email,
                uid: userId
            });
            
            return true;
        };
        
        // ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
        auth.onAuthStateChanged((user) => {
            if (user) {
                console.log('✅ Пользователь авторизован:', user.email);
                // Если пользователь уже вошел и находится на странице входа - редирект
                if (window.location.pathname.includes('login') || 
                    window.location.pathname.includes('register') || 
                    window.location.pathname === '/' || 
                    window.location.pathname === '/index.html') {
                    window.location.href = '/feed.html';
                }
            }
        });
        
        // ===== ЧАСЫ =====
        function updateTime() {
            const now = new Date();
            const timeString = now.getHours().toString().padStart(2, '0') + ':' + 
                              now.getMinutes().toString().padStart(2, '0');
            document.getElementById('currentTime').textContent = timeString;
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        // ===== ЗАГРУЗКА ПРИ СТАРТЕ =====
        window.addEventListener('load', () => {
            // Загружаем сохраненные username из localStorage
            try {
                const users = JSON.parse(localStorage.getItem('czhmass_users') || '{}');
                for (const [username, data] of Object.entries(users)) {
                    usernameCache.set(username, data);
                }
                console.log(`✅ Загружено ${usernameCache.size} username из localStorage`);
            } catch (e) {
                console.error('Ошибка загрузки из localStorage:', e);
            }
            
            clearErrors();
        });
    </script>
</body>
</html>
