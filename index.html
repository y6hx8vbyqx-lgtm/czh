<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>czhmass - Регистрация</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
        }
        .header {
            background: #667eea;
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .form-container {
            padding: 30px;
        }
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #a0aec0;
            transition: all 0.3s;
        }
        .tab.active {
            color: #667eea;
            font-weight: bold;
            border-bottom: 3px solid #667eea;
            margin-bottom: -2px;
        }
        .form {
            display: none;
        }
        .form.active {
            display: block;
        }
        .input-group {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #5a67d8;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background: #c6f6d5;
            color: #22543d;
        }
        .error {
            background: #fed7d7;
            color: #742a2a;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>czhmass.com</h1>
            <p>Мини-социальная сеть</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Вход</button>
            <button class="tab" onclick="switchTab('register')">Регистрация</button>
        </div>
        
        <div class="form-container">
            <!-- ФОРМА ВХОДА -->
            <div id="loginForm" class="form active">
                <div class="input-group">
                    <input type="text" id="loginUsername" placeholder="Имя пользователя" required>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Пароль" required>
                </div>
                <button class="btn" onclick="login()">Войти</button>
                <div id="loginMessage" class="message"></div>
            </div>
            
            <!-- ФОРМА РЕГИСТРАЦИИ -->
            <div id="registerForm" class="form">
                <div class="input-group">
                    <input type="text" id="regUsername" placeholder="Имя пользователя" required>
                </div>
                <div class="input-group">
                    <input type="email" id="regEmail" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="regPassword" placeholder="Пароль" required>
                </div>
                <div class="input-group">
                    <input type="password" id="regConfirm" placeholder="Повторите пароль" required>
                </div>
                <button class="btn" onclick="register()">Зарегистрироваться</button>
                <div id="registerMessage" class="message"></div>
            </div>
        </div>
        
        <div class="footer">
            <p>После входа вы попадёте в ленту постов</p>
        </div>
    </div>

    <script>
        // ===== ПЕРЕКЛЮЧЕНИЕ ТАБОВ =====
        function switchTab(tabName) {
            // Скрыть все формы
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('registerForm').classList.remove('active');
            
            // Убрать активность со всех табов
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Показать нужную форму и активировать таб
            document.getElementById(tabName + 'Form').classList.add('active');
            event.target.classList.add('active');
        }
        
        // ===== РЕГИСТРАЦИЯ =====
        function register() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            const message = document.getElementById('registerMessage');
            
            // Сброс сообщения
            message.style.display = 'none';
            message.className = 'message';
            
            // Валидация
            if (!username || !email || !password || !confirm) {
                showMessage(message, 'Заполните все поля', 'error');
                return;
            }
            
            if (password !== confirm) {
                showMessage(message, 'Пароли не совпадают', 'error');
                return;
            }
            
            if (username.length < 3) {
                showMessage(message, 'Имя пользователя минимум 3 символа', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage(message, 'Пароль минимум 6 символов', 'error');
                return;
            }
            
            // Получаем существующих пользователей
            let users = JSON.parse(localStorage.getItem('czhmass_users') || '{}');
            
            // Проверка на существование
            if (users[username]) {
                showMessage(message, 'Пользователь уже существует', 'error');
                return;
            }
            
            // Создание пользователя
            users[username] = {
                email: email,
                password: password,
                posts: [],
                postTimes: [],
                createdAt: new Date().toISOString(),
                isAdmin: false
            };
            
            // Сохранение
            localStorage.setItem('czhmass_users', JSON.stringify(users));
            localStorage.setItem('czhmass_currentUser', username);
            
            showMessage(message, '✅ Регистрация успешна! Перенаправляем...', 'success');
            
            setTimeout(() => {
                window.location.href = 'feed.html';
            }, 1500);
        }
        
        // ===== ВХОД =====
        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const message = document.getElementById('loginMessage');
            
            // Сброс сообщения
            message.style.display = 'none';
            message.className = 'message';
            
            // Валидация
            if (!username || !password) {
                showMessage(message, 'Заполните все поля', 'error');
                return;
            }
            
            // Получаем пользователей
            let users = JSON.parse(localStorage.getItem('czhmass_users') || '{}');
            
            // Проверка
            if (!users[username]) {
                showMessage(message, 'Пользователь не найден', 'error');
                return;
            }
            
            if (users[username].password !== password) {
                showMessage(message, 'Неверный пароль', 'error');
                return;
            }
            
            // Успешный вход
            localStorage.setItem('czhmass_currentUser', username);
            
            showMessage(message, '✅ Вход успешен! Перенаправляем...', 'success');
            
            setTimeout(() => {
                window.location.href = 'feed.html';
            }, 1000);
        }
        
        // ===== ПОКАЗ СООБЩЕНИЙ =====
        function showMessage(element, text, type) {
            element.textContent = text;
            element.className = 'message ' + type;
            element.style.display = 'block';
        }
        
        // ===== ENTER ДЛЯ ВХОДА =====
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('loginForm').classList.contains('active')) {
                    login();
                } else {
                    register();
                }
            }
        });
        
        // ===== АВТОВХОД ПРИ ПЕРЕЗАГРУЗКЕ =====
        window.addEventListener('load', function() {
            const currentUser = localStorage.getItem('czhmass_currentUser');
            if (currentUser) {
                window.location.href = 'feed.html';
            }
        });
    </script>
</body>
</html>
