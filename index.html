<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>czhmass - Регистрация</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }

        .header {
            background: #667eea;
            color: white;
            padding: 32px 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .tabs {
            display: flex;
            margin: 0;
            border-bottom: 2px solid #e2e8f0;
            background: #f8fafc;
        }

        .tab {
            flex: 1;
            padding: 18px;
            text-align: center;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            color: #64748b;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: #667eea;
            font-weight: 600;
            border-bottom: 3px solid #667eea;
            background: white;
        }

        .form-container {
            padding: 32px;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #5a67d8;
        }

        .btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }

        .message {
            margin-top: 16px;
            padding: 14px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
        }

        .success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .error {
            background: #fee2e2;
            color: #7f1d1d;
            border: 1px solid #fecaca;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #64748b;
            font-size: 14px;
            border-top: 1px solid #f1f5f9;
        }

        .username-check {
            font-size: 12px;
            margin-top: 5px;
            display: none;
            padding: 8px;
            border-radius: 6px;
            font-weight: 500;
        }

        .username-available {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .username-taken {
            background: #fee2e2;
            color: #7f1d1d;
            border: 1px solid #fecaca;
        }

        .username-checking {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fde68a;
        }

        .privacy-note {
            font-size: 12px;
            color: #64748b;
            margin-top: 5px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .container {
                border-radius: 12px;
            }
            .form-container {
                padding: 24px;
            }
            .tab {
                padding: 16px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>czhmass.com</h1>
            <p>Мини-социальная сеть</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login', event)">Вход</button>
            <button class="tab" onclick="switchTab('register', event)">Регистрация</button>
        </div>

        <div class="form-container">
            <!-- ФОРМА ВХОДА -->
            <div id="loginForm" class="form active">
                <div class="input-group">
                    <input type="email" id="loginEmail" placeholder="Ваш email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Пароль" required>
                </div>
                <button class="btn" onclick="login()" id="loginBtn">Войти</button>
                <div id="loginMessage" class="message"></div>
            </div>

            <!-- ФОРМА РЕГИСТРАЦИИ -->
            <div id="registerForm" class="form">
                <div class="input-group">
                    <input type="text" id="regUsername" placeholder="Имя пользователя (будет видно всем)" 
                           required minlength="3" maxlength="20"
                           oninput="checkUsernameAvailability(this.value)">
                    <div class="username-check" id="usernameCheck">
                        <span id="usernameCheckText">Проверяем...</span>
                    </div>
                    <div class="privacy-note">
                        Только латинские буквы, цифры, _ и . 
                    </div>
                </div>
                <div class="input-group">
                    <input type="email" id="regEmail" placeholder="Email (видят только админы)" required>
                    <div class="privacy-note">
                        Ваш email будет скрыт от других пользователей
                    </div>
                </div>
                <div class="input-group">
                    <input type="password" id="regPassword" placeholder="Пароль (минимум 6 символов)" 
                           required minlength="6">
                </div>
                <div class="input-group">
                    <input type="password" id="regConfirm" placeholder="Повторите пароль" required>
                </div>
                <button class="btn" onclick="register()" id="registerBtn" disabled>Зарегистрироваться</button>
                <div id="registerMessage" class="message"></div>
            </div>
        </div>

        <div class="footer">
            <p>После входа вы попадёте в ленту постов</p>
        </div>
    </div>

    <script>
        // ===== FIREBASE КОНФИГ =====
        const firebaseConfig = {
            apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
            authDomain: "czhmass.firebaseapp.com",
            projectId: "czhmass",
            storageBucket: "czhmass.firebasestorage.app",
            messagingSenderId: "1064257019843",
            appId: "1:1064257019843:web:65488b45be2f86838ca776"
        };

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        let usernameAvailable = false;
        let usernameCheckTimeout = null;
        let currentUsername = '';

        // ===== ПРОВЕРКА USERNAME =====
        async function checkUsernameAvailability(username) {
            const checkDiv = document.getElementById('usernameCheck');
            const checkText = document.getElementById('usernameCheckText');
            const registerBtn = document.getElementById('registerBtn');
            
            currentUsername = username.trim().toLowerCase();
            
            if (currentUsername.length < 3) {
                checkDiv.style.display = 'none';
                usernameAvailable = false;
                registerBtn.disabled = true;
                return;
            }

            // Проверяем допустимые символы
            if (!/^[a-z0-9_.]+$/.test(currentUsername)) {
                checkDiv.style.display = 'block';
                checkDiv.className = 'username-check username-taken';
                checkText.textContent = '✗ Только латинские буквы, цифры, _ и .';
                usernameAvailable = false;
                registerBtn.disabled = true;
                return;
            }

            // Показываем проверку
            checkDiv.style.display = 'block';
            checkDiv.className = 'username-check username-checking';
            checkText.textContent = '⏳ Проверяем доступность...';
            registerBtn.disabled = true;

            // Очищаем предыдущий таймер
            if (usernameCheckTimeout) clearTimeout(usernameCheckTimeout);
            
            usernameCheckTimeout = setTimeout(async () => {
                try {
                    const snapshot = await db.collection('users')
                        .where('username', '==', currentUsername)
                        .limit(1)
                        .get();

                    if (snapshot.empty) {
                        // Username свободен
                        checkDiv.className = 'username-check username-available';
                        checkText.textContent = '✓ Имя пользователя доступно';
                        usernameAvailable = true;
                        registerBtn.disabled = false;
                    } else {
                        // Username занят
                        checkDiv.className = 'username-check username-taken';
                        checkText.textContent = '✗ Имя пользователя уже занято';
                        usernameAvailable = false;
                        registerBtn.disabled = true;
                    }
                } catch (error) {
                    console.error('Ошибка проверки username:', error);
                    checkDiv.className = 'username-check username-taken';
                    checkText.textContent = '✗ Ошибка проверки';
                    usernameAvailable = false;
                    registerBtn.disabled = true;
                }
            }, 800);
        }

        // ===== ПЕРЕКЛЮЧЕНИЕ ТАБОВ =====
        function switchTab(tabName, event) {
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('registerForm').classList.remove('active');

            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            document.getElementById(tabName + 'Form').classList.add('active');
            event.target.classList.add('active');
        }

        function showMessage(element, text, type) {
            element.textContent = text;
            element.className = 'message ' + type;
            element.style.display = 'block';
        }

        // ===== РЕГИСТРАЦИЯ =====
        async function register() {
            const username = document.getElementById('regUsername').value.trim().toLowerCase();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            const message = document.getElementById('registerMessage');
            const registerBtn = document.getElementById('registerBtn');

            message.style.display = 'none';
            message.className = 'message';
            registerBtn.disabled = true;
            registerBtn.textContent = 'Регистрация...';

            // ВАЛИДАЦИЯ
            if (!username || !email || !password || !confirm) {
                showMessage(message, 'Заполните все поля', 'error');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зарегистрироваться';
                return;
            }

            if (!usernameAvailable) {
                showMessage(message, '❌ Это имя пользователя уже занято или недоступно', 'error');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зарегистрироваться';
                return;
            }

            if (password !== confirm) {
                showMessage(message, 'Пароли не совпадают', 'error');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зарегистрироваться';
                return;
            }

            if (username.length < 3) {
                showMessage(message, 'Имя пользователя минимум 3 символа', 'error');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зарегистрироваться';
                return;
            }

            if (!/^[a-z0-9_.]+$/.test(username)) {
                showMessage(message, 'Только латинские буквы, цифры, _ и .', 'error');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зарегистрироваться';
                return;
            }

            if (password.length < 6) {
                showMessage(message, 'Пароль минимум 6 символов', 'error');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зарегистрироваться';
                return;
            }

            if (!email.includes('@')) {
                showMessage(message, 'Введите правильный email', 'error');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зарегистрироваться';
                return;
            }

            try {
                showMessage(message, 'Регистрация...', 'success');

                // 1. СОЗДАЕМ ПОЛЬЗОВАТЕЛЯ В AUTH
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // 2. СОХРАНЯЕМ В FIRESTORE
                await db.collection('users').doc(user.uid).set({
                    username: username,
                    email: email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    isAdmin: false,
                    displayEmail: false,  // Email скрыт по умолчанию
                    allowMentions: true,  // Разрешаем упоминания
                    profileVisible: true,  // Профиль виден
                    showPostsCount: true,  // Показывать счетчик постов
                    showJoinDate: true,    // Показывать дату регистрации
                    postsCount: 0,
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 3. ЛОКАЛЬНОЕ СОХРАНЕНИЕ
                localStorage.setItem('czhmass_currentUser', username);
                localStorage.setItem('czhmass_userId', user.uid);
                localStorage.setItem('czhmass_userEmail', email);
                localStorage.setItem('czhmass_isAdmin', 'false');

                showMessage(message, '✅ Регистрация успешна! Перенаправляем...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'feed.html';
                }, 1500);

            } catch (error) {
                console.error('Ошибка регистрации:', error);
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зарегистрироваться';
                
                let errorText = 'Ошибка регистрации';
                if (error.code === 'auth/email-already-in-use') {
                    errorText = 'Email уже используется';
                } else if (error.code === 'auth/invalid-email') {
                    errorText = 'Неверный формат email';
                } else if (error.code === 'auth/weak-password') {
                    errorText = 'Пароль слишком слабый';
                } else if (error.code.includes('permission')) {
                    errorText = 'Ошибка доступа к базе. Проверьте правила Firestore.';
                }

                showMessage(message, '❌ ' + errorText, 'error');
            }
        }

        // ===== ВХОД =====
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const message = document.getElementById('loginMessage');
            const loginBtn = document.getElementById('loginBtn');

            message.style.display = 'none';
            message.className = 'message';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Вход...';

            if (!email || !password) {
                showMessage(message, 'Заполните все поля', 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Войти';
                return;
            }

            if (!email.includes('@')) {
                showMessage(message, 'Введите правильный email', 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Войти';
                return;
            }

            try {
                showMessage(message, 'Вход...', 'success');
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // ПОЛУЧАЕМ USERNAME
                const userDoc = await db.collection('users').doc(user.uid).get();

                if (!userDoc.exists) {
                    showMessage(message, '❌ Данные пользователя не найдены', 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Войти';
                    return;
                }

                const userData = userDoc.data();

                // СОХРАНЯЕМ ЛОКАЛЬНО
                localStorage.setItem('czhmass_currentUser', userData.username);
                localStorage.setItem('czhmass_userId', user.uid);
                localStorage.setItem('czhmass_userEmail', email);
                localStorage.setItem('czhmass_isAdmin', userData.isAdmin ? 'true' : 'false');

                showMessage(message, '✅ Вход успешен! Перенаправляем...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'feed.html';
                }, 1000);

            } catch (error) {
                console.error('Ошибка входа:', error);
                loginBtn.disabled = false;
                loginBtn.textContent = 'Войти';

                let errorText = 'Ошибка входа';
                if (error.code === 'auth/user-not-found') errorText = 'Пользователь не найден';
                if (error.code === 'auth/wrong-password') errorText = 'Неверный пароль';
                if (error.code === 'auth/invalid-email') errorText = 'Неверный email';
                if (error.code.includes('permission')) errorText = 'Ошибка доступа. Проверьте правила Firestore.';

                showMessage(message, '❌ ' + errorText, 'error');
            }
        }

        // ===== ENTER ДЛЯ ВХОДА =====
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('loginForm').classList.contains('active')) {
                    login();
                } else {
                    register();
                }
            }
        });

        // ===== АВТОВХОД ЕСЛИ УЖЕ ВОШЛИ =====
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'feed.html';
            }
        });

        // Инициализация при загрузке
        window.addEventListener('load', () => {
            console.log('🚀 Страница регистрации загружена');
        });
    </script>
</body>
</html>
