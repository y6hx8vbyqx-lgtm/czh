<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#000;
  --card:rgba(28,28,30,.95);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  padding-bottom:100px;
}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);
  border-radius:18px;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}
.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  cursor:pointer;
}
.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}

.container{
  max-width:430px;
  margin:auto;
  padding:130px 14px 30px;
}

.profile-header{
  background:var(--card);
  border-radius:22px;
  padding:20px;
  margin-bottom:14px;
  text-align:center;
}
.profile-avatar{
  width:100px;height:100px;
  border-radius:30px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  font-weight:700;
  margin:0 auto 16px;
}
.profile-name{
  font-size:22px;
  font-weight:700;
  margin-bottom:4px;
}
.profile-email{
  color:var(--sub);
  font-size:14px;
  margin-bottom:20px;
}
.profile-stats{
  display:flex;
  justify-content:space-around;
  border-top:1px solid var(--border);
  padding-top:16px;
}
.stat{
  text-align:center;
}
.stat-value{
  font-size:20px;
  font-weight:700;
}
.stat-label{
  color:var(--sub);
  font-size:12px;
}
.profile-info{
  color:var(--sub);
  font-size:13px;
  text-align:center;
  margin-top:8px;
}

.profile-details{
  background:var(--card);
  border-radius:22px;
  padding:20px;
  margin-bottom:14px;
}
.details-title{
  font-size:16px;
  font-weight:600;
  margin-bottom:12px;
}
.detail-item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid var(--border);
}
.detail-item:last-child{
  border-bottom:none;
}
.detail-label{
  color:var(--sub);
}
.detail-value{
  font-weight:500;
}

.posts{
  background:var(--card);
  border-radius:22px;
  padding:20px;
}
.posts-title{
  font-size:16px;
  font-weight:600;
  margin-bottom:12px;
}
.post{
  padding:16px;
  border-radius:16px;
  background:#1c1c1e;
  margin-bottom:10px;
}
.post:last-child{
  margin-bottom:0;
}
.post-text{
  margin-bottom:8px;
}
.post-time{
  color:var(--sub);
  font-size:12px;
}

.error{
  background:var(--card);
  border-radius:22px;
  padding:40px 20px;
  text-align:center;
  margin:20px 0;
}
.error-title{
  color:var(--danger);
  font-size:18px;
  margin-bottom:10px;
}
.error-text{
  color:var(--sub);
  font-size:14px;
}
</style>
</head>

<body>

<div class="dynamic-island" id="time"></div>

<div class="navbar">
  <div class="logo" onclick="goHome()">czhmass</div>
  <button class="nav-btn" onclick="logout()">🚪</button>
</div>

<div class="container" id="container">
  <!-- Контент будет загружен динамически -->
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
  authDomain:"czhmass.firebaseapp.com",
  projectId:"czhmass"
});
const db=firebase.firestore();
const auth=firebase.auth();

let currentUser, userData;

auth.onAuthStateChanged(async u=>{
  if(!u)return location.href="index.html";
  currentUser=u;
  await loadProfile();
});

async function loadProfile(){
  const container = document.getElementById("container");
  
  try {
    // Показываем загрузку
    container.innerHTML = `
      <div class="profile-header">
        <div class="profile-avatar">U</div>
        <div class="profile-name">Загрузка...</div>
        <div class="profile-email">Email адрес<br><small>загрузка...</small></div>
        <div class="profile-info">Виден только вам и администраторам</div>
        <div class="profile-stats">
          <div class="stat">
            <div class="stat-value">0</div>
            <div class="stat-label">Постов</div>
          </div>
          <div class="stat">
            <div class="stat-value">0</div>
            <div class="stat-label">Дней с нами</div>
          </div>
          <div class="stat">
            <div class="stat-value">-</div>
            <div class="stat-label">Последний вход</div>
          </div>
        </div>
      </div>
      <div class="profile-details">
        <div class="details-title">Информация о профиле</div>
        <div class="detail-item">
          <span class="detail-label">ID пользователя</span>
          <span class="detail-value">загрузка...</span>
        </div>
      </div>
      <div class="posts">
        <div class="posts-title">Мои посты</div>
        <div style="text-align:center;color:var(--sub);padding:40px 0;">
          Загрузка постов...
        </div>
      </div>`;
    
    // Загружаем данные пользователя
    const userDoc = await db.collection("users").doc(currentUser.uid).get();
    
    if (!userDoc.exists) {
      // Если документ не существует, создаем его
      await db.collection("users").doc(currentUser.uid).set({
        username: "user" + currentUser.uid.slice(-6),
        email: currentUser.email || "не указан",
        createdAt: new Date(),
        isAdmin: false,
        lastLogin: new Date()
      });
      
      userData = {
        username: "user" + currentUser.uid.slice(-6),
        email: currentUser.email || "не указан",
        createdAt: new Date(),
        isAdmin: false,
        lastLogin: new Date()
      };
    } else {
      userData = userDoc.data();
      
      // Обновляем время последнего входа
      await db.collection("users").doc(currentUser.uid).update({
        lastLogin: new Date()
      });
    }
    
    // Получаем количество постов пользователя
    const postsSnap = await db.collection("posts")
      .where("userId", "==", currentUser.uid)
      .get();
    const postsCount = postsSnap.size;
    
    // Вычисляем дни с нами
    const createdAt = userData.createdAt?.toDate ? userData.createdAt.toDate() : new Date(userData.createdAt);
    const daysWithUs = Math.floor((new Date() - createdAt) / (1000 * 60 * 60 * 24));
    
    // Форматируем последний вход
    let lastLoginFormatted = "-";
    if (userData.lastLogin) {
      const lastLoginDate = userData.lastLogin?.toDate ? userData.lastLogin.toDate() : new Date(userData.lastLogin);
      const now = new Date();
      const diffHours = Math.floor((now - lastLoginDate) / (1000 * 60 * 60));
      
      if (diffHours < 1) {
        lastLoginFormatted = "только что";
      } else if (diffHours < 24) {
        lastLoginFormatted = `${diffHours} ч назад`;
      } else {
        const diffDays = Math.floor(diffHours / 24);
        lastLoginFormatted = `${diffDays} д назад`;
      }
    }
    
    // Обновляем профиль
    container.innerHTML = `
      <div class="profile-header">
        <div class="profile-avatar">${userData.username?.[0]?.toUpperCase() || "U"}</div>
        <div class="profile-name">@${userData.username || "user"}</div>
        <div class="profile-email">${userData.email || "не указан"}</div>
        <div class="profile-info">Виден только вам и администраторам</div>
        <div class="profile-stats">
          <div class="stat">
            <div class="stat-value">${postsCount}</div>
            <div class="stat-label">Постов</div>
          </div>
          <div class="stat">
            <div class="stat-value">${daysWithUs}</div>
            <div class="stat-label">Дней с нами</div>
          </div>
          <div class="stat">
            <div class="stat-value">${lastLoginFormatted}</div>
            <div class="stat-label">Последний вход</div>
          </div>
        </div>
      </div>
      <div class="profile-details">
        <div class="details-title">Информация о профиле</div>
        <div class="detail-item">
          <span class="detail-label">ID пользователя</span>
          <span class="detail-value">${currentUser.uid}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Дата регистрации</span>
          <span class="detail-value">${createdAt.toLocaleDateString("ru-RU")}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Роль</span>
          <span class="detail-value">${userData.isAdmin ? "👑 Администратор" : "👤 Пользователь"}</span>
        </div>
      </div>`;
    
    // Загружаем посты пользователя
    await loadUserPosts();
    
  } catch(error) {
    console.error("Ошибка при загрузке профиля:", error);
    
    container.innerHTML = `
      <div class="error">
        <div class="error-title">Ошибка загрузки профиля</div>
        <div class="error-text">${error.message}</div>
        <button style="margin-top:20px;background:var(--accent);color:white;border:none;padding:12px 24px;border-radius:12px;font-weight:600;cursor:pointer;" onclick="loadProfile()">
          Попробовать снова
        </button>
      </div>`;
  }
}

// Функция для получения постов пользователя (без сложного запроса)
async function getUserPosts(uid) {
  try {
    // Получаем все посты и фильтруем на клиенте
    const allPostsSnap = await db.collection("posts")
      .orderBy("createdAt", "desc")
      .limit(50) // Ограничиваем для производительности
      .get();
    
    // Фильтруем по userId
    const userPosts = [];
    allPostsSnap.forEach(doc => {
      const post = doc.data();
      if (post.userId === uid) {
        userPosts.push({
          id: doc.id,
          ...post
        });
      }
    });
    
    return userPosts;
  } catch(error) {
    console.error("Ошибка при получении постов пользователя:", error);
    
    // Альтернативный способ: простой запрос без сортировки
    if (error.code === 'failed-precondition') {
      const simpleSnap = await db.collection("posts")
        .where("userId", "==", uid)
        .get();
      
      const userPosts = [];
      simpleSnap.forEach(doc => {
        userPosts.push({
          id: doc.id,
          ...doc.data()
        });
      });
      
      // Сортируем на клиенте
      userPosts.sort((a, b) => {
        const dateA = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.createdAt);
        const dateB = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(b.createdAt);
        return dateB - dateA;
      });
      
      return userPosts.slice(0, 20); // Ограничиваем количество
    }
    
    throw error;
  }
}

async function loadUserPosts() {
  const container = document.getElementById("container");
  
  try {
    // Получаем посты пользователя
    const userPosts = await getUserPosts(currentUser.uid);
    
    // Если постов нет
    if (userPosts.length === 0) {
      container.innerHTML += `
        <div class="posts">
          <div class="posts-title">Мои посты</div>
          <div style="text-align:center;color:var(--sub);padding:40px 0;">
            У вас пока нет постов
          </div>
        </div>`;
      return;
    }
    
    // Форматируем посты
    let postsHTML = `
      <div class="posts">
        <div class="posts-title">Мои посты</div>`;
    
    userPosts.forEach(post => {
      // Форматируем время
      let timeAgo = "только что";
      try {
        if (post.createdAt) {
          const postDate = post.createdAt.toDate ? post.createdAt.toDate() : new Date(post.createdAt);
          const now = new Date();
          const diff = now - postDate;
          const minutes = Math.floor(diff / (1000 * 60));
          const hours = Math.floor(minutes / 60);
          const days = Math.floor(hours / 24);
          
          if (days > 7) {
            timeAgo = postDate.toLocaleDateString("ru-RU");
          } else if (days > 0) {
            timeAgo = `${days} д назад`;
          } else if (hours > 0) {
            timeAgo = `${hours} ч назад`;
          } else if (minutes > 0) {
            timeAgo = `${minutes} мин назад`;
          }
        }
      } catch (dateError) {
        console.log("Ошибка форматирования даты:", dateError);
      }
      
      postsHTML += `
        <div class="post">
          <div class="post-text">${post.text}</div>
          <div class="post-time">${timeAgo}</div>
        </div>`;
    });
    
    postsHTML += `</div>`;
    container.innerHTML += postsHTML;
    
  } catch(error) {
    console.error("Ошибка при загрузке постов:", error);
    
    container.innerHTML += `
      <div class="posts">
        <div class="posts-title">Мои посты</div>
        <div style="text-align:center;color:var(--danger);padding:40px 0;">
          ${error.message.includes("index") ? 
            "Не удалось загрузить посты (требуется индекс в Firebase)" : 
            "Ошибка при загрузке постов"}
        </div>
      </div>`;
  }
}

function goHome() {
  location.href = "feed.html";
}

function logout() {
  if(confirm("Выйти из аккаунта?")){
    auth.signOut().then(()=>{
      location.href="index.html";
    });
  }
}

setInterval(()=>{
  const timeElement = document.getElementById("time");
  if(timeElement){
    timeElement.textContent = new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
  }
},1000);
</script>

</body>
</html>
