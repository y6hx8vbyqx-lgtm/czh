<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#000;
  --card:rgba(28,28,30,.95);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  padding-bottom:100px;
}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);
  border-radius:18px;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}
.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  cursor:pointer;
}
.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}

.container{
  max-width:430px;
  margin:auto;
  padding:130px 14px 30px;
}

.profile-header{
  background:var(--card);
  border-radius:22px;
  padding:20px;
  margin-bottom:14px;
  text-align:center;
}
.profile-avatar{
  width:100px;height:100px;
  border-radius:30px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  font-weight:700;
  margin:0 auto 16px;
}
.profile-name{
  font-size:22px;
  font-weight:700;
  margin-bottom:4px;
}
.profile-email{
  color:var(--sub);
  font-size:14px;
  margin-bottom:20px;
}
.profile-stats{
  display:flex;
  justify-content:space-around;
  border-top:1px solid var(--border);
  padding-top:16px;
}
.stat{
  text-align:center;
}
.stat-value{
  font-size:20px;
  font-weight:700;
}
.stat-label{
  color:var(--sub);
  font-size:12px;
}
.profile-info{
  color:var(--sub);
  font-size:13px;
  text-align:center;
  margin-top:8px;
}

.profile-details{
  background:var(--card);
  border-radius:22px;
  padding:20px;
  margin-bottom:14px;
}
.details-title{
  font-size:16px;
  font-weight:600;
  margin-bottom:12px;
}
.detail-item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid var(--border);
}
.detail-item:last-child{
  border-bottom:none;
}
.detail-label{
  color:var(--sub);
}
.detail-value{
  font-weight:500;
}

.posts{
  background:var(--card);
  border-radius:22px;
  padding:20px;
}
.posts-title{
  font-size:16px;
  font-weight:600;
  margin-bottom:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.posts-count{
  color:var(--sub);
  font-size:14px;
  font-weight:normal;
}
.post{
  padding:16px;
  border-radius:16px;
  background:#1c1c1e;
  margin-bottom:10px;
  position:relative;
}
.post:last-child{
  margin-bottom:0;
}
.post-text{
  margin-bottom:8px;
  line-height:1.4;
}
.post-time{
  color:var(--sub);
  font-size:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.post-actions{
  display:flex;
  gap:12px;
  margin-top:12px;
}
.post-action-btn{
  background:var(--accent);
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:10px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  transition:opacity 0.2s;
}
.post-action-btn:hover{
  opacity:0.9;
}
.post-action-btn.secondary{
  background:rgba(255,255,255,0.1);
}
.post-action-btn.danger{
  background:var(--danger);
}
.post-action-btn .icon{
  font-size:14px;
}

.load-more-btn, .hide-posts-btn{
  width:100%;
  background:var(--accent);
  color:white;
  border:none;
  padding:14px;
  border-radius:14px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  margin-top:12px;
  transition:opacity 0.2s;
}
.load-more-btn:hover, .hide-posts-btn:hover{
  opacity:0.9;
}
.hide-posts-btn{
  background:rgba(255,255,255,0.1);
}

.error{
  background:var(--card);
  border-radius:22px;
  padding:40px 20px;
  text-align:center;
  margin:20px 0;
}
.error-title{
  color:var(--danger);
  font-size:18px;
  margin-bottom:10px;
}
.error-text{
  color:var(--sub);
  font-size:14px;
}
</style>
</head>

<body>

<div class="dynamic-island" id="time"></div>

<div class="navbar">
  <div class="logo" onclick="goHome()">czhmass</div>
  <button class="nav-btn" onclick="logout()">🚪</button>
</div>

<div class="container" id="container">
  <!-- Контент будет загружен динамически -->
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
  authDomain:"czhmass.firebaseapp.com",
  projectId:"czhmass"
});
const db=firebase.firestore();
const auth=firebase.auth();

let currentUser, userData;
let allUserPosts = [];
let showAllPosts = false;
const POSTS_PER_PAGE = 1; // Показываем только 1 пост изначально

auth.onAuthStateChanged(async u=>{
  if(!u)return location.href="index.html";
  currentUser=u;
  await loadProfile();
});

async function loadProfile(){
  const container = document.getElementById("container");
  
  try {
    // Показываем загрузку
    container.innerHTML = `
      <div class="profile-header">
        <div class="profile-avatar">U</div>
        <div class="profile-name">Загрузка...</div>
        <div class="profile-email">Email адрес<br><small>загрузка...</small></div>
        <div class="profile-info">Виден только вам и администраторам</div>
        <div class="profile-stats">
          <div class="stat">
            <div class="stat-value">0</div>
            <div class="stat-label">Постов</div>
          </div>
          <div class="stat">
            <div class="stat-value">0</div>
            <div class="stat-label">Дней с нами</div>
          </div>
          <div class="stat">
            <div class="stat-value">-</div>
            <div class="stat-label">Последний вход</div>
          </div>
        </div>
      </div>
      <div class="profile-details">
        <div class="details-title">Информация о профиле</div>
        <div class="detail-item">
          <span class="detail-label">ID пользователя</span>
          <span class="detail-value">загрузка...</span>
        </div>
      </div>
      <div class="posts">
        <div class="posts-title">
          <span>Мои посты</span>
          <span class="posts-count">загрузка...</span>
        </div>
        <div style="text-align:center;color:var(--sub);padding:40px 0;">
          Загрузка постов...
        </div>
      </div>`;
    
    // Загружаем данные пользователя
    const userDoc = await db.collection("users").doc(currentUser.uid).get();
    
    if (!userDoc.exists) {
      // Если документ не существует, создаем его
      await db.collection("users").doc(currentUser.uid).set({
        username: "user" + currentUser.uid.slice(-6),
        email: currentUser.email || "не указан",
        createdAt: new Date(),
        isAdmin: false,
        lastLogin: new Date()
      });
      
      userData = {
        username: "user" + currentUser.uid.slice(-6),
        email: currentUser.email || "не указан",
        createdAt: new Date(),
        isAdmin: false,
        lastLogin: new Date()
      };
    } else {
      userData = userDoc.data();
      
      // Обновляем время последнего входа
      await db.collection("users").doc(currentUser.uid).update({
        lastLogin: new Date()
      });
    }
    
    // Получаем посты пользователя
    allUserPosts = await getUserPosts(currentUser.uid);
    const postsCount = allUserPosts.length;
    
    // Вычисляем дни с нами
    const createdAt = userData.createdAt?.toDate ? userData.createdAt.toDate() : new Date(userData.createdAt);
    const daysWithUs = Math.floor((new Date() - createdAt) / (1000 * 60 * 60 * 24));
    
    // Форматируем последний вход
    let lastLoginFormatted = "-";
    if (userData.lastLogin) {
      const lastLoginDate = userData.lastLogin?.toDate ? userData.lastLogin.toDate() : new Date(userData.lastLogin);
      const now = new Date();
      const diffHours = Math.floor((now - lastLoginDate) / (1000 * 60 * 60));
      
      if (diffHours < 1) {
        lastLoginFormatted = "только что";
      } else if (diffHours < 24) {
        lastLoginFormatted = `${diffHours} ч назад`;
      } else {
        const diffDays = Math.floor(diffHours / 24);
        lastLoginFormatted = `${diffDays} д назад`;
      }
    }
    
    // Обновляем профиль
    container.innerHTML = `
      <div class="profile-header">
        <div class="profile-avatar">${userData.username?.[0]?.toUpperCase() || "U"}</div>
        <div class="profile-name">@${userData.username || "user"}</div>
        <div class="profile-email">${userData.email || "не указан"}</div>
        <div class="profile-info">Виден только вам и администраторам</div>
        <div class="profile-stats">
          <div class="stat">
            <div class="stat-value">${postsCount}</div>
            <div class="stat-label">Постов</div>
          </div>
          <div class="stat">
            <div class="stat-value">${daysWithUs}</div>
            <div class="stat-label">Дней с нами</div>
          </div>
          <div class="stat">
            <div class="stat-value">${lastLoginFormatted}</div>
            <div class="stat-label">Последний вход</div>
          </div>
        </div>
      </div>
      <div class="profile-details">
        <div class="details-title">Информация о профиле</div>
        <div class="detail-item">
          <span class="detail-label">ID пользователя</span>
          <span class="detail-value">${currentUser.uid}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Дата регистрации</span>
          <span class="detail-value">${createdAt.toLocaleDateString("ru-RU")}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Роль</span>
          <span class="detail-value">${userData.isAdmin ? "👑 Администратор" : "👤 Пользователь"}</span>
        </div>
      </div>`;
    
    // Загружаем посты пользователя
    await renderUserPosts();
    
  } catch(error) {
    console.error("Ошибка при загрузке профиля:", error);
    
    container.innerHTML = `
      <div class="error">
        <div class="error-title">Ошибка загрузки профиля</div>
        <div class="error-text">${error.message}</div>
        <button style="margin-top:20px;background:var(--accent);color:white;border:none;padding:12px 24px;border-radius:12px;font-weight:600;cursor:pointer;" onclick="loadProfile()">
          Попробовать снова
        </button>
      </div>`;
  }
}

// Функция для получения постов пользователя
async function getUserPosts(uid) {
  try {
    // Получаем все посты и фильтруем на клиенте
    const allPostsSnap = await db.collection("posts")
      .orderBy("createdAt", "desc")
      .limit(100) // Ограничиваем для производительности
      .get();
    
    // Фильтруем по userId
    const userPosts = [];
    allPostsSnap.forEach(doc => {
      const post = doc.data();
      if (post.userId === uid) {
        userPosts.push({
          id: doc.id,
          ...post
        });
      }
    });
    
    return userPosts;
  } catch(error) {
    console.error("Ошибка при получении постов пользователя:", error);
    
    // Альтернативный способ: простой запрос без сортировки
    if (error.code === 'failed-precondition') {
      const simpleSnap = await db.collection("posts")
        .where("userId", "==", uid)
        .get();
      
      const userPosts = [];
      simpleSnap.forEach(doc => {
        userPosts.push({
          id: doc.id,
          ...doc.data()
        });
      });
      
      // Сортируем на клиенте
      userPosts.sort((a, b) => {
        const dateA = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.createdAt);
        const dateB = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(b.createdAt);
        return dateB - dateA;
      });
      
      return userPosts.slice(0, 50); // Ограничиваем количество
    }
    
    throw error;
  }
}

// Функция для отображения постов пользователя
async function renderUserPosts() {
  const container = document.getElementById("container");
  
  try {
    // Определяем, сколько постов показывать
    const postsToShow = showAllPosts ? allUserPosts : allUserPosts.slice(0, POSTS_PER_PAGE);
    
    // Если постов нет
    if (allUserPosts.length === 0) {
      container.innerHTML += `
        <div class="posts">
          <div class="posts-title">
            <span>Мои посты</span>
            <span class="posts-count">0 постов</span>
          </div>
          <div style="text-align:center;color:var(--sub);padding:40px 0;">
            У вас пока нет постов
          </div>
        </div>`;
      return;
    }
    
    // Форматируем посты
    let postsHTML = `
      <div class="posts">
        <div class="posts-title">
          <span>Мои посты</span>
          <span class="posts-count">${allUserPosts.length} ${getPostWord(allUserPosts.length)}</span>
        </div>`;
    
    postsToShow.forEach(post => {
      // Форматируем время
      let timeAgo = "только что";
      let fullDate = "";
      try {
        if (post.createdAt) {
          const postDate = post.createdAt.toDate ? post.createdAt.toDate() : new Date(post.createdAt);
          const now = new Date();
          const diff = now - postDate;
          const minutes = Math.floor(diff / (1000 * 60));
          const hours = Math.floor(minutes / 60);
          const days = Math.floor(hours / 24);
          
          if (days > 7) {
            timeAgo = postDate.toLocaleDateString("ru-RU");
            fullDate = postDate.toLocaleDateString("ru-RU", {
              day: "2-digit",
              month: "2-digit",
              year: "numeric"
            }) + ", " + postDate.toLocaleTimeString("ru-RU", {
              hour: "2-digit",
              minute: "2-digit"
            });
          } else if (days > 0) {
            timeAgo = `${days} д назад`;
            fullDate = postDate.toLocaleDateString("ru-RU");
          } else if (hours > 0) {
            timeAgo = `${hours} ч назад`;
            fullDate = "Сегодня, " + postDate.toLocaleTimeString("ru-RU", {
              hour: "2-digit",
              minute: "2-digit"
            });
          } else if (minutes > 0) {
            timeAgo = `${minutes} мин назад`;
            fullDate = "Сегодня, " + postDate.toLocaleTimeString("ru-RU", {
              hour: "2-digit",
              minute: "2-digit"
            });
          } else {
            fullDate = "Только что";
          }
        }
      } catch (dateError) {
        console.log("Ошибка форматирования даты:", dateError);
      }
      
      postsHTML += `
        <div class="post" id="post-${post.id}">
          <div class="post-text">${post.text}</div>
          <div class="post-time">
            <span title="${fullDate}">${timeAgo}</span>
            <span>❤️ ${post.likes || 0} | 💬 ${post.commentsCount || 0}</span>
          </div>
          <div class="post-actions">
            <button class="post-action-btn" onclick="goToPostInFeed('${post.id}')">
              <span class="icon">🔍</span> Найти в ленте
            </button>
            <button class="post-action-btn secondary" onclick="copyPostLink('${post.id}')">
              <span class="icon">🔗</span> Ссылка
            </button>
            ${(post.userId === currentUser.uid || userData?.isAdmin) ? 
              `<button class="post-action-btn danger" onclick="deletePost('${post.id}')">
                <span class="icon">🗑</span> Удалить
              </button>` : 
              ''}
          </div>
        </div>`;
    });
    
    // Добавляем кнопку "Показать еще" или "Скрыть"
    if (allUserPosts.length > POSTS_PER_PAGE) {
      if (!showAllPosts) {
        postsHTML += `
          <button class="load-more-btn" onclick="toggleShowAllPosts()">
            📂 Показать все посты (еще ${allUserPosts.length - POSTS_PER_PAGE})
          </button>`;
      } else {
        postsHTML += `
          <button class="hide-posts-btn" onclick="toggleShowAllPosts()">
            📁 Скрыть посты (оставить первый)
          </button>`;
      }
    }
    
    postsHTML += `</div>`;
    
    // Добавляем посты в контейнер
    const existingPosts = document.querySelector('.posts');
    if (existingPosts) {
      existingPosts.outerHTML = postsHTML;
    } else {
      container.innerHTML += postsHTML;
    }
    
  } catch(error) {
    console.error("Ошибка при отображении постов:", error);
    
    const errorHTML = `
      <div class="posts">
        <div class="posts-title">
          <span>Мои посты</span>
          <span class="posts-count">${allUserPosts.length} ${getPostWord(allUserPosts.length)}</span>
        </div>
        <div style="text-align:center;color:var(--danger);padding:40px 0;">
          ${error.message.includes("index") ? 
            "Не удалось загрузить посты (требуется индекс в Firebase)" : 
            "Ошибка при загрузке постов"}
        </div>
      </div>`;
    
    const existingPosts = document.querySelector('.posts');
    if (existingPosts) {
      existingPosts.outerHTML = errorHTML;
    } else {
      container.innerHTML += errorHTML;
    }
  }
}

// Функция для правильного склонения слова "пост"
function getPostWord(count) {
  if (count % 10 === 1 && count % 100 !== 11) {
    return "пост";
  } else if ([2, 3, 4].includes(count % 10) && ![12, 13, 14].includes(count % 100)) {
    return "поста";
  } else {
    return "постов";
  }
}

// Переключение между режимами показа постов
function toggleShowAllPosts() {
  showAllPosts = !showAllPosts;
  renderUserPosts();
  
  // Прокручиваем к постам
  const postsElement = document.querySelector('.posts');
  if (postsElement) {
    postsElement.scrollIntoView({ behavior: 'smooth' });
  }
}

// Переход к посту в основной ленте
function goToPostInFeed(postId) {
  // Сохраняем ID поста в localStorage
  localStorage.setItem('scrollToPostId', postId);
  
  // Переходим на главную страницу
  location.href = 'feed.html';
  
  // На feed.html нужно будет добавить код, который проверяет
  // localStorage.getItem('scrollToPostId') и прокручивает к посту
}

// Копирование ссылки на пост
function copyPostLink(postId) {
  const link = `${window.location.origin}/feed.html#post-${postId}`;
  
  // Создаем временный элемент для копирования
  const tempInput = document.createElement('input');
  tempInput.value = link;
  document.body.appendChild(tempInput);
  tempInput.select();
  document.execCommand('copy');
  document.body.removeChild(tempInput);
  
  // Показываем уведомление
  alert('Ссылка на пост скопирована в буфер обмена!\n\n' + link);
}

// Удаление поста
async function deletePost(postId) {
  if (!confirm("Вы уверены, что хотите удалить этот пост? Это действие нельзя отменить.")) {
    return;
  }
  
  try {
    // Удаляем пост
    await db.collection("posts").doc(postId).delete();
    
    // Удаляем из массива
    allUserPosts = allUserPosts.filter(post => post.id !== postId);
    
    // Обновляем отображение
    await renderUserPosts();
    
    // Обновляем счетчик постов в профиле
    const statValue = document.querySelector('.stat-value:first-child');
    if (statValue) {
      statValue.textContent = allUserPosts.length;
    }
    
    alert('Пост успешно удален!');
    
  } catch(error) {
    console.error("Ошибка при удалении поста:", error);
    alert('Не удалось удалить пост: ' + error.message);
  }
}

function goHome() {
  location.href = "feed.html";
}

function logout() {
  if(confirm("Выйти из аккаунта?")){
    auth.signOut().then(()=>{
      location.href="index.html";
    });
  }
}

setInterval(()=>{
  const timeElement = document.getElementById("time");
  if(timeElement){
    timeElement.textContent = new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
  }
},1000);
</script>

</body>
</html>
