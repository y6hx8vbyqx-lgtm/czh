<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - czhmass.com</title>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .navbar {
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #1877f2;
            text-decoration: none;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            background: #1877f2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #166fe5;
            transform: translateY(-1px);
        }

        .btn-back {
            background: #e4e6eb;
            color: #050505;
        }

        .btn-settings {
            background: #805ad5;
        }

        .profile-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            margin-bottom: 24px;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            font-weight: bold;
        }

        .username {
            font-size: 28px;
            font-weight: 700;
            color: #1c1e21;
            margin-bottom: 10px;
        }

        .email-info {
            margin-bottom: 20px;
        }

        .email-label {
            font-size: 14px;
            color: #65676b;
            margin-bottom: 5px;
        }

        .email-value {
            font-size: 18px;
            font-weight: 500;
            color: #1c1e21;
        }

        .privacy-note {
            font-size: 12px;
            color: #805ad5;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .admin-badge {
            background: #805ad5;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            min-width: 120px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #1877f2;
        }

        .stat-label {
            color: #65676b;
            font-size: 14px;
            margin-top: 5px;
        }

        .info-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #f0f2f5;
        }

        .info-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1c1e21;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f2f5;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .info-item {
            padding: 16px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .info-label {
            font-size: 14px;
            color: #65676b;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 500;
            color: #1c1e21;
        }

        .message {
            padding: 14px;
            border-radius: 8px;
            margin: 16px 0;
            display: none;
            font-size: 14px;
        }

        .success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .error {
            background: #fee2e2;
            color: #7f1d1d;
            border: 1px solid #fecaca;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #65676b;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
            
            .stats {
                flex-direction: column;
                gap: 20px;
            }
            
            .profile-card {
                padding: 25px;
            }
            
            .avatar {
                width: 100px;
                height: 100px;
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <a href="feed.html" class="logo">czhmass.com</a>
            <div class="nav-buttons">
                <button class="btn btn-back" onclick="window.location.href='feed.html'">← К ленте</button>
                <button class="btn btn-settings" onclick="window.location.href='profile-settings.html'">⚙️ Приватность</button>
            </div>
        </nav>

        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar" id="avatar">U</div>
                <h1 class="username" id="username">Загрузка...</h1>
                
                <div id="adminBadge" class="admin-badge" style="display: none;">👑 АДМИНИСТРАТОР</div>
                
                <div class="email-info">
                    <div class="email-label">Email адрес</div>
                    <div class="email-value" id="email">загрузка...</div>
                    <div class="privacy-note">
                        <span>🔒</span> Виден только вам и администраторам
                    </div>
                </div>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="postsCount">0</div>
                    <div class="stat-label">Постов</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="accountAge">0</div>
                    <div class="stat-label">Дней с нами</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="lastLogin">-</div>
                    <div class="stat-label">Последний вход</div>
                </div>
            </div>

            <div class="info-section">
                <h2 class="info-title">📊 Информация о профиле</h2>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">ID пользователя</div>
                        <div class="info-value" id="userId">загрузка...</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Дата регистрации</div>
                        <div class="info-value" id="createdAt">загрузка...</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Статус аккаунта</div>
                        <div class="info-value" id="accountStatus">Активен</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Роль</div>
                        <div class="info-value" id="role">Пользователь</div>
                    </div>
                </div>
            </div>

            <div id="loadingProfile" class="loading">
                <div>Загрузка профиля...</div>
            </div>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        // ===== FIREBASE КОНФИГ =====
        const firebaseConfig = {
            apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
            authDomain: "czhmass.firebaseapp.com",
            projectId: "czhmass",
            storageBucket: "czhmass.firebasestorage.app",
            messagingSenderId: "1064257019843",
            appId: "1:1064257019843:web:65488b45be2f86838ca776"
        };

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        let db, auth;
        let isMyProfile = false;

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            console.log('✅ Firebase инициализирован');
        }

        db = firebase.firestore();
        auth = firebase.auth();

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 4000);
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'Неизвестно';
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                return date.toLocaleDateString('ru-RU', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });
            } catch (e) {
                return 'Неизвестно';
            }
        }

        function calculateDays(timestamp) {
            if (!timestamp) return 0;
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                const now = new Date();
                const diff = now - date;
                return Math.floor(diff / (1000 * 60 * 60 * 24));
            } catch (e) {
                return 0;
            }
        }

        function formatLastLogin(timestamp) {
            if (!timestamp) return 'Сегодня';
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                const now = new Date();
                const diff = now - date;
                
                if (diff < 60000) return 'Только что';
                if (diff < 3600000) return `${Math.floor(diff / 60000)} мин назад`;
                if (diff < 86400000) return `${Math.floor(diff / 3600000)} ч назад`;
                if (diff < 172800000) return 'Вчера';
                
                return `${Math.floor(diff / 86400000)} дн. назад`;
            } catch (e) {
                return 'Недавно';
            }
        }

        function getAvatarLetter(username) {
            return username ? username.charAt(0).toUpperCase() : 'U';
        }

        // ===== ЗАГРУЗКА ПРОФИЛЯ =====
        async function loadProfile() {
            const user = auth.currentUser;
            
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    showMessage('❌ Профиль не найден', 'error');
                    return;
                }

                const userData = userDoc.data();
                
                // Обновляем аватар
                const avatarDiv = document.getElementById('avatar');
                avatarDiv.textContent = getAvatarLetter(userData.username);
                
                // Обновляем основную информацию
                document.getElementById('username').textContent = userData.username || 'Без имени';
                document.getElementById('email').textContent = user.email;
                document.getElementById('userId').textContent = user.uid.substring(0, 8) + '...';
                document.getElementById('createdAt').textContent = formatDate(userData.createdAt);
                document.getElementById('postsCount').textContent = userData.postsCount || 0;
                document.getElementById('accountAge').textContent = calculateDays(userData.createdAt);
                document.getElementById('lastLogin').textContent = formatLastLogin(userData.lastLogin);
                
                // Админ-бейдж
                if (userData.isAdmin) {
                    document.getElementById('adminBadge').style.display = 'inline-block';
                    document.getElementById('role').textContent = 'Администратор';
                }
                
                // Скрываем загрузку
                document.getElementById('loadingProfile').style.display = 'none';
                
                console.log('✅ Профиль загружен:', userData.username);

            } catch (error) {
                console.error('❌ Ошибка загрузки профиля:', error);
                showMessage('Ошибка загрузки профиля', 'error');
                document.getElementById('loadingProfile').innerHTML = '<div class="error">Ошибка загрузки профиля</div>';
            }
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        auth.onAuthStateChanged((user) => {
            if (user) {
                loadProfile();
            } else {
                window.location.href = 'index.html';
            }
        });

        // Запуск при загрузке
        window.addEventListener('load', () => {
            console.log('🚀 Страница profile.html загружена');
        });
    </script>
</body>
</html>
