<style>

body{

}
.logo{

  cursor:pointer;
}
.nav-btn{

  padding:8px 12px;border-radius:12px;font-size:16px;
}

.container{
  max-width:430px;
  margin:auto;
  padding:130px 14px 30px;
}

.profile-header{
  background:var(--card);
  border-radius:22px;
  padding:20px;
  margin-bottom:14px;
  text-align:center;
}
.profile-avatar{
  width:100px;height:100px;
  border-radius:30px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  font-weight:700;
  margin:0 auto 16px;
}
.profile-name{
  font-size:22px;
  font-weight:700;
  margin-bottom:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.change-name-btn{
  background:none;
  border:none;
  color:var(--sub);
  font-size:16px;
  cursor:pointer;

}
.change-name-btn:hover{

}
.profile-email{

}
.profile-stats{

}
.stat{

}
.stat-value{

  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.stat-label{
  color:var(--sub);

}
.profile-info{

}

.profile-details{
  background:var(--card);
  border-radius:22px;

}
.details-title{

}
.detail-item{

}

}

}

}
.posts-title{

  align-items:center;
}
.posts-count{

}
.post:last-child{

}

}

  font-size:18px;

}

/* Модальное окно для смены имени */
.modal-overlay{

  align-items:center;

}

.modal{

.modal-header{

}

}
.modal-close{

  color:var(--sub);
  font-size:20px;

.modal-input{
  width:100%;

}
.modal-input:focus{

}
.modal-buttons{

.modal-btn{

}

/* Уведомление */
.notification{

  left:50%;

}
.notification.show{

}
</style>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
  authDomain:"czhmass.firebaseapp.com",
  projectId:"czhmass"
});
const db=firebase.firestore();
const auth=firebase.auth();

let currentUser, userData;
let allUserPosts = [];
let showAllPosts = false;
const POSTS_PER_PAGE = 1;

auth.onAuthStateChanged(async u=>{
  if(!u)return location.href="index.html";
  currentUser=u;
  await loadProfile();
});

async function loadProfile(){
  const container = document.getElementById("container");
  
  try {
    // Показываем загрузку
    container.innerHTML = `
      <div class="profile-header">
        <div class="profile-avatar">U</div>
        <div class="profile-name">
          <span>Загрузка...</span>
        </div>
        <div class="profile-email">Email адрес<br><small>загрузка...</small></div>
        <div class="profile-info">Виден только вам и администраторам</div>
        <div class="profile-stats">
          <div class="stat">
            <div class="stat-value">
              <span>📝</span>
              <span>0</span>
            </div>
            <div class="stat-label">Постов</div>
          </div>
          <div class="stat">
            <div class="stat-value">
              <span>❤️</span>
              <span>0</span>
            </div>
            <div class="stat-label">Лайков</div>
          </div>
          <div class="stat">
            <div class="stat-value">-</div>
            <div class="stat-label">Последний вход</div>
          </div>
        </div>
      </div>
      <div class="profile-details">
        <div class="details-title">Информация о профиле</div>
        <div class="detail-item">
          <span class="detail-label">ID пользователя</span>
          <span class="detail-value">загрузка...</span>
        </div>
      </div>
      <div class="posts">
        <div class="posts-title">
          <span>Мои посты</span>
          <span class="posts-count">загрузка...</span>
        </div>
        <div style="text-align:center;color:var(--sub);padding:40px 0;">
          Загрузка постов...
        </div>
      </div>`;
    
    // Загружаем данные пользователя
    const userDoc = await db.collection("users").doc(currentUser.uid).get();
    
    if (!userDoc.exists) {
      // Если документ не существует, создаем его
      await db.collection("users").doc(currentUser.uid).set({
        username: "user" + currentUser.uid.slice(-6),
        email: currentUser.email || "не указан",
        createdAt: new Date(),
        isAdmin: false,
        lastLogin: new Date()
      });
      
      userData = {
        username: "user" + currentUser.uid.slice(-6),
        email: currentUser.email || "не указан",
        createdAt: new Date(),
        isAdmin: false,
        lastLogin: new Date()
      };
    } else {
      userData = userDoc.data();
      
      // Обновляем время последнего входа
      await db.collection("users").doc(currentUser.uid).update({
        lastLogin: new Date()
      });
    }
    
    // Получаем посты пользователя
    allUserPosts = await getUserPosts(currentUser.uid);
    const postsCount = allUserPosts.length;
    
    // Получаем общее количество лайков
    const totalLikes = await getUserLikesCount(currentUser.uid);
    
    // Вычисляем дни с нами
    const createdAt = userData.createdAt?.toDate ? userData.createdAt.toDate() : new Date(userData.createdAt);
    const daysWithUs = Math.floor((new Date() - createdAt) / (1000 * 60 * 60 * 24));
    
    // Форматируем последний вход
    let lastLoginFormatted = "-";
    if (userData.lastLogin) {
      const lastLoginDate = userData.lastLogin?.toDate ? userData.lastLogin.toDate() : new Date(userData.lastLogin);
      const now = new Date();
      const diffHours = Math.floor((now - lastLoginDate) / (1000 * 60 * 60));
      
      if (diffHours < 1) {
        lastLoginFormatted = "только что";
      } else if (diffHours < 24) {
        lastLoginFormatted = `${diffHours} ч назад`;
      } else {
        const diffDays = Math.floor(diffHours / 24);
        lastLoginFormatted = `${diffDays} д назад`;
      }
    }
    
    // Обновляем профиль
    container.innerHTML = `
      <div class="profile-header">
        <div class="profile-avatar">${userData.username?.[0]?.toUpperCase() || "U"}</div>
        <div class="profile-name">
          <span>@${userData.username || "user"}</span>
          <button class="change-name-btn" onclick="openChangeNameModal()" title="Сменить имя">
            ✏️
          </button>
        </div>
        <div class="profile-email">${userData.email || "не указан"}</div>
        <div class="profile-info">Виден только вам и администраторам</div>
        <div class="profile-stats">
          <div class="stat">
            <div class="stat-value">
              <span>📝</span>
              <span>${postsCount}</span>
            </div>
            <div class="stat-label">Постов</div>
          </div>
          <div class="stat">
            <div class="stat-value">
              <span>❤️</span>
              <span>${totalLikes}</span>
            </div>
            <div class="stat-label">Лайков</div>
          </div>
          <div class="stat">
            <div class="stat-value">${lastLoginFormatted}</div>
            <div class="stat-label">Последний вход</div>
          </div>
        </div>
      </div>
      <div class="profile-details">
        <div class="details-title">Информация о профиле</div>
        <div class="detail-item">
          <span class="detail-label">ID пользователя</span>
          <span class="detail-value">${currentUser.uid}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Дата регистрации</span>
          <span class="detail-value">${createdAt.toLocaleDateString("ru-RU")}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Роль</span>
          <span class="detail-value">${userData.isAdmin ? "👑 Администратор" : "👤 Пользователь"}</span>
        </div>
      </div>`;
    
    // Загружаем посты пользователя
    await renderUserPosts();
    
  } catch(error) {
    console.error("Ошибка при загрузке профиля:", error);
    
    container.innerHTML = `
      <div class="error">
        <div class="error-title">Ошибка загрузки профиля</div>
        <div class="error-text">${error.message}</div>
        <button style="margin-top:20px;background:var(--accent);color:white;border:none;padding:12px 24px;border-radius:12px;font-weight:600;cursor:pointer;" onclick="loadProfile()">
          Попробовать снова
        </button>
      </div>`;
  }
}

// Функция для получения постов пользователя
async function getUserPosts(uid) {
  try {
    // Получаем все посты и фильтруем на клиенте
    const allPostsSnap = await db.collection("posts")
      .orderBy("createdAt", "desc")
      .limit(100)
      .get();
    
    // Фильтруем по userId
    const userPosts = [];
    allPostsSnap.forEach(doc => {
      const post = doc.data();
      if (post.userId === uid) {
        userPosts.push({
          id: doc.id,
          ...post
        });
      }
    });
    
    return userPosts;
  } catch(error) {
    console.error("Ошибка при получении постов пользователя:", error);
    
    // Альтернативный способ: простой запрос без сортировки
    if (error.code === 'failed-precondition') {
      const simpleSnap = await db.collection("posts")
        .where("userId", "==", uid)
        .get();
      
      const userPosts = [];
      simpleSnap.forEach(doc => {
        userPosts.push({
          id: doc.id,
          ...doc.data()
        });
      });
      
      // Сортируем на клиенте
      userPosts.sort((a, b) => {
        const dateA = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.createdAt);
        const dateB = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(b.createdAt);
        return dateB - dateA;
      });
      
      return userPosts.slice(0, 50);
    }
    
    throw error;
  }
}

// Функция для получения общего количества лайков
async function getUserLikesCount(uid) {
  try {
    const snap = await db.collection("posts")
      .where("userId", "==", uid)
      .get();
    
    let totalLikes = 0;
    snap.forEach(doc => {
      const post = doc.data();
      totalLikes += (post.likes || 0);
    });
    
    return totalLikes;
  } catch(error) {
    console.error("Ошибка при получении лайков:", error);
    return 0;
  }
}

// Функция для отображения постов пользователя
async function renderUserPosts() {
  const container = document.getElementById("container");
  
  try {
    // Определяем, сколько постов показывать
    const postsToShow = showAllPosts ? allUserPosts : allUserPosts.slice(0, POSTS_PER_PAGE);
    
    // Если постов нет
    if (allUserPosts.length === 0) {
      container.innerHTML += `
        <div class="posts">
          <div class="posts-title">
            <span>Мои посты</span>
            <span class="posts-count">0 постов</span>
          </div>
          <div style="text-align:center;color:var(--sub);padding:40px 0;">
            У вас пока нет постов
          </div>
        </div>`;
      return;
    }
    
    // Форматируем посты
    let postsHTML = `
      <div class="posts">
        <div class="posts-title">
          <span>Мои посты</span>
          <span class="posts-count">${allUserPosts.length} ${getPostWord(allUserPosts.length)}</span>
        </div>`;
    
    postsToShow.forEach(post => {
      // Форматируем время
      let timeAgo = "только что";
      let fullDate = "";
      try {
        if (post.createdAt) {
          const postDate = post.createdAt.toDate ? post.createdAt.toDate() : new Date(post.createdAt);
          const now = new Date();
          const diff = now - postDate;
          const minutes = Math.floor(diff / (1000 * 60));
          const hours = Math.floor(minutes / 60);
          const days = Math.floor(hours / 24);
          
          if (days > 7) {
            timeAgo = postDate.toLocaleDateString("ru-RU");
            fullDate = postDate.toLocaleDateString("ru-RU", {
              day: "2-digit",
              month: "2-digit",
              year: "numeric"
            }) + ", " + postDate.toLocaleTimeString("ru-RU", {
              hour: "2-digit",
              minute: "2-digit"
            });
          } else if (days > 0) {
            timeAgo = `${days} д назад`;
            fullDate = postDate.toLocaleDateString("ru-RU");
          } else if (hours > 0) {
            timeAgo = `${hours} ч назад`;
            fullDate = "Сегодня, " + postDate.toLocaleTimeString("ru-RU", {
              hour: "2-digit",
              minute: "2-digit"
            });
          } else if (minutes > 0) {
            timeAgo = `${minutes} мин назад`;
            fullDate = "Сегодня, " + postDate.toLocaleTimeString("ru-RU", {
              hour: "2-digit",
              minute: "2-digit"
            });
          } else {
            fullDate = "Только что";
          }
        }
      } catch (dateError) {
        console.log("Ошибка форматирования даты:", dateError);
      }
      
      postsHTML += `
        <div class="post" id="post-${post.id}">
          <div class="post-text">${post.text}</div>
          <div class="post-time">
            <span title="${fullDate}">${timeAgo}</span>
            <span>❤️ ${post.likes || 0} | 💬 ${post.commentsCount || 0}</span>
          </div>
          <div class="post-actions">
            <button class="post-action-btn" onclick="goToPostInFeed('${post.id}')">
              <span class="icon">🔍</span> Найти в ленте
            </button>
            <button class="post-action-btn secondary" onclick="copyPostLink('${post.id}')">
              <span class="icon">🔗</span> Ссылка
            </button>
            <button class="post-action-btn danger" onclick="deletePost('${post.id}')">
              <span class="icon">🗑</span> Удалить
            </button>
          </div>
        </div>`;
    });
    
    // Добавляем кнопку "Показать еще" или "Скрыть"
    if (allUserPosts.length > POSTS_PER_PAGE) {
      if (!showAllPosts) {
        postsHTML += `
          <button class="load-more-btn" onclick="toggleShowAllPosts()">
            📂 Показать все посты (еще ${allUserPosts.length - POSTS_PER_PAGE})
          </button>`;
      } else {
        postsHTML += `
          <button class="hide-posts-btn" onclick="toggleShowAllPosts()">
            📁 Скрыть посты (оставить первый)
          </button>`;
      }
    }
    
    postsHTML += `</div>`;
    
    // Добавляем посты в контейнер
    const existingPosts = document.querySelector('.posts');
    if (existingPosts) {
      existingPosts.outerHTML = postsHTML;
    } else {
      container.innerHTML += postsHTML;
    }
    
  } catch(error) {
    console.error("Ошибка при отображении постов:", error);
    
    const errorHTML = `
      <div class="posts">
        <div class="posts-title">
          <span>Мои посты</span>
          <span class="posts-count">${allUserPosts.length} ${getPostWord(allUserPosts.length)}</span>
        </div>
        <div style="text-align:center;color:var(--danger);padding:40px 0;">
          ${error.message.includes("index") ? 
            "Не удалось загрузить посты (требуется индекс в Firebase)" : 
            "Ошибка при загрузке постов"}
        </div>
      </div>`;
    
    const existingPosts = document.querySelector('.posts');
    if (existingPosts) {
      existingPosts.outerHTML = errorHTML;
    } else {
      container.innerHTML += errorHTML;
    }
  }
}

// Функция для правильного склонения слова "пост"
function getPostWord(count) {
  if (count % 10 === 1 && count % 100 !== 11) {
    return "пост";
  } else if ([2, 3, 4].includes(count % 10) && ![12, 13, 14].includes(count % 100)) {
    return "поста";
  } else {
    return "постов";
  }
}

// Переключение между режимами показа постов
function toggleShowAllPosts() {
  showAllPosts = !showAllPosts;
  renderUserPosts();
  
  // Прокручиваем к постам
  const postsElement = document.querySelector('.posts');
  if (postsElement) {
    postsElement.scrollIntoView({ behavior: 'smooth' });
  }
}

// Переход к посту в основной ленте
function goToPostInFeed(postId) {
  // Сохраняем ID поста в localStorage
  localStorage.setItem('scrollToPostId', postId);
  
  // Переходим на главную страницу
  location.href = 'feed.html';
}

// Копирование ссылки на пост
function copyPostLink(postId) {
  const link = `${window.location.origin}/feed.html#post-${postId}`;
  
  // Создаем временный элемент для копирования
  const tempInput = document.createElement('input');
  tempInput.value = link;
  document.body.appendChild(tempInput);
  tempInput.select();
  document.execCommand('copy');
  document.body.removeChild(tempInput);
  
  // Показываем уведомление
  showNotification('Ссылка на пост скопирована в буфер обмена!\n\n' + link);
}

// Удаление поста
async function deletePost(postId) {
  if (!confirm("Вы уверены, что хотите удалить этот пост? Это действие нельзя отменить.")) {
    return;
  }
  
  try {
    // Удаляем пост
    await db.collection("posts").doc(postId).delete();
    
    // Удаляем из массива
    allUserPosts = allUserPosts.filter(post => post.id !== postId);
    
    // Обновляем отображение
    await renderUserPosts();
    
    // Обновляем счетчик постов и лайков в профиле
    const postsCount = allUserPosts.length;
    const totalLikes = await getUserLikesCount(currentUser.uid);
    
    // Обновляем статистику
    const statValues = document.querySelectorAll('.stat-value');
    if (statValues.length >= 2) {
      statValues[0].innerHTML = `<span>📝</span><span>${postsCount}</span>`;
      statValues[1].innerHTML = `<span>❤️</span><span>${totalLikes}</span>`;
    }
    
    showNotification('Пост успешно удален!');
    
  } catch(error) {
    console.error("Ошибка при удалении поста:", error);
    showNotification('Не удалось удалить пост: ' + error.message);
  }
}

// Обновляем имя пользователя во всех его постах
async function updateUsernameInAllPosts(userId, newUsername) {
  try {
    // Находим все посты пользователя
    const postsSnap = await db.collection("posts")
      .where("userId", "==", userId)
      .get();
    
    // Обновляем каждый пост
    const batch = db.batch();
    postsSnap.forEach(doc => {
      batch.update(doc.ref, { username: newUsername });
    });
    
    // Находим все комментарии пользователя
    const allPostsSnap = await db.collection("posts").get();
    allPostsSnap.forEach(postDoc => {
      const commentsRef = postDoc.ref.collection("comments")
        .where("userId", "==", userId);
      
      commentsRef.get().then(commentsSnap => {
        commentsSnap.forEach(commentDoc => {
          batch.update(commentDoc.ref, { username: newUsername });
        });
      });
    });
    
    await batch.commit();
    return true;
  } catch(error) {
    console.error("Ошибка при обновлении имени в постах:", error);
    return false;
  }
}

// Открыть модальное окно для смены имени
function openChangeNameModal() {
  const modal = document.getElementById('changeNameModal');
  const input = document.getElementById('newUsernameInput');
  
  // Показываем текущее имя (без @)
  const currentName = userData.username || '';
  input.value = currentName.replace('@', '');
  
  modal.classList.add('show');
  input.focus();
}

// Закрыть модальное окно
function closeChangeNameModal() {
  document.getElementById('changeNameModal').classList.remove('show');
}

// Сменить имя пользователя
async function changeUsername() {
  const input = document.getElementById('newUsernameInput');
  const newUsername = input.value.trim();
  
  if (!newUsername) {
    showNotification("Введите новое имя!");
    return;
  }
  
  if (newUsername.length < 3) {
    showNotification("Имя должно быть не менее 3 символов!");
    return;
  }
  
  if (newUsername.length > 20) {
    showNotification("Имя должно быть не более 20 символов!");
    return;
  }
  
  if (!/^[a-zA-Zа-яА-Я0-9_]+$/.test(newUsername)) {
    showNotification("Имя может содержать только буквы, цифры и подчеркивание!");
    return;
  }
  
  try {
    // Обновляем в Firestore
    await db.collection("users").doc(currentUser.uid).update({
      username: newUsername
    });
    
    // Обновляем локальные данные
    userData.username = newUsername;
    
    // Обновляем имя во всех постах и комментариях
    const updateSuccess = await updateUsernameInAllPosts(currentUser.uid, newUsername);
    
    if (updateSuccess) {
      showNotification("Имя успешно изменено! Обновляю данные...");
      
      // Обновляем отображение профиля
      document.querySelector('.profile-name span:first-child').textContent = "@" + newUsername;
      document.querySelector('.profile-avatar').textContent = newUsername[0]?.toUpperCase() || "U";
      
      // Закрываем модальное окно
      closeChangeNameModal();
      
      // Перезагружаем профиль через 1 секунду
      setTimeout(() => {
        loadProfile();
      }, 1000);
      
    } else {
      showNotification("Имя изменено, но возникла ошибка при обновлении старых постов");
    }
    
  } catch(error) {
    console.error("Ошибка при смене имени:", error);
    showNotification("Ошибка при смене имени: " + error.message);
  }
}

// Функция для показа уведомления
function showNotification(message, duration = 3000) {
  const notification = document.getElementById('notification');
  notification.textContent = message;
  notification.classList.add('show');
  
  setTimeout(() => {
    notification.classList.remove('show');
  }, duration);
}
