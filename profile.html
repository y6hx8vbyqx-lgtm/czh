<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - czhmass.com</title>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 10px;
        }

        /* iOS Динамический островок */
        .dynamic-island {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 35px;
            background: rgba(40, 40, 40, 0.95);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 15px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        .island-time {
            font-size: 15px;
            font-weight: 600;
            color: white;
        }

        /* Навигация */
        .navbar {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(28, 28, 30, 0.8);
            padding: 12px 20px;
            border-radius: 15px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 999;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: auto;
            white-space: nowrap;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-settings {
            background: rgba(52, 199, 89, 0.2);
            color: #34c759;
        }

        /* Основной контент */
        .container {
            padding: 140px 20px 100px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Карточка профиля в стиле iOS */
        .profile-card-ios {
            background: rgba(28, 28, 30, 0.8);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* Заголовок профиля */
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar-ios {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 22px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .username-ios {
            font-size: 24px;
            font-weight: 700;
            color: white;
            margin-bottom: 15px;
        }

        .email-info-ios {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .email-label-ios {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
        }

        .email-value-ios {
            font-size: 16px;
            font-weight: 500;
            color: white;
        }

        .privacy-note-ios {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .admin-badge-ios {
            background: linear-gradient(135deg, #805ad5, #6b46c1);
            color: white;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        /* Статистика */
        .stats-ios {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            padding: 20px 0;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item-ios {
            text-align: center;
            flex: 1;
        }

        .stat-value-ios {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
            font-variant-numeric: tabular-nums;
        }

        .stat-label-ios {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        /* Информационная сетка */
        .info-section-ios {
            margin-top: 30px;
        }

        .info-title-ios {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.9);
            padding-bottom: 10px;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .info-grid-ios {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .info-item-ios {
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            border: 0.5px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
        }

        .info-item-ios:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .info-label-ios {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 6px;
        }

        .info-value-ios {
            font-size: 15px;
            font-weight: 500;
            color: white;
        }

        /* Сообщения */
        .message {
            position: fixed;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1001;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            display: none;
            max-width: 90%;
            text-align: center;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translate(-50%, -20px);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        .success {
            background: rgba(52, 199, 89, 0.15);
            color: #34c759;
            border-color: rgba(52, 199, 89, 0.3);
        }

        .error {
            background: rgba(255, 59, 48, 0.15);
            color: #ff3b30;
            border-color: rgba(255, 59, 48, 0.3);
        }

        /* Загрузка */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
        }

        /* Адаптивность для мобильных */
        @media (max-width: 768px) {
            .navbar {
                width: 95%;
                top: 65px;
                padding: 10px 15px;
            }
            
            .container {
                padding: 130px 15px 80px;
            }
            
            .dynamic-island {
                width: 110px;
                height: 32px;
                top: 10px;
            }
            
            .profile-card-ios {
                padding: 20px;
            }
            
            .nav-buttons {
                gap: 6px;
            }
            
            .btn {
                padding: 8px 12px;
                font-size: 13px;
            }
            
            .btn span:not(.btn-icon) {
                display: none;
            }
            
            .btn-icon {
                display: inline-block;
                font-size: 16px;
            }
            
            .avatar-ios {
                width: 90px;
                height: 90px;
                font-size: 36px;
                border-radius: 20px;
            }
            
            .info-grid-ios {
                grid-template-columns: 1fr;
            }
            
            .stats-ios {
                flex-direction: column;
                gap: 25px;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                padding: 8px 12px;
            }
            
            .logo {
                font-size: 16px;
            }
            
            .btn {
                padding: 6px 10px;
            }
            
            .username-ios {
                font-size: 20px;
            }
            
            .avatar-ios {
                width: 80px;
                height: 80px;
                font-size: 32px;
            }
        }

        @media (max-width: 360px) {
            .navbar {
                padding: 6px 10px;
            }
            
            .logo {
                font-size: 14px;
            }
            
            .nav-buttons {
                gap: 4px;
            }
            
            .btn {
                padding: 5px 8px;
            }
            
            .dynamic-island {
                width: 100px;
                height: 30px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- iOS Динамический островок -->
    <div class="dynamic-island">
        <span class="island-time" id="currentTime">--:--</span>
    </div>

    <!-- Навигация -->
    <nav class="navbar">
        <div class="logo">czhmass</div>
        <div class="nav-buttons">
            <button class="btn btn-back" onclick="window.location.href='feed.html'" title="Назад">
                <span class="btn-icon">←</span>
                <span>Назад</span>
            </button>
            <button class="btn btn-settings" onclick="window.location.href='profile-settings.html'" title="Приватность">
                <span class="btn-icon">⚙️</span>
                <span>Приватность</span>
            </button>
        </div>
    </nav>

    <!-- Основной контейнер -->
    <div class="container">
        <!-- Карточка профиля -->
        <div class="profile-card-ios">
            <div class="profile-header">
                <div class="avatar-ios" id="avatar">U</div>
                <h1 class="username-ios" id="username">Загрузка...</h1>

                <div id="adminBadge" class="admin-badge-ios" style="display: none;">
                    <span class="btn-icon">👑</span>
                    <span>АДМИНИСТРАТОР</span>
                </div>

                <div class="email-info-ios">
                    <div class="email-label-ios">Email адрес</div>
                    <div class="email-value-ios" id="email">загрузка...</div>
                    <div class="privacy-note-ios">
                        <span>🔒</span>
                        Виден только вам и администраторам
                    </div>
                </div>
            </div>

            <div class="stats-ios">
                <div class="stat-item-ios">
                    <div class="stat-value-ios" id="postsCount">0</div>
                    <div class="stat-label-ios">Постов</div>
                </div>
                <div class="stat-item-ios">
                    <div class="stat-value-ios" id="accountAge">0</div>
                    <div class="stat-label-ios">Дней с нами</div>
                </div>
                <div class="stat-item-ios">
                    <div class="stat-value-ios" id="lastLogin">-</div>
                    <div class="stat-label-ios">Последний вход</div>
                </div>
            </div>

            <div class="info-section-ios">
                <h2 class="info-title-ios">📊 Информация о профиле</h2>
                <div class="info-grid-ios">
                    <div class="info-item-ios">
                        <div class="info-label-ios">ID пользователя</div>
                        <div class="info-value-ios" id="userId">загрузка...</div>
                    </div>
                    <div class="info-item-ios">
                        <div class="info-label-ios">Дата регистрации</div>
                        <div class="info-value-ios" id="createdAt">загрузка...</div>
                    </div>
                    <div class="info-item-ios">
                        <div class="info-label-ios">Статус аккаунта</div>
                        <div class="info-value-ios" id="accountStatus">Активен</div>
                    </div>
                    <div class="info-item-ios">
                        <div class="info-label-ios">Роль</div>
                        <div class="info-value-ios" id="role">Пользователь</div>
                    </div>
                </div>
            </div>

            <div id="loadingProfile" class="loading">
                <div>Загрузка профиля...</div>
            </div>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        // ===== FIREBASE КОНФИГ =====
        const firebaseConfig = {
            apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
            authDomain: "czhmass.firebaseapp.com",
            projectId: "czhmass",
            storageBucket: "czhmass.firebasestorage.app",
            messagingSenderId: "1064257019843",
            appId: "1:1064257019843:web:65488b45be2f86838ca776"
        };

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        let db, auth;

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            console.log('✅ Firebase инициализирован');
        }

        db = firebase.firestore();
        auth = firebase.auth();

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 4000);
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'Неизвестно';
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                return date.toLocaleDateString('ru-RU', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });
            } catch (e) {
                return 'Неизвестно';
            }
        }

        function calculateDays(timestamp) {
            if (!timestamp) return 0;
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                const now = new Date();
                const diff = now - date;
                return Math.floor(diff / (1000 * 60 * 60 * 24));
            } catch (e) {
                return 0;
            }
        }

        function formatLastLogin(timestamp) {
            if (!timestamp) return 'Сегодня';
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                const now = new Date();
                const diff = now - date;

                if (diff < 60000) return 'Только что';
                if (diff < 3600000) return `${Math.floor(diff / 60000)} мин назад`;
                if (diff < 86400000) return `${Math.floor(diff / 3600000)} ч назад`;
                if (diff < 172800000) return 'Вчера';

                return `${Math.floor(diff / 86400000)} дн. назад`;
            } catch (e) {
                return 'Недавно';
            }
        }

        function getAvatarLetter(username) {
            return username ? username.charAt(0).toUpperCase() : 'U';
        }

        // ===== ОБНОВЛЕНИЕ ВРЕМЕНИ В ОСТРОВКЕ =====
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
            document.getElementById('currentTime').textContent = timeString;
        }

        setInterval(updateTime, 1000);
        updateTime();

        // ===== АДАПТИВНЫЙ ИНТЕРФЕЙС ДЛЯ МОБИЛЬНЫХ =====
        function updateMobileUI() {
            const backBtn = document.querySelector('.btn-back');
            const settingsBtn = document.querySelector('.btn-settings');
            
            if (window.innerWidth <= 768) {
                // Мобильная версия - показываем только иконки
                backBtn.querySelector('span:not(.btn-icon)')?.style.setProperty('display', 'none', 'important');
                settingsBtn.querySelector('span:not(.btn-icon)')?.style.setProperty('display', 'none', 'important');
            } else {
                // Десктоп версия - показываем текст
                backBtn.querySelector('span:not(.btn-icon)')?.style.setProperty('display', 'inline', 'important');
                settingsBtn.querySelector('span:not(.btn-icon)')?.style.setProperty('display', 'inline', 'important');
            }
        }

        window.addEventListener('resize', updateMobileUI);

        // ===== ЗАГРУЗКА ПРОФИЛЯ =====
        async function loadProfile() {
            const user = auth.currentUser;

            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const userDoc = await db.collection('users').doc(user.uid).get();

                if (!userDoc.exists) {
                    showMessage('❌ Профиль не найден', 'error');
                    return;
                }

                const userData = userDoc.data();

                // Обновляем аватар
                const avatarDiv = document.getElementById('avatar');
                avatarDiv.textContent = getAvatarLetter(userData.username);

                // Обновляем основную информацию
                document.getElementById('username').textContent = userData.username || 'Без имени';
                document.getElementById('email').textContent = user.email;
                document.getElementById('userId').textContent = user.uid.substring(0, 8) + '...';
                document.getElementById('createdAt').textContent = formatDate(userData.createdAt);
                document.getElementById('postsCount').textContent = userData.postsCount || 0;
                document.getElementById('accountAge').textContent = calculateDays(userData.createdAt);
                document.getElementById('lastLogin').textContent = formatLastLogin(userData.lastLogin);

                // Админ-бейдж
                if (userData.isAdmin) {
                    document.getElementById('adminBadge').style.display = 'inline-flex';
                    document.getElementById('role').textContent = 'Администратор';
                }

                // Скрываем загрузку
                document.getElementById('loadingProfile').style.display = 'none';

                console.log('✅ Профиль загружен:', userData.username);

            } catch (error) {
                console.error('❌ Ошибка загрузки профиля:', error);
                showMessage('Ошибка загрузки профиля: ' + error.message, 'error');
            }
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        auth.onAuthStateChanged((user) => {
            if (user) {
                console.log('👤 Пользователь авторизован:', user.uid);
                updateMobileUI(); // Настраиваем интерфейс под размер экрана
                loadProfile();
            } else {
                window.location.href = 'index.html';
            }
        });

        // Запуск при загрузке страницы
        window.addEventListener('load', () => {
            console.log('🚀 Страница профиля загружена');
            updateTime();
        });
    </script>
</body>
</html>
