<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - czhmass.com</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }
        
        .navbar {
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #1877f2;
            text-decoration: none;
        }
        
        .btn {
            background: #1877f2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: #166fe5;
        }
        
        .btn-back {
            background: #e4e6eb;
            color: #050505;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .profile-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            font-weight: bold;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #050505;
        }
        
        .user-info {
            margin: 30px 0;
            text-align: left;
        }
        
        .info-row {
            display: flex;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .info-label {
            width: 180px;
            color: #65676b;
            font-weight: 500;
        }
        
        .info-value {
            color: #050505;
        }
        
        .admin-badge {
            background: #805ad5;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            margin-left: 10px;
        }
        
        .posts-section {
            margin-top: 40px;
            text-align: left;
        }
        
        .posts-section h2 {
            margin-bottom: 20px;
            color: #050505;
        }
        
        .user-post {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            border-left: 4px solid #1877f2;
        }
        
        .post-time {
            color: #65676b;
            font-size: 14px;
            margin-top: 8px;
        }
        
        .message {
            padding: 16px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }
        
        .error {
            background: #fee2e2;
            color: #7f1d1d;
            border: 1px solid #fecaca;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #65676b;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="feed.html" class="logo">czhmass.com</a>
        <button class="btn btn-back" onclick="window.location.href='feed.html'">← Назад в ленту</button>
    </nav>
    
    <div class="container">
        <div class="profile-card">
            <div class="avatar" id="userAvatar">?</div>
            <h1 id="userName">Загрузка...</h1>
            <div id="adminBadge" class="admin-badge" style="display: none;">👑 Администратор</div>
            
            <div class="user-info">
                <div class="info-row">
                    <div class="info-label">Email:</div>
                    <div class="info-value" id="userEmail">загрузка...</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Зарегистрирован:</div>
                    <div class="info-value" id="userCreated">загрузка...</div>
                </div>
                <div class="info-row">
                    <div class="info-label">Количество постов:</div>
                    <div class="info-value" id="userPostsCount">0</div>
                </div>
                <div class="info-row">
                    <div class="info-label">ID пользователя:</div>
                    <div class="info-value" id="userId" style="font-size: 12px; color: #65676b;">загрузка...</div>
                </div>
            </div>
            
            <div class="posts-section">
                <h2>📝 Мои последние посты</h2>
                <div id="userPosts">
                    <div class="loading">Загрузка постов...</div>
                </div>
            </div>
            
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        // ===== FIREBASE КОНФИГ =====
        const firebaseConfig = {
            apiKey: "AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
            authDomain: "czhmass.firebaseapp.com",
            projectId: "czhmass",
            storageBucket: "czhmass.firebasestorage.app",
            messagingSenderId: "1064257019843",
            appId: "1:1064257019843:web:65488b45be2f86838ca776"
        };
        
        // ===== ИНИЦИАЛИЗАЦИЯ =====
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🚀 Загрузка профиля...');
            
            try {
                // 1. Инициализация Firebase
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                
                const db = firebase.firestore();
                const auth = firebase.auth();
                
                // 2. Проверка авторизации
                auth.onAuthStateChanged(async (user) => {
                    if (!user) {
                        console.log('❌ Пользователь не авторизован');
                        
                        // Проверяем старые данные
                        const oldUserId = localStorage.getItem('czhmass_userId');
                        if (oldUserId) {
                            console.log('Найден старый ID, но нет Firebase сессии');
                            alert('Сессия устарела. Войдите заново.');
                            localStorage.clear();
                        }
                        
                        window.location.href = 'index.html';
                        return;
                    }
                    
                    console.log('✅ Пользователь авторизован:', user.email);
                    await loadUserProfile(user.uid, db);
                });
                
            } catch (error) {
                console.error('❌ Ошибка инициализации:', error);
                showMessage('Ошибка загрузки профиля', 'error');
            }
        });
        
        // ===== ЗАГРУЗКА ПРОФИЛЯ =====
        async function loadUserProfile(userId, db) {
            try {
                // 1. Получаем данные пользователя
                const userDoc = await db.collection('users').doc(userId).get();
                
                if (!userDoc.exists) {
                    showMessage('❌ Данные пользователя не найдены', 'error');
                    return;
                }
                
                const userData = userDoc.data();
                
                // 2. Обновляем интерфейс
                document.getElementById('userAvatar').textContent = 
                    userData.username ? userData.username.charAt(0).toUpperCase() : '?';
                
                document.getElementById('userName').textContent = 
                    userData.username ? '@' + userData.username : 'Без имени';
                
                document.getElementById('userEmail').textContent = 
                    userData.email || 'Не указан';
                
                document.getElementById('userId').textContent = userId;
                
                // Дата регистрации
                if (userData.createdAt) {
                    const date = userData.createdAt.toDate();
                    document.getElementById('userCreated').textContent = 
                        date.toLocaleDateString('ru-RU') + ' ' + date.toLocaleTimeString('ru-RU');
                }
                
                // Количество постов
                document.getElementById('userPostsCount').textContent = 
                    userData.postsCount || 0;
                
                // Админ-бейдж
                if (userData.isAdmin) {
                    document.getElementById('adminBadge').style.display = 'inline-block';
                }
                
                // 3. Загружаем посты пользователя
                await loadUserPosts(userId, db, userData.username);
                
            } catch (error) {
                console.error('❌ Ошибка загрузки профиля:', error);
                showMessage('Ошибка загрузки данных профиля', 'error');
            }
        }
        
        // ===== ЗАГРУЗКА ПОСТОВ ПОЛЬЗОВАТЕЛЯ =====
        async function loadUserPosts(userId, db, username) {
            try {
                const postsQuery = await db.collection('posts')
                    .where('userId', '==', userId)
                    .orderBy('createdAt', 'desc')
                    .limit(10)
                    .get();
                
                const postsContainer = document.getElementById('userPosts');
                
                if (postsQuery.empty) {
                    postsContainer.innerHTML = '<p style="color: #65676b; text-align: center;">У вас пока нет постов</p>';
                    return;
                }
                
                let postsHTML = '';
                postsQuery.forEach(doc => {
                    const post = doc.data();
                    postsHTML += `
                        <div class="user-post">
                            <div>${escapeHtml(post.text)}</div>
                            <div class="post-time">
                                ${formatTime(post.createdAt)}
                            </div>
                        </div>
                    `;
                });
                
                postsContainer.innerHTML = postsHTML;
                
            } catch (error) {
                console.error('❌ Ошибка загрузки постов:', error);
                document.getElementById('userPosts').innerHTML = 
                    '<p style="color: #dc2626;">Ошибка загрузки постов</p>';
            }
        }
        
        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
            
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 5000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return 'недавно';
            try {
                const date = timestamp.toDate();
                const now = new Date();
                const diff = now - date;
                const minutes = Math.floor(diff / 60000);
                
                if (minutes < 1) return 'только что';
                if (minutes < 60) return `${minutes} мин назад`;
                if (minutes < 1440) return `${Math.floor(minutes / 60)} ч назад`;
                return date.toLocaleDateString('ru-RU');
            } catch {
                return 'недавно';
            }
        }
    </script>
</body>
</html>
