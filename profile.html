<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>czhmass</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#000;
  --card:rgba(28,28,30,.95);
  --border:#1f1f1f;
  --text:#fff;
  --sub:#9a9a9a;
  --accent:linear-gradient(135deg,#667eea,#764ba2);
  --danger:#ff453a;
  --success:#32d74b;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
}
.fade{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.dynamic-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;
  background:#111;display:flex;align-items:center;justify-content:center;
  font-weight:600;z-index:1000;
}

.navbar{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  width:92%;max-width:430px;
  background:var(--card);
  border-radius:18px;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:999;
}
.logo{
  font-weight:700;
  background:var(--accent);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.nav-btns{display:flex;gap:8px}
.nav-btn{
  background:#1c1c1e;border:none;color:#fff;
  padding:8px 12px;border-radius:12px;font-size:16px;
}

.container{
  max-width:480px;
  margin:auto;
  padding:130px 14px 80px;
}

.create{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
}
.create textarea{
  width:100%;
  min-height:80px;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:16px;
  padding:12px;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.create button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border:none;
  border-radius:16px;
  background:var(--accent);
  color:#fff;
  font-weight:600;
}

.post{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
  position:relative;
  transition:box-shadow 0.3s ease;
}
.post.highlighted{
  box-shadow:0 0 0 2px var(--accent), 0 0 20px rgba(102,126,234,0.3);
}
.post-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}
.avatar{
  width:40px;
  height:40px;
  border-radius:14px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}
.post-user-info{
  display:flex;
  flex-direction:column;
  flex-grow:1;
}
.post-user{
  font-weight:600;
  cursor:pointer;
  transition:opacity 0.2s;
}
.post-user:hover{
  opacity:0.7;
}
.post-time{
  color:var(--sub);
  font-size:12px;
  margin-top:2px;
}
.post-text{
  margin:10px 0;
  line-height:1.4;
  word-break:break-word;
}
.post-actions{
  display:flex;
  gap:16px;
  margin-top:12px;
}
.action{
  background:none;
  border:none;
  color:var(--sub);
  font-size:18px;
  cursor:pointer;
  transition:transform 0.2s;
}
.action:hover{
  transform:scale(1.1);
}
.liked{color:#ff2d55}
.trash{
  margin-left:auto;
  background:none;border:none;
  color:var(--danger);font-size:18px;
  cursor:pointer;
}

.sheet{
  position:fixed;
  inset:0;
  background:#000;
  transform:translateY(100%);
  transition:.35s ease;
  z-index:2000;
  display:flex;
  flex-direction:column;
}
.sheet.show{transform:translateY(0)}
.sheet-header{
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
}
.sheet-body{
  flex:1;
  overflow:auto;
  padding:14px;
}
.sheet-footer{
  padding:12px;
  border-top:1px solid var(--border);
  display:flex;
  gap:8px;
}
.sheet-footer input{
  flex:1;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* PROFILE SHEET */
.profile-header{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:20px;
}
.profile-avatar{
  width:72px;height:72px;
  border-radius:22px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:700;
}
.profile-info{
  display:flex;
  flex-direction:column;
  gap:6px;
  flex:1;
}
.profile-name-container{
  display:flex;
  align-items:center;
  gap:10px;
}
.profile-name{
  font-size:18px;
  font-weight:700;
}
.change-name-btn{
  background:rgba(255,255,255,0.1);
  border:none;
  color:var(--sub);
  border-radius:8px;
  padding:4px 8px;
  font-size:12px;
  cursor:pointer;
  transition:background 0.2s;
}
.change-name-btn:hover{
  background:rgba(255,255,255,0.2);
}
.profile-stats{
  display:flex;
  gap:16px;
}
.profile-stat{
  display:flex;
  flex-direction:column;
}
.profile-stat-value{
  font-size:16px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:4px;
}
.profile-stat-label{
  color:var(--sub);
  font-size:12px;
  margin-top:2px;
}
.likes-stat{
  color:#ff2d55;
}
.posts-stat{
  color:#5ac8fa;
}

/* Форма смены имени */
.name-change-form{
  background:var(--card);
  border-radius:16px;
  padding:16px;
  margin-top:16px;
  margin-bottom:16px;
  display:none;
}
.name-change-form.show{
  display:block;
}
.name-change-form input{
  width:100%;
  background:#1c1c1e;
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  color:#fff;
  margin-bottom:12px;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.name-change-buttons{
  display:flex;
  gap:8px;
}
.name-change-buttons button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
}
.name-change-buttons button:first-child{
  background:var(--success);
  color:white;
}
.name-change-buttons button:last-child{
  background:rgba(255,255,255,0.1);
  color:var(--text);
}

/* Уведомление */
.notification{
  position:fixed;
  top:120px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:var(--accent);
  color:white;
  padding:12px 20px;
  border-radius:14px;
  font-weight:600;
  z-index:1999;
  opacity:0;
  transition:opacity 0.3s, transform 0.3s;
  pointer-events:none;
  max-width:90%;
  text-align:center;
}
.notification.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<div class="dynamic-island" id="time"></div>

<div class="navbar">
  <div class="logo">czhmass</div>
  <div class="nav-btns">
    <!-- ВАЖНО: кнопка профиля ведёт на profile.html -->
    <button class="nav-btn" onclick="location.href='profile.html'">👤</button>

    <!-- ВАЖНО: кнопка админа ведёт на admin.html -->
    <button class="nav-btn" id="adminBtn" style="display:none" onclick="location.href='admin.html'">👑</button>

    <button class="nav-btn" onclick="logout()">🚪</button>
  </div>
</div>

<div class="container">

  <div class="create">
    <textarea id="postText" placeholder="Что у вас нового? Пишите анонимно..."></textarea>
    <button onclick="createPost()">Опубликовать</button>
  </div>

  <div id="feed"></div>

</div>

<!-- Уведомление -->
<div class="notification" id="notification"></div>

<!-- COMMENTS -->
<div class="sheet" id="commentsSheet">
  <div class="sheet-header">
    <strong>Комментарии</strong>
    <button class="action" onclick="closeComments()">✕</button>
  </div>
  <div class="sheet-body" id="commentsBody"></div>
  <div class="sheet-footer">
    <input id="commentInput" placeholder="Комментарий" onkeypress="if(event.key==='Enter') addComment()">
    <button class="action" onclick="addComment()">📤</button>
  </div>
</div>

<!-- PROFILE (только для кликов по нику) -->
<div class="sheet" id="profileSheet">
  <div class="sheet-header">
    <strong>Профиль</strong>
    <button class="action" onclick="closeProfile()">✕</button>
  </div>
  <div class="sheet-body">
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar">A</div>
      <div class="profile-info">
        <div class="profile-name-container">
          <div class="profile-name" id="profileName">@anon</div>
          <button class="change-name-btn" onclick="toggleNameChangeForm()">✏️</button>
        </div>
        <div class="profile-stats">
          <div class="profile-stat">
            <div class="profile-stat-value posts-stat">
              <span>📝</span>
              <span id="profilePostsCount">0</span>
            </div>
            <div class="profile-stat-label">постов</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-value likes-stat">
              <span>❤️</span>
              <span id="profileLikesCount">0</span>
            </div>
            <div class="profile-stat-label">лайков</div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Форма смены имени -->
    <div class="name-change-form" id="nameChangeForm">
      <input type="text" id="newUsernameInput" placeholder="Новое имя пользователя" maxlength="20">
      <div class="name-change-buttons">
        <button onclick="changeUsername()">Сохранить</button>
        <button onclick="toggleNameChangeForm()">Отмена</button>
      </div>
    </div>
    
    <div id="profilePosts"></div>
  </div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBn-gM0CM2NPMGZ6OpytlPkiIOSIm54hcY",
  authDomain:"czhmass.firebaseapp.com",
  projectId:"czhmass"
});
const db=firebase.firestore();
const auth=firebase.auth();

let currentUser,userData;
let postsCache=new Map();
let currentPostId=null;
let currentProfileUserId = null;

auth.onAuthStateChanged(async u=>{
  if(!u)return location.href="index.html";
  currentUser=u;
  const snap=await db.collection("users").doc(u.uid).get();
  userData=snap.data()||{};
  if(userData.isAdmin) adminBtn.style.display="block";
  loadPosts();
  
  // Проверяем, нужно ли прокрутить к определенному посту
  setTimeout(checkPostToScroll, 1000);
});

// Проверяем, нужно ли прокрутить к посту из профиля
function checkPostToScroll() {
  const postIdToScroll = localStorage.getItem('scrollToPostId');
  if (postIdToScroll) {
    console.log("Ищем пост для прокрутки:", postIdToScroll);
    
    // Даем время на загрузку всех постов
    setTimeout(() => {
      const postElement = document.getElementById(`post-${postIdToScroll}`);
      if (postElement) {
        console.log("Пост найден, прокручиваем...");
        postElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
        postElement.classList.add('highlighted');
        
        // Показываем уведомление
        showNotification('Найден пост из вашего профиля!');
        
        // Убираем подсветку через 5 секунд
        setTimeout(() => {
          postElement.classList.remove('highlighted');
        }, 5000);
      } else {
        console.log("Пост не найден в DOM");
        showNotification('Пост не найден в ленте');
      }
      
      // Очищаем после использования
      localStorage.removeItem('scrollToPostId');
    }, 500);
  }
}

// Функция для показа уведомления
function showNotification(message, duration = 3000) {
  const notification = document.getElementById('notification');
  notification.textContent = message;
  notification.classList.add('show');
  
  setTimeout(() => {
    notification.classList.remove('show');
  }, duration);
}

// Функция для форматирования времени (сколько времени прошло)
function formatTimeAgo(date) {
  if (!date) return "только что";
  
  const now = new Date();
  const diff = now - date;
  const seconds = Math.floor(diff / 1000);
  const minutes = Math.floor(seconds / 60);
  const hours = Math.floor(minutes / 60);
  const days = Math.floor(hours / 24);
  
  if (days > 7) {
    // Если больше недели, показываем дату
    return date.toLocaleDateString("ru-RU", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric"
    }) + ", " + date.toLocaleTimeString("ru-RU", {
      hour: "2-digit",
      minute: "2-digit"
    });
  } else if (days > 0) {
    return `${days} д назад`;
  } else if (hours > 0) {
    return `${hours} ч назад`;
  } else if (minutes > 0) {
    return `${minutes} мин назад`;
  } else {
    return "только что";
  }
}

// Функция для полного форматирования даты и времени
function formatFullDateTime(date) {
  if (!date) return "";
  
  return date.toLocaleDateString("ru-RU", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric"
  }) + ", " + date.toLocaleTimeString("ru-RU", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

async function loadPosts(){
  const feed = document.getElementById("feed");
  feed.innerHTML = "<div style='text-align:center;color:var(--sub);padding:40px 0;'>Загрузка постов...</div>";
  
  try {
    const snap = await db.collection("posts").orderBy("createdAt","desc").get();
    
    if (snap.empty) {
      feed.innerHTML = "<div style='text-align:center;color:var(--sub);padding:40px 0;'>Пока нет постов. Будьте первым!</div>";
      return;
    }
    
    feed.innerHTML = "";
    
    snap.forEach(doc=>{
      const p=doc.data();
      postsCache.set(doc.id,p);
      const liked=p.likedBy?.includes(currentUser.uid);
      
      // Форматируем время
      let timeAgo = "только что";
      let fullDateTime = "";
      try {
        if (p.createdAt) {
          const postDate = p.createdAt.toDate ? p.createdAt.toDate() : new Date(p.createdAt);
          timeAgo = formatTimeAgo(postDate);
          fullDateTime = formatFullDateTime(postDate);
        }
      } catch (dateError) {
        console.log("Ошибка форматирования даты:", dateError);
      }
      
      feed.innerHTML+=`
      <div class="post fade" id="post-${doc.id}">
        <div class="post-header">
          <div class="avatar">${p.username?.[0]||"A"}</div>
          <div class="post-user-info">
            <div class="post-user" onclick="openProfile('${p.userId}','${p.username}')">
              @${p.username}
            </div>
            <div class="post-time" title="${fullDateTime}">${timeAgo}</div>
          </div>
          ${(p.userId===currentUser.uid||userData.isAdmin)?
            `<button class="trash" onclick="deletePost('${doc.id}', '${p.userId}')">🗑</button>`:""}
        </div>
        <div class="post-text">${p.text}</div>
        <div class="post-actions">
          <button class="action ${liked?"liked":""}" onclick="toggleLike('${doc.id}')">
            ${liked?"❤️":"🤍"} ${p.likes||0}
          </button>
          <button class="action" onclick="openComments('${doc.id}')">
            💬 ${p.commentsCount||0}
          </button>
        </div>
      </div>`;
    });
    
    // Проверяем еще раз после загрузки
    setTimeout(checkPostToScroll, 100);
    
  } catch(error) {
    console.error("Ошибка при загрузке постов:", error);
    feed.innerHTML = `<div style='text-align:center;color:var(--danger);padding:40px 0;'>Ошибка при загрузке постов: ${error.message}</div>`;
  }
}

async function createPost(){
  const postText = document.getElementById("postText");
  if(!postText.value.trim()){
    showNotification("Напишите что-нибудь перед отправкой!");
    return;
  }
  
  try {
    const username = userData.username || "anon" + currentUser.uid.slice(-4);
    
    await db.collection("posts").add({
      text: postText.value,
      userId: currentUser.uid,
      username: username,
      createdAt: new Date(),
      likes: 0,
      likedBy: [],
      commentsCount: 0
    });
    
    postText.value = "";
    showNotification("Пост опубликован!");
    loadPosts();
    
  } catch(error) {
    console.error("Ошибка при создании поста:", error);
    showNotification("Ошибка при публикации: " + error.message);
  }
}

async function deletePost(postId, postUserId){
  if(!confirm("Удалить пост?"))return;
  
  try {
    await db.collection("posts").doc(postId).delete();
    showNotification("Пост удален!");
    
    // Перезагружаем основную ленту
    loadPosts();
    
    // Если профиль открыт и это пост того же пользователя, обновляем профиль
    if (currentProfileUserId === postUserId) {
      await refreshProfilePosts(postUserId);
    }
    
  } catch(error) {
    console.error("Ошибка при удалении поста:", error);
    showNotification("Не удалось удалить пост: " + error.message);
  }
}

async function toggleLike(id){
  const p=postsCache.get(id);
  const liked=p.likedBy?.includes(currentUser.uid);
  
  try {
    await db.collection("posts").doc(id).update({
      likes: firebase.firestore.FieldValue.increment(liked?-1:1),
      likedBy: liked
        ? firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
        : firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
    });
    
    showNotification(liked ? "Лайк убран" : "Посту понравилось!");
    loadPosts();
    
  } catch(error) {
    console.error("Ошибка при лайке:", error);
    showNotification("Ошибка: " + error.message);
  }
}

function openComments(id){
  currentPostId=id;
  commentsSheet.classList.add("show");
  loadComments();
}
function closeComments(){
  commentsSheet.classList.remove("show");
}

async function loadComments(){
  const commentsBody = document.getElementById("commentsBody");
  commentsBody.innerHTML = "<div style='text-align:center;color:var(--sub);padding:40px 0;'>Загрузка комментариев...</div>";
  
  try {
    const snap = await db.collection("posts").doc(currentPostId)
      .collection("comments").orderBy("createdAt").get();
    
    if (snap.empty) {
      commentsBody.innerHTML = "<div style='text-align:center;color:var(--sub);padding:40px 0;'>Комментариев пока нет</div>";
      return;
    }
    
    commentsBody.innerHTML = "";
    
    snap.forEach(d=>{
      const c=d.data();
      
      // Форматируем время для комментария
      let timeAgo = "только что";
      try {
        if (c.createdAt) {
          const commentDate = c.createdAt.toDate ? c.createdAt.toDate() : new Date(c.createdAt);
          timeAgo = formatTimeAgo(commentDate);
        }
      } catch (dateError) {
        console.log("Ошибка форматирования даты комментария:", dateError);
      }
      
      commentsBody.innerHTML+=`
        <div class="post fade">
          <div class="post-header">
            <div class="avatar">${c.username?.[0]||"A"}</div>
            <div class="post-user-info">
              <strong>@${c.username}</strong>
              <div class="post-time">${timeAgo}</div>
            </div>
          </div>
          <div class="post-text">${c.text}</div>
        </div>`;
    });
    
  } catch(error) {
    console.error("Ошибка при загрузке комментариев:", error);
    commentsBody.innerHTML = `<div style='text-align:center;color:var(--danger);padding:40px 0;'>Ошибка загрузки: ${error.message}</div>`;
  }
}

async function addComment(){
  const commentInput = document.getElementById("commentInput");
  if(!commentInput.value.trim()){
    showNotification("Напишите комментарий!");
    return;
  }
  
  try {
    const username = userData.username || "anon" + currentUser.uid.slice(-4);
    
    await db.collection("posts").doc(currentPostId)
      .collection("comments").add({
        text: commentInput.value,
        userId: currentUser.uid,
        username: username,
        createdAt: new Date()
      });
    
    await db.collection("posts").doc(currentPostId)
      .update({
        commentsCount: firebase.firestore.FieldValue.increment(1)
      });
    
    commentInput.value = "";
    showNotification("Комментарий добавлен!");
    loadComments();
    loadPosts();
    
  } catch(error) {
    console.error("Ошибка при добавлении комментария:", error);
    showNotification("Ошибка: " + error.message);
  }
}

// Функция для получения количества постов пользователя
async function getUserPostsCount(uid) {
  const snap = await db.collection("posts")
    .where("userId", "==", uid)
    .get();
  return snap.size;
}

// Функция для получения общего количества лайков пользователя
async function getUserLikesCount(uid) {
  try {
    const snap = await db.collection("posts")
      .where("userId", "==", uid)
      .get();
    
    let totalLikes = 0;
    snap.forEach(doc => {
      const post = doc.data();
      totalLikes += (post.likes || 0);
    });
    
    return totalLikes;
  } catch(error) {
    console.error("Ошибка при получении лайков пользователя:", error);
    return 0;
  }
}

// Функция для получения всех постов пользователя (без сложного запроса)
async function getUserPosts(uid) {
  try {
    // Получаем все посты и фильтруем на клиенте
    const allPostsSnap = await db.collection("posts")
      .orderBy("createdAt", "desc")
      .limit(100)
      .get();
    
    // Фильтруем по userId
    const userPosts = [];
    allPostsSnap.forEach(doc => {
      const post = doc.data();
      if (post.userId === uid) {
        userPosts.push({
          id: doc.id,
          ...post
        });
      }
    });
    
    return userPosts;
  } catch(error) {
    console.error("Ошибка при получении постов пользователя:", error);
    
    // Альтернативный способ: простой запрос без сортировки
    if (error.code === 'failed-precondition') {
      const simpleSnap = await db.collection("posts")
        .where("userId", "==", uid)
        .get();
      
      const userPosts = [];
      simpleSnap.forEach(doc => {
        userPosts.push({
          id: doc.id,
          ...doc.data()
        });
      });
      
      // Сортируем на клиенте
      userPosts.sort((a, b) => {
        const dateA = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.createdAt);
        const dateB = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(b.createdAt);
        return dateB - dateA;
      });
      
      return userPosts.slice(0, 50);
    }
    
    throw error;
  }
}

// Функция для обновления постов в профиле
async function refreshProfilePosts(uid) {
  const profilePosts = document.getElementById("profilePosts");
  const profilePostsCount = document.getElementById("profilePostsCount");
  const profileLikesCount = document.getElementById("profileLikesCount");
  
  if (!profilePosts) return;
  
  try {
    // Получаем количество постов
    const postsCount = await getUserPostsCount(uid);
    profilePostsCount.textContent = postsCount;
    
    // Получаем количество лайков
    const likesCount = await getUserLikesCount(uid);
    profileLikesCount.textContent = likesCount;
    
    // Очищаем контейнер
    profilePosts.innerHTML = "";
    
    // Если постов нет
    if (postsCount === 0) {
      profilePosts.innerHTML = `
        <div style="text-align:center;color:var(--sub);padding:40px 0;">
          У пользователя пока нет постов
        </div>`;
      return;
    }
    
    // Получаем посты пользователя
    const userPosts = await getUserPosts(uid);
    
    // Добавляем посты
    userPosts.forEach(post => {
      const canDelete = post.userId === currentUser.uid || userData.isAdmin;
      
      // Форматируем дату
      let timeAgo = "только что";
      let fullDateTime = "";
      
      try {
        if (post.createdAt) {
          const postDate = post.createdAt.toDate ? post.createdAt.toDate() : new Date(post.createdAt);
          timeAgo = formatTimeAgo(postDate);
          fullDateTime = formatFullDateTime(postDate);
        }
      } catch (dateError) {
        console.log("Ошибка форматирования даты:", dateError);
      }
      
      profilePosts.innerHTML += `
        <div class="post fade" id="profile-post-${post.id}">
          <div class="post-text">${post.text}</div>
          <div class="post-time" title="${fullDateTime}">
            <span>${timeAgo}</span>
            <span style="color:#ff2d55;margin-left:10px;">❤️ ${post.likes || 0}</span>
            <span style="color:#5ac8fa;margin-left:10px;">💬 ${post.commentsCount || 0}</span>
          </div>
          ${canDelete ? 
            `<button class="trash" style="position:absolute;top:16px;right:16px;" 
                     onclick="deletePostFromProfile('${post.id}', '${uid}')">🗑</button>` : 
            ""}
        </div>`;
    });
    
  } catch(error) {
    console.error("Ошибка при загрузке постов профиля:", error);
    profilePosts.innerHTML = `
      <div style="text-align:center;color:var(--danger);padding:40px 0;">
        ${error.message.includes("index") ? 
          "Пожалуйста, создайте индекс в Firebase Console" : 
          "Ошибка при загрузке постов"}
      </div>`;
  }
}

// Функция удаления поста из профиля
async function deletePostFromProfile(postId, userId) {
  if(!confirm("Удалить этот пост из профиля?")) return;
  
  try {
    await db.collection("posts").doc(postId).delete();
    
    // Удаляем пост из DOM
    const postElement = document.getElementById(`profile-post-${postId}`);
    if (postElement) {
      postElement.remove();
    }
    
    // Обновляем счетчики через запрос к Firestore
    const postsCount = await getUserPostsCount(userId);
    const likesCount = await getUserLikesCount(userId);
    
    document.getElementById("profilePostsCount").textContent = postsCount;
    document.getElementById("profileLikesCount").textContent = likesCount;
    
    // Обновляем основную ленту
    loadPosts();
    showNotification("Пост удален из профиля!");
    
  } catch(error) {
    console.error("Ошибка при удалении поста:", error);
    showNotification("Не удалось удалить пост: " + error.message);
  }
}

// Показать/скрыть форму смены имени
function toggleNameChangeForm() {
  const form = document.getElementById('nameChangeForm');
  const input = document.getElementById('newUsernameInput');
  
  if (form.classList.contains('show')) {
    form.classList.remove('show');
    input.value = '';
  } else {
    form.classList.add('show');
    input.focus();
  }
}

// Сменить имя пользователя
async function changeUsername() {
  const newUsernameInput = document.getElementById('newUsernameInput');
  const newUsername = newUsernameInput.value.trim();
  
  if (!newUsername) {
    showNotification("Введите новое имя пользователя!");
    return;
  }
  
  if (newUsername.length < 3) {
    showNotification("Имя должно быть минимум 3 символа!");
    return;
  }
  
  if (newUsername.length > 20) {
    showNotification("Имя не должно превышать 20 символов!");
    return;
  }
  
  // Проверяем, не начинается ли имя с @
  const cleanUsername = newUsername.startsWith('@') ? newUsername.substring(1) : newUsername;
  
  try {
    // Обновляем имя в профиле пользователя
    await db.collection('users').doc(currentUser.uid).update({
      username: cleanUsername,
      updatedAt: new Date()
    });
    
    // Обновляем имя во всех постах пользователя
    const postsSnapshot = await db.collection('posts')
      .where('userId', '==', currentUser.uid)
      .get();
    
    const batch = db.batch();
    postsSnapshot.forEach(doc => {
      batch.update(doc.ref, { username: cleanUsername });
    });
    
    await batch.commit();
    
    // Обновляем имя во всех комментариях пользователя
    // Для этого нужно пройтись по всем постам и обновить комментарии
    // Это можно сделать фоново, но для простоты пока обновим только посты
    
    // Обновляем локальные данные
    userData.username = cleanUsername;
    
    // Обновляем аватар и имя в профиле
    document.getElementById('profileName').textContent = '@' + cleanUsername;
    document.getElementById('profileAvatar').textContent = cleanUsername[0].toUpperCase();
    
    // Скрываем форму
    toggleNameChangeForm();
    
    // Показываем уведомление
    showNotification("Имя успешно изменено!");
    
    // Обновляем основную ленту
    setTimeout(() => {
      loadPosts();
    }, 500);
    
  } catch(error) {
    console.error("Ошибка при смене имени:", error);
    showNotification("Ошибка при смене имени: " + error.message);
  }
}

async function openProfile(uid, name){
  currentProfileUserId = uid;
  profileSheet.classList.add("show");
  
  // Скрываем форму смены имени при открытии чужого профиля
  const form = document.getElementById('nameChangeForm');
  form.classList.remove('show');
  document.getElementById('newUsernameInput').value = '';
  
  // Показываем кнопку смены имени только для своего профиля
  const changeNameBtn = document.querySelector('.change-name-btn');
  if (uid === currentUser.uid) {
    changeNameBtn.style.display = 'block';
  } else {
    changeNameBtn.style.display = 'none';
  }
  
  // header
  document.getElementById("profileName").textContent="@"+name;
  document.getElementById("profileAvatar").textContent=name?.[0]||"A";
  
  // Сначала показываем загрузку
  document.getElementById("profilePosts").innerHTML = `
    <div style="text-align:center;color:var(--sub);padding:40px 0;">
      Загрузка постов...
    </div>`;
  
  // Затем загружаем посты и статистику
  await refreshProfilePosts(uid);
}

function closeProfile(){

}
